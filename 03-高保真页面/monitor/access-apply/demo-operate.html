<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>示范运营准入申请 - 智能网联汽车安全监测平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{DEFAULT:'#1677ff',hover:'#4096ff',disabled:'#85a5cc'}}}}}</script>
  <style>.version-node{padding:8px 10px;border-left:2px solid #f0f0f0;margin-left:8px;position:relative}.version-node::before{content:'';position:absolute;left:-6px;top:12px;width:10px;height:10px;border-radius:50%;border:2px solid}.version-node.current{border-left-color:#1677ff;background:#f0f5ff}.version-node.current::before{border-color:#1677ff;background:#1677ff}.version-node.passed{border-left-color:#52c41a}.version-node.passed::before{border-color:#52c41a;background:#52c41a}.version-node.expired{border-left-color:#d9d9d9}.version-node.expired::before{border-color:#d9d9d9;background:#d9d9d9}.version-node.processing{border-left-color:#fa8c16}.version-node.processing::before{border-color:#fa8c16;background:#fa8c16}.change-highlight{background:#fff7e6;border-left:3px solid #fa8c16;padding:8px 12px;border-radius:0 6px 6px 0;margin-bottom:8px}.change-old{color:#00000073;text-decoration:line-through;font-size:12px}.change-new{color:#fa8c16;font-weight:500;font-size:13px}.multi-select{position:relative;display:inline-block}.multi-select-panel{display:none;position:absolute;top:100%;left:0;z-index:1000;background:#fff;border:1px solid #d9d9d9;border-radius:6px;box-shadow:0 6px 16px rgba(0,0,0,.08);padding:8px 0;min-width:180px;max-height:260px;overflow-y:auto}.multi-select-panel.show{display:block}.multi-select-panel label{display:flex;align-items:center;padding:5px 12px;cursor:pointer;font-size:13px;color:#000000d9}.multi-select-panel label:hover{background:#f5f5f5}.multi-select-panel input[type=checkbox]{margin-right:8px}</style>
</head>
<body>
<div id="app" class="flex h-screen overflow-hidden">
  <aside id="sidebar"></aside>
  <div class="flex-1 flex flex-col overflow-hidden">
    <header id="topnav"></header>
    <main class="flex-1 overflow-auto bg-[#f0f2f5] p-6">
      <div class="page-header"><h2>示范运营准入申请</h2><div class="flex gap-2"><button class="ant-btn ant-btn-primary" onclick="openApplyModal()">+ 新增申请</button></div></div>
      <div class="filter-bar"><div class="filter-row">
        <div class="filter-item"><label>申请编号</label><input class="ant-input" placeholder="请输入" id="fAppId" style="width:140px"></div>
        <div class="filter-item"><label>申请类型</label><div class="ant-select" id="fType">全部<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg></div></div>
        <div class="filter-item"><label>申请主体</label><input class="ant-input" placeholder="请输入" id="fCompany" style="width:140px"></div>
        <div class="filter-item"><label>申请状态</label><div class="multi-select" id="msStatus"><div class="ant-input flex items-center justify-between cursor-pointer" style="width:200px;height:32px;padding:0 12px;font-size:13px;color:#00000073" onclick="toggleMultiSelect('msStatus')"><span id="msStatusLabel">全部</span><svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg></div><div class="multi-select-panel" id="msStatusPanel"><label><input type="checkbox" value="draft">草稿</label><label><input type="checkbox" value="pending_review">待初审</label><label><input type="checkbox" value="pending_expert">待专家评审</label><label><input type="checkbox" value="pending_joint">待联席审批</label><label><input type="checkbox" value="rejected">已退回</label><label><input type="checkbox" value="withdrawn">已撤回</label><label><input type="checkbox" value="pending_plate">待上传牌照</label><label><input type="checkbox" value="active">已生效</label><label><input type="checkbox" value="expired">已过期</label><label><input type="checkbox" value="terminated">已终止</label></div></div></div>
        <div class="filter-item"><label>有效期</label><div class="ant-select" id="fValid" onclick="toggleDropdown('validDropdown')">全部<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg></div><div class="dropdown-panel" id="validDropdown" style="display:none;position:absolute;z-index:1000;background:#fff;border:1px solid #d9d9d9;border-radius:6px;box-shadow:0 6px 16px rgba(0,0,0,.08);padding:4px 0;min-width:120px"><div style="padding:5px 12px;cursor:pointer;font-size:13px" onclick="selectValid('all','全部')">全部</div><div style="padding:5px 12px;cursor:pointer;font-size:13px" onclick="selectValid('valid','有效')">有效</div><div style="padding:5px 12px;cursor:pointer;font-size:13px" onclick="selectValid('expired','已过期')">已过期</div><div style="padding:5px 12px;cursor:pointer;font-size:13px" onclick="selectValid('not_started','未生效')">未生效</div></div></div>
        <div class="flex gap-2 items-end"><button class="ant-btn ant-btn-primary" onclick="renderTable()">查询</button><button class="ant-btn" onclick="resetFilter()">重置</button></div>
      </div></div>
      <div class="ant-table-wrapper">
        <div style="overflow-x:auto"><table class="ant-table"><thead><tr><th>申请编号</th><th>申请类型</th><th>申请主体</th><th>示范运营类型</th><th>原申请编号</th><th>运营车辆数</th><th>运营路段数</th><th>申请状态</th><th>申请时间</th><th>有效期起止</th><th>操作</th></tr></thead><tbody id="mainTbody"></tbody></table></div>
        <div class="flex items-center justify-between px-4 py-3"><span class="text-sm text-[#00000073]" id="totalCount">共 0 条</span><div class="ant-pagination" id="paginationBar"></div></div>
      </div>
    </main>
  </div>
</div>
<script>
const PAGE_ID='demo-operate';
var pageSize=10;var currentPage=1;
var statusMap={draft:{label:'草稿',cls:'ant-tag-default'},pending_review:{label:'待初审',cls:'ant-tag-processing'},pending_expert:{label:'待专家评审',cls:'ant-tag-processing'},pending_joint:{label:'待联席审批',cls:'ant-tag-processing'},rejected:{label:'已退回',cls:'ant-tag-error'},withdrawn:{label:'已撤回',cls:'ant-tag-default'},pending_plate:{label:'待上传牌照',cls:'ant-tag-warning'},active:{label:'已生效',cls:'ant-tag-success'},expired:{label:'已过期',cls:'ant-tag-default'},terminated:{label:'已终止',cls:'ant-tag-error'}};
var typeMap={initial:{label:'初次申请'},renewal:{label:'续期申请'},change:{label:'变更申请'},add_vehicle:{label:'新增相同配置车辆'}};
var operateTypeMap={passenger:{label:'载人示范运营'},cargo:{label:'载物示范运营'},special:{label:'特种作业示范运营'}};
var appData=[
  {id:'DO202604001',type:'initial',operateType:'passenger',company:'A公司',origId:'-',vehicleCount:2,roadCount:3,status:'pending_review',time:'2026-04-10',validFrom:'2026-04-15',validTo:'2026-10-15'},
  {id:'DO202604002',type:'renewal',operateType:'cargo',company:'B公司',origId:'DO202603001',vehicleCount:1,roadCount:2,status:'active',time:'2026-04-05',validFrom:'2026-05-01',validTo:'2026-10-05'},
  {id:'DO202604003',type:'change',operateType:'passenger',company:'D公司',origId:'DO202603002',vehicleCount:1,roadCount:1,status:'rejected',time:'2026-04-08',validFrom:'-',validTo:'-'},
  {id:'DO202604004',type:'add_vehicle',operateType:'cargo',company:'A公司',origId:'DO202604001',vehicleCount:1,roadCount:2,status:'active',time:'2026-04-12',validFrom:'2026-04-20',validTo:'2026-10-20'},
  {id:'DO202604005',type:'initial',operateType:'passenger',company:'D公司',origId:'-',vehicleCount:1,roadCount:1,status:'pending_expert',time:'2026-04-24',validFrom:'-',validTo:'-'},
  {id:'DO202604006',type:'initial',operateType:'special',company:'上海E公司',origId:'-',vehicleCount:1,roadCount:2,status:'pending_plate',time:'2026-04-25',validFrom:'2026-05-01',validTo:'2026-11-01'},
  {id:'DO202604007',type:'initial',operateType:'passenger',company:'G公司',origId:'-',vehicleCount:1,roadCount:2,status:'active',time:'2026-04-28',validFrom:'2026-05-01',validTo:'2026-11-01'},
  {id:'DO202603001',type:'initial',operateType:'cargo',company:'B公司',origId:'-',vehicleCount:1,roadCount:2,status:'expired',time:'2026-03-01',validFrom:'2026-03-15',validTo:'2026-04-30'},
  {id:'DO202603002',type:'initial',operateType:'passenger',company:'D公司',origId:'-',vehicleCount:1,roadCount:1,status:'active',time:'2026-03-10',validFrom:'2026-03-20',validTo:'2026-09-20'},
  {id:'DO202605001',type:'initial',operateType:'passenger',company:'J公司',origId:'-',vehicleCount:1,roadCount:1,status:'pending_joint',time:'2026-05-01',validFrom:'-',validTo:'-'},
  {id:'DO202605002',type:'initial',operateType:'cargo',company:'S公司',origId:'-',vehicleCount:1,roadCount:1,status:'draft',time:'2026-05-08',validFrom:'-',validTo:'-'},
  {id:'DO202604008',type:'initial',operateType:'special',company:'J公司',origId:'-',vehicleCount:1,roadCount:1,status:'terminated',time:'2026-04-19',validFrom:'2026-05-01',validTo:'2026-11-01'},
  {id:'DO202605003',type:'initial',operateType:'passenger',company:'T品牌',origId:'-',vehicleCount:1,roadCount:2,status:'active',time:'2025-11-20',validFrom:'2025-12-01',validTo:'2026-06-30'}
];
function getOps(d){var ops=['<button class="ant-btn-link" onclick="openDetail(\''+d.id+'\')">查看</button>'];if(d.status==='draft')ops.push('<button class="ant-btn-link">编辑</button>','<button class="ant-btn-link">提交</button>');if(d.status==='rejected')ops.push('<button class="ant-btn-link">重新提交</button>');if(d.status==='pending_review'||d.status==='pending_expert')ops.push('<button class="ant-btn-link">撤回</button>');if(d.status==='active'){ops.push('<button class="ant-btn-link" onclick="openReportSubmitPage(\''+d.id+'\')">报告提交</button>');var vt=new Date(d.validTo);var nm=new Date();var tm=new Date(nm.getTime()+60*24*60*60*1000);if(vt<=tm)ops.push('<button class="ant-btn-link" onclick="openRenewalPage(\''+d.id+'\')">续期</button>');ops.push('<button class="ant-btn-link" onclick="openChangePage(\''+d.id+'\')">变更</button>','<button class="ant-btn-link" onclick="openAddVehiclePage(\''+d.id+'\')">新增相同配置车辆</button>');}return ops.join(' ');}

function toggleMultiSelect(id){var panel=document.getElementById(id+'Panel');panel.classList.toggle('show');}
function getMultiSelectValues(id){var cbs=document.querySelectorAll('#'+id+'Panel input[type=checkbox]');var vals=[];cbs.forEach(function(cb){if(cb.checked)vals.push(cb.value);});return vals;}
function updateMultiSelectLabel(id){var vals=getMultiSelectValues(id);var label=document.getElementById(id+'Label');label.textContent=vals.length===0?'全部':vals.length+'项已选';label.style.color=vals.length===0?'#00000073':'#1677ff';}
var currentValidFilter='all';
function toggleDropdown(id){var el=document.getElementById(id);el.style.display=el.style.display==='none'?'block':'none';}
function selectValid(val,label){currentValidFilter=val;var sel=document.getElementById('fValid');sel.innerHTML=label+'<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>';document.getElementById('validDropdown').style.display='none';}
document.addEventListener('click',function(e){document.querySelectorAll('.multi-select').forEach(function(ms){if(!ms.contains(e.target)){ms.querySelector('.multi-select-panel').classList.remove('show');}});if(!e.target.closest('#fValid')&&!e.target.closest('#validDropdown')){var vd=document.getElementById('validDropdown');if(vd)vd.style.display='none';}});
document.addEventListener('change',function(e){if(e.target.closest('.multi-select-panel')){var panel=e.target.closest('.multi-select-panel');var ms=panel.closest('.multi-select');updateMultiSelectLabel(ms.id);}});

function renderTable(){var data=[].concat(appData);var statusVals=getMultiSelectValues('msStatus');if(statusVals.length>0)data=data.filter(function(d){return statusVals.indexOf(d.status)>-1;});if(currentValidFilter==='valid'){data=data.filter(function(d){return d.validFrom!=='-'&&d.validTo!=='-'&&new Date(d.validTo)>=new Date()&&new Date(d.validFrom)<=new Date();});}else if(currentValidFilter==='expired'){data=data.filter(function(d){return d.validTo!=='-'&&new Date(d.validTo)<new Date();});}else if(currentValidFilter==='not_started'){data=data.filter(function(d){return d.validFrom!=='-'&&new Date(d.validFrom)>new Date();});}var total=data.length;var tp=Math.ceil(total/pageSize)||1;var s=(currentPage-1)*pageSize;var pd=data.slice(s,s+pageSize);var h='';pd.forEach(function(d){var st=statusMap[d.status]||statusMap.draft;var ty=typeMap[d.type]||typeMap.initial;var ot=operateTypeMap[d.operateType]||{label:'-'};var vr=d.validFrom!=='-'?d.validFrom+' 至 '+d.validTo:'-';h+='<tr><td>'+d.id+'</td><td><span class="ant-tag ant-tag-default">'+ty.label+'</span></td><td>'+d.company+'</td><td><span class="ant-tag ant-tag-processing">'+ot.label+'</span></td><td>'+(d.origId!=='-'?'<button class="ant-btn-link" onclick="openDetail(\''+d.origId+'\')">'+d.origId+'</button>':'-')+'</td><td>'+d.vehicleCount+'</td><td>'+d.roadCount+'</td><td><span class="ant-tag '+st.cls+'">'+st.label+'</span></td><td>'+d.time+'</td><td class="text-xs">'+vr+'</td><td class="flex gap-1 flex-wrap">'+getOps(d)+'</td></tr>';});document.getElementById('mainTbody').innerHTML=h;document.getElementById('totalCount').textContent='共 '+total+' 条';var pg='<span class="page-item'+(currentPage<=1?' disabled':'')+'" onclick="goPage('+(currentPage-1)+')">‹</span>';for(var i=1;i<=tp;i++)pg+='<span class="page-item'+(i===currentPage?' active':'')+'" onclick="goPage('+i+')">'+i+'</span>';pg+='<span class="page-item'+(currentPage>=tp?' disabled':'')+'" onclick="goPage('+(currentPage+1)+')">›</span><span class="text-sm text-[#00000073] ml-2">'+pageSize+' 条/页</span>';document.getElementById('paginationBar').innerHTML=pg;}
function goPage(p){var tp=Math.ceil(appData.length/pageSize)||1;if(p<1||p>tp)return;currentPage=p;renderTable();}
function resetFilter(){document.getElementById('fAppId').value='';document.getElementById('fCompany').value='';document.querySelectorAll('#msStatusPanel input[type=checkbox]').forEach(function(cb){cb.checked=false;});updateMultiSelectLabel('msStatus');currentValidFilter='all';var sel=document.getElementById('fValid');sel.innerHTML='全部<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>';currentPage=1;renderTable();}

var roadData=[{name:'襄阳市区示范运营路段',type:'城市道路',status:'开放'},{name:'高新区示范运营专用道路',type:'专用道路',status:'开放'},{name:'东津新区示范运营路段',type:'城市道路',status:'开放'},{name:'襄阳经开区示范运营主干道',type:'城市道路',status:'开放'},{name:'襄阳机场路示范运营段',type:'高速公路',status:'暂停'}];
var vehicleData=[{vin:'LSVAU2180N2012345',brand:'T品牌',model:'秦PLUS DM-i',level:'L3',mileage:'12,350km / 620h',violations:0,accidents:0,insuranceExpiry:'2027-03-15'},{vin:'LSVAU2180N2012347',brand:'E品牌',model:'ES6',level:'L4',mileage:'8,200km / 410h',violations:1,accidents:0,insuranceExpiry:'2027-04-20'},{vin:'LSVAU2180N2012349',brand:'金龙',model:'T5',level:'L4',mileage:'15,600km / 780h',violations:0,accidents:0,insuranceExpiry:'2027-05-10'},{vin:'LSVAU2180N2012350',brand:'V品牌',model:'E-HS3',level:'L4',mileage:'6,800km / 340h',violations:0,accidents:1,insuranceExpiry:'2027-06-01'},{vin:'LSVAU2180N2012351',brand:'C公司',model:'RT6',level:'L4',mileage:'22,100km / 1,105h',violations:2,accidents:0,insuranceExpiry:'2027-02-28'}];
var personData=[{name:'刘建国',gender:'男',age:42,unit:'A公司',idType:'身份证',idNo:'420600198301011234'},{name:'孙丽华',gender:'女',age:36,unit:'B公司',idType:'身份证',idNo:'420600198801022345'},{name:'周明',gender:'男',age:45,unit:'D公司',idType:'身份证',idNo:'420600198001033456'},{name:'吴芳',gender:'女',age:38,unit:'上海E公司',idType:'身份证',idNo:'420600198701044567'},{name:'郑伟',gender:'男',age:40,unit:'C公司',idType:'身份证',idNo:'420600198501055678'}];
var selectedRoads=[];var selectedVehicles=[];var selectedPersons=[];

function openRoadSelectModal(){var html='<div style="max-height:400px;overflow-y:auto"><table class="ant-table" style="width:100%"><thead><tr><th><input type="checkbox" class="ant-checkbox" onclick="toggleAllRoads(this)"></th><th>路段名称</th><th>路段类型</th><th>路段状态</th></tr></thead><tbody>';for(var i=0;i<roadData.length;i++){var ck=selectedRoads.indexOf(i)>-1?'checked':'';html+='<tr><td><input type="checkbox" class="ant-checkbox road-cb" data-idx="'+i+'" '+ck+'></td><td>'+roadData[i].name+'</td><td>'+roadData[i].type+'</td><td><span class="ant-tag '+(roadData[i].status==='开放'?'ant-tag-success':'ant-tag-default')+'">'+roadData[i].status+'</span></td></tr>';}html+='</tbody></table></div>';openModal('选择示范运营路段',html,{footer:'<button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn ant-btn-primary" onclick="confirmRoadSelect()">确认选择</button>'});}
function toggleAllRoads(el){var cbs=document.querySelectorAll('.road-cb');for(var i=0;i<cbs.length;i++)cbs[i].checked=el.checked;}
function confirmRoadSelect(){selectedRoads=[];var cbs=document.querySelectorAll('.road-cb');for(var i=0;i<cbs.length;i++){if(cbs[i].checked)selectedRoads.push(parseInt(cbs[i].dataset.idx));}closeModal();renderRoadTable();}
function renderRoadTable(){var el=document.getElementById('roadTableBody');if(!el)return;if(selectedRoads.length===0){el.innerHTML='<tr><td colspan="5" style="text-align:center;color:#00000073;padding:24px">暂未选择示范运营路段</td></tr>';return;}var h='';for(var i=0;i<selectedRoads.length;i++){var r=roadData[selectedRoads[i]];h+='<tr><td>'+(i+1)+'</td><td>'+r.name+'</td><td>'+r.type+'</td><td><span class="ant-tag '+(r.status==='开放'?'ant-tag-success':'ant-tag-default')+'">'+r.status+'</span></td><td><button class="ant-btn-link danger" onclick="removeRoad('+i+')">删除</button></td></tr>';}el.innerHTML=h;}
function removeRoad(idx){selectedRoads.splice(idx,1);renderRoadTable();}

function openVehicleSelectModal(){var html='<div style="max-height:400px;overflow-y:auto"><table class="ant-table" style="width:100%"><thead><tr><th><input type="checkbox" class="ant-checkbox" onclick="toggleAllVehicles(this)"></th><th>VIN码</th><th>品牌</th><th>型号</th><th>自动驾驶级别</th><th>道路测试里程及小时</th></tr></thead><tbody>';for(var i=0;i<vehicleData.length;i++){var ck=selectedVehicles.indexOf(i)>-1?'checked':'';html+='<tr><td><input type="checkbox" class="ant-checkbox vehicle-cb" data-idx="'+i+'" '+ck+'></td><td class="font-mono text-xs">'+vehicleData[i].vin+'</td><td>'+vehicleData[i].brand+'</td><td>'+vehicleData[i].model+'</td><td><span class="ant-tag '+(vehicleData[i].level==='L4'?'ant-tag-success':'ant-tag-processing')+'">'+vehicleData[i].level+'</span></td><td class="text-xs">'+vehicleData[i].mileage+'</td></tr>';}html+='</tbody></table></div>';openModal('选择示范运营车辆',html,{footer:'<button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn ant-btn-primary" onclick="confirmVehicleSelect()">确认选择</button>'});}
function toggleAllVehicles(el){var cbs=document.querySelectorAll('.vehicle-cb');for(var i=0;i<cbs.length;i++)cbs[i].checked=el.checked;}
function confirmVehicleSelect(){selectedVehicles=[];var cbs=document.querySelectorAll('.vehicle-cb');for(var i=0;i<cbs.length;i++){if(cbs[i].checked)selectedVehicles.push(parseInt(cbs[i].dataset.idx));}closeModal();renderVehicleTable();}
function renderVehicleTable(){var el=document.getElementById('vehicleTableBody');if(!el)return;if(selectedVehicles.length===0){el.innerHTML='<tr><td colspan="9" style="text-align:center;color:#00000073;padding:24px">暂未选择示范运营车辆</td></tr>';return;}var h='';for(var i=0;i<selectedVehicles.length;i++){var v=vehicleData[selectedVehicles[i]];h+='<tr><td>'+(i+1)+'</td><td class="font-mono text-xs">'+v.vin+'</td><td>'+v.brand+'</td><td>'+v.model+'</td><td><span class="ant-tag '+(v.level==='L4'?'ant-tag-success':'ant-tag-processing')+'">'+v.level+'</span></td><td class="text-xs">'+v.mileage+'</td><td><input class="ant-input" placeholder="临牌号" style="width:100px;font-size:12px"></td><td><input class="ant-input" type="date" style="width:110px;font-size:12px" title="有效期至"></td><td><button class="ant-btn-link danger" onclick="removeVehicle('+i+')">删除</button></td></tr>';}el.innerHTML=h;}

function openPlateHistoryModal(vin){var historyData=[{plate:'鄂F·A001',validFrom:'2026-03-15',validTo:'2026-04-30',status:'已过期'},{plate:'鄂F·A005',validFrom:'2026-05-01',validTo:'2026-10-20',status:'当前有效'}];var h='<div style="overflow-x:auto"><table class="ant-table" style="width:100%;font-size:13px"><thead><tr><th>序号</th><th>临时牌照号</th><th>有效期起</th><th>有效期止</th><th>状态</th></tr></thead><tbody>';historyData.forEach(function(r,i){h+='<tr><td>'+(i+1)+'</td><td class="font-mono text-xs">'+r.plate+'</td><td>'+r.validFrom+'</td><td>'+r.validTo+'</td><td><span class="ant-tag '+(r.status==='当前有效'?'ant-tag-success':'ant-tag-default')+'">'+r.status+'</span></td></tr>';});h+='</tbody></table></div>';openModal('牌照历史记录 - '+vin,h,{footer:'<button class="ant-btn" onclick="closeModal()">关闭</button>'});}

function toggleCollapse(id){var el=document.getElementById(id);var toggle=document.getElementById(id+'Toggle');if(el.style.display==='none'){el.style.display='block';toggle.textContent='点击收起 ▲';}else{el.style.display='none';toggle.textContent='点击展开 ▼';}}
