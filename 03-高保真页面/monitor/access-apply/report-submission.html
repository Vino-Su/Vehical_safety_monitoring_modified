<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>报告提交管理 - 智能网联汽车安全监测平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{DEFAULT:'#1677ff',hover:'#4096ff',disabled:'#85a5cc'}}}}}</script>
  <script src="../../components/pagination-component.js"></script>
  <style>
    .layout-flex{display:flex;gap:16px;align-items:flex-start;height:calc(100vh - 64px - 48px - 56px)}
    .left-pane{width:320px;flex-shrink:0;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,21,41,.08);display:flex;flex-direction:column;overflow:hidden;height:100%}
    .right-pane{flex:1;min-width:0;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,21,41,.08);display:flex;flex-direction:column;overflow:hidden;height:100%}
    .left-search{padding:12px;border-bottom:1px solid #f0f0f0}
    .left-search input{width:100%;height:32px;padding:0 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;outline:none}
    .left-search input:focus{border-color:#1677ff}
    .group-tabs{display:flex;border-bottom:1px solid #f0f0f0;background:#fafafa}
    .group-tab{flex:1;padding:10px 0;text-align:center;font-size:13px;color:#00000073;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
    .group-tab:hover{color:#1677ff}
    .group-tab.active{color:#1677ff;border-bottom-color:#1677ff;font-weight:500;background:#fff}
    .app-list{flex:1;overflow-y:auto;padding:4px 0}
    .app-item{padding:10px 12px;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
    .app-item:hover{background:#f5f5f5}
    .app-item.active{background:#e6f4ff;border-left-color:#1677ff}
    .app-item-biz{font-size:11px;color:#1677ff;margin-bottom:2px}
    .app-item-id{font-size:13px;color:#000000d9;font-weight:500;margin-bottom:2px}
    .app-item-meta{font-size:12px;color:#00000073;display:flex;justify-content:space-between}
    .biz-tag{font-size:11px;padding:1px 6px;border-radius:3px;border:1px solid;display:inline-block;margin-right:4px}
    .biz-tag-road{color:#1677ff;background:#e6f4ff;border-color:#91caff}
    .biz-tag-demo{color:#722ed1;background:#f9f0ff;border-color:#d3adf7}
    .biz-tag-oper{color:#fa8c16;background:#fff7e6;border-color:#ffd591}
    .right-header{padding:16px 20px;border-bottom:1px solid #f0f0f0;background:#fafafa}
    .right-title{font-size:16px;font-weight:500;color:#000000d9;margin-bottom:4px}
    .right-sub{font-size:12px;color:#00000073}
    .right-body{flex:1;overflow-y:auto;padding:16px 20px}
    .report-type-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;border:1px solid}
    .report-type-stage{color:#1677ff;background:#e6f4ff;border-color:#91caff}
    .report-type-summary{color:#52c41a;background:#f6ffed;border-color:#b7eb8f}
    .upload-zone{border:1px dashed #d9d9d9;border-radius:6px;padding:16px;text-align:center;cursor:pointer;color:#00000073;background:#fafafa;font-size:13px;transition:all .2s}
    .upload-zone:hover{border-color:#1677ff;color:#1677ff}
    .upload-zone .upload-icon{display:block;margin:0 auto 6px;color:#00000040}
    .upload-zone:hover .upload-icon{color:#1677ff}
    .file-list{margin-top:8px;font-size:13px}
    .file-list .file-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#f5f5f5;border-radius:4px;margin-bottom:4px}
    .file-list .file-item .file-name{flex:1;color:#000000d9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .file-list .file-item .file-size{color:#00000073;font-size:12px}
    .file-list .file-item .file-remove{color:#ff4d4f;cursor:pointer;font-size:16px}
    .period-row{display:none}
    .period-row.show{display:flex}
    .file-cell{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle}
    .ant-modal-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}
  </style>
</head>
<body>
<div id="app" class="flex h-screen overflow-hidden">
  <aside id="sidebar"></aside>
  <div class="flex-1 flex flex-col overflow-hidden">
    <header id="topnav"></header>
    <main class="flex-1 overflow-auto bg-[#f0f2f5] p-6">
      <!-- 页面标题 -->
      <div class="page-header">
        <h2>报告提交管理</h2>
        <div class="flex gap-2">
          <button class="ant-btn ant-btn-primary" id="btnSubmitReport" onclick="openReportModal()">提交报告</button>
        </div>
      </div>

      <!-- 左右双栏布局 -->
      <div class="layout-flex">
        <!-- 左栏：申请列表 -->
        <div class="left-pane">
          <div class="left-search">
            <input placeholder="搜索申请编号" id="appSearch" oninput="renderAppList()">
          </div>
          <div class="group-tabs">
            <div class="group-tab active" data-group="all" onclick="switchGroup('all')">全部</div>
            <div class="group-tab" data-group="road_test" onclick="switchGroup('road_test')">道路测试</div>
            <div class="group-tab" data-group="demo_apply" onclick="switchGroup('demo_apply')">示范应用</div>
            <div class="group-tab" data-group="demo_operate" onclick="switchGroup('demo_operate')">商业化试点</div>
          </div>
          <div class="app-list" id="appList"></div>
        </div>

        <!-- 右栏：报告列表 -->
        <div class="right-pane">
          <div class="right-header">
            <div class="right-title">
              <span id="currentAppLabel">全部申请</span> · 报告列表
            </div>
            <div class="right-sub" id="currentAppSub">展示选中申请对应的所有报告</div>
          </div>
          <div class="right-body">
            <!-- 筛选区 -->
            <div class="filter-bar mb-4">
              <div class="filter-row">
                <div class="filter-item">
                  <label>报告类型</label>
                  <div class="ant-select" id="fReportType" onclick="toggleDropdown('reportTypeDropdown')">全部<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg></div>
                  <div class="dropdown-panel" id="reportTypeDropdown" style="display:none;position:absolute;z-index:1000;background:#fff;border:1px solid #d9d9d9;border-radius:6px;box-shadow:0 6px 16px rgba(0,0,0,.08);padding:4px 0;min-width:140px">
                    <div class="dropdown-item" style="padding:5px 12px;cursor:pointer;font-size:13px" onclick="selectReportType('all','全部')">全部</div>
                    <div class="dropdown-item" style="padding:5px 12px;cursor:pointer;font-size:13px" onclick="selectReportType('stage','阶段性报告')">阶段性报告</div>
                    <div class="dropdown-item" style="padding:5px 12px;cursor:pointer;font-size:13px" onclick="selectReportType('summary','总结性报告')">总结性报告</div>
                  </div>
                </div>
                <div class="filter-item">
                  <label>报告标题</label>
                  <input class="ant-input" placeholder="请输入" id="fReportTitle" style="width:180px">
                </div>
                <div class="filter-item">
                  <label>报告提交时间</label>
                  <div style="display:flex;gap:4px;align-items:center;">
                    <input class="ant-input" type="date" id="fSubmitFrom" style="width:140px">
                    <span class="mx-1 text-[#00000040]">~</span>
                    <input class="ant-input" type="date" id="fSubmitTo" style="width:140px">
                  </div>
                </div>
                <div class="flex gap-2 items-end">
                  <button class="ant-btn ant-btn-primary" onclick="renderReportTable()">查询</button>
                  <button class="ant-btn" onclick="resetReportFilter()">重置</button>
                </div>
              </div>
            </div>

            <!-- 报告列表 -->
            <div class="ant-table-wrapper">
              <div style="overflow-x:auto">
                <table class="ant-table">
                  <thead>
                    <tr>
                      <th>业务类型</th>
                      <th class="col-code">申请编号</th>
                      <th>报告类型</th>
                      <th>报告标题</th>
                      <th>提交主体</th>
                      <th>提交人</th>
                      <th class="col-code">报告提交时间</th>
                      <th>报告附件</th>
                    </tr>
                  </thead>
                  <tbody id="reportTbody"></tbody>
                </table>
              </div>
              <div id="reportPaginationBar"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- 提交报告弹窗 -->
<div id="reportModal" class="ant-modal-mask" style="display:none !important">
  <div class="ant-modal" style="width:600px">
    <div class="ant-modal-header">
      <span class="ant-modal-title">提交报告</span>
      <span class="ant-modal-close" onclick="closeReportModal()">×</span>
    </div>
    <div class="ant-modal-body">
      <!-- 申请编号 -->
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>申请编号</div>
        <div class="ant-form-control">
          <input class="ant-input" id="modalAppId" readonly style="background:#f5f5f5;color:#00000073">
        </div>
      </div>
      <!-- 报告类型 -->
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>报告类型</div>
        <div class="ant-form-control">
          <div style="display:flex;gap:24px;padding-top:6px">
            <label style="display:flex;align-items:center;cursor:pointer;font-size:14px"><input type="radio" name="modalReportType" value="stage" checked onchange="onReportTypeChange()"> <span style="margin-left:6px">阶段性报告</span></label>
            <label style="display:flex;align-items:center;cursor:pointer;font-size:14px"><input type="radio" name="modalReportType" value="summary" onchange="onReportTypeChange()"> <span style="margin-left:6px">总结性报告</span></label>
          </div>
        </div>
      </div>
      <!-- 报告周期（阶段性必填） -->
      <div class="ant-form-item period-row show" id="periodRow">
        <div class="ant-form-label"><span class="required">*</span>报告周期</div>
        <div class="ant-form-control">
          <div style="display:flex;gap:4px;align-items:center">
            <input class="ant-input" type="date" id="modalPeriodFrom" style="width:50%">
            <span class="mx-1 text-[#00000040]">~</span>
            <input class="ant-input" type="date" id="modalPeriodTo" style="width:50%">
          </div>
        </div>
      </div>
      <!-- 报告文件 -->
      <div class="ant-form-item">
        <div class="ant-form-label"><span class="required">*</span>报告文件</div>
        <div class="ant-form-control">
          <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
            <svg class="upload-icon" viewBox="0 0 24 24" width="32" height="32" fill="currentColor"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
            点击或拖拽文件至此区域上传（支持 pdf/doc/docx，≤20MB）
          </div>
          <input type="file" id="fileInput" style="display:none" accept=".pdf,.doc,.docx" onchange="onFileSelect(this)">
          <div class="file-list" id="fileList"></div>
        </div>
      </div>
      <!-- 备注 -->
      <div class="ant-form-item">
        <div class="ant-form-label">备注</div>
        <div class="ant-form-control">
          <textarea class="ant-input" id="modalRemark" style="height:72px;padding:8px 12px;resize:vertical" placeholder="请输入补充说明（最多 200 字）" maxlength="200" oninput="updateRemarkCount()"></textarea>
          <div style="text-align:right;font-size:12px;color:#00000073;margin-top:4px"><span id="remarkCount">0</span> / 200</div>
        </div>
      </div>
    </div>
    <div class="ant-modal-footer">
      <button class="ant-btn" onclick="closeReportModal()">取消</button>
      <button class="ant-btn ant-btn-primary" onclick="submitReport()">提交</button>
    </div>
  </div>
</div>

<script>
const PAGE_ID='report-submission';
var reportPager;

// 业务类型映射
var bizMap={
  road_test:{label:'道路测试',cls:'biz-tag-road'},
  demo_apply:{label:'示范应用',cls:'biz-tag-demo'},
  demo_operate:{label:'商业化试点',cls:'biz-tag-oper'}
};

// 报告类型映射
var reportTypeMap={
  stage:{label:'阶段性报告',cls:'report-type-stage'},
  summary:{label:'总结性报告',cls:'report-type-summary'}
};

// 申请列表数据（取自各业务申请，状态以"已生效"或可提交报告的状态为主）
var appListData=[
  // 道路测试
  {id:'RT202604002',biz:'road_test',type:'renewal',origId:'RT202603001',vehicleCount:1,roadCount:2,status:'active',time:'2026-04-05 10:25:18',validTo:'2026-10-05'},
  {id:'RT202604007',biz:'road_test',type:'initial',origId:'-',vehicleCount:1,roadCount:2,status:'active',time:'2026-04-28 13:18:07',validTo:'2026-11-01'},
  {id:'RT202605008',biz:'road_test',type:'change',origId:'RT202605007',vehicleCount:1,roadCount:2,status:'active',time:'2026-05-12 09:48:31',validTo:'2027-01-20'},
  {id:'RT202604010',biz:'road_test',type:'initial',origId:'-',vehicleCount:1,roadCount:1,status:'active',time:'2026-04-08 13:37:21',validTo:'2026-10-20'},
  // 示范应用
  {id:'DA202604001',biz:'demo_apply',type:'initial',origId:'-',vehicleCount:3,roadCount:2,status:'active',time:'2026-04-15 10:30:22',validTo:'2026-12-31'},
  {id:'DA202605005',biz:'demo_apply',type:'renewal',origId:'DA202604001',vehicleCount:3,roadCount:2,status:'active',time:'2026-05-15 14:22:18',validTo:'2027-06-30'},
  {id:'DA202605006',biz:'demo_apply',type:'initial',origId:'-',vehicleCount:2,roadCount:1,status:'active',time:'2026-05-20 10:08:42',validTo:'2027-02-28'},
  // 商业化试点
  {id:'DO202605003',biz:'demo_operate',type:'initial',origId:'-',vehicleCount:2,roadCount:1,status:'active',time:'2026-05-18 11:36:55',validTo:'2027-03-15'},
  {id:'DO202605004',biz:'demo_operate',type:'change',origId:'DO202604001',vehicleCount:1,roadCount:1,status:'active',time:'2026-05-25 09:14:27',validTo:'2027-04-20'}
];

// 报告数据
var reportData=[
  // RT202604002 - 道路测试 - 3份报告
  {id:'RPT202604001',appId:'RT202604002',biz:'road_test',type:'stage',title:'道路测试第一季度阶段性报告',submitCompany:'B公司',submitUser:'张明',time:'2026-04-22 14:35:00',file:'road_test_q1_stage_report.pdf',fileSize:'2.8 MB'},
  {id:'RPT202604002',appId:'RT202604002',biz:'road_test',type:'stage',title:'道路测试第二季度阶段性报告',submitCompany:'B公司',submitUser:'张明',time:'2026-05-20 16:12:33',file:'road_test_q2_stage_report.pdf',fileSize:'3.2 MB'},
  {id:'RPT202604003',appId:'RT202604002',biz:'road_test',type:'summary',title:'道路测试半年度总结性报告',submitCompany:'B公司',submitUser:'王强',time:'2026-06-15 10:08:24',file:'road_test_halfyear_summary_report.pdf',fileSize:'5.6 MB'},

  // RT202604007 - 道路测试 - 1份报告
  {id:'RPT202604010',appId:'RT202604007',biz:'road_test',type:'stage',title:'G公司道路测试首月运行报告',submitCompany:'G公司',submitUser:'李芳',time:'2026-05-15 11:42:08',file:'road_test_first_month_report.pdf',fileSize:'2.4 MB'},

  // RT202605008 - 道路测试 - 1份报告
  {id:'RPT202605020',appId:'RT202605008',biz:'road_test',type:'stage',title:'M公司变更后首阶段报告',submitCompany:'M公司',submitUser:'陈伟',time:'2026-05-22 09:33:15',file:'road_test_change_stage_report.pdf',fileSize:'3.1 MB'},

  // RT202604010 - 道路测试 - 2份报告
  {id:'RPT202604015',appId:'RT202604010',biz:'road_test',type:'stage',title:'H公司道路测试月度运行报告',submitCompany:'H公司',submitUser:'刘洋',time:'2026-05-10 15:18:42',file:'h_company_monthly_report.pdf',fileSize:'2.9 MB'},
  {id:'RPT202604016',appId:'RT202604010',biz:'road_test',type:'stage',title:'H公司道路测试月度运行报告（5月）',submitCompany:'H公司',submitUser:'刘洋',time:'2026-06-08 14:25:11',file:'h_company_monthly_report_may.pdf',fileSize:'3.0 MB'},

  // DA202604001 - 示范应用 - 2份报告
  {id:'RPT202604025',appId:'DA202604001',biz:'demo_apply',type:'stage',title:'示范应用第一季度阶段性报告',submitCompany:'A公司',submitUser:'张明',time:'2026-04-28 16:48:33',file:'demo_apply_q1_stage_report.pdf',fileSize:'4.2 MB'},
  {id:'RPT202604026',appId:'DA202604001',biz:'demo_apply',type:'summary',title:'示范应用首阶段总结性报告',submitCompany:'A公司',submitUser:'李芳',time:'2026-05-30 10:12:48',file:'demo_apply_first_summary_report.pdf',fileSize:'6.5 MB'},

  // DA202605005 - 示范应用 - 1份报告
  {id:'RPT202605030',appId:'DA202605005',biz:'demo_apply',type:'stage',title:'示范应用延期后首阶段报告',submitCompany:'A公司',submitUser:'王强',time:'2026-06-02 09:55:21',file:'demo_apply_renewal_stage_report.pdf',fileSize:'3.8 MB'},

  // DA202605006 - 示范应用 - 1份报告
  {id:'RPT202605035',appId:'DA202605006',biz:'demo_apply',type:'stage',title:'示范应用试点首月报告',submitCompany:'A公司',submitUser:'张明',time:'2026-06-05 11:36:54',file:'demo_apply_first_month_report.pdf',fileSize:'3.4 MB'},

  // DO202605003 - 商业化试点 - 1份报告
  {id:'RPT202605040',appId:'DO202605003',biz:'demo_operate',type:'stage',title:'商业化试点首月运行报告',submitCompany:'J公司',submitUser:'赵静',time:'2026-06-10 14:18:39',file:'demo_operate_first_month_report.pdf',fileSize:'4.0 MB'},

  // DO202605004 - 商业化试点 - 1份报告
  {id:'RPT202605045',appId:'DO202605004',biz:'demo_operate',type:'stage',title:'商业化试点变更后阶段性报告',submitCompany:'J公司',submitUser:'孙磊',time:'2026-06-15 09:42:18',file:'demo_operate_change_stage_report.pdf',fileSize:'3.7 MB'}
];

// 全局状态
var currentGroup='all';
var currentSelectedAppId=null;
var currentReportTypeFilter='all';
var modalFiles=[];

// 渲染申请列表（左栏）
function renderAppList(){
  var data=[].concat(appListData);
  // 按分组过滤
  if(currentGroup!=='all'){
    data=data.filter(function(d){return d.biz===currentGroup;});
  }
  // 按搜索过滤
  var kw=(document.getElementById('appSearch').value||'').trim().toLowerCase();
  if(kw)data=data.filter(function(d){return d.id.toLowerCase().indexOf(kw)>-1;});
  // 按时间倒序
  data.sort(function(a,b){return b.time.localeCompare(a.time);});

  var html='';
  if(data.length===0){
    html='<div class="empty-state" style="padding:24px 12px;text-align:center;color:#00000040;font-size:13px">暂无申请</div>';
  }else{
    data.forEach(function(d){
      var bz=bizMap[d.biz]||bizMap.road_test;
      var isActive=d.id===currentSelectedAppId?' active':'';
      html+='<div class="app-item'+isActive+'" onclick="selectApp(\''+d.id+'\')">'+
        '<div class="app-item-biz"><span class="biz-tag '+bz.cls+'">'+bz.label+'</span></div>'+
        '<div class="app-item-id">'+d.id+'</div>'+
        '<div class="app-item-meta"><span>'+d.time.substring(0,10)+'</span><span>至 '+d.validTo+'</span></div>'+
        '</div>';
    });
  }
  document.getElementById('appList').innerHTML=html;
}

// 切换分组
function switchGroup(group){
  currentGroup=group;
  // 高亮 tab
  document.querySelectorAll('.group-tab').forEach(function(t){t.classList.remove('active');});
  document.querySelector('.group-tab[data-group="'+group+'"]').classList.add('active');
  // 切换分组时清空选中
  currentSelectedAppId=null;
  renderAppList();
  renderReportTable();
  // 更新右栏标题
  updateRightHeader();
}

// 选中申请
function selectApp(id){
  currentSelectedAppId=id;
  renderAppList();
  renderReportTable();
  updateRightHeader();
}

function updateRightHeader(){
  var labelEl=document.getElementById('currentAppLabel');
  var subEl=document.getElementById('currentAppSub');
  if(currentSelectedAppId){
    var app=appListData.find(function(d){return d.id===currentSelectedAppId;});
    var bz=app?bizMap[app.biz]:null;
    labelEl.innerHTML='申请 '+currentSelectedAppId+(bz?' <span class="biz-tag '+bz.cls+'">'+bz.label+'</span>':'');
    subEl.textContent='当前展示该申请对应的所有报告';
  }else{
    var groupLabel=currentGroup==='all'?'全部申请':(bizMap[currentGroup]?bizMap[currentGroup].label+'申请':'全部申请');
    labelEl.textContent=groupLabel;
    var totalReports=reportData.length;
    subEl.textContent='当前展示 '+groupLabel+' 对应的所有报告（共 '+totalReports+' 份）';
  }
}

// 渲染报告表格（右栏）
function renderReportTable(){
  var data=[].concat(reportData);
  // 按分组过滤
  if(currentGroup!=='all'){
    data=data.filter(function(d){return d.biz===currentGroup;});
  }
  // 按选中申请过滤
  if(currentSelectedAppId){
    data=data.filter(function(d){return d.appId===currentSelectedAppId;});
  }
  // 按报告类型过滤
  if(currentReportTypeFilter!=='all'){
    data=data.filter(function(d){return d.type===currentReportTypeFilter;});
  }
  // 按报告标题过滤
  var titleKw=(document.getElementById('fReportTitle').value||'').trim();
  if(titleKw)data=data.filter(function(d){return d.title.indexOf(titleKw)>-1;});
  // 按提交时间过滤
  var from=document.getElementById('fSubmitFrom').value;
  var to=document.getElementById('fSubmitTo').value;
  if(from)data=data.filter(function(d){return d.time.substring(0,10)>=from;});
  if(to)data=data.filter(function(d){return d.time.substring(0,10)<=to;});
  // 按时间倒序
  data.sort(function(a,b){return b.time.localeCompare(a.time);});

  var total=data.length;
  var cp=reportPager?reportPager.getCurrentPage():1;
  var ps=reportPager?reportPager.getPageSize():10;
  var start=(cp-1)*ps;
  var pd=data.slice(start,start+ps);
  var html='';
  if(pd.length===0){
    html='<tr><td colspan="8"><div class="empty-state" style="padding:32px 16px;text-align:center;color:#00000073;font-size:13px">'+
      (currentSelectedAppId?'该申请暂无报告记录':'暂无符合条件的报告')+
      '</div></td></tr>';
  }else{
    pd.forEach(function(d){
      var bz=bizMap[d.biz]||bizMap.road_test;
      var rt=reportTypeMap[d.type]||reportTypeMap.stage;
      var detailLink=getAppLink(d.biz);
      html+='<tr>'+
        '<td><span class="biz-tag '+bz.cls+'">'+bz.label+'</span></td>'+
        '<td class="col-code"><a href="'+detailLink+'" class="text-[#1677ff] no-underline hover:text-[#4096ff]" title="点击查看申请详情">'+d.appId+'</a></td>'+
        '<td><span class="'+rt.cls+'">'+rt.label+'</span></td>'+
        '<td>'+d.title+'</td>'+
        '<td>'+d.submitCompany+'</td>'+
        '<td>'+d.submitUser+'</td>'+
        '<td class="col-code text-xs">'+d.time+'</td>'+
        '<td><a href="javascript:void(0)" class="ant-btn-link file-cell" title="'+d.file+'（'+d.fileSize+'）" onclick="downloadFile(\''+d.id+'\')">'+d.file+'</a></td>'+
        '</tr>';
    });
  }
  document.getElementById('reportTbody').innerHTML=html;
  if(reportPager)reportPager.setTotal(total);
}

function getAppLink(biz){
  if(biz==='road_test')return 'road-test.html';
  if(biz==='demo_apply')return 'demo-apply.html';
  if(biz==='demo_operate')return 'demo-operate.html';
  return '#';
}

function resetReportFilter(){
  document.getElementById('fReportTitle').value='';
  document.getElementById('fSubmitFrom').value='';
  document.getElementById('fSubmitTo').value='';
  currentReportTypeFilter='all';
  document.getElementById('fReportType').innerHTML='全部<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>';
  if(reportPager)reportPager.reset();
  renderReportTable();
}

// 下拉菜单
function toggleDropdown(id){
  var el=document.getElementById(id);
  el.style.display=el.style.display==='none'?'block':'none';
}
function selectReportType(val,label){
  currentReportTypeFilter=val;
  document.getElementById('fReportType').innerHTML=label+'<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>';
  document.getElementById('reportTypeDropdown').style.display='none';
}
document.addEventListener('click',function(e){
  if(!e.target.closest('#fReportType')&&!e.target.closest('#reportTypeDropdown')){
    var d=document.getElementById('reportTypeDropdown');if(d)d.style.display='none';
  }
});

// 提交报告弹窗
function openReportModal(){
  // 必须先选中一个申请
  if(!currentSelectedAppId){
    showToast('请先在左侧列表中选择一个申请','warn');
    return;
  }
  var app=appListData.find(function(d){return d.id===currentSelectedAppId;});
  if(!app){
    showToast('未找到对应申请信息','error');
    return;
  }
  document.getElementById('modalAppId').value=currentSelectedAppId;
  // 重置表单
  document.querySelector('input[name="modalReportType"][value="stage"]').checked=true;
  document.getElementById('modalPeriodFrom').value='';
  document.getElementById('modalPeriodTo').value='';
  document.getElementById('modalRemark').value='';
  document.getElementById('remarkCount').textContent='0';
  modalFiles=[];
  renderFileList();
  onReportTypeChange();
  document.getElementById('reportModal').style.setProperty('display','flex','important');
}

function closeReportModal(){
  var el=document.getElementById('reportModal');
  el.style.setProperty('display','none','important');
}

function onReportTypeChange(){
  var checked=document.querySelector('input[name="modalReportType"]:checked');
  var row=document.getElementById('periodRow');
  if(checked&&checked.value==='stage'){
    row.classList.add('show');
  }else{
    row.classList.remove('show');
  }
}

function onFileSelect(input){
  if(!input.files||input.files.length===0)return;
  for(var i=0;i<input.files.length;i++){
    var f=input.files[i];
    modalFiles.push({name:f.name,size:(f.size/1024/1024).toFixed(2)+' MB'});
  }
  renderFileList();
  input.value='';
}

function renderFileList(){
  var html='';
  modalFiles.forEach(function(f,idx){
    html+='<div class="file-item">'+
      '<svg viewBox="0 0 24 24" width="14" height="14" fill="#1677ff"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg>'+
      '<span class="file-name">'+f.name+'</span>'+
      '<span class="file-size">'+f.size+'</span>'+
      '<span class="file-remove" onclick="removeFile('+idx+')">×</span>'+
      '</div>';
  });
  document.getElementById('fileList').innerHTML=html;
}

function removeFile(idx){
  modalFiles.splice(idx,1);
  renderFileList();
}

function updateRemarkCount(){
  var len=(document.getElementById('modalRemark').value||'').length;
  document.getElementById('remarkCount').textContent=len;
}

function submitReport(){
  var appId=document.getElementById('modalAppId').value;
  var reportType=document.querySelector('input[name="modalReportType"]:checked').value;
  var periodFrom=document.getElementById('modalPeriodFrom').value;
  var periodTo=document.getElementById('modalPeriodTo').value;
  var remark=document.getElementById('modalRemark').value;

  // 校验
  if(!appId){
    showToast('请选择申请','error');return;
  }
  if(reportType==='stage'){
    if(!periodFrom||!periodTo){
      showToast('阶段性报告必须填写报告周期','error');return;
    }
    if(periodFrom>periodTo){
      showToast('报告周期起始日期不能晚于截止日期','error');return;
    }
  }
  if(modalFiles.length===0){
    showToast('请上传报告文件','error');return;
  }

  // 模拟提交：追加到 reportData
  var app=appListData.find(function(d){return d.id===appId;});
  var now=new Date();
  var pad=function(n){return n<10?'0'+n:n;};
  var nowStr=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+' '+pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  var typeLabel=reportType==='stage'?'阶段性':'总结性';
  var periodLabel=reportType==='stage'?'（'+periodFrom+' ~ '+periodTo+'）':'';
  var newReport={
    id:'RPT'+now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+pad(now.getHours())+pad(now.getMinutes())+pad(now.getSeconds()),
    appId:appId,
    biz:app.biz,
    type:reportType,
    title:appId+' '+typeLabel+'报告'+periodLabel,
    submitCompany:'A公司',
    submitUser:'当前用户',
    time:nowStr,
    file:modalFiles[0].name,
    fileSize:modalFiles[0].size
  };
  reportData.unshift(newReport);

  closeReportModal();
  showToast('报告提交成功','success');
  // 切到对应申请视图
  selectApp(appId);
  updateRightHeader();
}

// 报告相关操作
function previewReport(id){
  showToast('查看报告详情：'+id,'info');
}
function downloadFile(id){
  var r=reportData.find(function(d){return d.id===id;});
  if(!r)return;
  showToast('开始下载：'+r.file,'success');
}

// Toast
function showToast(msg,type){
  var colors={success:'#52c41a',error:'#ff4d4f',warn:'#faad14',info:'#1677ff'};
  var c=colors[type]||colors.info;
  var t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText='position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid '+c+';color:'+c+';padding:10px 24px;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:9999;font-size:14px';
  document.body.appendChild(t);
  setTimeout(function(){t.remove();},2500);
}

// 初始化
document.addEventListener('DOMContentLoaded',function(){
  reportPager=new Pagination({
    container:'reportPaginationBar',
    pageSize:10,
    onPageChange:function(page,size){renderReportTable();}
  });
  renderAppList();
  renderReportTable();
  updateRightHeader();
});
</script>
<script src="../../common.js"></script>
</body>
