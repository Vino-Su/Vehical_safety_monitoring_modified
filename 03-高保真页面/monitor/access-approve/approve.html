/th><th>违法次数</th><th>事故次数</th><th>保险有效期</th><th>临时牌照号</th><th>牌照有效期</th>';h+='</tr></thead><tbody>'+buildVehicleRows(d.vehicles,isRT)+'</tbody></table></div>';h+='<h4 class="text-sm font-semibold text-[#000000d9] mb-2 mt-4 pb-2 border-b border-[#f0f0f0]">'+personLabel+'（'+d.persons.length+'人）</h4>';h+='<div style="overflow-x:auto"><table class="ant-table" style="width:100%;font-size:13px"><thead><tr><th>序号</th><th>姓名</th><th>性别</th><th>年龄</th><th>工作单位</th><th>证件类型</th><th>证件号码</th></tr></thead><tbody>';d.persons.forEach(function(p,i){h+='<tr><td>'+(i+1)+'</td><td>'+p.name+'</td><td>'+p.gender+'</td><td>'+p.age+'</td><td>'+p.unit+'</td><td>'+p.idType+'</td><td class="font-mono text-xs">'+p.idNo+'</td></tr>';});h+='</tbody></table></div>';h+='<h4 class="text-sm font-semibold text-[#000000d9] mb-2 mt-4 pb-2 border-b border-[#f0f0f0]">申请材料</h4><div class="space-y-2 text-sm">';if(d.materials&&d.materials.length>0){d.materials.forEach(function(m){h+='<div class="flex items-center gap-2"><span class="text-[#52c41a]">✓</span><span class="text-xs text-[#00000040]">材料'+m.id+'</span> '+m.name+' <button class="ant-btn-link ant-btn-sm">预览</button><button class="ant-btn-link ant-btn-sm">下载</button></div>';});}else{h+='<div class="text-xs text-[#00000073]">同原申请材料</div>';}h+='</div>';return h;}

function getFlowSteps(d){var isRT=d.category==='rt';var isInit=(d.subType==='initial'||d.subType==='remote');var steps=['提交申请','第三方初审'];if(isRT&&isInit){steps.push('实车检查');steps.push('专家评审');}else if(!isRT&&isInit){steps.push('专家评审');}steps.push('市工作专班审核');steps.push('上传临时牌照');return steps;}

function buildFlowLog(d){var steps=getFlowSteps(d);var isRT=d.category==='rt';var isInit=(d.subType==='initial'||d.subType==='remote');var isPassed=d.status==='passed';var isRejected=d.status==='rejected';var currentStepIdx=-1;if(d.node==='pending_review')currentStepIdx=1;else if(d.node==='pending_vehicle')currentStepIdx=2;else if(d.node==='pending_expert'){if(isRT&&isInit)currentStepIdx=3;else currentStepIdx=2;}else if(d.node==='pending_joint'){if(isRT&&isInit)currentStepIdx=4;else currentStepIdx=3;}else if(d.node==='pending_plate'){if(isRT&&isInit)currentStepIdx=5;else currentStepIdx=4;}else if(d.node==='done')currentStepIdx=steps.length;var logs=[];logs.push({title:'提交申请',handler:d.company,time:d.time+' 09:00',opinion:'提交'+getTypeLabel(d),status:'已处理',color:'#52c41a',dot:'✓',tagCls:'ant-tag-success'});if(currentStepIdx<=1&&d.status==='processing'){logs.push({title:'第三方初审',handler:'第三方专业管理机构',time:'审批中',opinion:'',status:'处理中',color:'#1677ff',dot:'●',tagCls:'ant-tag-processing'});return renderFLH(logs);}logs.push({title:'第三方初审',handler:'第三方专业管理机构',time:d.time+' 通过',opinion:'审核结论：通过\n审核意见：申请材料齐全、合规',status:'已处理',color:'#52c41a',dot:'✓',tagCls:'ant-tag-success',attach:'初审意见书_'+d.id+'.pdf'});if(isRT&&isInit){if(currentStepIdx<=2&&d.status==='processing'){logs.push({title:'实车检查',handler:'第三方专业管理机构',time:'检查中',opinion:'',status:'处理中',color:'#1677ff',dot:'●',tagCls:'ant-tag-processing'});return renderFLH(logs);}if(isRejected&&currentStepIdx<=2){logs.push({title:'实车检查',handler:'第三方专业管理机构',time:'退回',opinion:'审核结论：退回\n审核意见：实车检查未通过',status:'已退回',color:'#ff4d4f',dot:'✗',tagCls:'ant-tag-error'});return renderFLH(logs);}logs.push({title:'实车检查',handler:'第三方专业管理机构',time:'通过',opinion:'审核结论：通过\n实车检查报告已上传',status:'已处理',color:'#52c41a',dot:'✓',tagCls:'ant-tag-success',attach:'实车检查报告_'+d.id+'.pdf'});if(currentStepIdx<=3&&d.status==='processing'){logs.push({title:'专家评审',handler:'第三方专业管理机构',time:'评审中',opinion:'',status:'处理中',color:'#1677ff',dot:'●',tagCls:'ant-tag-processing'});return renderFLH(logs);}if(isRejected&&currentStepIdx<=3){logs.push({title:'专家评审',handler:'第三方专业管理机构',time:'退回',opinion:'审核结论：退回\n审核意见：专家评审未通过',status:'已退回',color:'#ff4d4f',dot:'✗',tagCls:'ant-tag-error'});return renderFLH(logs);}logs.push({title:'专家评审',handler:'第三方专业管理机构',time:'通过',opinion:'审核结论：通过\n专家评审意见：通过',status:'已处理',color:'#52c41a',dot:'✓',tagCls:'ant-tag-success',attach:'专家评审意见_'+d.id+'.pdf'});}if(!isRT&&isInit){if(currentStepIdx<=2&&d.status==='processing'){logs.push({title:'专家评审',handler:'第三方专业管理机构',time:'评审中',opinion:'',status:'处理中',color:'#1677ff',dot:'●',tagCls:'ant-tag-processing'});return renderFLH(logs);}if(isRejected&&currentStepIdx<=2){logs.push({title:'专家评审',handler:'第三方专业管理机构',time:'退回',opinion:'审核结论：退回\n审核意见：专家评审未通过',status:'已退回',color:'#ff4d4f',dot:'✗',tagCls:'ant-tag-error'});return renderFLH(logs);}logs.push({title:'专家评审',handler:'第三方专业管理机构',time:'通过',opinion:'审核结论：通过\n专家评审意见：通过',status:'已处理',color:'#52c41a',dot:'✓',tagCls:'ant-tag-success',attach:'专家评审意见_'+d.id+'.pdf'});}var jointIdx=isRT&&isInit?4:!isRT&&isInit?3:2;if(currentStepIdx<=jointIdx&&d.status==='processing'){logs.push({title:'市工作专班审核',handler:'市工作专班',time:'审批中',opinion:'',status:'处理中',color:'#1677ff',dot:'●',tagCls:'ant-tag-processing'});return renderFLH(logs);}if(isRejected){logs.push({title:'市工作专班审核',handler:'市工作专班',time:'退回',opinion:'审核结论：退回\n审核意见：材料不完整或不符合要求',status:'已退回',color:'#ff4d4f',dot:'✗',tagCls:'ant-tag-error'});return renderFLH(logs);}logs.push({title:'市工作专班审核',handler:'市工作专班',time:'通过',opinion:'审核结论：通过\n审核意见：同意批准',status:'已处理',color:'#52c41a',dot:'✓',tagCls:'ant-tag-success',attach:'审批决定书_'+d.id+'.pdf'});if(isPassed){logs.push({title:'上传临时牌照',handler:d.company,time:'已上传',opinion:'临时牌照信息已录入',status:'已处理',color:'#52c41a',dot:'✓',tagCls:'ant-tag-success'});}return renderFLH(logs);}

function renderFLH(logs){var h='<h4 class="text-sm font-semibold text-[#000000d9] mb-4 mt-6 pb-2 border-b border-[#f0f0f0]">流程日志</h4><div class="space-y-3">';logs.forEach(function(l,i){var hn=i<logs.length-1;var bs=hn?'border-left:2px solid '+l.color+';margin-left:5px;padding-left:12px':'margin-left:17px;padding-left:0';h+='<div class="relative pb-3" style="'+bs+'"><div class="absolute w-3 h-3 rounded-full flex items-center justify-center text-[8px] text-white font-bold mt-1" style="left:-7px;top:0;background:'+l.color+'">'+l.dot+'</div><div class="min-w-0"><div class="flex items-center justify-between mb-2"><span class="text-sm font-medium text-[#000000d9]">'+l.title+'</span><span class="ant-tag '+l.tagCls+' text-[10px]">'+l.status+'</span></div><div class="text-xs text-[#00000073] space-y-1"><div><span class="text-[#00000040]">处理人：</span>'+l.handler+'</div><div><span class="text-[#00000040]">处理时间：</span>'+l.time+'</div>';if(l.opinion)h+='<div class="whitespace-pre-line mt-1.5 p-2 bg-[#fafafa] rounded"><span class="text-[#00000040]">处理意见：</span>'+l.opinion+'</div>';if(l.attach)h+='<div class="flex items-center gap-1 mt-1.5"><span class="text-[#00000040]">附件：</span><button class="ant-btn-link text-xs">'+l.attach+'</button></div>';h+='</div></div></div>';});return h+'</div>';}

function buildFlowProgress(d){var steps=getFlowSteps(d);var isRT=d.category==='rt';var isInit=(d.subType==='initial'||d.subType==='remote');var currentStepIdx=-1;if(d.node==='pending_review')currentStepIdx=1;else if(d.node==='pending_vehicle')currentStepIdx=2;else if(d.node==='pending_expert'){if(isRT&&isInit)currentStepIdx=3;else currentStepIdx=2;}else if(d.node==='pending_joint'){if(isRT&&isInit)currentStepIdx=4;else currentStepIdx=3;}else if(d.node==='pending_plate'){if(isRT&&isInit)currentStepIdx=5;else currentStepIdx=4;}else if(d.node==='done')currentStepIdx=steps.length;var isRejected=d.status==='rejected';var h='<h4 class="text-sm font-semibold text-[#000000d9] mb-3 mt-4 pb-2 border-b border-[#f0f0f0]">审批流程进度</h4><div class="flex items-center gap-0 text-xs flex-wrap">';steps.forEach(function(s,i){var done=i<currentStepIdx;var isCurrent=i===currentStepIdx-1&&d.status==='processing';var isReject=isRejected&&isCurrent;var bg=isReject?'#ff4d4f':done?'#52c41a':isCurrent?'#1677ff':'#d9d9d9';var icon=isReject?'✗':done?'✓':(i+1);h+='<div class="flex items-center"><div class="w-6 h-6 rounded-full text-white flex items-center justify-center text-xs" style="background:'+bg+'">'+icon+'</div><span class="ml-1 '+(isReject?'text-[#ff4d4f]':'')+'">'+s+'</span></div>';if(i<steps.length-1)h+='<div class="w-6 h-0.5" style="background:'+(done&&!isReject?bg:'#d9d9d9')+'"></div>';});h+='</div>';return h;}

function openDetail(id){var d=appData.find(function(x){return x.id===id;});if(!d)return;var body=buildDetailHtml(d)+buildFlowProgress(d)+buildFlowLog(d);openModal('审批详情 - '+id,body,{wide:true,footer:'<button class="ant-btn" onclick="closeModal()">关闭</button>'});}

function openApprove(id){var d=appData.find(function(x){return x.id===id;});if(!d)return;var detailHtml=buildDetailHtml(d)+buildFlowProgress(d);var uploadLabel='审批文件';if(d.node==='pending_review')uploadLabel='初审意见书';else if(d.node==='pending_vehicle')uploadLabel='实车检查报告';else if(d.node==='pending_expert')uploadLabel='专家评审意见';var approveBar='<div style="position:sticky;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #f0f0f0;padding:10px 16px;margin:0 -24px -24px -24px;z-index:10">';approveBar+='<div class="flex items-center gap-2" style="flex-wrap:nowrap">';approveBar+='<label class="flex items-center gap-1 cursor-pointer text-sm whitespace-nowrap"><input type="radio" name="approveResult" checked> 通过</label>';approveBar+='<label class="flex items-center gap-1 cursor-pointer text-sm whitespace-nowrap"><input type="radio" name="approveResult"> 退回</label>';approveBar+='<div class="w-px h-5 bg-[#e8e8e8] mx-1"></div>';approveBar+='<input type="text" class="ant-input text-sm" style="width:200px" placeholder="审批意见（选填）"/>';approveBar+='<button class="ant-btn ant-btn-sm whitespace-nowrap" onclick="document.getElementById(\'approveFileInput\').click()">上传'+uploadLabel+'</button>';approveBar+='<div class="flex items-center gap-2 ml-auto shrink-0"><button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn ant-btn-primary" onclick="closeModal()">确定</button></div>';approveBar+='</div>';approveBar+='<div id="approveUploadedFiles" class="mt-1"></div>';approveBar+='<input type="file" id="approveFileInput" style="display:none" onchange="handleApproveFile(this)">';approveBar+='</div>';openModal('审批 - '+id,detailHtml+approveBar,{wide:true,footer:' '});}

function handleApproveFile(input){if(!input.files||!input.files.length)return;var container=document.getElementById('approveUploadedFiles');if(!container)return;var file=input.files[0];var h=container.innerHTML;h+='<div class="flex items-center gap-2 text-xs text-[#000000d9] py-1"><span class="text-[#52c41a]">✓</span><span>'+file.name+'</span><span class="text-[#00000040]">('+(file.size/1024).toFixed(1)+'KB)</span><button class="ant-btn-link ant-btn-sm text-[#ff4d4f]" onclick="this.parentElement.remove()">删除</button></div>';container.innerHTML=h;input.value='';}

document.addEventListener('DOMContentLoaded',function(){pager=new Pagination({container:'paginationBar',pageSize:10,pageSizeOptions:[10,20,50,100],onPageChange:function(){renderTable();},onPageSizeChange:function(){renderTable();}});renderTable();});
</script>
