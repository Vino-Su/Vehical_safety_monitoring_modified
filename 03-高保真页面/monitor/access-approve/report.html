<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{DEFAULT:'#1677ff',hover:'#4096ff',disabled:'#85a5cc'}}}}}</script>
</head>
<body>
<div id="app" class="flex h-screen overflow-hidden">
  <aside id="sidebar"></aside>
  <div class="flex-1 flex flex-col overflow-hidden">
    <header id="topnav"></header>
    <main class="flex-1 overflow-auto bg-[#f0f2f5] p-6">
      <div class="page-header"><h2>报告管理</h2></div>

      <div class="ant-tabs mb-4">
        <span class="ant-tab active" onclick="switchTab(this,'tab-query')">报告查询</span>
        <span class="ant-tab" onclick="switchTab(this,'tab-submit')">报告提交</span>
        <span class="ant-tab" onclick="switchTab(this,'tab-archive')">材料归档</span>
      </div>

      <div id="tab-query">
        <div class="filter-bar">
          <div class="filter-row">
            <div class="filter-item"><label>报告类型</label><select class="ant-input" id="qReportType" style="width:130px"><option value="all">全部</option><option value="阶段性报告">阶段性报告</option><option value="总结性报告">总结性报告</option></select></div>
            <div class="filter-item"><label>申请类型</label><select class="ant-input" id="qSubType" style="width:130px"><option value="all">全部</option><option value="道路测试准入">道路测试准入</option><option value="示范应用准入">示范应用准入</option><option value="商业化试点准入">商业化试点准入</option></select></div>
            <div class="filter-item"><label>报告提交机构</label><input class="ant-input" placeholder="请输入关键词" id="qCompany" style="width:160px"></div>
            <div class="filter-item"><label>关联申请编号</label><input class="ant-input" placeholder="请输入编号" id="qApplicationId" style="width:160px"></div>
            <div class="filter-item"><label>提交时间起</label><input class="ant-input" type="date" id="qStartDate" style="width:140px"></div>
            <div class="filter-item"><label>至</label><input class="ant-input" type="date" id="qEndDate" style="width:140px"></div>
            <div class="flex gap-2 items-end"><button class="ant-btn ant-btn-primary" onclick="searchReports()">查询</button><button class="ant-btn" onclick="resetReports()">重置</button></div>
          </div>
        </div>

        <div class="ant-table-wrapper">
          <table class="ant-table" id="reportTable">
            <thead><tr><th>报告编号</th><th>报告类型</th><th>申请类型</th><th>报告名称</th><th>提交机构</th><th>关联申请编号</th><th>提交时间</th><th>操作</th></tr></thead>
            <tbody id="reportTbody"></tbody>
          </table>
        </div>
        <div id="paginationQuery"></div>
      </div>

      <div id="tab-submit" style="display:none">
        <div class="flex items-center justify-between mb-4">
          <p class="text-sm text-[#00000073]">主管部门向工业和信息化部、公安部和交通运输部报告辖区内智能网联汽车道路测试、示范应用、商业化试点情况，该报告无需审核直接提交。</p>
          <button class="ant-btn ant-btn-primary" onclick="openNewReport()">+ 新增报告</button>
        </div>
        <div class="filter-bar">
          <div class="filter-row">
            <div class="filter-item"><label>报告类型</label><div class="ant-select" id="sReportType">全部<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg></div></div>
            <div class="filter-item"><label>报送对象</label><div class="ant-select" id="sReceiver">全部<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg></div></div>
            <div class="filter-item"><label>报告期次</label><input class="ant-input" placeholder="请输入期次" id="sPeriod" style="width:140px"></div>
            <div class="flex gap-2 items-end"><button class="ant-btn ant-btn-primary" onclick="searchSubmits()">查询</button><button class="ant-btn" onclick="resetSubmits()">重置</button></div>
          </div>
        </div>

        <div class="ant-table-wrapper">
          <table class="ant-table" id="submitTable">
            <thead><tr><th>报告编号</th><th>报告名称</th><th>报告类型</th><th>报告期次</th><th>报告日期</th><th>报送单位</th><th>报送对象</th><th>操作</th></tr></thead>
            <tbody id="submitTbody"></tbody>
          </table>
        </div>
        <div id="paginationSubmit"></div>
      </div>

      <div id="tab-archive" style="display:none">
        <div class="flex items-center justify-between mb-4">
          <p class="text-sm text-[#00000073]">主管部门对专家评审、现场实车审查的相关材料进行归档管理。</p>
          <button class="ant-btn ant-btn-primary" onclick="openUpload()">+ 上传归档材料</button>
        </div>
        <div class="filter-bar">
          <div class="filter-row">
            <div class="filter-item"><label>材料类型</label><div class="ant-select" id="aMaterialType">全部<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg></div></div>
            <div class="filter-item"><label>申请企业</label><input class="ant-input" placeholder="请输入企业名称" id="aCompanyFilter" style="width:160px"></div>
            <div class="filter-item"><label>关联申请编号</label><input class="ant-input" placeholder="请输入编号" id="aApplicationId" style="width:180px"></div>
            <div class="flex gap-2 items-end"><button class="ant-btn ant-btn-primary" onclick="searchArchives()">查询</button><button class="ant-btn" onclick="resetArchives()">重置</button></div>
          </div>
        </div>

        <div class="ant-table-wrapper">
          <table class="ant-table" id="archiveTable">
            <thead><tr><th>材料编号</th><th>材料名称</th><th>材料类型</th><th>关联申请编号</th><th>申请企业</th><th>格式</th><th>文件大小</th><th>上传时间</th><th>操作</th></tr></thead>
            <tbody id="archiveTbody"></tbody>
          </table>
        </div>
        <div id="paginationArchive"></div>
      </div>
    </main>
  </div>
</div>

function switchTab(el,tabId){
  currentTab=tabId;
  document.querySelectorAll('.ant-tab').forEach(function(t){t.classList.remove('active')});
  el.classList.add('active');
  ['tab-query','tab-submit','tab-archive'].forEach(function(id){
    document.getElementById(id).style.display=id===tabId?'':'none'
  });
  if(tabId==='query')initPagerQuery();
  else if(tabId==='submit')initPagerSubmit();
  else if(tabId==='archive')initPagerArchive();
}

function getFilteredReports(){
  var filtered=[].concat(mockReports);
  var typeVal=document.getElementById('qReportType').value;
  var applyTypeVal=document.getElementById('qSubType').value;
  var appIdEl=document.getElementById('qApplicationId');
  var appId=appIdEl.value.trim().toUpperCase();
  if(typeVal!=='all')filtered=filtered.filter(function(r){return r.type===typeVal;});
  if(applyTypeVal!=='all')filtered=filtered.filter(function(r){return r.applyType===applyTypeVal;});
  if(appId)filtered=filtered.filter(function(r){return r.applicationId.toUpperCase().indexOf(appId)>-1;});
  return filtered;
}

function initPagerQuery(){
  var data=getFilteredReports();
  if(!pagerQuery){
    pagerQuery=new Pagination({
      container:'paginationQuery',
      pageSize:10,
      pageSizeOptions:[10,20,50,100],
      onPageChange:function(page,size){renderReports(page,size);}
    });
  }
  pagerQuery.setTotal(data.length);
  renderReports(1,pagerQuery.getPageSize());
}

function renderReports(page,pageSize){
  var data=getFilteredReports();
  var start=(page-1)*pageSize;
  var pageData=data.slice(start,start+pageSize);
  var html='';
  pageData.forEach(function(r){
    var typeTag=r.type==='阶段性报告'?'<span class="ant-tag ant-tag-processing">'+r.type+'</span>':'<span class="ant-tag ant-tag-success">'+r.type+'</span>';
    html+='<tr>'+
      '<td>'+r.id+'</td>'+
      '<td>'+typeTag+'</td>'+
      '<td>'+r.applyType+'</td>'+
      '<td>'+r.name+'</td>'+
      '<td>'+r.company+'</td>'+
      '<td><span class="text-[#1677ff] cursor-pointer hover:text-[#4096ff]" onclick="showApplicationDetail(\''+r.applicationId+'\')">'+r.applicationId+'</span></td>'+
      '<td>'+r.time+'</td>'+
      '<td class="flex gap-1"><button class="ant-btn-link" onclick="showReportDetail(\''+r.id+'\')">查看详情</button><button class="ant-btn-link">下载报告</button></td>'+
    '</tr>';
  });
  document.getElementById('reportTbody').innerHTML=html;
}

function initPagerSubmit(){
  var data=[].concat(mockSubmits);

      '<td>'+s.id+'</td><td>'+s.title+'</td><td>'+s.type+'</td><td>'+s.period+'</td>'+

function initPagerArchive(){
  var data=[].concat(mockArchives);

function renderArchives(page,pageSize){
  var data=[].concat(mockArchives);

    html+='<tr>'+
      '<td>'+a.id+'</td><td>'+a.name+'</td><td>'+a.type+'</td>'+

function showApplicationDetail(appId){

    return;
  }
  var scls=app.status==='已通过'?'ant-tag-success':app.status==='审批中'?'ant-tag-processing':'ant-tag-default';
  var body='<div class="ant-descriptions">'+
    '<div class="ant-descriptions-row"><div class="ant-descriptions-label">申请编号</div><div class="ant-descriptions-value">'+app.id+'</div><div class="ant-descriptions-label">申请类型</div><div class="ant-descriptions-value">'+app.type+'</div></div>'+
