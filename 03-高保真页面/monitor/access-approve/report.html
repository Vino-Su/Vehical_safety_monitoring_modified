<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>报告管理 - 智能网联汽车安全监测平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{DEFAULT:'#1677ff',hover:'#4096ff',disabled:'#85a5cc'}}}}}</script>
  <script src="../../components/pagination-component.js"></script>
  <style>
    /* 左右双栏布局（报告查询 / 材料归档 复用） */
    .layout-flex{display:flex;gap:16px;align-items:flex-start;height:calc(100vh - 64px - 48px - 44px - 56px)}
    .left-pane{width:320px;flex-shrink:0;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,21,41,.08);display:flex;flex-direction:column;overflow:hidden;height:100%}
    .right-pane{flex:1;min-width:0;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,21,41,.08);display:flex;flex-direction:column;overflow:hidden;height:100%}
    .left-search{padding:12px;border-bottom:1px solid #f0f0f0;display:flex;flex-direction:column;gap:8px}
    .left-search input,.left-search select{width:100%;height:32px;padding:0 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;outline:none;background:#fff}
    .left-search input:focus,.left-search select:focus{border-color:#1677ff}
    .group-tabs{display:flex;border-bottom:1px solid #f0f0f0;background:#fafafa}
    .group-tab{flex:1;padding:10px 0;text-align:center;font-size:13px;color:#00000073;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
    .group-tab:hover{color:#1677ff}
    .group-tab.active{color:#1677ff;border-bottom-color:#1677ff;font-weight:500;background:#fff}
    .app-list{flex:1;overflow-y:auto;padding:4px 0}
    .app-item{padding:10px 12px;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
    .app-item:hover{background:#f5f5f5}
    .app-item.active{background:#e6f4ff;border-left-color:#1677ff}
    .app-item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
    .app-item-id{font-size:13px;color:#000000d9;font-weight:500;margin-bottom:2px}
    .app-item-company{font-size:12px;color:#000000d9;margin-bottom:2px}
    .app-item-meta{font-size:12px;color:#00000073;display:flex;justify-content:space-between}
    .biz-tag{font-size:11px;padding:1px 6px;border-radius:3px;border:1px solid;display:inline-block}
    .biz-tag-road{color:#1677ff;background:#e6f4ff;border-color:#91caff}
    .biz-tag-demo{color:#722ed1;background:#f9f0ff;border-color:#d3adf7}
    .biz-tag-oper{color:#fa8c16;background:#fff7e6;border-color:#ffd591}
    .archive-badge{font-size:11px;padding:1px 6px;border-radius:3px;border:1px solid}
    .archive-yes{color:#52c41a;background:#f6ffed;border-color:#b7eb8f}
    .archive-no{color:#00000073;background:#fafafa;border-color:#d9d9d9}
    .right-header{padding:16px 20px;border-bottom:1px solid #f0f0f0;background:#fafafa;display:flex;align-items:center;justify-content:space-between}
    .right-title{font-size:16px;font-weight:500;color:#000000d9;margin-bottom:4px}
    .right-sub{font-size:12px;color:#00000073}
    .right-body{flex:1;overflow-y:auto;padding:16px 20px}
    .report-type-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;border:1px solid}
    .report-type-stage{color:#1677ff;background:#e6f4ff;border-color:#91caff}
    .report-type-summary{color:#52c41a;background:#f6ffed;border-color:#b7eb8f}
    .file-cell{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle}
    .upload-zone{border:1px dashed #d9d9d9;border-radius:6px;padding:16px;text-align:center;cursor:pointer;color:#00000073;background:#fafafa;font-size:13px;transition:all .2s}
    .upload-zone:hover{border-color:#1677ff;color:#1677ff}
    .file-list{margin-top:8px;font-size:13px}
    .file-list .file-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#f5f5f5;border-radius:4px;margin-bottom:4px}
    .file-list .file-item .file-name{flex:1;color:#000000d9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .file-list .file-item .file-size{color:#00000073;font-size:12px}
    .file-list .file-item .file-remove{color:#ff4d4f;cursor:pointer;font-size:16px}
    .period-row{display:none}
    .period-row.show{display:flex}
    .dropdown-panel{position:absolute;z-index:1000;background:#fff;border:1px solid #d9d9d9;border-radius:6px;box-shadow:0 6px 16px rgba(0,0,0,.08);padding:4px 0;min-width:140px}
    .dropdown-item{padding:5px 12px;cursor:pointer;font-size:13px}
    .dropdown-item:hover{background:#f5f5f5}
  </style>
</head>
<body>
<div id="app" class="flex h-screen overflow-hidden">
  <aside id="sidebar"></aside>
  <div class="flex-1 flex flex-col overflow-hidden">
    <header id="topnav"></header>
    <main class="flex-1 overflow-auto bg-[#f0f2f5] p-6">
      <div class="page-header"><h2>报告管理</h2></div>

      <div class="ant-tabs">
        <span class="ant-tab active" onclick="switchTab(this,'tab-query')">报告查询</span>
        <span class="ant-tab" onclick="switchTab(this,'tab-submit')">报告提交</span>
        <span class="ant-tab" onclick="switchTab(this,'tab-archive')">材料归档</span>
      </div>

      <!-- ============ Tab1 报告查询（双栏，结构同 F08，无提交报告按钮） ============ -->
      <div id="tab-query">
        <div class="layout-flex">
          <!-- 左栏：申请列表 -->
          <div class="left-pane">
            <div class="left-search">
              <input placeholder="搜索申请编号" id="qAppSearch" oninput="renderQueryAppList()">
            </div>
            <div class="group-tabs">
              <div class="group-tab active" data-group="all" onclick="switchQueryGroup('all')">全部</div>
              <div class="group-tab" data-group="road_test" onclick="switchQueryGroup('road_test')">道路测试</div>
              <div class="group-tab" data-group="demo_apply" onclick="switchQueryGroup('demo_apply')">示范应用</div>
              <div class="group-tab" data-group="demo_operate" onclick="switchQueryGroup('demo_operate')">商业化试点</div>
            </div>
            <div class="app-list" id="qAppList"></div>
          </div>
          <!-- 右栏：报告列表 -->
          <div class="right-pane">
            <div class="right-header">
              <div>
                <div class="right-title"><span id="qCurrentAppLabel">全部申请</span> · 报告列表</div>
                <div class="right-sub" id="qCurrentAppSub">展示选中申请对应的所有报告</div>
              </div>
            </div>
            <div class="right-body">
              <div class="filter-bar mb-4">
                <div class="filter-row">
                  <div class="filter-item" style="position:relative">
                    <label>报告类型</label>
                    <div class="ant-select" id="qReportType" onclick="toggleDropdown('qReportTypeDropdown')" style="min-width:120px">全部<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg></div>
                    <div class="dropdown-panel" id="qReportTypeDropdown" style="display:none;top:36px">
                      <div class="dropdown-item" onclick="selectQueryReportType('all','全部')">全部</div>
                      <div class="dropdown-item" onclick="selectQueryReportType('stage','阶段性报告')">阶段性报告</div>
                      <div class="dropdown-item" onclick="selectQueryReportType('summary','总结性报告')">总结性报告</div>
                    </div>
                  </div>
                  <div class="filter-item"><label>报告标题</label><input class="ant-input" placeholder="请输入" id="qReportTitle" style="width:180px"></div>
                  <div class="filter-item"><label>报告提交时间</label>
                    <div style="display:flex;gap:4px;align-items:center">
                      <input class="ant-input" type="date" id="qSubmitFrom" style="width:140px">
                      <span class="mx-1 text-[#00000040]">~</span>
                      <input class="ant-input" type="date" id="qSubmitTo" style="width:140px">
                    </div>
                  </div>
                  <div class="flex gap-2 items-end">
                    <button class="ant-btn ant-btn-primary" onclick="renderQueryTable()">查询</button>
                    <button class="ant-btn" onclick="resetQueryFilter()">重置</button>
                  </div>
                </div>
              </div>
              <div class="ant-table-wrapper">
                <div style="overflow-x:auto">
                  <table class="ant-table">
                    <thead>
                      <tr>
                        <th>业务类型</th><th class="col-code">申请编号</th><th>报告类型</th><th>报告标题</th>
                        <th>提交主体</th><th>提交人</th><th class="col-code">报告提交时间</th><th>报告附件</th>
                      </tr>
                    </thead>
                    <tbody id="qReportTbody"></tbody>
                  </table>
                </div>
                <div id="qPaginationBar"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ============ Tab2 报告提交（向上级部门报送） ============ -->
      <div id="tab-submit" style="display:none">
        <div class="flex items-center justify-end mb-4">
          <button class="ant-btn ant-btn-primary" onclick="openNewReport()">+ 新增报告</button>
        </div>
        <div class="filter-bar">
          <div class="filter-row">
            <div class="filter-item"><label>报告名称</label><input class="ant-input" placeholder="请输入报告名称" id="sReportName" style="width:180px"></div>
            <div class="filter-item"><label>报告类型</label>
              <select class="ant-input" id="sReportType" style="width:150px">
                <option value="all">全部</option>
                <option value="道路测试情况报告">道路测试情况报告</option>
                <option value="示范应用情况报告">示范应用情况报告</option>
                <option value="商业化试点安全报告">商业化试点安全报告</option>
                <option value="年度综合报告">年度综合报告</option>
                <option value="专项工作报告">专项工作报告</option>
              </select>
            </div>
            <div class="filter-item"><label>报送对象</label>
              <select class="ant-input" id="sReceiver" style="width:160px">
                <option value="all">全部</option>
                <option value="工业和信息化厅">工业和信息化厅</option>
                <option value="公安厅">公安厅</option>
                <option value="交通运输厅">交通运输厅</option>
              </select>
            </div>
            <div class="filter-item"><label>报送时间</label>
              <div style="display:flex;gap:4px;align-items:center">
                <input class="ant-input" type="date" id="sDateFrom" style="width:140px">
                <span class="mx-1 text-[#00000040]">~</span>
                <input class="ant-input" type="date" id="sDateTo" style="width:140px">
              </div>
            </div>
            <div class="filter-item"><label>报送状态</label>
              <select class="ant-input" id="sStatus" style="width:120px">
                <option value="all">全部</option>
                <option value="success">报送成功</option>
                <option value="fail">报送失败</option>
              </select>
            </div>
            <div class="flex gap-2 items-end"><button class="ant-btn ant-btn-primary" onclick="searchSubmits()">查询</button><button class="ant-btn" onclick="resetSubmits()">重置</button></div>
          </div>
        </div>
        <div class="ant-table-wrapper">
          <div style="overflow-x:auto">
            <table class="ant-table" id="submitTable">
              <thead><tr>
                <th class="col-code">报告编号</th><th>报告名称</th><th>报告类型</th><th>报送对象</th>
                <th class="col-code">报送时间</th><th>报送单位</th><th>报送人</th><th>报告附件</th><th class="col-status">报送状态</th><th class="col-action">操作</th>
              </tr></thead>
              <tbody id="submitTbody"></tbody>
            </table>
          </div>
          <div id="paginationSubmit"></div>
        </div>
      </div>

      <!-- ============ Tab3 材料归档（双栏） ============ -->
      <div id="tab-archive" style="display:none">
        <div class="layout-flex">
          <!-- 左栏：申请列表 -->
          <div class="left-pane">
            <div class="left-search">
              <input placeholder="搜索申请编号" id="aAppSearch" oninput="renderArchiveAppList()">
              <input placeholder="搜索申请企业" id="aCompanySearch" oninput="renderArchiveAppList()">
              <select id="aArchiveStatus" onchange="renderArchiveAppList()">
                <option value="all">归档状态：全部</option>
                <option value="archived">已归档</option>
                <option value="unarchived">未归档</option>
              </select>
            </div>
            <div class="group-tabs">
              <div class="group-tab active" data-group="all" onclick="switchArchiveGroup('all')">全部</div>
              <div class="group-tab" data-group="road_test" onclick="switchArchiveGroup('road_test')">道路测试</div>
              <div class="group-tab" data-group="demo_apply" onclick="switchArchiveGroup('demo_apply')">示范应用</div>
              <div class="group-tab" data-group="demo_operate" onclick="switchArchiveGroup('demo_operate')">商业化试点</div>
            </div>
            <div class="app-list" id="aAppList"></div>
          </div>
          <!-- 右栏：材料列表 -->
          <div class="right-pane">
            <div class="right-header">
              <div>
                <div class="right-title"><span id="aCurrentAppLabel">全部申请</span> · 归档材料</div>
                <div class="right-sub" id="aCurrentAppSub">展示选中申请对应的所有归档材料</div>
              </div>
              <button class="ant-btn ant-btn-primary" id="aArchiveBtn" onclick="archiveFlow()" style="display:none">归档</button>
            </div>
            <div class="right-body">
              <div class="filter-bar mb-4">
                <div class="filter-row">
                  <div class="filter-item"><label>材料类型</label>
                    <select class="ant-input" id="aMaterialType" style="width:220px">
                      <option value="all">全部</option>
                    </select>
                  </div>
                  <div class="flex gap-2 items-end">
                    <button class="ant-btn ant-btn-primary" onclick="renderArchiveTable()">查询</button>
                    <button class="ant-btn" onclick="resetArchiveFilter()">重置</button>
                  </div>
                </div>
              </div>
              <div class="ant-table-wrapper">
                <div style="overflow-x:auto">
                  <table class="ant-table">
                    <thead>
                      <tr>
                        <th class="col-code">材料编号</th><th>材料名称</th><th>材料类型</th><th>申请主体</th>
                        <th class="col-code">关联申请编号</th><th class="col-num">文件大小(MB)</th><th class="col-code">上传时间</th><th>文件附件</th>
                      </tr>
                    </thead>
                    <tbody id="aMaterialTbody"></tbody>
                  </table>
                </div>
                <div id="aPaginationBar"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="../../common.js"></script>

function switchTab(el,tabId){
  document.querySelectorAll('.ant-tab').forEach(function(t){t.classList.remove('active')});
  el.classList.add('active');
  ['tab-query','tab-submit','tab-archive'].forEach(function(id){
    document.getElementById(id).style.display=id===tabId?'':'none'
  });

}

/* ================= Tab2 报告提交 ================= */
var pagerSubmit;
// 推送成功时间：仅成功记录有，基于报送时间派生一个确定性时刻
function getPushTime(s){
  if(s.status!=='success')return '';
  function pad(n){return n<10?'0'+n:''+n;}
  var n=parseInt((s.id||'').replace(/\D/g,''),10)||0;
  return s.time+' '+pad(8+(n%9))+':'+pad((n*7)%60)+':'+pad((n*13)%60);
}
function getFilteredSubmits(){
  var data=[].concat(mockSubmits);
  var name=(document.getElementById('sReportName').value||'').trim();
  var type=document.getElementById('sReportType').value;
  var receiver=document.getElementById('sReceiver').value;
  var from=document.getElementById('sDateFrom').value;
  var to=document.getElementById('sDateTo').value;
  var status=document.getElementById('sStatus').value;
  if(name)data=data.filter(function(s){return s.name.indexOf(name)>-1;});
  if(type!=='all')data=data.filter(function(s){return s.type===type;});
  if(receiver!=='all')data=data.filter(function(s){return s.receiver===receiver;});
  if(from)data=data.filter(function(s){return s.time>=from;});
  if(to)data=data.filter(function(s){return s.time<=to;});
  if(status!=='all')data=data.filter(function(s){return s.status===status;});
  data.sort(function(a,b){return b.time.localeCompare(a.time);});
  return data;
}
function initPagerSubmit(){
  var data=getFilteredSubmits();
  if(!pagerSubmit){
    pagerSubmit=new Pagination({container:'paginationSubmit',pageSize:10,pageSizeOptions:[10,20,50,100],onPageChange:function(p,s){renderSubmits(p,s);}});
  }
  pagerSubmit.setTotal(data.length);
  renderSubmits(1,pagerSubmit.getPageSize());
}
function renderSubmits(page,pageSize){
  var data=getFilteredSubmits();
  var pd=data.slice((page-1)*pageSize,(page-1)*pageSize+pageSize);
  var html='';
  if(pd.length===0){
    html='<tr><td colspan="10"><div style="padding:32px 16px;text-align:center;color:#00000073;font-size:13px">暂无符合条件的报告</div></td></tr>';
  }else{
    pd.forEach(function(s){
      var rtag=s.receiver==='工业和信息化厅'?'<span class="ant-tag ant-tag-processing">工业和信息化厅</span>':s.receiver==='公安厅'?'<span class="ant-tag ant-tag-warning">公安厅</span>':'<span class="ant-tag ant-tag-success">交通运输厅</span>';
      var stag=s.status==='success'?'<span class="ant-tag ant-tag-success">报送成功</span>':'<span class="ant-tag ant-tag-error">报送失败</span>';
      var resubmitBtn=s.status==='fail'
        ? '<button class="ant-btn-link" onclick="resubmitReport(\''+s.id+'\')">再次提交</button>'
        : '';
      html+='<tr>'+
        '<td class="col-code">'+s.id+'</td>'+
        '<td>'+s.name+'</td>'+
        '<td>'+s.type+'</td>'+
        '<td>'+rtag+'</td>'+
        '<td class="col-code">'+s.time+'</td>'+
        '<td>'+s.unit+'</td>'+
        '<td>'+s.user+'</td>'+
        '<td><a href="javascript:void(0)" class="ant-btn-link file-cell" title="'+s.file+'" onclick="showToast(\'开始下载：'+s.file+'\',\'success\')">'+s.file+'</a></td>'+
        '<td class="col-status">'+stag+'</td>'+
        '<td class="col-action flex gap-1 justify-center"><button class="ant-btn-link" onclick="showSubmitDetail(\''+s.id+'\')">详情</button>'+resubmitBtn+'</td>'+
        '</tr>';
    });
  }
  document.getElementById('submitTbody').innerHTML=html;
}
function searchSubmits(){initPagerSubmit();}
function resetSubmits(){
  document.getElementById('sReportName').value='';
  document.getElementById('sReportType').value='all';
  document.getElementById('sReceiver').value='all';
  document.getElementById('sDateFrom').value='';
  document.getElementById('sDateTo').value='';
  document.getElementById('sStatus').value='all';

}
function resubmitReport(id){
  var s=mockSubmits.find(function(x){return x.id===id;});

    footer:'<button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn ant-btn-primary" onclick="doResubmit(\''+id+'\')">确认提交</button>'
  });

  var body='<div class="ant-descriptions">'+

    '<div class="ant-descriptions-row"><div class="ant-descriptions-label">报送单位</div><div class="ant-descriptions-value">'+s.unit+'</div><div class="ant-descriptions-label">报送人</div><div class="ant-descriptions-value">'+s.user+'</div></div>'+
    '<div class="ant-descriptions-row"><div class="ant-descriptions-label">报送时间</div><div class="ant-descriptions-value">'+s.time+'</div><div class="ant-descriptions-label">推送成功时间</div><div class="ant-descriptions-value">'+(s.status==='success'?getPushTime(s):'—')+'</div></div>'+
    '<div class="ant-descriptions-row"><div class="ant-descriptions-label">报告附件</div><div class="ant-descriptions-value" style="flex:3"><a href="javascript:void(0)" class="ant-btn-link" onclick="showToast(\'开始下载：'+s.file+'\',\'success\')">'+s.file+'</a></div></div>'+
    '</div>'+
    (s.status==='fail'?'<p class="text-sm text-[#ff4d4f] mt-4 p-3 bg-[#fff2f0] rounded">推送失败原因：上级部门平台接口响应超时，请稍后使用"再次提交"重新推送。</p>':'<p class="text-sm text-[#52c41a] mt-4 p-3 bg-[#f6ffed] rounded">该报告已通过接口成功推送至'+s.receiver+'平台。</p>');
  openModal('报告详情',body,{wide:true,footer:'<button class="ant-btn" onclick="closeModal()">关闭</button>'});
}
function openNewReport(){
  var body='<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>报告名称</div><div class="ant-form-control"><input class="ant-input" placeholder="请输入报告名称"></div></div>'+
    '<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>报告类型</div><div class="ant-form-control"><select class="ant-input"><option>道路测试情况报告</option><option>示范应用情况报告</option><option>商业化试点安全报告</option><option>年度综合报告</option><option>专项工作报告</option></select></div></div>'+
    '<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>报送对象</div><div class="ant-form-control"><select class="ant-input"><option>工业和信息化厅</option><option>公安厅</option><option>交通运输厅</option></select></div></div>'+
    '<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>报告附件</div><div class="ant-form-control"><div class="upload-zone">点击或拖拽文件至此区域上传（支持 pdf/doc/docx，≤20MB）</div></div></div>'+
    '<div class="ant-form-item"><div class="ant-form-label">备注说明</div><div class="ant-form-control"><textarea class="ant-input" style="height:60px;padding:8px 12px" placeholder="补充说明信息（选填）"></textarea></div></div>'+
    '<p class="text-sm text-[#00000073]">提交后系统将通过接口自动推送至所选上级部门平台，并根据推送结果更新报送状态。</p>';
  openModal('新增报告',body,{wide:true,footer:'<button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn ant-btn-primary" onclick="closeModal();showToast(\'报告已提交并推送\',\'success\')">提交报告</button>'});
}

/* ================= Tab3 材料归档 ================= */
var aGroup='all',aSelectedApp=null,aPager;

function renderArchiveAppList(){
  var data=[].concat(appListData);
  if(aGroup!=='all')data=data.filter(function(d){return d.biz===aGroup;});
  var kw=(document.getElementById('aAppSearch').value||'').trim().toLowerCase();
  if(kw)data=data.filter(function(d){return d.id.toLowerCase().indexOf(kw)>-1;});
  var ckw=(document.getElementById('aCompanySearch').value||'').trim();
  if(ckw)data=data.filter(function(d){return d.company.indexOf(ckw)>-1;});
  var st=document.getElementById('aArchiveStatus').value;
  if(st==='archived')data=data.filter(function(d){return d.archived;});
  else if(st==='unarchived')data=data.filter(function(d){return !d.archived;});
  data.sort(function(a,b){return b.time.localeCompare(a.time);});
  var html='';
  if(data.length===0){
    html='<div style="padding:24px 12px;text-align:center;color:#00000040;font-size:13px">暂无申请</div>';
  }else{
    data.forEach(function(d){
      var bz=bizMap[d.biz];
      var active=d.id===aSelectedApp?' active':'';
      var abadge=d.archived?'<span class="archive-badge archive-yes">已归档</span>':'<span class="archive-badge archive-no">未归档</span>';
      html+='<div class="app-item'+active+'" onclick="selectArchiveApp(\''+d.id+'\')">'+
        '<div class="app-item-top"><span class="biz-tag '+bz.cls+'">'+bz.label+'</span>'+abadge+'</div>'+
        '<div class="app-item-id">'+d.id+'</div>'+
        '<div class="app-item-company">'+d.company+'</div>'+
        '<div class="app-item-meta"><span>'+d.time.substring(0,10)+'</span></div>'+
        '</div>';
    });
  }
  document.getElementById('aAppList').innerHTML=html;
}
function switchArchiveGroup(g){
  aGroup=g;aSelectedApp=null;
  document.querySelectorAll('#tab-archive .group-tab').forEach(function(t){t.classList.remove('active');});
  document.querySelector('#tab-archive .group-tab[data-group="'+g+'"]').classList.add('active');
  renderArchiveAppList();renderArchiveTable();updateArchiveHeader();
}
function selectArchiveApp(id){
  aSelectedApp=id;renderArchiveAppList();renderArchiveTable();updateArchiveHeader();
}
function updateArchiveHeader(){
  var labelEl=document.getElementById('aCurrentAppLabel');
  var subEl=document.getElementById('aCurrentAppSub');
  var btn=document.getElementById('aArchiveBtn');
  if(aSelectedApp){
    var app=appListData.find(function(d){return d.id===aSelectedApp;});
    var bz=app?bizMap[app.biz]:null;
    labelEl.innerHTML='申请 '+aSelectedApp+(bz?' <span class="biz-tag '+bz.cls+'">'+bz.label+'</span>':'')+(app?' · '+app.company:'');
    subEl.textContent=app&&app.archived?'该申请流程已归档':'展示该申请对应的所有归档材料';
    btn.style.display='';
    if(app&&app.archived){btn.textContent='已归档';btn.disabled=true;btn.style.opacity='.5';btn.style.cursor='not-allowed';}
    else{btn.textContent='归档';btn.disabled=false;btn.style.opacity='1';btn.style.cursor='pointer';}
  }else{
    var gl=aGroup==='all'?'全部申请':bizMap[aGroup].label+'申请';
    labelEl.textContent=gl;
    subEl.textContent='当前展示 '+gl+' 对应的所有归档材料';
    btn.style.display='none';
  }
}
function getFilteredMaterials(){
  var data=[].concat(materialData);
  // 按左栏分组/选中申请过滤
  if(aSelectedApp){
    data=data.filter(function(m){return m.appId===aSelectedApp;});
  }else if(aGroup!=='all'){
    var ids=appListData.filter(function(d){return d.biz===aGroup;}).map(function(d){return d.id;});
    data=data.filter(function(m){return ids.indexOf(m.appId)>-1;});
  }
  var mt=document.getElementById('aMaterialType').value;
  if(mt&&mt!=='all')data=data.filter(function(m){return m.type===mt;});
  data.sort(function(a,b){return b.time.localeCompare(a.time);});
  return data;
}
function renderArchiveTable(){
  var data=getFilteredMaterials();
  var total=data.length;
  var cp=aPager?aPager.getCurrentPage():1;
  var ps=aPager?aPager.getPageSize():10;
  var pd=data.slice((cp-1)*ps,(cp-1)*ps+ps);
  var html='';
  if(pd.length===0){
    html='<tr><td colspan="8"><div style="padding:32px 16px;text-align:center;color:#00000073;font-size:13px">'+(aSelectedApp?'该申请暂无归档材料':'暂无符合条件的材料')+'</div></td></tr>';
  }else{
    pd.forEach(function(m){
      html+='<tr>'+
        '<td class="col-code">'+m.id+'</td>'+
        '<td>'+m.name+'</td>'+
        '<td><span class="ant-tag ant-tag-default">'+m.type+'</span></td>'+
        '<td>'+m.company+'</td>'+
        '<td class="col-code"><span class="text-[#1677ff] cursor-pointer hover:text-[#4096ff]" onclick="showApplicationDetail(\''+m.appId+'\')">'+m.appId+'</span></td>'+
        '<td class="col-num">'+m.size+'</td>'+
        '<td class="col-code text-xs">'+m.time+'</td>'+
        '<td><a href="javascript:void(0)" class="ant-btn-link" onclick="showToast(\'开始下载：'+m.name+'\',\'success\')">下载</a></td>'+
        '</tr>';
    });
  }
  document.getElementById('aMaterialTbody').innerHTML=html;
  if(aPager)aPager.setTotal(total);
}
function resetArchiveFilter(){
  document.getElementById('aMaterialType').value='all';
  if(aPager)aPager.reset();
  renderArchiveTable();
}
function archiveFlow(){
  if(!aSelectedApp)return;
  var app=appListData.find(function(d){return d.id===aSelectedApp;});
  if(!app||app.archived)return;
  openModal('归档确认','<p class="text-sm text-[#000000d9]">确定要将申请流程 <b>'+aSelectedApp+'</b>（'+app.company+'）整体归档吗？归档后该流程的所有材料将进入档案库。</p>',{
    footer:'<button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn ant-btn-primary" onclick="doArchive()">确认归档</button>'
  });
}
function doArchive(){
  var app=appListData.find(function(d){return d.id===aSelectedApp;});
  if(app)app.archived=true;
  closeModal();
  showToast('申请流程已归档','success');
  renderArchiveAppList();updateArchiveHeader();
}
function initMaterialTypeOptions(){
  var sel=document.getElementById('aMaterialType');
  materialTypeList.forEach(function(t){
    var o=document.createElement('option');o.value=t;o.textContent=t;sel.appendChild(o);
  });
}

/* ================= 申请详情弹窗（共用） ================= */
function showApplicationDetail(appId){
  var app=appListData.find(function(x){return x.id===appId;});
  if(!app){
    openModal('提示','<p class="text-sm text-[#00000073]">未找到该编号关联的申请记录，请确认编号是否正确。</p>',{footer:'<button class="ant-btn" onclick="closeModal()">关闭</button>'});
    return;
  }
  var bz=bizMap[app.biz];
  var body='<div class="ant-descriptions">'+
    '<div class="ant-descriptions-row"><div class="ant-descriptions-label">申请编号</div><div class="ant-descriptions-value">'+app.id+'</div><div class="ant-descriptions-label">业务类型</div><div class="ant-descriptions-value"><span class="biz-tag '+bz.cls+'">'+bz.label+'</span></div></div>'+
    '<div class="ant-descriptions-row"><div class="ant-descriptions-label">申请主体</div><div class="ant-descriptions-value">'+app.company+'</div><div class="ant-descriptions-label">有效期至</div><div class="ant-descriptions-value">'+app.validTo+'</div></div>'+
    '<div class="ant-descriptions-row"><div class="ant-descriptions-label">申请时间</div><div class="ant-descriptions-value">'+app.time+'</div><div class="ant-descriptions-label">归档状态</div><div class="ant-descriptions-value">'+(app.archived?'<span class="archive-badge archive-yes">已归档</span>':'<span class="archive-badge archive-no">未归档</span>')+'</div></div>'+
    '</div>'+
    '<div class="text-sm text-[#00000073] mt-4 p-3 bg-[#fafafa] rounded">如需查看该申请的完整材料清单及审批进度，请前往对应准入申请页面。</div>';
  openModal('申请记录详情 - '+appId,body,{wide:true,footer:'<button class="ant-btn" onclick="closeModal()">关闭</button>'});
}

/* ================= Toast ================= */
function showToast(msg,type){
  var colors={success:'#52c41a',error:'#ff4d4f',warn:'#faad14',info:'#1677ff'};
  var c=colors[type]||colors.info;
  var t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText='position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid '+c+';color:'+c+';padding:10px 24px;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:9999;font-size:14px';
  document.body.appendChild(t);
  setTimeout(function(){t.remove();},2500);
}

/* ================= 初始化 ================= */
document.addEventListener('DOMContentLoaded',function(){
  initMaterialTypeOptions();
  qPager=new Pagination({container:'qPaginationBar',pageSize:10,pageSizeOptions:[10,20,50,100],onPageChange:function(p,s){renderQueryTable();}});
  aPager=new Pagination({container:'aPaginationBar',pageSize:10,pageSizeOptions:[10,20,50,100],onPageChange:function(p,s){renderArchiveTable();}});
  renderQueryAppList();renderQueryTable();updateQueryHeader();
  renderArchiveAppList();renderArchiveTable();updateArchiveHeader();
});
</script>
</body>
</html>
