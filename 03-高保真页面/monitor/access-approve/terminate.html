function getTermTypeInfo(typeId){
  return termTypes.find(function(t){return t.id===typeId;})||termTypes[0];
}

function operatorOf(d){
  if(d.trigger.indexOf('自动')>-1) return '系统';
  return d.operator||'市工作专班';
}

function renderTable(){
  var data=[].concat(termData);
  var company=document.getElementById('filterCompany').value.trim();
  var typeVal=document.getElementById('filterType').value;
  var triggerVal=document.getElementById('filterTrigger').value;
  var statusVal=document.getElementById('filterStatus').value;
  var dateFrom=document.getElementById('filterDateFrom').value;
  var dateTo=document.getElementById('filterDateTo').value;
  if(company)data=data.filter(function(d){return d.company.indexOf(company)>-1;});
  if(typeVal&&typeVal!=='全部'){data=data.filter(function(d){return getTermTypeInfo(d.termType).name===typeVal;});}
  if(triggerVal&&triggerVal!=='全部'){data=data.filter(function(d){return d.trigger.indexOf(triggerVal)>-1;});}
  if(statusVal&&statusVal!=='全部'){data=data.filter(function(d){return d.status===statusVal;});}
  if(dateFrom)data=data.filter(function(d){return d.time>=dateFrom;});
  if(dateTo)data=data.filter(function(d){return d.time<=dateTo;});
  data.sort(function(a,b){return b.time.localeCompare(a.time);});
  var total=data.length;
  var cp=pager?pager.getCurrentPage():1;var ps=pager?pager.getPageSize():10;
  var start=(cp-1)*ps;
  var pageData=data.slice(start,start+ps);
  var html='';
  pageData.forEach(function(d){
    var ti=getTermTypeInfo(d.termType);
    var statusTag=d.status==='已办结'?'<span class="ant-tag ant-tag-success">已办结</span>':'<span class="ant-tag ant-tag-processing">受理中</span>';
    var triggerTag=d.trigger.indexOf('自动')>-1&&d.trigger.indexOf('手动')>-1?'<span class="ant-tag ant-tag-warning">自动/手动</span>':d.trigger==='自动触发'?'<span class="ant-tag ant-tag-default">自动触发</span>':'<span class="ant-tag ant-tag-processing">手动触发</span>';
    html+='<tr><td>'+d.id+'</td><td><button class="ant-btn-link" onclick="openDetail(\''+d.id+'\')">'+d.appId+'</button></td><td>'+d.appType+'</td><td>'+d.company+'</td><td><span class="ant-tag" style="background:'+ti.color+'15;color:'+ti.color+';border-color:'+ti.color+'40">'+ti.name+'</span></td><td>'+triggerTag+'</td><td>'+d.time+'</td><td>'+operatorOf(d)+'</td><td>'+statusTag+'</td><td><button class="ant-btn-link" onclick="openDetail(\''+d.id+'\')">详情</button></td></tr>';
  });
  document.getElementById('terminateTbody').innerHTML=html;
  if(pager)pager.setTotal(total);
}

function resetFilter(){
  document.getElementById('filterCompany').value='';
  ['filterType','filterTrigger','filterStatus'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='全部';});
  document.getElementById('filterDateFrom').value='';
  document.getElementById('filterDateTo').value='';
  if(pager)pager.reset();
  renderTable();
}

  var companies=Object.keys(validAppsByCompany);

  var typeOptions=termTypes.map(function(t){return '<div class="flex items-start gap-2 p-2 rounded hover:bg-[#f5f5f5] cursor-pointer" onclick="selectTermType(this,\''+t.id+'\')"><div class="w-4 h-4 mt-0.5 rounded-full border border-[#d9d9d9] flex-shrink-0" id="radio_'+t.id+'"></div><div><div class="text-sm text-[#000000d9]">'+t.name+'<span class="text-xs text-[#00000040] ml-2">'+t.trigger+'</span></div><div class="text-xs text-[#00000073]">'+t.desc+'</div></div></div>';}).join('');
  openModal('发起资格终止',
    '<div class="bg-[#fff2f0] border border-[#ffccc7] rounded-lg p-4 mb-4">' +
      '<div class="flex items-start gap-2"><span class="text-[#ff4d4f] text-lg">⚠</span>' +
      '<div><p class="text-sm font-medium text-[#000000d9]">资格终止后，对应准入申请将标记为"已终止"，相关测试/示范/运营活动将立即停止</p>' +
      '<p class="text-xs text-[#00000073] mt-1">终止记录将在对应准入申请的流程日志中体现。资格终止后如需恢复，需重新提交准入申请。</p></div></div>' +
    '</div>' +
    '<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>申请主体</div><div class="ant-form-control"><select class="ant-input" id="termCompany" style="cursor:pointer;height:32px" onchange="loadValidApps()">'+companyOptions+'</select><div class="text-xs text-[#00000073] mt-1">选择申请主体后，系统自动带出其当前有效的申请流程</div></div></div>' +
    '<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>关联申请流程</div><div class="ant-form-control"><div id="validAppsBox" class="border border-[#f0f0f0] rounded-lg p-3 min-h-[80px]"><div class="text-xs text-[#00000040] text-center py-4">请先选择申请主体</div></div></div></div>' +
    '<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>终止类型</div><div class="ant-form-control"><div class="border border-[#f0f0f0] rounded-lg p-2 max-h-64 overflow-y-auto">'+typeOptions+'</div><input type="hidden" id="selectedTermType" value=""></div></div>' +
    '<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>终止原因及说明</div><div class="ant-form-control"><textarea class="ant-input" id="termReason" style="height:80px;padding:8px 12px" placeholder="请详细描述终止原因及相关情况说明"></textarea></div></div>' +
    '<div class="ant-form-item"><div class="ant-form-label">附件上传</div><div class="ant-form-control"><button class="ant-btn ant-btn-sm" type="button" onclick="addAttachment()"><span>选择附件上传</span></button><div class="text-xs text-[#00000040] mt-1">支持PDF/Word/图片等格式，图片≤5MB、文档≤20MB，非必填</div><div id="attachList" class="mt-2 space-y-1"></div></div></div>',
    {wide:true,footer:'<button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn ant-btn-danger" onclick="submitTerminate()">确认终止</button>'});
}

function loadValidApps(){
  var company=document.getElementById('termCompany').value;
  var box=document.getElementById('validAppsBox');
  if(!company){box.innerHTML='<div class="text-xs text-[#00000040] text-center py-4">请先选择申请主体</div>';return;}
  var apps=validAppsByCompany[company]||[];
  if(!apps.length){box.innerHTML='<div class="text-xs text-[#00000040] text-center py-4">该申请主体当前无有效申请流程</div>';return;}
  var rows=apps.map(function(a){
    return '<label class="flex items-center gap-2 p-2 rounded hover:bg-[#f5f5f5] cursor-pointer"><input type="checkbox" class="term-app-checkbox" checked style="accent-color:#1677ff"><div class="flex-1"><div class="text-sm text-[#000000d9]">'+a.appId+'<span class="text-xs text-[#00000073] ml-2">'+a.appType+'</span></div><div class="text-xs text-[#00000040]">有效期：'+a.period+'</div></div></label>';
  }).join('');
  box.innerHTML='<div class="flex items-center justify-between mb-2 pb-2 border-b border-[#f0f0f0]"><span class="text-xs text-[#00000073]">共 '+apps.length+' 条有效申请，默认全部终止</span><button class="ant-btn-link ant-btn-sm" onclick="toggleAllApps()">全选/反选</button></div>'+rows;
}

function toggleAllApps(){
  var cbs=document.querySelectorAll('.term-app-checkbox');
  var allChecked=[].every.call(cbs,function(c){return c.checked;});
  [].forEach.call(cbs,function(c){c.checked=!allChecked;});
}

function addAttachment(){
  var list=document.getElementById('attachList');
  var idx=list.children.length+1;
  var names=['终止情况说明.pdf','现场照片01.png','第三方鉴定报告.pdf','整改通知书.docx'];
  var name=names[idx-1]||('附件'+idx+'.pdf');
  var div=document.createElement('div');
  div.className='flex items-center gap-2 p-2 bg-[#fafafa] rounded text-sm';
  div.innerHTML='<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" style="color:#1677ff;flex-shrink:0"><path d="M16.5 6v11.5a4 4 0 11-8 0V5a2.5 2.5 0 015 0v10.5a1 1 0 11-2 0V6H9v9.5a2.5 2.5 0 005 0V5a4 4 0 10-8 0v12.5a5.5 5.5 0 1011 0V6h-1.5z"/></svg><span class="flex-1 text-[#000000d9]">'+name+'</span><span class="text-xs text-[#00000040]">已上传</span><button class="ant-btn-link ant-btn-sm" onclick="this.parentNode.remove()">删除</button>';
  list.appendChild(div);
}

function submitTerminate(){
  var company=document.getElementById('termCompany').value;
  var checkedApps=document.querySelectorAll('.term-app-checkbox:checked');
  var termType=document.getElementById('selectedTermType').value;
  var reason=document.getElementById('termReason').value.trim();
  if(!company){showToast('请选择申请主体','error');return;}
  if(!checkedApps.length){showToast('至少选择一条关联申请流程','error');return;}
  if(!termType){showToast('请选择终止类型','error');return;}
  if(!reason){showToast('请填写终止原因及说明','error');return;}
  var count=checkedApps.length;
  closeModal();
  showToast('已发起资格终止，关联的 '+count+' 条申请流程已标记为"已终止"','success');
}

function showToast(msg,type){
  var colors={success:'#52c41a',error:'#ff4d4f',warn:'#faad14',info:'#1677ff'};
  var c=colors[type]||colors.info;
  var t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText='position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid '+c+';color:'+c+';padding:10px 24px;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:9999;font-size:14px';
  document.body.appendChild(t);
  setTimeout(function(){t.remove();},2500);
}

function selectTermType(el,typeId){
  document.querySelectorAll('#selectedTermType').forEach(function(i){i.value=typeId;});
  document.querySelectorAll('.ant-modal .rounded-full[id^="radio_"]').forEach(function(r){r.style.background='';r.style.borderColor='#d9d9d9';r.innerHTML='';});
  var radio=document.getElementById('radio_'+typeId);
  if(radio){radio.style.background='#1677ff';radio.style.borderColor='#1677ff';radio.innerHTML='<span style="color:#fff;font-size:10px;line-height:1">✓</span>';}
}

function openDetail(id){
  var d=termData.find(function(x){return x.id===id;});
  if(!d)return;
  var ti=getTermTypeInfo(d.termType);
  var isRT=d.appId.indexOf('RT')===0;
  var isDA=d.appId.indexOf('DA')===0;
  var typeLabel=isRT?'道路测试':isDA?'示范应用':'商业化试点';
  var periodLabel=isRT?'测试周期':typeLabel+'时间段';
  var roadLabel=isRT?'测试路段或区域':typeLabel+'路段';
  var vehicleLabel=typeLabel+'车辆';
  var schemeLabel=isRT?'测试方案':isDA?'示范应用方案':'商业化试点方案';

  h+='<h4 class="text-sm font-semibold text-[#000000d9] mb-2 pb-2 border-b border-[#f0f0f0]">终止记录信息</h4>';

  h+='<div class="ant-descriptions-row"><div class="ant-descriptions-label">终止编号</div><div class="ant-descriptions-value">'+d.id+'</div><div class="ant-descriptions-label">准入申请编号</div><div class="ant-descriptions-value">'+d.appId+'</div><div class="ant-descriptions-label">终止类型</div><div class="ant-descriptions-value"><span class="ant-tag" style="background:'+ti.color+'15;color:'+ti.color+';border-color:'+ti.color+'40">'+ti.name+'</span></div></div>';
  h+='<div class="ant-descriptions-row"><div class="ant-descriptions-label">触发方式</div><div class="ant-descriptions-value">'+d.trigger+'</div><div class="ant-descriptions-label">终止日期</div><div class="ant-descriptions-value">'+d.time+'</div><div class="ant-descriptions-label">办理状态</div><div class="ant-descriptions-value">'+(d.status==='已办结'?'<span class="ant-tag ant-tag-success">已办结</span>':'<span class="ant-tag ant-tag-processing">受理中</span>')+'</div></div>';
  h+='<div class="ant-descriptions-row"><div class="ant-descriptions-label">操作人</div><div class="ant-descriptions-value">'+operatorOf(d)+'</div><div class="ant-descriptions-label"></div><div class="ant-descriptions-value"></div><div class="ant-descriptions-label"></div><div class="ant-descriptions-value"></div></div>';
  h+='</div>';
  h+='<h4 class="text-sm font-semibold text-[#000000d9] mb-2 mt-3">终止原因</h4>';
  h+='<div class="text-sm text-[#000000d9] p-3 bg-[#fafafa] rounded leading-relaxed">'+d.reason+'</div>';

  h+='<h4 class="text-sm font-semibold text-[#000000d9] mb-2 mt-4 pb-2 border-b border-[#f0f0f0]">附件</h4>';
  var atts=d.attachment||attachmentMap[d.id]||[];
  if(atts.length){
    h+='<div class="space-y-2 text-sm">';
    atts.forEach(function(a){h+='<div class="flex items-center gap-2 p-2 bg-[#fafafa] rounded"><svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" style="color:#1677ff;flex-shrink:0"><path d="M16.5 6v11.5a4 4 0 11-8 0V5a2.5 2.5 0 015 0v10.5a1 1 0 11-2 0V6H9v9.5a2.5 2.5 0 005 0V5a4 4 0 10-8 0v12.5a5.5 5.5 0 1011 0V6h-1.5z"/></svg><span class="flex-1 text-[#000000d9]">'+a+'</span><button class="ant-btn-link ant-btn-sm">预览</button><button class="ant-btn-link ant-btn-sm">下载</button></div>';});
    h+='</div>';
  }else{
    h+='<div class="text-xs text-[#00000040]">无</div>';
  }

  h+='<h4 class="text-sm font-semibold text-[#000000d9] mb-2 mt-4 pb-2 border-b border-[#f0f0f0]">关联申请流程</h4>';
  var relApps=[{appId:d.appId,appType:d.appType,period:d.testPeriod}];
  (validAppsByCompany[d.company]||[]).forEach(function(a){if(a.appId!==d.appId)relApps.push(a);});
  h+='<div style="overflow-x:auto"><table class="ant-table" style="width:100%;font-size:13px"><thead><tr><th>序号</th><th>申请编号</th><th>申请类型</th><th>有效期</th><th>申请状态</th></tr></thead><tbody>';
  relApps.forEach(function(a,i){h+='<tr><td>'+(i+1)+'</td><td>'+a.appId+'</td><td>'+a.appType+'</td><td>'+(a.period||'-')+'</td><td><span class="ant-tag ant-tag-error">已终止</span></td></tr>';});
  h+='</tbody></table></div>';

  h+='<h4 class="text-sm font-semibold text-[#000000d9] mb-2 mt-4 pb-2 border-b border-[#f0f0f0]">主申请详细信息</h4>';
  h+='<div class="ant-descriptions">';
  h+='<div class="ant-descriptions-row"><div class="ant-descriptions-label">准入申请编号</div><div class="ant-descriptions-value">'+d.appId+'</div><div class="ant-descriptions-label">申请类型</div><div class="ant-descriptions-value">'+d.appType+'</div><div class="ant-descriptions-label">申请状态</div><div class="ant-descriptions-value"><span class="ant-tag ant-tag-error">已终止</span></div></div>';
  h+='<div class="ant-descriptions-row"><div class="ant-descriptions-label">申请主体</div><div class="ant-descriptions-value">'+d.company+'</div><div class="ant-descriptions-label">项目负责人</div><div class="ant-descriptions-value">'+d.manager+'</div><div class="ant-descriptions-label">联系方式</div><div class="ant-descriptions-value">'+d.managerPhone+'</div></div>';
  h+='<div class="ant-descriptions-row"><div class="ant-descriptions-label">'+periodLabel+'</div><div class="ant-descriptions-value">'+d.testPeriod+'</div><div class="ant-descriptions-label">终止日期</div><div class="ant-descriptions-value">'+d.time+'</div><div class="ant-descriptions-label"></div><div class="ant-descriptions-value"></div></div>';
  h+='</div>';

  h+='<h4 class="text-sm font-semibold text-[#000000d9] mb-2 mt-4 pb-2 border-b border-[#f0f0f0]">'+roadLabel+'</h4>';
  h+='<div style="overflow-x:auto"><table class="ant-table" style="width:100%;font-size:13px"><thead><tr><th>序号</th><th>道路名称</th><th>道路类型</th><th>道路状态</th></tr></thead><tbody>';
  d.roads.forEach(function(r,i){h+='<tr><td>'+(i+1)+'</td><td>'+r.name+'</td><td>'+r.type+'</td><td><span class="ant-tag '+(r.status==='开放'?'ant-tag-success':'ant-tag-error')+'">'+r.status+'</span></td></tr>';});
  h+='</tbody></table></div>';

  h+='<h4 class="text-sm font-semibold text-[#000000d9] mb-2 mt-4 pb-2 border-b border-[#f0f0f0]">'+vehicleLabel+'</h4>';
  h+='<div style="overflow-x:auto"><table class="ant-table" style="width:100%;font-size:13px"><thead><tr><th>序号</th><th>VIN码</th><th>品牌</th><th>型号</th><th>自动驾驶级别</th><th>牌照号</th></tr></thead><tbody>';
  d.vehicles.forEach(function(v,i){h+='<tr><td>'+(i+1)+'</td><td class="font-mono text-xs">'+v.vin+'</td><td>'+v.brand+'</td><td>'+v.model+'</td><td><span class="ant-tag '+(v.level==='L4'?'ant-tag-success':'ant-tag-processing')+'">'+v.level+'</span></td><td>'+v.plate+'</td></tr>';});
  h+='</tbody></table></div>';

  h+='<h4 class="text-sm font-semibold text-[#000000d9] mb-2 mt-4 pb-2 border-b border-[#f0f0f0]">申请材料</h4>';
  h+='<div class="space-y-2 text-sm">';
  d.materials.forEach(function(m){h+='<div class="flex items-center gap-2"><span class="text-[#52c41a]">✓</span>'+m+' <button class="ant-btn-link ant-btn-sm">预览</button><button class="ant-btn-link ant-btn-sm">下载</button></div>';});
  h+='</div>';

  h+='<h4 class="text-sm font-semibold text-[#000000d9] mb-3 mt-4 pb-2 border-b border-[#f0f0f0]">审批流程进度</h4>';
  h+='<div class="flex items-center gap-0 text-xs">';
  var steps=[{label:'提交申请',done:true},{label:'第三方初审',done:true},{label:'市工作专班审核',done:true},{label:'临牌回传',done:true},{label:'资格终止',done:true,error:true}];
  steps.forEach(function(s,i){
    var bg=s.error?'#ff4d4f':s.done?'#52c41a':'#d9d9d9';

  h+='<h4 class="text-sm font-semibold text-[#000000d9] mb-4 mt-4 pb-2 border-b border-[#f0f0f0]">流程日志</h4>';
  h+='<div class="space-y-3">';
  var flowLogs=buildFlowLogs(d,ti);
  flowLogs.forEach(function(log,li){
    var hasNext=li<flowLogs.length-1;
    var bs=hasNext?'border-left:2px solid '+log.color+';margin-left:5px;padding-left:12px':'margin-left:17px;padding-left:0';
    h+='<div class="relative pb-3" style="'+bs+'"><div class="absolute w-3 h-3 rounded-full flex items-center justify-center text-[8px] text-white font-bold mt-1" style="left:-7px;top:0;background:'+log.color+'">'+log.dot+'</div>';
    h+='<div class="min-w-0"><div class="flex items-center justify-between mb-2"><span class="text-sm font-medium text-[#000000d9]">'+log.title+'</span><span class="ant-tag '+log.tagClass+' text-[10px]">'+log.status+'</span></div><div class="text-xs text-[#00000073] space-y-1">';
    h+='<div><span class="text-[#00000040]">处理人：</span>'+log.handler+'</div>';
    h+='<div><span class="text-[#00000040]">处理时间：</span>'+log.time+'</div>';
    if(log.opinion)h+='<div class="whitespace-pre-line mt-1.5 p-2 bg-[#fafafa] rounded"><span class="text-[#00000040]">处理意见：</span>'+log.opinion+'</div>';

  });
  h+='</div>';

  openModal('终止详情 - '+d.id,h,{wide:true,footer:'<button class="ant-btn" onclick="closeModal()">关闭</button>'});
}

function buildFlowLogs(d,ti){
  var logs=[];
  logs.push({title:'提交申请',handler:d.manager+'（'+d.company+'）',time:d.testPeriod.split(' 至 ')[0]+' 09:00',opinion:'提交'+d.appType+'申请',status:'已处理',color:'#52c41a',dot:'✓',tagClass:'ant-tag-success'});
  logs.push({title:'第三方初审',handler:'张三（第三方专业管理机构A）',time:d.time+' - 审批通过',opinion:'审核结论：通过\n审核意见：申请材料齐全、合规，建议提交市工作专班审核',status:'已处理',color:'#52c41a',dot:'✓',tagClass:'ant-tag-success'});
  logs.push({title:'市工作专班审核',handler:'王主任（市工作专班）',time:d.time+' - 审批通过',opinion:'审核结论：通过\n审核意见：同意批准'+d.appType.replace('准入','').replace('新增','').replace('延期','').replace('变更','')+'申请',status:'已处理',color:'#52c41a',dot:'✓',tagClass:'ant-tag-success'});
  logs.push({title:'临牌回传',handler:'李警官（市交管部门）',time:d.time+' - 已回传',opinion:'临时牌照已发放',status:'已处理',color:'#52c41a',dot:'✓',tagClass:'ant-tag-success'});
  if(d.status==='已办结'){
    logs.push({title:'资格终止 — '+ti.name,handler:operatorOf(d),time:d.time+' - 已终止',opinion:'终止类型：'+ti.name+'（'+d.trigger+'）\n终止原因：'+d.reason,status:'已终止',color:'#ff4d4f',dot:'✗',tagClass:'ant-tag-error'});
  }else{
    logs.push({title:'资格终止 — '+ti.name,handler:operatorOf(d),time:d.time+' - 受理中',opinion:'终止类型：'+ti.name+'（'+d.trigger+'）\n终止原因：'+d.reason,status:'受理中',color:'#1677ff',dot:'●',tagClass:'ant-tag-processing'});
  }
  return logs;
}
