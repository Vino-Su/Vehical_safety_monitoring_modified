<body>

              <tr><td><input type="checkbox" class="ant-checkbox"></td><td>韩梅梅</td><td>女</td><td>36</td><td>4206**********34</td><td>E公司</td><td><span class="ant-tag ant-tag-processing">驾驶人</span></td><td>A2</td><td>12年</td><td>无</td><td>无</td><td>无</td><td>2026-03-18</td><td class="flex gap-1"><button class="ant-btn-link" onclick="openDetailModal(1)">详情</button><button class="ant-btn-link" onclick="openAddModal(1)">编辑</button><button class="ant-btn-link danger">删除</button></td></tr>
              <tr><td><input type="checkbox" class="ant-checkbox"></td><td>王小明</td><td>男</td><td>33</td><td>4206**********56</td><td>C公司</td><td><span class="ant-tag ant-tag-processing">驾驶人</span></td><td>B1</td><td>9年</td><td>无</td><td>无</td><td>无</td><td>2026-04-20</td><td class="flex gap-1"><button class="ant-btn-link" onclick="openDetailModal(2)">详情</button><button class="ant-btn-link" onclick="openAddModal(2)">编辑</button><button class="ant-btn-link danger">删除</button></td></tr>
              <tr><td><input type="checkbox" class="ant-checkbox"></td><td>刘勇辉</td><td>男</td><td>45</td><td>4206**********78</td><td>A公司</td><td><span class="ant-tag ant-tag-processing">驾驶人</span><span class="ant-tag ant-tag-processing" style="margin-left:4px">安全员</span></td><td>C1</td><td>21年</td><td>无</td><td>无</td><td>无</td><td>2026-03-22</td><td class="flex gap-1"><button class="ant-btn-link" onclick="openDetailModal(3)">详情</button><button class="ant-btn-link" onclick="openAddModal(3)">编辑</button><button class="ant-btn-link danger">删除</button></td></tr>

        <div class="flex items-center justify-between px-4 py-3">

</div>
<script>
const PAGE_ID='person';

function formGroup(title, fields) {
  return '<h4 class="text-sm font-semibold text-[#000000d9] mb-3 pb-2 border-b border-[#f0f0f0]">' + title + '</h4>' + fields;
}

function formItem(label, content, required) {
  return '<div class="ant-form-item"><div class="ant-form-label">' + (required ? '<span class="required">*</span>' : '') + label + '</div><div class="ant-form-control">' + content + '</div></div>';
}

function inputField(placeholder, type) {
  return '<input class="ant-input" placeholder="' + placeholder + '"' + (type ? ' type="' + type + '"' : '') + '>';
}

function selectField(placeholder) {
  return '<div class="ant-select" style="width:100%">' + placeholder + ' <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg></div>';
}

function uploadField(hint) {
  return '<button class="ant-btn ant-btn-sm">点击或拖拽文件上传</button><div class="text-xs text-[#00000040] mt-1">' + hint + '</div>';
}

const personData = [
  {name:'张伟',gender:'男',idNumber:'4206**********12',age:'41',company:'A公司',personType:'安全员,远程操控员',licenseType:'A1',drivingYears:'17年',firstLicenseDate:'2009-05-20',illegalRecord:'无',illegalType:'',drinkDriveRecord:'无',scoreCommitment:'是',scoreFile:'记分周期合规承诺书-张伟.pdf',trafficProofFile:'交管记分查询证明-张伟.pdf',deathAccident:'无',accidentRecord:'无',familiarTest:'是',masterMethod:'是',emergencyCapability:'是',contractFile:'劳动合同-张伟.pdf',trainingRecord:'培训记录-张伟.pdf',idCardFile:'身份证-张伟.pdf',driverLicenseFile:'驾驶证-张伟.pdf',safeDriveFile:'安全驾驶证明-张伟.pdf',trainingHours:'120',remoteHours:'200',trainingProof:'专业技能培训证明-张伟.pdf',remoteProof:'远程操控操作证明-张伟.pdf',regTime:'2026-03-15 10:30'},
  {name:'韩梅梅',gender:'女',idNumber:'4206**********34',age:'36',company:'E公司',personType:'驾驶人',licenseType:'A2',drivingYears:'12年',firstLicenseDate:'2014-08-12',illegalRecord:'无',illegalType:'',drinkDriveRecord:'无',scoreCommitment:'是',scoreFile:'记分周期合规承诺书-韩梅梅.pdf',trafficProofFile:'',deathAccident:'无',accidentRecord:'无',familiarTest:'是',masterMethod:'是',emergencyCapability:'是',contractFile:'劳动合同-韩梅梅.pdf',trainingRecord:'培训记录-韩梅梅.pdf',idCardFile:'身份证-韩梅梅.pdf',driverLicenseFile:'驾驶证-韩梅梅.pdf',safeDriveFile:'安全驾驶证明-韩梅梅.pdf',trainingHours:'',remoteHours:'',trainingProof:'',remoteProof:'',regTime:'2026-03-18 14:20'},
  {name:'王小明',gender:'男',idNumber:'4206**********56',age:'33',company:'C公司',personType:'驾驶人',licenseType:'B1',drivingYears:'9年',firstLicenseDate:'2017-03-25',illegalRecord:'无',illegalType:'',drinkDriveRecord:'无',scoreCommitment:'是',scoreFile:'记分周期合规承诺书-王小明.pdf',trafficProofFile:'交管记分查询证明-王小明.pdf',deathAccident:'无',accidentRecord:'无',familiarTest:'是',masterMethod:'是',emergencyCapability:'是',contractFile:'劳动合同-王小明.pdf',trainingRecord:'培训记录-王小明.pdf',idCardFile:'身份证-王小明.pdf',driverLicenseFile:'驾驶证-王小明.pdf',safeDriveFile:'安全驾驶证明-王小明.pdf',trainingHours:'',remoteHours:'',trainingProof:'',remoteProof:'',regTime:'2026-04-20 09:15'},
  {name:'刘勇辉',gender:'男',idNumber:'4206**********78',age:'45',company:'A公司',personType:'驾驶人,安全员',licenseType:'C1',drivingYears:'21年',firstLicenseDate:'2005-11-03',illegalRecord:'无',illegalType:'',drinkDriveRecord:'无',scoreCommitment:'是',scoreFile:'记分周期合规承诺书-刘勇辉.pdf',trafficProofFile:'',deathAccident:'无',accidentRecord:'无',familiarTest:'是',masterMethod:'是',emergencyCapability:'是',contractFile:'劳动合同-刘勇辉.pdf',trainingRecord:'培训记录-刘勇辉.pdf',idCardFile:'身份证-刘勇辉.pdf',driverLicenseFile:'驾驶证-刘勇辉.pdf',safeDriveFile:'安全驾驶证明-刘勇辉.pdf',trainingHours:'80',remoteHours:'150',trainingProof:'专业技能培训证明-刘勇辉.pdf',remoteProof:'远程操控操作证明-刘勇辉.pdf',regTime:'2026-03-22 16:45'}
];

function personTypeTags(types) {
  if (!types) return '-';
  return types.split(',').map(function(t) { return '<span class="ant-tag ant-tag-processing">' + t + '</span>'; }).join('');
}

function openAddModal(index){
  var d = index!==undefined ? personData[index] : null;
  var isEdit = !!d;
  var body = '<div style="max-height:70vh;overflow-y:auto">';

  // 分组1: 基本信息
  body += formGroup('基本信息',
    formItem('姓名', inputField('请输入完整姓名'), true) +
    formItem('性别', selectField(d ? d.gender : '请选择性别'), true) +
    formItem('身份证号', '<input class="ant-input" placeholder="请输入18位完整身份证号" value="' + (d ? d.idNumber : '') + '">', true) +
    formItem('身份证附件', uploadField('支持PDF/JPG/PNG格式，正反面扫描件') + (d && d.idCardFile ? '<div class="text-xs text-[#1677ff] mt-1">已上传：' + d.idCardFile + '</div>' : ''), true) +
    formItem('年龄', '<input class="ant-input" value="' + (d ? d.age : '根据身份证号自动计算') + '" disabled><div class="text-xs text-[#00000073] mt-1">身份证号填写后自动计算，不可编辑</div>', false) +
    formItem('所属企业', selectField(d ? d.company : '请选择所属企业'), true) +
    formItem('登记时间', '<input class="ant-input" value="' + (d ? d.regTime : '2026-06-10 10:30') + '" disabled><div class="text-xs text-[#00000073] mt-1">系统自动生成，不可编辑</div>', false)
  );

  // 分组2: 驾驶资质信息
  body += formGroup('驾驶资质信息',
    formItem('驾照类型', selectField(d ? d.licenseType : '请选择驾照类型'), true) +
    formItem('机动车驾驶证附件', uploadField('支持PDF/JPG/PNG格式') + (d && d.driverLicenseFile ? '<div class="text-xs text-[#1677ff] mt-1">已上传：' + d.driverLicenseFile + '</div>' : ''), true) +
    formItem('初次领证日期', '<input class="ant-input" type="date" value="' + (d ? d.firstLicenseDate : '') + '" onchange="updateDrivingYears(this.value)"><div class="text-xs text-[#00000073] mt-1" id="drivingYearsHint">' + (d ? '当前驾龄：' + d.drivingYears : '选择后自动计算驾龄') + '</div>', true) +
    formItem('安全驾驶证明', uploadField('支持PDF/JPG/PNG格式，由交管部门出具') + (d && d.safeDriveFile ? '<div class="text-xs text-[#1677ff] mt-1">已上传：' + d.safeDriveFile + '</div>' : ''), true)
  );

  // 分组3: 人员类型信息
  body += formGroup('人员类型信息',
    formItem('人员类型', selectField(d ? d.personType : '请选择（可多选）'), true) +
    '<div class="text-xs text-[#00000040] mb-3">枚举值：驾驶人、安全员、远程操控员、其他，至少选择1项</div>'
  );

  // 分组4: 交通违法与事故记录
  body += formGroup('交通违法与事故记录',
    formItem('最近1年内有无严重交通违法行为记录', '<select class="ant-input illegal-record-select" onchange="toggleIllegalType(this.value)" style="width:100%;padding:6px 12px;border:1px solid #d9d9d9;border-radius:6px"><option value="">请选择</option><option value="无"' + (d && d.illegalRecord === '无' ? ' selected' : '') + '>无</option><option value="有"' + (d && d.illegalRecord === '有' ? ' selected' : '') + '>有</option></select>', true) +
    '<div id="illegalTypeGroup" style="display:' + (d && d.illegalRecord === '有' ? 'block' : 'none') + '">' +
    formItem('严重交通违法行为类型', selectField(d && d.illegalType ? d.illegalType : '请选择（可多选）'), true) +
    '</div>' +
    formItem('有无酒驾/醉驾/精神药品记录', selectField(d ? d.drinkDriveRecord : '请选择'), true) +
    formItem('连续3个记分周期未记满12分承诺', '<select class="ant-input score-commitment-select" style="width:100%;padding:6px 12px;border:1px solid #d9d9d9;border-radius:6px"><option value="">请选择</option><option value="是"' + (d && d.scoreCommitment === '是' ? ' selected' : '') + '>是</option><option value="否"' + (d && d.scoreCommitment === '否' ? ' selected' : '') + '>否</option></select>', true) +
    formItem('记分周期合规承诺书', uploadField('企业加盖公章的承诺书，支持PDF格式') + (d && d.scoreFile ? '<div class="text-xs text-[#1677ff] mt-1">已上传：' + d.scoreFile + '</div>' : ''), true) +
    formItem('交管记分查询证明', uploadField('交管部门出具的记分查询结果截图/PDF，佐证材料（选填）') + (d && d.trafficProofFile ? '<div class="text-xs text-[#1677ff] mt-1">已上传：' + d.trafficProofFile + '</div>' : ''), false) +
    formItem('有无交通事故记录', selectField(d ? d.accidentRecord : '请选择'), true) +
    formItem('有无致人死亡或重伤且负责任的交通事故记录', selectField(d ? d.deathAccident : '请选择'), true)
  );

  // 分组5: 培训与资质信息
  body += formGroup('培训与资质信息',
    formItem('是否熟悉自动驾驶功能测试评价规程', selectField(d ? d.familiarTest : '请选择'), true) +
    formItem('是否掌握车辆道路测试操作方法', selectField(d ? d.masterMethod : '请选择'), true) +
    formItem('是否具备紧急状态下应急处置能力', selectField(d ? d.emergencyCapability : '请选择'), true) +
    formItem('劳动合同或劳务合同信息', uploadField('支持PDF/JPG/PNG格式') + (d && d.contractFile ? '<div class="text-xs text-[#1677ff] mt-1">已上传：' + d.contractFile + '</div>' : ''), true) +
    formItem('培训记录', uploadField('支持PDF/JPG/PNG格式（选填）') + (d && d.trainingRecord ? '<div class="text-xs text-[#1677ff] mt-1">已上传：' + d.trainingRecord + '</div>' : ''), false)
  );

  // 分组6: 自动驾驶安全员/远程操控员额外信息 (条件展示)
  var hasSafetyRole = d && (d.personType.indexOf('安全员') >= 0 || d.personType.indexOf('远程操控员') >= 0);
  body += '<div id="safetyExtraGroup" style="display:' + (hasSafetyRole ? 'block' : 'none') + '">';
  body += formGroup('自动驾驶安全员/远程操控员额外信息',
    '<div class="text-xs text-[#00000073] mb-2">仅当人员类型包含"安全员"或"远程操控员"时填写</div>' +
    formItem('专业技能培训时长（小时）', '<input class="ant-input" placeholder="不少于40小时" type="number" value="' + (d ? d.trainingHours : '') + '">', true) +
    formItem('远程操控操作时长（小时）', '<input class="ant-input" placeholder="不少于100小时" type="number" value="' + (d ? d.remoteHours : '') + '">', true) +
    formItem('专业技能培训证明', uploadField('支持PDF/JPG/PNG格式') + (d && d.trainingProof ? '<div class="text-xs text-[#1677ff] mt-1">已上传：' + d.trainingProof + '</div>' : ''), true) +
    formItem('远程操控操作证明', uploadField('支持PDF/JPG/PNG格式') + (d && d.remoteProof ? '<div class="text-xs text-[#1677ff] mt-1">已上传：' + d.remoteProof + '</div>' : ''), true)
  );
  body += '</div>';

  body += '</div>';
  openModal((isEdit ? '编辑' : '新增') + '人员备案登记', body, {wide:true, footer:'<button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn ant-btn-primary" onclick="submitPersonForm()">确定</button>'});
}

function openDetailModal(index){
  var d = personData[index] || personData[0];
  var hasSafety = d.personType.indexOf('安全员') >= 0 || d.personType.indexOf('远程操控员') >= 0;
  var html = '<div class="ant-descriptions" style="max-height:70vh;overflow-y:auto">';

  html += '<h4 class="text-sm font-semibold text-[#000000d9] mb-3 pb-2 border-b border-[#f0f0f0]">基本信息</h4>';
  html += '<div class="ant-descriptions-row"><div class="ant-descriptions-label">姓名</div><div class="ant-descriptions-value">' + d.name + '</div><div class="ant-descriptions-label">性别</div><div class="ant-descriptions-value">' + d.gender + '</div></div>';
  html += '<div class="ant-descriptions-row"><div class="ant-descriptions-label">身份证号</div><div class="ant-descriptions-value">' + d.idNumber + '</div><div class="ant-descriptions-label">年龄</div><div class="ant-descriptions-value">' + d.age + '岁</div></div>';
  html += '<div class="ant-descriptions-row"><div class="ant-descriptions-label">身份证附件</div><div class="ant-descriptions-value"><a href="#" class="text-[#1677ff]">' + d.idCardFile + '</a></div><div class="ant-descriptions-label">所属企业</div><div class="ant-descriptions-value">' + d.company + '</div></div>';
  html += '<div class="ant-descriptions-row"><div class="ant-descriptions-label">登记时间</div><div class="ant-descriptions-value">' + d.regTime + '</div><div class="ant-descriptions-label"></div><div class="ant-descriptions-value"></div></div>';

  html += '<h4 class="text-sm font-semibold text-[#000000d9] mb-3 mt-4 pb-2 border-b border-[#f0f0f0]">驾驶资质信息</h4>';
  html += '<div class="ant-descriptions-row"><div class="ant-descriptions-label">驾照类型</div><div class="ant-descriptions-value">' + d.licenseType + '</div><div class="ant-descriptions-label">驾龄</div><div class="ant-descriptions-value">' + d.drivingYears + '</div></div>';
  html += '<div class="ant-descriptions-row"><div class="ant-descriptions-label">初次领证日期</div><div class="ant-descriptions-value">' + d.firstLicenseDate + '</div><div class="ant-descriptions-label">机动车驾驶证附件</div><div class="ant-descriptions-value"><a href="#" class="text-[#1677ff]">' + d.driverLicenseFile + '</a></div></div>';
  html += '<div class="ant-descriptions-row"><div class="ant-descriptions-label">安全驾驶证明</div><div class="ant-descriptions-value"><a href="#" class="text-[#1677ff]">' + d.safeDriveFile + '</a></div><div class="ant-descriptions-label"></div><div class="ant-descriptions-value"></div></div>';

  html += '<h4 class="text-sm font-semibold text-[#000000d9] mb-3 mt-4 pb-2 border-b border-[#f0f0f0]">人员类型信息</h4>';
  html += '<div class="ant-descriptions-row"><div class="ant-descriptions-label">人员类型</div><div class="ant-descriptions-value">' + personTypeTags(d.personType) + '</div><div class="ant-descriptions-label"></div><div class="ant-descriptions-value"></div></div>';

  html += '<h4 class="text-sm font-semibold text-[#000000d9] mb-3 mt-4 pb-2 border-b border-[#f0f0f0]">交通违法与事故记录</h4>';
  html += '<div class="ant-descriptions-row"><div class="ant-descriptions-label">最近1年内严重交通违法行为</div><div class="ant-descriptions-value">' + d.illegalRecord + '</div><div class="ant-descriptions-label">严重交通违法行为类型</div><div class="ant-descriptions-value">' + (d.illegalType || '—（无记录）') + '</div></div>';
  html += '<div class="ant-descriptions-row"><div class="ant-descriptions-label">有无酒驾/醉驾/精神药品记录</div><div class="ant-descriptions-value">' + d.drinkDriveRecord + '</div><div class="ant-descriptions-label">连续3个记分周期未记满12分承诺</div><div class="ant-descriptions-value">' + d.scoreCommitment + '</div></div>';
  html += '<div class="ant-descriptions-row"><div class="ant-descriptions-label">记分周期合规承诺书</div><div class="ant-descriptions-value"><a href="#" class="text-[#1677ff]">' + d.scoreFile + '</a></div><div class="ant-descriptions-label">交管记分查询证明</div><div class="ant-descriptions-value">' + (d.trafficProofFile ? '<a href="#" class="text-[#1677ff]">' + d.trafficProofFile + '</a>' : '未上传') + '</div></div>';
  html += '<div class="ant-descriptions-row"><div class="ant-descriptions-label">有无交通事故记录</div><div class="ant-descriptions-value">' + d.accidentRecord + '</div><div class="ant-descriptions-label">致人死亡或重伤交通事故记录</div><div class="ant-descriptions-value">' + d.deathAccident + '</div></div>';

  html += '<h4 class="text-sm font-semibold text-[#000000d9] mb-3 mt-4 pb-2 border-b border-[#f0f0f0]">培训与资质信息</h4>';
  html += '<div class="ant-descriptions-row"><div class="ant-descriptions-label">是否熟悉自动驾驶测试评价规程</div><div class="ant-descriptions-value">' + d.familiarTest + '</div><div class="ant-descriptions-label">是否掌握道路测试操作方法</div><div class="ant-descriptions-value">' + d.masterMethod + '</div></div>';
  html += '<div class="ant-descriptions-row"><div class="ant-descriptions-label">是否具备应急处理能力</div><div class="ant-descriptions-value">' + d.emergencyCapability + '</div><div class="ant-descriptions-label">劳动合同或劳务合同</div><div class="ant-descriptions-value"><a href="#" class="text-[#1677ff]">' + d.contractFile + '</a></div></div>';
  html += '<div class="ant-descriptions-row"><div class="ant-descriptions-label">培训记录</div><div class="ant-descriptions-value"><a href="#" class="text-[#1677ff]">' + d.trainingRecord + '</a></div><div class="ant-descriptions-label"></div><div class="ant-descriptions-value"></div></div>';

  if (hasSafety) {
    html += '<h4 class="text-sm font-semibold text-[#000000d9] mb-3 mt-4 pb-2 border-b border-[#f0f0f0]">自动驾驶安全员/远程操控员额外信息</h4>';
    html += '<div class="ant-descriptions-row"><div class="ant-descriptions-label">专业技能培训时长（小时）</div><div class="ant-descriptions-value">' + d.trainingHours + '</div><div class="ant-descriptions-label">远程操控操作时长（小时）</div><div class="ant-descriptions-value">' + d.remoteHours + '</div></div>';
    html += '<div class="ant-descriptions-row"><div class="ant-descriptions-label">专业技能培训证明</div><div class="ant-descriptions-value"><a href="#" class="text-[#1677ff]">' + d.trainingProof + '</a></div><div class="ant-descriptions-label">远程操控操作证明</div><div class="ant-descriptions-value"><a href="#" class="text-[#1677ff]">' + d.remoteProof + '</a></div></div>';
  }

  html += '</div>';
  openModal('人员详情 - ' + d.name, html, {wide:true, footer:'<button class="ant-btn" onclick="closeModal()">关闭</button>'});
}

function toggleIllegalType(val) {
  var el = document.getElementById('illegalTypeGroup');
  if (el) el.style.display = val === '有' ? 'block' : 'none';
}

function updateDrivingYears(dateStr) {
  if (!dateStr) return;
  var firstDate = new Date(dateStr);
  var now = new Date();
  var years = now.getFullYear() - firstDate.getFullYear();
  var months = now.getMonth() - firstDate.getMonth();
  if (months < 0) { years--; months += 12; }
  var hint = document.getElementById('drivingYearsHint');
  if (hint) hint.textContent = '当前驾龄：' + years + '年' + months + '月';
}

function submitPersonForm() {
  var illegalSelect = document.querySelector('.illegal-record-select');
  if (illegalSelect && illegalSelect.value === '有') {
    alert('该人员不符合驾驶人/安全员条件');
    return;
  }
  var scoreSelect = document.querySelector('.score-commitment-select');
  if (scoreSelect && scoreSelect.value === '否') {
    alert('该人员不符合驾驶人/安全员条件');
    return;
  }
  var hint = document.getElementById('drivingYearsHint');
  if (hint) {
    var match = hint.textContent.match(/(\d+)年/);
    if (match && parseInt(match[1]) < 3) {
      alert('驾驶经历需满3年，当前驾龄不足');
      return;
    }
  }
  closeModal();
}
</script>
