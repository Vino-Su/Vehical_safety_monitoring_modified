<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>材料目录配置 - 智能网联汽车安全监测平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{DEFAULT:'#1677ff',hover:'#4096ff',disabled:'#85a5cc'}}}}}</script>
  <style>
    .cfg-table-container{overflow-x:auto}
    .cfg-table-container table{min-width:100%;table-layout:fixed}
    .cfg-desc{font-size:13px;color:#00000073;line-height:20px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .cfg-muted td{color:#00000073!important;background:#fafafa}
    .tag-list{display:flex;flex-wrap:wrap;gap:4px}
    .tag-list .ant-tag{margin:0}
    /* 左侧类型树 */
    .catalog-layout{display:grid;grid-template-columns:320px 1fr;gap:16px;align-items:stretch;min-height:calc(100vh - 64px - 48px - 56px - 80px)}
    .type-tree{background:#fff;border:1px solid #f0f0f0;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,21,41,.06);display:flex;flex-direction:column}
    .type-tree-head{padding:12px 16px;border-bottom:1px solid #f0f0f0;background:#fafafa;flex-shrink:0}
    .type-tree-head h4{font-size:13px;font-weight:600;color:#000000d9}
    .cat-tabs{display:flex;border-bottom:1px solid #f0f0f0;background:#fafafa;flex-shrink:0}
    .cat-tab{flex:1;padding:10px 0;text-align:center;font-size:13px;color:#00000073;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;user-select:none}
    .cat-tab:hover{color:#1677ff}
    .cat-tab.active{color:#1677ff;border-bottom-color:#1677ff;font-weight:500;background:#fff}
    .type-tree-body{flex:1;overflow:auto;min-height:120px}
    .type-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid #f5f5f5;font-size:13px;color:#000000d9;line-height:20px;display:flex;align-items:center;justify-content:space-between;gap:8px;transition:all .15s}
    .type-item:hover{background:#f0f7ff}
    .type-item.selected{background:#e6f4ff;color:#1677ff;font-weight:500}
    .type-item.disabled{color:#00000040;cursor:not-allowed}
    .type-item.disabled:hover{background:transparent}
    .type-item .type-cat{font-size:11px;color:#00000073;font-weight:400}
    /* 右侧目录面板 */
    .catalog-panel{background:#fff;border:1px solid #f0f0f0;border-radius:8px;padding:16px}
    .catalog-panel-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px}
    .catalog-panel-head .title-wrap{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .catalog-panel-head h4{font-size:14px;font-weight:600;color:#000000d9}
    .catalog-panel-head .actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    /* 表单 */
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .form-grid .full{grid-column:1/-1}
    .field-label{font-size:14px;color:#000000d9;margin-bottom:6px;line-height:20px}
    .field-label .req{color:#ff4d4f;margin-right:4px}
    .field-help{font-size:12px;color:#00000073;line-height:18px;margin-top:4px}
    .field-error{font-size:12px;color:#ff4d4f;line-height:18px;margin-top:4px;display:none}
    .field-error.show{display:block}
    .ant-input.err,.ant-input.err:focus{border-color:#ff4d4f!important;box-shadow:0 0 0 2px rgba(255,77,79,.1)!important}
    textarea.ant-input{height:auto!important;padding:6px 12px!important;line-height:20px;resize:vertical}
    /* 多选枚举 */
    .multi-enum-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
    .multi-enum-grid.err{border:1px solid #ffccc7;border-radius:6px;padding:8px}
    .multi-enum-option{display:flex;align-items:center;gap:8px;min-height:34px;padding:7px 10px;border:1px solid #d9d9d9;border-radius:6px;background:#fff;font-size:13px;color:#000000d9;line-height:18px;cursor:pointer;transition:all .2s}
    .multi-enum-option:hover{border-color:#4096ff;background:#f0f7ff}
    .multi-enum-option.selected{border-color:#91caff;background:#e6f4ff;color:#1677ff}
    .multi-enum-option input{width:14px;height:14px;flex-shrink:0}
    /* 开关 */
    .cfg-switch{width:42px;height:22px;border:none;border-radius:11px;background:#d9d9d9;position:relative;cursor:pointer;transition:background .2s;padding:0;flex-shrink:0}
    .cfg-switch span{position:absolute;width:18px;height:18px;top:2px;left:2px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.2);transition:left .2s}
    .cfg-switch.checked{background:#1677ff}
    .cfg-switch.checked span{left:22px}
    /* 附件简化（文件名 + 替换入口） */
    .attach-box{display:flex;align-items:center;gap:8px;padding:6px 10px;border:1px dashed #d9d9d9;border-radius:6px;background:#fafafa;font-size:13px;color:#000000d9;min-height:34px}
    .attach-box.has-file{border-style:solid;background:#f6ffed;border-color:#b7eb8f}
    .attach-box .attach-icon{color:#52c41a;font-size:14px}
    .attach-box .attach-empty{color:#00000040}
    .inline-alert{display:flex;gap:8px;padding:10px 12px;border-radius:6px;font-size:13px;line-height:20px;margin-bottom:16px}
    .inline-alert.info{background:#e6f4ff;color:#0958d9;border:1px solid #91caff}
    .inline-alert.warn{background:#fffbe6;color:#ad6800;border:1px solid #ffe58f}
    .confirm-body{font-size:14px;color:#000000d9;line-height:22px}
    .confirm-tip{margin-top:12px;font-size:13px;color:#00000073;background:#fafafa;border:1px solid #f0f0f0;border-radius:6px;padding:10px 12px;line-height:20px}
    .toast-msg{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:9999;background:#fff;border:1px solid #f0f0f0;border-radius:8px;box-shadow:0 6px 16px rgba(0,0,0,.12);padding:10px 22px;font-size:14px;color:#000000d9;white-space:nowrap}
    .empty-row td{text-align:center;color:#00000040;padding:40px 0!important}
    .move-btn{padding:0 6px;color:#1677ff;cursor:pointer;font-size:13px;background:none;border:none}
    .move-btn:hover{color:#4096ff}
    .move-btn[disabled]{color:#00000040;cursor:not-allowed}
    /* 版本对比差异表 */
    .diff-table td.added{background:#f6ffed}
    .diff-table td.removed{background:#fff2f0}
    .diff-table td.modified{background:#fff7e6}
    .diff-tag{display:inline-block;padding:1px 8px;border-radius:10px;font-size:12px;line-height:18px}
    .diff-tag.added{background:#f6ffed;color:#389e0d;border:1px solid #b7eb8f}
    .diff-tag.removed{background:#fff2f0;color:#cf1322;border:1px solid #ffccc7}
    .diff-tag.modified{background:#fff7e6;color:#d46b08;border:1px solid #ffd591}
    .diff-tag.same{background:#fafafa;color:#00000040;border:1px solid #f0f0f0}
    @media(max-width:1200px){.form-grid,.multi-enum-grid{grid-template-columns:1fr}.catalog-layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div id="app" class="flex h-screen overflow-hidden">
  <aside id="sidebar"></aside>
  <div class="flex-1 flex flex-col overflow-hidden">
    <header id="topnav"></header>
    <main class="flex-1 overflow-auto bg-[#f0f2f5] p-6">
      <div class="page-header"><h2>材料目录配置</h2></div>

      <!-- Tab 页签区 -->
      <div class="ant-tabs">
        <span class="ant-tab active" data-tab="library" onclick="switchTab(this,'library')">材料项库</span>
        <span class="ant-tab" data-tab="catalog" onclick="switchTab(this,'catalog')">流程材料目录配置</span>
        <span class="ant-tab" data-tab="version" onclick="switchTab(this,'version')">目录版本管理</span>
      </div>

      <!-- ============ 材料项库 Tab ============ -->
      <div id="panel-library">
        <div class="filter-bar">
          <div class="filter-row">
            <div class="filter-item"><label>材料名称/代码</label><input id="mat_kw" class="ant-input" placeholder="材料名称或代码" style="width:200px"></div>
            <div class="filter-item"><label>提供方</label><select id="mat_provider" class="ant-input" style="width:150px"></select></div>
            <div class="filter-item"><label>材料状态</label><select id="mat_status" class="ant-input" style="width:120px"><option>全部</option><option>已启用</option><option>已停用</option></select></div>
            <div class="filter-actions">
              <button class="ant-btn ant-btn-primary" onclick="queryMaterial()">查询</button>
              <button class="ant-btn" onclick="resetMaterial()">重置</button>
            </div>
            <button class="ant-btn ant-btn-primary" style="margin-left:auto" onclick="openMaterialForm('add')">+ 新增材料项</button>
          </div>
        </div>
        <div class="card">
          <div class="cfg-table-container">
            <table class="ant-table">
              <colgroup><col style="width:170px"><col style="width:220px"><col style="width:140px"><col style="width:160px"><col style="width:90px"><col style="width:160px"><col style="width:180px"></colgroup>
              <thead><tr><th>材料代码</th><th>材料名称</th><th>提供方</th><th>格式要求</th><th>状态</th><th>更新时间</th><th>操作</th></tr></thead>
              <tbody id="materialTbody"></tbody>
            </table>
          </div>
          <div id="materialPagination"></div>
        </div>
      </div>

      <!-- ============ 流程材料目录配置 Tab ============ -->
      <div id="panel-catalog" style="display:none">
        <div class="inline-alert info">
          <span>💡</span>
          <div>每个测试示范类型最多存在 <b>一个当前已发布材料目录版本</b> 与 <b>一个草稿版本</b>；保存草稿不影响企业端新发起申请展示的材料目录，发布后仅新发起申请使用新版本，历史申请保留提交时目录快照。</div>
        </div>
        <div class="catalog-layout">
          <!-- 左侧类型树 -->
          <div class="type-tree">
            <div class="type-tree-head"><h4>测试示范类型</h4></div>
            <div class="cat-tabs">
              <div class="cat-tab active" data-cat="道路测试" onclick="switchCatTab(this,'道路测试')">道路测试</div>
              <div class="cat-tab" data-cat="示范应用" onclick="switchCatTab(this,'示范应用')">示范应用</div>
              <div class="cat-tab" data-cat="商业化试点" onclick="switchCatTab(this,'商业化试点')">商业化试点</div>
            </div>
            <div class="type-tree-body" id="catalogTypeTree"></div>
          </div>
          <!-- 右侧目录配置 -->
          <div class="catalog-panel" id="catalogPanel"></div>
        </div>
      </div>

      <!-- ============ 目录版本管理 Tab ============ -->
      <div id="panel-version" style="display:none">
        <div class="catalog-layout">
          <!-- 左侧类型树（含停用） -->
          <div class="type-tree">
            <div class="type-tree-head"><h4>测试示范类型（含停用）</h4></div>
            <div class="cat-tabs">
              <div class="cat-tab active" data-cat="道路测试" onclick="switchVersionCatTab(this,'道路测试')">道路测试</div>
              <div class="cat-tab" data-cat="示范应用" onclick="switchVersionCatTab(this,'示范应用')">示范应用</div>
              <div class="cat-tab" data-cat="商业化试点" onclick="switchVersionCatTab(this,'商业化试点')">商业化试点</div>
            </div>
            <div class="type-tree-body" id="versionTypeTree"></div>
          </div>
          <!-- 右侧版本列表 -->
          <div class="catalog-panel" id="versionPanel"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
var PAGE_ID='approve-config';
var currentTab='library';

/* ============ 枚举与联动数据源 ============ */
var CATEGORIES=['道路测试','示范应用','商业化试点'];
var SUBTYPES=['初次申请','延期申请','变更申请','新增相同配置车辆'];
var PROVIDERS=['申请单位','车辆制造商','第三方检测机构','保险公司','准入管理部门','其他'];
var FORMAT_OPTS=['PDF','DOC','DOCX','XLS','XLSX','JPG','PNG','ZIP','其他'];
var catPrefix={'道路测试':'RT','示范应用':'DA','商业化试点':'CP'};
var subMap={'初次申请':'INITIAL','延期申请':'RENEW','变更申请':'CHANGE','新增相同配置车辆':'ADD_VEHICLE'};

/* ============ 测试示范类型数据（与 approval-config 一致：3大类×4子类型=12条） ============ */
function buildTypeData(){
  var rows=[];
  CATEGORIES.forEach(function(cat){
    SUBTYPES.forEach(function(sub){
      rows.push({code:catPrefix[cat]+'_'+subMap[sub],name:cat+sub,category:cat,subType:sub,status:'已启用'});
    });
  });
  // 演示：商业化试点延期申请为停用类型，仍可在版本管理中查看历史目录
  var cp=rows.find(function(r){return r.code==='CP_RENEW';});
  if(cp)cp.status='已停用';
  return rows;
}
var typeData=buildTypeData();
function getTypeName(code){var t=typeData.find(function(x){return x.code===code;});return t?t.name:code;}
function getTypeActive(code){var t=typeData.find(function(x){return x.code===code;});return t?t.status==='已启用':true;}

/* ============ 材料项库数据 ============ */
var materialData=[
  {code:'MAT_INSURANCE',name:'保险凭证',desc:'自动驾驶车辆测试示范期间的有效保险凭证',provider:'保险公司',formats:['PDF'],sizeLimit:20,status:'已启用',time:'2026-04-08 10:20:30'},
  {code:'MAT_TEST_REPORT',name:'自动驾驶功能测试报告',desc:'由第三方检测机构出具的自动驾驶功能测试报告',provider:'第三方检测机构',formats:['PDF'],sizeLimit:50,status:'已启用',time:'2026-04-15 14:30:00'},
  {code:'MAT_APPLY',name:'测试示范准入申请书',desc:'申请单位填写的测试示范准入申请表',provider:'申请单位',formats:['PDF','DOC','DOCX'],sizeLimit:20,status:'已启用',time:'2026-04-18 09:15:22'},
  {code:'MAT_SAFETY',name:'安全评估报告',desc:'自动驾驶系统安全评估报告，由准入管理部门出具',provider:'准入管理部门',formats:['PDF'],sizeLimit:30,status:'已启用',time:'2026-04-20 16:45:10'},
  {code:'MAT_SELF_DECL',name:'安全性自我声明',desc:'申请单位出具的安全性自我声明文件',provider:'申请单位',formats:['PDF'],sizeLimit:10,status:'已启用',time:'2026-04-12 11:00:00'},
  {code:'MAT_VEHICLE_CERT',name:'车辆出厂合格证',desc:'车辆制造商出具的车辆出厂合格证明',provider:'车辆制造商',formats:['PDF','JPG','PNG'],sizeLimit:10,status:'已启用',time:'2026-04-05 08:30:00'},
  {code:'MAT_DRIVER_LICENSE',name:'驾驶员资质证明',desc:'安全员/驾驶员的驾驶资质证明材料',provider:'申请单位',formats:['PDF','JPG','PNG'],sizeLimit:10,status:'已启用',time:'2026-04-06 13:20:00'},
  {code:'MAT_ROUTE_PLAN',name:'测试路线方案',desc:'道路测试路线规划方案文件',provider:'申请单位',formats:['PDF','DOC'],sizeLimit:20,status:'已启用',time:'2026-04-16 10:10:00'},
  {code:'MAT_BUSINESS_LICENSE',name:'企业营业执照',desc:'申请单位的企业营业执照扫描件',provider:'申请单位',formats:['PDF','JPG','PNG'],sizeLimit:10,status:'已启用',time:'2026-04-03 09:00:00'},
  {code:'MAT_TECH_SPEC',name:'车辆技术参数说明',desc:'车辆关键技术参数说明文件',provider:'车辆制造商',formats:['PDF','DOC'],sizeLimit:20,status:'已启用',time:'2026-04-09 15:30:00'},
  {code:'MAT_SENSOR_INFO',name:'传感器配置信息',desc:'车辆传感器配置清单',provider:'申请单位',formats:['PDF','XLSX'],sizeLimit:20,status:'已启用',time:'2026-04-11 14:00:00'},
  {code:'MAT_PLAN',name:'示范应用运营计划书',desc:'示范应用/商业化试点的运营计划书',provider:'申请单位',formats:['PDF','DOC'],sizeLimit:30,status:'已启用',time:'2026-04-22 11:30:00'},
  {code:'MAT_PLATFORM',name:'平台对接证明',desc:'与监管平台对接完成的证明文件',provider:'准入管理部门',formats:['PDF'],sizeLimit:10,status:'已启用',time:'2026-04-10 16:00:00'},
  {code:'MAT_EMERGENCY_PLAN',name:'应急处置预案',desc:'自动驾驶车辆应急处置预案',provider:'申请单位',formats:['PDF','DOC'],sizeLimit:20,status:'已停用',time:'2026-04-25 17:30:00'}
];
function getMaterial(code){return materialData.find(function(x){return x.code===code;});}
function getMaterialName(code){var m=getMaterial(code);return m?m.name:code;}
function getMaterialFormats(code){var m=getMaterial(code);return m?m.formats.slice():['PDF'];}
function materialActive(code){var m=getMaterial(code);return m?m.status==='已启用':true;}

/* ============ 流程材料目录 + 版本数据 ============ */
// 目录材料项构造器
function item(code,opts){
  opts=opts||{};
  var m=getMaterial(code);
  return {
    code:code,
    name:m?m.name:code,
    required:opts.required!==false,
    sort:opts.sort!=null?opts.sort:100,
    formats:opts.formats?opts.formats.slice():(m?m.formats.slice():['PDF']),
    fillInstruction:opts.fillInstruction||'',
    applicableCondition:opts.applicableCondition||''
  };
}
// 道路测试初次申请 V3 材料清单
var RT_V3=['MAT_APPLY','MAT_SAFETY','MAT_SELF_DECL','MAT_VEHICLE_CERT','MAT_DRIVER_LICENSE','MAT_TEST_REPORT','MAT_ROUTE_PLAN','MAT_INSURANCE','MAT_BUSINESS_LICENSE','MAT_TECH_SPEC','MAT_SENSOR_INFO'].map(function(c){return item(c);});
RT_V3[2]=item('MAT_SELF_DECL',{fillInstruction:'逐项声明自动化驾驶系统安全相关情况，加盖单位公章',applicableCondition:'所有申请均需提供'});
var RT_V2=['MAT_APPLY','MAT_SAFETY','MAT_SELF_DECL','MAT_VEHICLE_CERT','MAT_DRIVER_LICENSE','MAT_TEST_REPORT','MAT_ROUTE_PLAN','MAT_INSURANCE','MAT_BUSINESS_LICENSE'].map(function(c){return item(c);});
var RT_V1=['MAT_APPLY','MAT_SAFETY','MAT_VEHICLE_CERT','MAT_DRIVER_LICENSE','MAT_INSURANCE','MAT_BUSINESS_LICENSE'].map(function(c){return item(c);});
// 示范应用初次申请
var DA_V4=['MAT_APPLY','MAT_SAFETY','MAT_SELF_DECL','MAT_PLAN','MAT_VEHICLE_CERT','MAT_DRIVER_LICENSE','MAT_TEST_REPORT','MAT_INSURANCE','MAT_BUSINESS_LICENSE','MAT_TECH_SPEC','MAT_SENSOR_INFO','MAT_PLATFORM'].map(function(c){return item(c);});
var DA_V3=['MAT_APPLY','MAT_SAFETY','MAT_SELF_DECL','MAT_PLAN','MAT_VEHICLE_CERT','MAT_DRIVER_LICENSE','MAT_INSURANCE','MAT_BUSINESS_LICENSE','MAT_PLATFORM'].map(function(c){return item(c);});
var DA_V2=['MAT_APPLY','MAT_SAFETY','MAT_PLAN','MAT_VEHICLE_CERT','MAT_DRIVER_LICENSE','MAT_INSURANCE','MAT_BUSINESS_LICENSE'].map(function(c){return item(c);});
var DA_V1=['MAT_APPLY','MAT_SAFETY','MAT_VEHICLE_CERT','MAT_INSURANCE','MAT_BUSINESS_LICENSE'].map(function(c){return item(c);});
// 商业化试点初次申请
var CP_V2=['MAT_APPLY','MAT_SAFETY','MAT_SELF_DECL','MAT_PLAN','MAT_VEHICLE_CERT','MAT_DRIVER_LICENSE','MAT_INSURANCE','MAT_BUSINESS_LICENSE','MAT_PLATFORM'].map(function(c){return item(c);});
var CP_V1=['MAT_APPLY','MAT_SAFETY','MAT_PLAN','MAT_INSURANCE','MAT_BUSINESS_LICENSE'].map(function(c){return item(c);});

// catalogData[typeCode] = { versions:[{version,status,materials,publishTime,operator,changeSummary}], draft:[items] or null }
var catalogData={
  'RT_INITIAL':{versions:[
    {version:'ML_V3',status:'已发布',materials:RT_V3,publishTime:'2026-04-15 10:00:00',operator:'平台管理员',changeSummary:'新增自动驾驶等级要求字段，新增车辆技术参数说明与传感器配置信息'},
    {version:'ML_V2',status:'历史版本',materials:RT_V2,publishTime:'2026-03-20 14:00:00',operator:'张三',changeSummary:'调整适用对象范围，新增商用车类型所需材料'},
    {version:'ML_V1',status:'历史版本',materials:RT_V1,publishTime:'2026-01-10 09:00:00',operator:'平台管理员',changeSummary:'初始版本发布'}
  ],draft:null},
  'DA_INITIAL':{versions:[

    {version:'ML_V3',status:'历史版本',materials:DA_V3,publishTime:'2026-03-15 15:00:00',operator:'平台管理员',changeSummary:'调整运营区域范围定义'},

/* ============ Tab 切换 ============ */
function switchTab(el,tab){
  currentTab=tab;
  document.querySelectorAll('.ant-tabs .ant-tab').forEach(function(t){t.classList.remove('active');});
  var target=el;
  if(!target||!target.classList){target=document.querySelector('.ant-tab[data-tab="'+tab+'"]');}
  if(target&&target.classList)target.classList.add('active');
  document.getElementById('panel-library').style.display=tab==='library'?'':'none';
  document.getElementById('panel-catalog').style.display=tab==='catalog'?'':'none';
  document.getElementById('panel-version').style.display=tab==='version'?'':'none';
  if(tab==='catalog'){renderCatalogTypeTree();if(!selectedCatalogType)selectCatalogType(firstCatalogType());}
  if(tab==='version'){renderVersionTypeTree();if(!selectedVersionType)selectVersionType(firstVersionType());}
  if(location.hash!=='#'+tab)history.replaceState(null,'','#'+tab);
}

  var el=document.querySelector('.ant-tab[data-tab="'+tab+'"]');
  switchTab(el,tab);
}

/* ============ 工具 ============ */
function statusTag(status){
  return status==='已启用'
    ? '<span class="ant-tag ant-tag-success">已启用</span>'
    : '<span class="ant-tag ant-tag-default">已停用</span>';
}
function versionStatusTag(status){
  if(status==='已发布')return '<span class="ant-tag ant-tag-success">已发布</span>';
  if(status==='草稿')return '<span class="ant-tag ant-tag-processing">草稿</span>';
  return '<span class="ant-tag ant-tag-default">历史版本</span>';
}
function escapeHTML(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function nowStr(){var d=new Date();var p=function(n){return n<10?'0'+n:''+n;};return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());}
function todayStr(){var d=new Date();var p=function(n){return n<10?'0'+n:''+n;};return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());}

/* ============ 材料项库：查询/渲染 ============ */
function getMaterialFiltered(){
  var kw=document.getElementById('mat_kw').value.trim();
  var pv=document.getElementById('mat_provider').value;
  var st=document.getElementById('mat_status').value;
  return materialData.filter(function(d){
    if(kw&&d.name.indexOf(kw)===-1&&d.code.indexOf(kw)===-1)return false;
    if(pv!=='全部'&&d.provider!==pv)return false;
    if(st!=='全部'&&d.status!==st)return false;
    return true;
  });
}
function renderMaterial(){
  var data=getMaterialFiltered();
  var total=data.length;
  var totalPages=Math.max(1,Math.ceil(total/materialState.size));
  if(materialState.page>totalPages)materialState.page=totalPages;
  var start=(materialState.page-1)*materialState.size;
  var rows=data.slice(start,start+materialState.size);
  document.getElementById('materialTbody').innerHTML=rows.length?rows.map(function(d){
    var muted=d.status==='已停用'?' class="cfg-muted"':'';
    return '<tr'+muted+'>'+
      '<td class="col-code">'+d.code+'</td>'+
      '<td>'+d.name+'</td>'+
      '<td>'+d.provider+'</td>'+
      '<td><div class="tag-list">'+d.formats.map(function(f){return '<span class="ant-tag ant-tag-default">'+f+'</span>';}).join('')+'</div></td>'+
      '<td class="col-status">'+statusTag(d.status)+'</td>'+
      '<td class="col-code">'+d.time+'</td>'+
      '<td class="col-action">'+
        '<button class="ant-btn-link" onclick="openMaterialForm(\'edit\',\''+d.code+'\')">编辑</button>'+
        '<button class="ant-btn-link" onclick="confirmToggleMaterial(\''+d.code+'\')">'+(d.status==='已启用'?'停用':'启用')+'</button>'+
        '<button class="ant-btn-link" style="color:#ff4d4f" onclick="confirmDeleteMaterial(\''+d.code+'\')">删除</button>'+
      '</td></tr>';
  }).join(''):'<tr class="empty-row"><td colspan="7">暂无数据</td></tr>';
  if(materialState.pager)materialState.pager.setTotal(total);
}
function queryMaterial(){materialState.page=1;renderMaterial();showToast('查询完成');}
function resetMaterial(){document.getElementById('mat_kw').value='';document.getElementById('mat_provider').value='全部';document.getElementById('mat_status').value='全部';materialState.page=1;renderMaterial();showToast('已重置筛选条件');}

        multiEnum('f_mat_formats',FORMAT_OPTS,itemObj?itemObj.formats:[])+'<div class="field-help">至少选择 1 项</div><div class="field-error" id="err_mat_formats"></div></div>'+

        '<div class="field-help">已启用：可被流程材料目录选择；已停用：后续目录配置不可选，历史目录版本与历史申请快照保留</div></div>'+

}
function saveMaterial(mode,code){
  clearErrors(['err_mat_code','err_mat_name','err_mat_provider','err_mat_size','err_mat_formats']);
  var c=document.getElementById('f_mat_code').value.trim();
  var n=document.getElementById('f_mat_name').value.trim();
  var pv=document.getElementById('f_mat_provider').value;
  var size=parseInt(document.getElementById('f_mat_size').value,10);
  var formats=getEnumValues('f_mat_formats');
  var st=document.getElementById('f_mat_status').value;
  var ok=true;
  if(!c){setError('f_mat_code','err_mat_code','材料代码不可为空且必须全局唯一');ok=false;}
  else if(!/^[A-Z0-9_]+$/.test(c)){setError('f_mat_code','err_mat_code','代码限大写字母、数字、下划线');ok=false;}
  else if(mode==='add'&&materialData.some(function(x){return x.code===c;})){setError('f_mat_code','err_mat_code','代码已存在，必须全局唯一');ok=false;}
  if(!n){setError('f_mat_name','err_mat_name','材料名称不可为空');ok=false;}
  else if(n.length>80){setError('f_mat_name','err_mat_name','材料名称最长 80 字符');ok=false;}
  if(!formats.length){setEnumError('f_mat_formats','err_mat_formats','请至少选择一种格式');ok=false;}
  if(isNaN(size)||size<1||size>200){setError('f_mat_size','err_mat_size','单文件大小限制为 1-200 整数');ok=false;}
  if(!ok)return;
  var desc=document.getElementById('f_mat_desc').value.trim();
  if(mode==='add'){
    materialData.unshift({code:c,name:n,desc:desc,provider:pv,formats:formats,sizeLimit:size,status:st,time:nowStr()});
  }else{
    var it=getMaterial(code);if(it){it.name=n;it.desc=desc;it.provider=pv;it.formats=formats;it.sizeLimit=size;it.status=st;it.time=nowStr();}
  }
  closeModal();renderMaterial();showToast('保存成功');
}

/* ============ 多选枚举组件（材料格式） ============ */
function multiEnum(id,opts,selected){
  return '<div class="multi-enum-grid" id="'+id+'">'+opts.map(function(o){
    var checked=selected.indexOf(o)>-1;
    return '<label class="multi-enum-option'+(checked?' selected':'')+'"><input type="checkbox" value="'+o+'" '+(checked?'checked':'')+' onchange="syncEnum(this)"><span>'+o+'</span></label>';
  }).join('')+'</div>';
}
function syncEnum(input){var op=input.closest('.multi-enum-option');if(op)op.classList.toggle('selected',input.checked);}
function getEnumValues(id){
  var vals=[];document.querySelectorAll('#'+id+' input[type="checkbox"]').forEach(function(c){if(c.checked)vals.push(c.value);});return vals;
}

function firstCatalogType(){

}
function renderCatalogTypeTree(){
  var list=typeData.filter(function(t){return t.status==='已启用'&&t.category===selectedCatalogCat;});

function getEditingItems(){

        '<td>'+(it.required?'<span class="ant-tag ant-tag-error">必填</span>':'<span class="ant-tag ant-tag-default">选填</span>')+'</td>'+

// 操作草稿前确保草稿存在
function ensureDraft(){
  var code=selectedCatalogType;ensureCatalog(code);
  if(!catalogData[code].draft){
    var pub=getPublishedVersion(code);
    catalogData[code].draft=pub?pub.materials.map(function(it){var c={};for(var k in it)c[k]=it[k];return c;}):[];
  }
}
function openAddCatalogItem(){
  ensureDraft();
  var items=catalogData[selectedCatalogType].draft;
  var used={};items.forEach(function(it){used[it.code]=true;});
  var available=materialData.filter(function(m){return m.status==='已启用'&&!used[m.code];});
  if(!available.length){
    var body='<div class="confirm-body">当前材料项库中没有可添加的已启用材料项。</div>'+
      '<div class="confirm-tip">请先在「材料项库」Tab 中新增或启用材料项后再添加。</div>';
    openModal('添加材料项',body,{width:640,maskClosable:false,footer:'<button class="ant-btn ant-btn-primary" onclick="closeModal()">知道了</button>'});
    return;
  }
  var listHtml=available.map(function(m){return '<label class="multi-enum-option"><input type="radio" name="addmat" value="'+m.code+'"><span>'+m.name+'（'+m.code+'）</span></label>';}).join('');

    '<div class="multi-enum-grid" style="grid-template-columns:1fr">'+listHtml+'</div>'+

var currentEditItemCode='';
function saveCatalogItem(code){
  currentEditItemCode=code;
  clearErrors(['err_ci_sort','err_ci_formats']);
  var required=document.getElementById('f_ci_required').value==='是';
  var sort=parseInt(document.getElementById('f_ci_sort').value,10);
  var formats=getEnumValues('f_ci_formats');
  var ok=true;
  if(isNaN(sort)||sort<1||sort>999){setError('f_ci_sort','err_ci_sort','排序号为 1-999 整数');ok=false;}
  if(!formats.length){setEnumError('f_ci_formats','err_ci_formats','请至少选择一种上传格式');ok=false;}
  if(!ok)return;
  var fill=document.getElementById('f_ci_fill').value.trim();
  var cond=document.getElementById('f_ci_cond').value.trim();
  var it=catalogData[selectedCatalogType].draft.find(function(x){return x.code===code;});
  if(it){it.required=required;it.sort=sort;it.formats=formats;it.fillInstruction=fill;it.applicableCondition=cond;}
  closeModal();renderCatalogPanel();showToast('已更新，请点击「保存草稿」持久化');
}
function moveCatalogItem(code,dir){
  ensureDraft();
  var items=catalogData[selectedCatalogType].draft;
  items.sort(function(a,b){return (a.sort-b.sort);});
  var idx=items.findIndex(function(x){return x.code===code;});
  var target=idx+dir;
  if(target<0||target>=items.length)return;
  var a=items[idx].sort,b=items[target].sort;
  items[idx].sort=b;items[target].sort=a;
  renderCatalogPanel();showToast('已调整排序，请点击「保存草稿」持久化');
}

function saveCatalogDraft(){
  ensureDraft();
  var items=catalogData[selectedCatalogType].draft;
  // 校验：重复材料项
  var seen={};var dup=[];
  items.forEach(function(it){
    if(seen[it.code])dup.push(it.name);seen[it.code]=true;
  });
  if(dup.length){showToast('同一流程材料目录中存在重复材料项：'+dup.join('、'));return;}
  if(!items.length){showToast('请至少添加一个材料项后保存草稿');return;}
  showToast('草稿已保存');
}
function openPublishVersion(){
  ensureDraft();
  var code=selectedCatalogType;var t=typeData.find(function(x){return x.code===code;});
  var items=catalogData[code].draft;
  // 发布前校验
  var seen={};var dup=[];var stopped=[];
  items.forEach(function(it){
    if(seen[it.code])dup.push(it.name);seen[it.code]=true;
    if(!materialActive(it.code))stopped.push(it.name);
  });
  if(!items.length){showToast('请至少添加一个材料项后发布');return;}
  if(dup.length){showToast('存在重复材料项：'+dup.join('、'));return;}
  if(stopped.length){showToast('当前材料项已停用，请移除或替换后再发布：'+stopped.join('、'));return;}
  var suggested=nextVersionCode(code);
  var body=
    '<div class="inline-alert warn"><span>⚠️</span><div>发布后仅影响新发起申请使用新版本，已提交申请继续使用提交时固化的目录快照。</div></div>'+
    '<div class="form-grid">'+
      '<div class="full"><div class="field-label">所属测试示范类型</div>'+

      '<div class="full"><div class="field-label"><span class="req">*</span>变更说明</div>'+
        '<textarea id="f_pv_change" class="ant-input" rows="3" maxlength="500" placeholder="说明本次材料目录调整内容（最长500字符）"></textarea><div class="field-error" id="err_pv_change"></div></div>'+
      '<div class="full"><label class="multi-enum-option" style="cursor:pointer"><input type="checkbox" id="f_pv_confirm" onchange="this.closest(\'.multi-enum-option\').classList.toggle(\'selected\',this.checked)"><span>确认发布后仅影响新发起申请，历史申请不受影响</span></label><div class="field-error" id="err_pv_confirm"></div></div>'+
    '</div>';
  openModal('发布目录版本',body,{width:640,maskClosable:false,
    footer:'<button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn ant-btn-primary" onclick="applyPublishVersion()">发布</button>'});

function applyPublishVersion(){
  clearErrors(['err_pv_version','err_pv_change','err_pv_confirm']);
  var code=selectedCatalogType;var d=catalogData[code];
  var ver=document.getElementById('f_pv_version').value.trim();
  var change=document.getElementById('f_pv_change').value.trim();
  var confirm=document.getElementById('f_pv_confirm').checked;
  var ok=true;
  if(!ver){setError('f_pv_version','err_pv_version','请填写新版本号');ok=false;}
  else if(d.versions.some(function(v){return v.version===ver;})){setError('f_pv_version','err_pv_version','版本号在同一测试示范类型下必须唯一');ok=false;}
  if(!change){setError('f_pv_change','err_pv_change','请填写本次目录版本变更说明');ok=false;}
  if(!confirm){setError('f_pv_confirm','err_pv_confirm','请勾选发布确认');ok=false;}
  if(!ok)return;
  // 当前已发布版本转历史
  d.versions.forEach(function(v){if(v.status==='已发布')v.status='历史版本';});
  d.versions.unshift({version:ver,status:'已发布',materials:d.draft.map(function(it){var c={};for(var k in it)c[k]=it[k];return c;}),publishTime:nowStr(),operator:'平台管理员',changeSummary:change});
  d.draft=null;
  closeModal();renderCatalogPanel();showToast('发布成功');
}

function openComparePicker(code,baseVer){
  ensureCatalog(code);

  var body='<div class="field-label">选择与 <b>'+baseVer+'</b> 对比的目标版本</div>'+
    '<div class="multi-enum-grid" style="grid-template-columns:1fr">'+list+'</div><div class="field-error" id="err_compare"></div>';
  openModal('选择对比版本',body,{width:520,maskClosable:false,
    footer:'<button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn ant-btn-primary" onclick="compareVersions(\''+code+'\',\''+baseVer+'\')">开始对比</button>'});
}
function compareVersions(code,baseVer){
  var sel=document.querySelector('input[name="comparetarget"]:checked');
  if(!sel){var e=document.getElementById('err_compare');e.textContent='请选择一个目标版本';e.classList.add('show');return;}
  var targetVer=sel.value;
  ensureCatalog(code);
  var v1=catalogData[code].versions.find(function(x){return x.version===baseVer;});
  var v2=catalogData[code].versions.find(function(x){return x.version===targetVer;});
  if(!v1||!v2)return;
  var map1={},map2={};
  v1.materials.forEach(function(it){map1[it.code]=it;});
  v2.materials.forEach(function(it){map2[it.code]=it;});
  var allCodes=Object.keys(Object.assign({},map1,map2)).sort();
  var added=0,removed=0,modified=0,same=0;
  var rowsHtml=allCodes.map(function(c){
    var a=map1[c],b=map2[c];
    var changeType='',changeText='',cellCls='';
    if(a&&!b){changeType='removed';changeText='<span class="diff-tag removed">已移除</span>';cellCls='removed';removed++;}
    else if(!a&&b){changeType='added';changeText='<span class="diff-tag added">新增</span>';cellCls='added';added++;}
    else{
      var diffs=[];
      if(a.required!==b.required)diffs.push('必填');
      if(a.sort!==b.sort)diffs.push('排序');
      if(a.formats.join(',')!==b.formats.join(','))diffs.push('格式');
      var f1=a.fillInstruction||'',f2=b.fillInstruction||'';
      if(f1!==f2)diffs.push('填报说明');
      if(diffs.length){changeType='modified';changeText='<span class="diff-tag modified">变更：'+diffs.join('、')+'</span>';cellCls='modified';modified++;}
      else{changeText='<span class="diff-tag same">无变化</span>';same++;}
    }
    var fmtStr=function(it){return it?'<div class="tag-list" style="display:inline">'+it.formats.map(function(f){return '<span class="ant-tag ant-tag-default">'+f+'</span>';}).join('')+'</div>':'<span style="color:#00000040">-</span>';};
    var propStr=function(it){
      if(!it)return '<span style="color:#00000040">-</span>';
      return '必填:'+(it.required?'是':'否')+' · 排序:'+it.sort;
    };
    return '<tr>'+
      '<td class="col-code">'+c+'</td><td>'+getMaterialName(c)+'</td>'+
      '<td class="'+(a&&b?cellCls:'')+'">'+(changeType==='added'?'<span style="color:#00000040">-</span>':propStr(a))+'</td>'+
      '<td class="'+(a&&b?cellCls:'')+'">'+(changeType==='removed'?'<span style="color:#00000040">-</span>':propStr(b))+'</td>'+
      '<td>'+(changeType==='added'?'<span style="color:#00000040">-</span>':fmtStr(a))+'</td>'+
      '<td>'+(changeType==='removed'?'<span style="color:#00000040">-</span>':fmtStr(b))+'</td>'+
      '<td>'+changeText+'</td></tr>';
  }).join('');
  var summary='<div class="inline-alert info" style="margin-top:12px"><span>📊</span><div>'+
    '<b>'+baseVer+'</b>（'+v1.materials.length+' 项） → <b>'+targetVer+'</b>（'+v2.materials.length+' 项）；'+
    '新增 '+added+' 项，移除 '+removed+' 项，属性变更 '+modified+' 项，无变化 '+same+' 项。</div></div>';
  var body='<div class="grid grid-cols-2 gap-4 mb-4">'+
      '<div class="p-3 bg-[#f6ffed] rounded"><span class="text-xs text-[#00000073]">基准版本</span><br><span class="font-medium text-[#52c41a]">'+baseVer+'</span> ('+v1.publishTime+')</div>'+
      '<div class="p-3 bg-[#e6f4ff] rounded"><span class="text-xs text-[#00000073]">对比版本</span><br><span class="font-medium text-[#1677ff]">'+targetVer+'</span> ('+v2.publishTime+')</div>'+
    '</div>'+
    '<div class="cfg-table-container"><table class="ant-table diff-table">'+
    '<colgroup><col style="width:160px"><col style="width:200px"><col><col><col style="width:140px"><col style="width:140px"><col style="width:180px"></colgroup>'+
    '<thead><tr><th>材料代码</th><th>材料名称</th><th>'+baseVer+' 属性</th><th>'+targetVer+' 属性</th><th>'+baseVer+' 格式</th><th>'+targetVer+' 格式</th><th>变化</th></tr></thead><tbody>'+
    rowsHtml+'</tbody></table></div>'+summary;
  openModal('目录版本对比 ('+baseVer+' vs '+targetVer+')',body,{width:960,maskClosable:false,footer:'<button class="ant-btn" onclick="closeModal()">关闭</button>'});
}
function copyAsNewVersion(code,ver){
  ensureCatalog(code);
  var v=catalogData[code].versions.find(function(x){return x.version===ver;});if(!v)return;
  if(catalogData[code].draft){
    var body='<div class="confirm-body">当前类型已存在草稿，复制将覆盖现有草稿，是否继续？</div>'+
      '<div class="confirm-tip">复制 '+ver+' 的材料清单为新的草稿，可在「流程材料目录配置」中继续编辑后发布。</div>';
    openModal('确认覆盖草稿',body,{width:440,maskClosable:false,
      footer:'<button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn ant-btn-primary" onclick="doCopyAsNewVersion(\''+code+'\',\''+ver+'\')">确定</button>'});
    return;
  }
  doCopyAsNewVersion(code,ver);
}
function doCopyAsNewVersion(code,ver){
  var v=catalogData[code].versions.find(function(x){return x.version===ver;});if(!v)return;
  catalogData[code].draft=v.materials.map(function(it){var c={};for(var k in it)c[k]=it[k];return c;});
  closeModal();showToast('已复制为新草稿，请到「流程材料目录配置」继续编辑');
}

/* ============ 通用工具（表单校验/Toast） ============ */
function setError(inputId,errId,msg){var i=document.getElementById(inputId);if(i)i.classList.add('err');var e=document.getElementById(errId);if(e){e.textContent=msg;e.classList.add('show');}}
function setEnumError(gridId,errId,msg){var g=document.getElementById(gridId);if(g)g.classList.add('err');var e=document.getElementById(errId);if(e){e.textContent=msg;e.classList.add('show');}}
function clearErrors(ids){ids.forEach(function(id){var e=document.getElementById(id);if(e){e.classList.remove('show');e.textContent='';}});
  document.querySelectorAll('.ant-input.err').forEach(function(i){i.classList.remove('err');});
  document.querySelectorAll('.multi-enum-grid.err').forEach(function(g){g.classList.remove('err');});}
function showToast(msg){var ex=document.querySelector('.toast-msg');if(ex)ex.remove();var t=document.createElement('div');t.className='toast-msg';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.style.transition='opacity .3s';t.style.opacity='0';setTimeout(function(){if(t.parentNode)t.remove();},300);},2000);}

document.addEventListener('DOMContentLoaded',function(){
  // 提供方下拉初始化
  var pv=document.getElementById('mat_provider');
  pv.innerHTML='<option>全部</option>'+PROVIDERS.map(function(p){return '<option>'+p+'</option>';}).join('');
  initPagers();
  renderMaterial();
  // 支持 URL hash 直接打开指定 Tab（便于截图验证与深链接）
  var hash=(location.hash||'').replace('#','');
  if(hash==='catalog'||hash==='version'){switchTabByName(hash);}
});
</script>
