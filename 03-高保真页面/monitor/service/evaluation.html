<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试评价管理 - 智能网联汽车安全监测平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{DEFAULT:'#1677ff',hover:'#4096ff',disabled:'#85a5cc'}}}}}</script>
  <style>
    .toggle-switch{position:relative;display:inline-block;width:40px;height:20px}
    .toggle-switch input{opacity:0;width:0;height:0}
    .toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;transition:.3s;border-radius:20px}
    .toggle-slider:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:#fff;transition:.3s;border-radius:50%}
    .toggle-switch input:checked+.toggle-slider{background:#52c41a}
    .toggle-switch input:checked+.toggle-slider:before{transform:translateX(20px)}
    .score-card{background:linear-gradient(135deg,#f6ffed 0%,#e6f7ff 100%);border-radius:12px;padding:20px;text-align:center;margin-bottom:14px;border:1px solid #f0f0f0}
    .score-value{font-size:48px;font-weight:700;letter-spacing:-1px}
    .score-level{font-size:16px;font-weight:600;margin-top:4px}
  </style>
</head>
<body>
<div id="app" class="flex h-screen overflow-hidden">
  <aside id="sidebar"></aside>
  <div class="flex-1 flex flex-col overflow-hidden">
    <header id="topnav"></header>
    <main class="flex-1 overflow-auto bg-[#f0f2f5] p-6">
      <div class="page-header"><h2>测试评价管理</h2></div>
      <div class="ant-tabs mb-4">
        <span class="ant-tab active" onclick="switchTab(this,'tab-params')">评估参数配置</span>
        <span class="ant-tab" onclick="switchTab(this,'tab-rules')">评估规则配置</span>
        <span class="ant-tab" onclick="switchTab(this,'tab-vehicle')">车辆评估报告</span>
        <span class="ant-tab" onclick="switchTab(this,'tab-enterprise')">企业评估报告</span>
      </div>
      <div id="tab-params"></div>
      <div id="tab-rules" style="display:none"></div>
      <div id="tab-vehicle" style="display:none"></div>
      <div id="tab-enterprise" style="display:none"></div>
    </main>
  </div>
</div>
<script>
const PAGE_ID='evaluation';
var chartInstances={};
function initChart(id){var dom=document.getElementById(id);if(!dom)return null;if(chartInstances[id])chartInstances[id].dispose();var c=echarts.init(dom);chartInstances[id]=c;return c;}
function resizeAll(){Object.values(chartInstances).forEach(function(c){if(c&&!c.isDisposed())c.resize();});}
window.addEventListener('resize',function(){clearTimeout(window._rt);window._rt=setTimeout(resizeAll,200);});

var indicators=[
  {code:'P01',name:'临时行驶号牌有效期合规',source:'临牌发放记录+实时时间',auto:'全自动',rule:'布尔：有效期内=满分，过期0分',enabled:true},
  {code:'P02',name:'在规定测试范围内行驶',source:'实时位置+电子围栏',auto:'全自动',rule:'布尔：始终在围栏内=满分，有越界0分',enabled:true},
  {code:'P03',name:'避开高峰时段行驶',source:'申请时段限制+实时时间',auto:'全自动',rule:'布尔：无高峰时段行驶=满分',enabled:true},
  {code:'P04',name:'避开重大节日/活动',source:'活动日历',auto:'全自动',rule:'布尔：无违规=满分',enabled:true},
  {code:'P05',name:'避开安保活动',source:'安保活动配置',auto:'全自动',rule:'布尔：无违规=满分',enabled:true},
  {code:'P06',name:'避开管控路段',source:'管控路段配置+实时位置',auto:'全自动',rule:'布尔：无违规=满分',enabled:true},
  {code:'P07',name:'在规定道路行驶',source:'轨迹+获批道路清单',auto:'全自动',rule:'布尔：无偏离=满分',enabled:true},
  {code:'P08',name:'遇行人减速',source:'车端急减速事件',auto:'暂不采集',rule:'暂不参与计算',enabled:false},
  {code:'P09',name:'事故时安全员正确处理',source:'事故审核记录',auto:'暂不采集',rule:'暂不参与计算',enabled:false},
  {code:'P10',name:'车辆在线率',source:'车端心跳记录',auto:'全自动',rule:'线性：≥95%满分，每降1%扣权重×0.05',enabled:true},
  {code:'P11',name:'车辆故障率',source:'故障记录',auto:'全自动',rule:'线性：≤5%满分，每增1%扣权重×0.1',enabled:true},
  {code:'P12',name:'电子围栏越界次数',source:'告警记录',auto:'全自动',rule:'阶梯：0次满分，1次扣50%权重，≥2次0分',enabled:true},
  {code:'P13',name:'超速次数',source:'告警记录',auto:'全自动',rule:'阶梯：0次满分，1次扣50%权重',enabled:true},
  {code:'P14',name:'安全员脱岗次数',source:'告警记录',auto:'全自动',rule:'阶梯：0次满分，1次扣50%权重',enabled:true},
  {code:'P15',name:'测试报告按时提交',source:'报告上报记录',auto:'全自动',rule:'布尔：按时=满分，未按时0分',enabled:true}
];

function defaultWeightConfig(){
  var enabled=indicators.filter(function(i){return i.enabled});
  var base=Math.floor(100/enabled.length);
  var remainder=100-base*enabled.length;
  var cfg={};
  enabled.forEach(function(ind,idx){cfg[ind.code]=idx<remainder?base+1:base;});
  return cfg;
}

var rulesData=[
  {id:'RUL-001',name:'2026年Q2测试车辆评估规则',vehicleType:'测试车辆',periodType:'季度',effectiveStart:'2026-04-01',effectiveEnd:'2026-06-30',version:'V2.1',status:'生效中',weightConfig:defaultWeightConfig(),wn:0.7,wf:0.3,versions:[{version:'V2.0',time:'2026-01-01',wn:0.7,wf:0.3,weightConfig:defaultWeightConfig()},{version:'V1.0',time:'2025-10-01',wn:0.6,wf:0.4,weightConfig:defaultWeightConfig()}]},
  {id:'RUL-002',name:'2026年Q1测试车辆评估规则',vehicleType:'测试车辆',periodType:'季度',effectiveStart:'2026-01-01',effectiveEnd:'2026-03-31',version:'V2.0',status:'已过期',weightConfig:defaultWeightConfig(),wn:0.7,wf:0.3,versions:[{version:'V1.0',time:'2025-10-01',wn:0.6,wf:0.4,weightConfig:defaultWeightConfig()}]},
  {id:'RUL-003',name:'2026年度示范运营车辆评估规则',vehicleType:'示范运营车辆',periodType:'年度',effectiveStart:'2026-01-01',effectiveEnd:'2026-12-31',version:'V1.0',status:'生效中',weightConfig:defaultWeightConfig(),wn:0.7,wf:0.3,versions:[]}
];

var levelCriteria=[
  {range:'90~100',level:'优秀',color:'#52c41a',tag:'ant-tag-success',desc:'各项指标表现优异，无重大违规，可作为标杆示范'},
  {range:'75~89',level:'良好',color:'#1677ff',tag:'ant-tag-processing',desc:'整体表现良好，个别指标有改进空间，需持续关注'},
  {range:'60~74',level:'合格',color:'#fa8c16',tag:'ant-tag-warning',desc:'基本满足合规要求，部分指标需整改提升，建议限期改进'},
  {range:'0~59',level:'不合格',color:'#f5222d',tag:'ant-tag-error',desc:'存在严重违规或多项指标不达标，须立即整改，暂停相关业务直至复评合格'}
];

function getLevel(score){
  if(score>=90)return'优秀';if(score>=75)return'良好';if(score>=60)return'合格';return'不合格';
}
function levelTag(lv){
  var m={'优秀':'ant-tag-success','良好':'ant-tag-processing','合格':'ant-tag-warning','不合格':'ant-tag-error'};
  return '<span class="ant-tag '+(m[lv]||'ant-tag-default')+'">'+lv+'</span>';
}

var enterprises=['A公司','Q公司','R公司','B公司','C公司','I公司','J公司','P公司','G公司','S公司'];
var plates=['鄂F·A1234','鄂F·B5678','鄂F·C3456','鄂F·D7890','鄂F·E9012','鄂F·F4567','鄂F·G8901','鄂F·H2345','鄂F·I6789','鄂F·J0123'];
var vins=['LSVAA4189N2000001','LSVAA4189N2000002','LSVAA4189N2000003','LSVAA4189N2000004','LSVAA4189N2000005','LSVAA4189N2000006','LSVAA4189N2000007','LSVAA4189N2000008','LSVAA4189N2000009','LSVAA4189N2000010'];

var vehicleReports=[];
var vPeriods=['2025年10月','2025年11月','2025年12月','2026年1月','2026年2月','2026年3月','2026年4月'];
var vPeriodRanges=[['2025-10-01','2025-10-31'],['2025-11-01','2025-11-30'],['2025-12-01','2025-12-31'],['2026-01-01','2026-01-31'],['2026-02-01','2026-02-28'],['2026-03-01','2026-03-31'],['2026-04-01','2026-04-30']];
for(var vi=0;vi<6;vi++){
  for(var pi=0;pi<vPeriods.length;pi++){
    var sc=55+Math.random()*40;
    var genType=pi<5?'定期生成':'手动创建';
    vehicleReports.push({
      reportId:'VR-'+String(vi*vPeriods.length+pi+1).padStart(4,'0'),
      vin:vins[vi],plate:plates[vi],enterprise:enterprises[vi],
      ruleName:rulesData[0].name,period:vPeriods[pi],periodStart:vPeriodRanges[pi][0],periodEnd:vPeriodRanges[pi][1],
      score:sc.toFixed(1),level:getLevel(sc),
      genType:genType,genTime:vPeriodRanges[pi][1].replace('31','01').replace('30','01').replace('28','01')+' 02:00',
      detailScores:[
        {name:'在规定测试范围内行驶',weight:15,actual:sc>70?'始终在围栏内':'越界1次',score:sc>70?15:10,reason:sc>70?'-':'一次越界扣50%权重'},
        {name:'电子围栏越界次数',weight:20,actual:sc>80?'0次':'1次',score:sc>80?20:10,reason:sc>80?'-':'一次越界扣50%权重'},
        {name:'车辆在线率',weight:10,actual:(90+Math.random()*10).toFixed(1)+'%',score:10,reason:'-'},
        {name:'超速次数',weight:15,actual:sc>65?'0次':'1次',score:sc>65?15:8,reason:sc>65?'-':'超速1次扣分'},
        {name:'安全员脱岗次数',weight:10,actual:'0次',score:10,reason:'-'},
        {name:'车辆故障率',weight:10,actual:(Math.random()*5).toFixed(1)+'%',score:10,reason:'-'},
        {name:'测试报告按时提交',weight:10,actual:'按时提交',score:10,reason:'-'},
        {name:'避开管控路段',weight:10,actual:'无违规',score:10,reason:'-'}
      ]
    });
  }
}

var enterpriseReports=[];
var ePeriods=['2025年Q4','2026年Q1','2026年4月'];
var ePeriodRanges=[['2025-10-01','2025-12-31'],['2026-01-01','2026-03-31'],['2026-04-01','2026-04-30']];
for(var ei=0;ei<8;ei++){
  for(var epi=0;epi<ePeriods.length;epi++){
    var normalCnt=Math.floor(5+Math.random()*20);
    var faultCnt=Math.floor(Math.random()*5);
    var offlineCnt=Math.floor(Math.random()*3);
    var avgNormal=60+Math.random()*30;
    var baseScore=avgNormal*0.7+(faultCnt>0?Math.floor(50+Math.random()*20):60)*0.3;
    var penalty=Math.min(offlineCnt*2,20);
    var finalScore=Math.max(Math.round(baseScore-penalty),0);
    enterpriseReports.push({
      reportId:'ER-'+String(ei*ePeriods.length+epi+1).padStart(4,'0'),
      name:enterprises[ei],
      ruleName:epi<2?rulesData[0].name:rulesData[2].name,
      period:ePeriods[epi],periodStart:ePeriodRanges[epi][0],periodEnd:ePeriodRanges[epi][1],
      normalCnt:normalCnt,faultCnt:faultCnt,offlineCnt:offlineCnt,avgNormal:avgNormal.toFixed(1),
      score:finalScore,level:getLevel(finalScore),
      genType:epi<2?'定期生成':'手动创建',
      genTime:ePeriodRanges[epi][1].substring(0,8)+'02 02:00'
    });
  }
}

function switchTab(el,tabId){
  document.querySelectorAll('.ant-tab').forEach(function(t){t.classList.remove('active')});
  el.classList.add('active');
  ['tab-params','tab-rules','tab-vehicle','tab-enterprise'].forEach(function(id){
    document.getElementById(id).style.display=id===tabId?'':'none'
  });
  setTimeout(resizeAll,150);
}

// ========== 评估参数配置 ==========
function renderParams(){
  var enabledCount=indicators.filter(function(i){return i.enabled}).length;
  var html='<div class="card"><div class="flex justify-between items-center mb-4"><h4 class="text-sm font-semibold text-[#000000d9]">预置指标清单</h4><span class="text-xs text-[#00000073]">共 '+indicators.length+' 项 | 启用 '+enabledCount+' 项</span></div>';
  html+='<div class="ant-table-wrapper"><div style="overflow-x:auto"><table class="ant-table"><thead><tr><th>指标编码</th><th>指标名称</th><th>数据来源</th><th>采集自动化程度</th><th>默认计分规则</th><th>状态</th></tr></thead><tbody>';
  indicators.forEach(function(i){
    html+='<tr><td>'+i.code+'</td><td class="font-medium">'+i.name+'</td><td>'+i.source+'</td><td>'+(i.auto==='全自动'?'<span class="ant-tag ant-tag-success">全自动</span>':'<span class="ant-tag ant-tag-warning">暂不采集</span>')+'</td><td class="text-xs text-[#00000073]">'+i.rule+'</td><td class="flex items-center gap-2"><label class="toggle-switch"><input type="checkbox" '+(i.enabled?'checked':'')+' onchange="toggleIndicator(\''+i.code+'\',this.checked)"><span class="toggle-slider"></span></label>'+(i.enabled?'<span class="ant-tag ant-tag-success">启用</span>':'<span class="ant-tag ant-tag-default">停用</span>')+'</td></tr>';
  });
  html+='</tbody></table></div></div>';
  html+='<div class="mt-3"><button class="ant-btn ant-btn-primary" onclick="renderParams()">保存配置</button></div></div>';
  document.getElementById('tab-params').innerHTML=html;
}
function toggleIndicator(code,checked){var ind=indicators.find(function(i){return i.code===code});if(ind){ind.enabled=checked;renderParams();}}

// ========== 评估规则配置 ==========
function renderRules(){
  var html='<div class="card"><div class="flex justify-between items-center mb-4"><h4 class="text-sm font-semibold text-[#000000d9]">规则列表</h4><button class="ant-btn ant-btn-primary ant-btn-sm" onclick="openNewRuleModal()">+ 新建规则</button></div>';
  html+='<div class="ant-table-wrapper"><div style="overflow-x:auto"><table class="ant-table"><thead><tr><th>规则编号</th><th>规则名称</th><th>适用对象</th><th>周期类型</th><th>生效时间</th><th>版本</th><th>状态</th><th>操作</th></tr></thead><tbody>';
  rulesData.forEach(function(r){
    html+='<tr><td>'+r.id+'</td><td class="font-medium">'+r.name+'</td><td>'+r.vehicleType+'</td><td>'+r.periodType+'</td><td class="text-xs">'+r.effectiveStart+' ~ '+r.effectiveEnd+'</td><td>'+r.version+'</td><td>'+(r.status==='生效中'?'<span class="ant-tag ant-tag-success">生效中</span>':'<span class="ant-tag ant-tag-default">已过期</span>')+'</td><td class="flex gap-1"><button class="ant-btn-link" onclick="openRuleDetail(\''+r.id+'\')">查看权重</button><button class="ant-btn-link" onclick="openEditRuleModal(\''+r.id+'\')">编辑</button><button class="ant-btn-link" onclick="openVersionHistory(\''+r.id+'\')">版本历史</button><button class="ant-btn-link" onclick="copyRule(\''+r.id+'\')">复制</button></td></tr>';
  });
  html+='</tbody></table></div></div></div>';
  document.getElementById('tab-rules').innerHTML=html;
}
function openNewRuleModal(){
  var enabledIndicators=indicators.filter(function(i){return i.enabled});
  var html='<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>规则名称</div><div class="ant-form-control"><input class="ant-input" placeholder="如：2026年Q3评估规则" style="width:260px"></div></div>';
  html+='<div class="grid grid-cols-2 gap-4"><div class="ant-form-item"><div class="ant-form-label">适用对象</div><div class="ant-form-control"><select class="ant-input" style="cursor:pointer"><option>测试车辆</option><option>示范应用车辆</option><option>示范运营车辆</option></select></div></div>';
  html+='<div class="ant-form-item"><div class="ant-form-label">周期类型</div><div class="ant-form-control"><select class="ant-input" style="cursor:pointer"><option>月度</option><option selected>季度</option><option>年度</option></select></div></div></div>';
  html+='<div class="grid grid-cols-2 gap-4"><div class="ant-form-item"><div class="ant-form-label">生效开始</div><div class="ant-form-control"><input class="ant-input" type="date" value="2026-07-01"></div></div>';
  html+='<div class="ant-form-item"><div class="ant-form-label">生效结束</div><div class="ant-form-control"><input class="ant-input" type="date" value="2026-09-30"></div></div></div>';
  html+='<h4 class="text-sm font-semibold text-[#000000d9] mt-4 mb-2">指标权重配置（已启用指标）</h4>';
  html+='<table class="ant-table"><thead><tr><th>指标名称</th><th>权重(1-100)</th></tr></thead><tbody>';
  enabledIndicators.forEach(function(i){html+='<tr><td>'+i.name+' ('+i.code+')</td><td><input type="number" class="ant-input weight-input-new" data-code="'+i.code+'" value="0" min="0" max="100" style="width:80px"></td></tr>';});
  html+='</tbody></table>';
  html+='<h4 class="text-sm font-semibold text-[#000000d9] mt-4 mb-2">企业评估权重</h4>';
  html+='<div class="grid grid-cols-2 gap-4"><div class="ant-form-item"><div class="ant-form-label">正常车辆Wn</div><div class="ant-form-control"><input type="number" class="ant-input" value="0.7" step="0.1" style="width:80px"></div></div>';
  html+='<div class="ant-form-item"><div class="ant-form-label">故障车辆Wf</div><div class="ant-form-control"><input type="number" class="ant-input" value="0.3" step="0.1" style="width:80px"></div></div></div>';
  openModal('新建评估规则',html,{wide:true,footer:'<button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn ant-btn-primary" onclick="submitRule(\'new\')">提交创建</button>'});
}
function openEditRuleModal(ruleId){
  var rule=rulesData.find(function(r){return r.id===ruleId});if(!rule)return;
  var enabledIndicators=indicators.filter(function(i){return i.enabled});
  var html='<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>规则名称</div><div class="ant-form-control"><input class="ant-input" value="'+rule.name+'" style="width:260px"></div></div>';
  html+='<div class="grid grid-cols-2 gap-4"><div class="ant-form-item"><div class="ant-form-label">适用对象</div><div class="ant-form-control"><select class="ant-input" style="cursor:pointer">'+['测试车辆','示范应用车辆','示范运营车辆'].map(function(t){return '<option '+(rule.vehicleType===t?'selected':'')+'>'+t+'</option>';}).join('')+'</select></div></div>';
  html+='<div class="ant-form-item"><div class="ant-form-label">周期类型</div><div class="ant-form-control"><select class="ant-input" style="cursor:pointer">'+['月度','季度','年度'].map(function(t){return '<option '+(rule.periodType===t?'selected':'')+'>'+t+'</option>';}).join('')+'</select></div></div></div>';
  html+='<div class="grid grid-cols-2 gap-4"><div class="ant-form-item"><div class="ant-form-label">生效开始</div><div class="ant-form-control"><input class="ant-input" type="date" value="'+rule.effectiveStart+'"></div></div>';
  html+='<div class="ant-form-item"><div class="ant-form-label">生效结束</div><div class="ant-form-control"><input class="ant-input" type="date" value="'+rule.effectiveEnd+'"></div></div></div>';
  html+='<h4 class="text-sm font-semibold text-[#000000d9] mt-4 mb-2">指标权重配置（已启用指标）</h4>';
  html+='<table class="ant-table"><thead><tr><th>指标名称</th><th>权重(1-100)</th></tr></thead><tbody>';
  enabledIndicators.forEach(function(i){html+='<tr><td>'+i.name+' ('+i.code+')</td><td><input type="number" class="ant-input weight-input-edt" data-code="'+i.code+'" value="'+(rule.weightConfig[i.code]||0)+'" min="0" max="100" style="width:80px"></td></tr>';});
  html+='</tbody></table>';
  html+='<h4 class="text-sm font-semibold text-[#000000d9] mt-4 mb-2">企业评估权重</h4>';
  html+='<div class="grid grid-cols-2 gap-4"><div class="ant-form-item"><div class="ant-form-label">正常车辆Wn</div><div class="ant-form-control"><input type="number" class="ant-input" value="'+rule.wn+'" step="0.1" style="width:80px"></div></div>';
  html+='<div class="ant-form-item"><div class="ant-form-label">故障车辆Wf</div><div class="ant-form-control"><input type="number" class="ant-input" value="'+rule.wf+'" step="0.1" style="width:80px"></div></div></div>';
  openModal('编辑评估规则 - '+rule.name,html,{wide:true,footer:'<button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn ant-btn-primary" onclick="submitRule(\'edit\',\''+rule.id+'\')">保存修改（生成新版本）</button>'});

function submitRule(mode,ruleId){

  html+='<h4 class="text-sm font-semibold text-[#000000d9] mt-4 mb-2 pb-2 border-b border-[#f0f0f0]">等级判定标准</h4>';
  html+='<table class="ant-table mb-4"><thead><tr><th>分数区间</th><th>等级</th><th>判定说明</th></tr></thead><tbody>';
  levelCriteria.forEach(function(lc){html+='<tr'+(r.level===lc.level?' style="background:#f6ffed"':'')+'><td class="font-semibold">'+lc.range+'</td><td><span class="ant-tag '+lc.tag+'">'+lc.level+'</span></td><td class="text-xs text-[#00000073]">'+lc.desc+'</td></tr>';});
  html+='</tbody></table>';

  html+='<h4 class="text-sm font-semibold text-[#000000d9] mb-2 pb-2 border-b border-[#f0f0f0]">企业评估计算方式</h4>';
  html+='<div class="p-3 bg-[#fafafa] rounded text-sm text-[#000000d9] mb-4">';
  html+='<p><b>综合得分 = 正常车辆平均得分 × Wn + 故障车辆平均得分 × Wf - 离线扣分</b></p>';
  html+='<p class="text-xs text-[#00000073] mt-1">其中Wn为正常车辆权重（当前0.7），Wf为故障车辆权重（当前0.3），离线扣分=离线车辆数×2分/辆（上限20分）</p></div>';

  html+='<div class="grid grid-cols-2 gap-4"><div class="card"><h4 class="text-sm font-semibold mb-2">车辆构成分析</h4><div id="ePieChart" style="height:240px;"></div></div><div class="card"><h4 class="text-sm font-semibold mb-2">历史得分趋势</h4><div id="eTrendChart" style="height:240px;"></div></div></div>';

  openModal('企业评估报告 - '+r.reportId,html,{wide:true,footer:'<button class="ant-btn" onclick="closeModal()">关闭</button><button class="ant-btn ant-btn-primary" onclick="alert(\'PDF报告下载中...\')">下载PDF报告</button>'});
  setTimeout(function(){
    var pc=initChart('ePieChart');
    if(pc)pc.setOption({tooltip:{},series:[{type:'pie',radius:['45%','68%'],center:['50%','48%'],data:[{value:r.normalCnt,name:'正常',itemStyle:{color:'#52c41a'}},{value:r.faultCnt,name:'故障',itemStyle:{color:'#fa8c16'}},{value:r.offlineCnt,name:'离线',itemStyle:{color:'#f5222d'}}],label:{formatter:'{b}\n{d}%',fontSize:10}}]});
    var tc=initChart('eTrendChart');
    if(tc){var historyScores=enterpriseReports.filter(function(x){return x.name===r.name}).map(function(x){return x.score}).slice(-5);tc.setOption({tooltip:{},xAxis:{data:['前4期','前3期','前2期','前1期','当期']},yAxis:{name:'得分',min:0,max:100},series:[{type:'line',data:historyScores,lineStyle:{color:'#1677ff',width:2},smooth:true,markLine:{silent:true,data:[{yAxis:60,lineStyle:{color:'#f5222d',type:'dashed'},label:{formatter:'合格线'}}]}}],grid:{left:45,right:20,top:10,bottom:30}});}
  },200);
}

renderParams();
renderRules();
renderVehicle();
renderEnterprise();
</script>
<script src="../../common.js"></script>
