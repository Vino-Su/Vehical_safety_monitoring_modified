<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <title>监控一张图 - 智能网联汽车安全监测平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{DEFAULT:'#1677ff',hover:'#4096ff',disabled:'#85a5cc'}}}}}</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/AMap.JSAPI.Driving/1.4.4/AMap.Driving.min.css">
  <style>
    .amap-logo,.amap-copyright{display:none!important}
    .layer-switch{position:relative;display:inline-block;width:36px;height:20px}
    .layer-switch input{opacity:0;width:0;height:0}
    .layer-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#d9d9d9;border-radius:20px;transition:.3s}
    .layer-slider:before{content:"";position:absolute;height:16px;width:16px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.3s}
    .layer-switch input:checked+.layer-slider{background:#1677ff}
    .layer-switch input:checked+.layer-slider:before{transform:translateX(16px)}
    .vehicle-marker{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.3);cursor:pointer;border:2px solid #fff;transition:transform .2s}
    .vehicle-marker:hover{transform:scale(1.2)}
    .vehicle-marker.auto{background:#1677ff}
    .vehicle-marker.manual{background:#52c41a}
    .vehicle-marker.testing{background:#722ed1}
    .vehicle-marker.alarm{background:#ff4d4f;animation:pulse-alarm 1s infinite}
    .vehicle-marker.offline{background:#d9d9d9;color:#999}
    @keyframes pulse-alarm{0%,100%{box-shadow:0 0 0 0 rgba(255,77,79,.4)}50%{box-shadow:0 0 0 8px rgba(255,77,79,0)}}
    .alarm-badge{position:absolute;top:-6px;right:-6px;min-width:16px;height:16px;line-height:16px;text-align:center;background:#ff4d4f;color:#fff;font-size:10px;border-radius:8px;padding:0 4px;font-weight:600}
    .accident-marker{width:28px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);background:#faad14}
    .info-window{background:#fff;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.15);padding:16px;min-width:280px;max-width:360px;font-size:13px}
    .info-window .iw-title{font-size:14px;font-weight:600;color:#000000d9;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #f0f0f0}
    .info-window .iw-row{display:flex;justify-content:space-between;padding:3px 0}
    .info-window .iw-label{color:#00000073}
    .info-window .iw-value{color:#000000d9;font-weight:500}
    .info-window .iw-actions{margin-top:10px;padding-top:8px;border-top:1px solid #f0f0f0;display:flex;gap:8px;flex-wrap:wrap}
    .info-window .iw-close{position:absolute;top:8px;right:8px;cursor:pointer;color:#00000040;font-size:16px;line-height:1}
    .info-window .iw-close:hover{color:#000000d9}
    .fence-label{background:rgba(22,119,255,.12);border:2px dashed #1677ff;border-radius:4px;padding:4px 8px;font-size:11px;color:#1677ff;white-space:nowrap}
    .fence-label.forbidden{background:rgba(255,77,79,.1);border-color:#ff4d4f;color:#ff4d4f}
    .fence-label.speed{background:rgba(250,173,20,.1);border-color:#faad14;color:#faad14}
    .road-open{stroke:#52c41a;stroke-width:4;stroke-opacity:.7}
    .road-paused{stroke:#faad14;stroke-width:4;stroke-opacity:.7;stroke-dasharray:8 4}
    .road-closed{stroke:#ff4d4f;stroke-width:4;stroke-opacity:.7;stroke-dasharray:4 4}
    .facility-marker{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;border:1.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}
    .facility-marker.charger{background:#52c41a;color:#fff}
    .facility-marker.signal{background:#722ed1;color:#fff}
    .facility-marker.sensor{background:#1677ff;color:#fff}
  </style>
</head>

                <span class="page-item cursor-pointer" id="vNextBtn" onclick="vehiclePage<vehicleTotalPages&&renderVehicleTable(vehiclePage+1)" style="min-width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:12px">&gt;</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

function initMap(){
  map=new AMap.Map('mapContainer',{
    center:[112.144,32.042],
    zoom:14,
    mapStyle:'amap://styles/normal',
    resizeEnable:true
  });
  satelliteLayer=new AMap.TileLayer.Satellite();
  loadAllLayers();
}

function loadAllLayers(){
  loadVehicleLayer();
  loadAlarmLayer();
  loadAccidentLayer();
  loadFenceLayer();
  loadRoadLayer();
  loadFacilityLayer();
  loadHistoryAccidentLayer();
}

function getMarkerClass(v){
  if(v.status==='alarm')return 'alarm';
  if(v.status==='offline')return 'offline';
  if(v.mode==='auto')return 'auto';
  if(v.mode==='manual')return 'manual';
  return 'testing';
}

function loadVehicleLayer(){
  vehicleOverlays.forEach(function(m){map.remove(m)});
  vehicleOverlays=[];
  vehicleData.forEach(function(v){
    var cls=getMarkerClass(v);
    var content='<div class="vehicle-marker '+cls+'">'+v.plate.slice(-3)+'</div>';
    if(v.alarms>0)content='<div style="position:relative"><div class="vehicle-marker '+cls+'">'+v.plate.slice(-3)+'</div><span class="alarm-badge">'+v.alarms+'</span></div>';
    var marker=new AMap.Marker({
      position:[v.lon,v.lat],
      content:content,
      offset:new AMap.Pixel(-14,-14),
      zIndex:v.status==='alarm'?200:100,
      extData:v
    });
    marker.on('click',function(){showVehicleInfo(v)});
    vehicleOverlays.push(marker);
  });
  map.add(vehicleOverlays);
}

function loadAlarmLayer(){
  alarmOverlays.forEach(function(m){map.remove(m)});
  alarmOverlays=[];
  vehicleData.filter(function(v){return v.status==='alarm'}).forEach(function(v){
    var circle=new AMap.Circle({
      center:[v.lon,v.lat],
      radius:80,
      strokeColor:'#ff4d4f',
      strokeOpacity:0.6,
      strokeWeight:2,
      fillColor:'#ff4d4f',
      fillOpacity:0.08,
      zIndex:90
    });
    alarmOverlays.push(circle);
  });
  map.add(alarmOverlays);
}

function loadAccidentLayer(){
  accidentOverlays.forEach(function(m){map.remove(m)});

  var today=accidentData.filter(function(a){return a.time.startsWith('2026-05-11')});
  today.forEach(function(a){
    var content='<div class="accident-marker">⚠</div>';
    var marker=new AMap.Marker({
      position:[a.lon,a.lat],
      content:content,
      offset:new AMap.Pixel(-14,-14),
      zIndex:150,
      extData:a
    });
    marker.on('click',function(){showAccidentInfo(a)});
    accidentOverlays.push(marker);
  });
  map.add(accidentOverlays);
}

function loadFenceLayer(){
  fenceOverlays.forEach(function(m){map.remove(m)});
  fenceOverlays=[];
  fenceData.forEach(function(f){
    var strokeColor=f.type==='禁止区域'?'#ff4d4f':f.type==='限速区域'?'#faad14':'#1677ff';
    var fillColor=f.type==='禁止区域'?'rgba(255,77,79,0.06)':f.type==='限速区域'?'rgba(250,173,20,0.06)':'rgba(22,119,255,0.06)';
    var circle=new AMap.Circle({
      center:[f.lon,f.lat],
      radius:f.radius,
      strokeColor:strokeColor,
      strokeOpacity:0.8,
      strokeWeight:2,
      strokeStyle:'dashed',
      fillColor:fillColor,
      fillOpacity:1,
      zIndex:50
    });
    var labelCls=f.type==='禁止区域'?'fence-label forbidden':f.type==='限速区域'?'fence-label speed':'fence-label';
    var labelText=f.name+(f.speed?' (限速'+f.speed+'km/h)':'');
    var textMarker=new AMap.Text({
      text:'<span class="'+labelCls+'">'+labelText+'</span>',
      position:[f.lon,f.lat],
      offset:new AMap.Pixel(-60,-10),
      zIndex:55
    });
    fenceOverlays.push(circle);
    fenceOverlays.push(textMarker);
  });
  map.add(fenceOverlays);
}

function loadRoadLayer(){
  roadOverlays.forEach(function(m){map.remove(m)});
  roadOverlays=[];
  roadData.forEach(function(r){
    var style='road-open';
    if(r.status==='paused')style='road-paused';
    if(r.status==='closed')style='road-closed';
    var color=r.status==='open'?'#52c41a':r.status==='paused'?'#faad14':'#ff4d4f';
    var dashArray=r.status==='open'?null:r.status==='paused'?[8,4]:[4,4];
    var polyline=new AMap.Polyline({
      path:r.path,
      strokeColor:color,
      strokeWeight:5,
      strokeOpacity:0.8,
      strokeStyle:r.status==='open'?'solid':'dashed',
      strokeDasharray:dashArray,
      lineJoin:'round',
      lineCap:'round',
      zIndex:40,
      extData:r
    });
    var textMarker=new AMap.Text({
      text:'<span style="background:#fff;padding:2px 6px;border-radius:3px;font-size:10px;color:'+color+';box-shadow:0 1px 3px rgba(0,0,0,.1);white-space:nowrap">'+r.name+'</span>',
      position:r.path[Math.floor(r.path.length/2)],
      offset:new AMap.Pixel(-40,-12),
      zIndex:45
    });
    roadOverlays.push(polyline);
    roadOverlays.push(textMarker);
  });
  map.add(roadOverlays);
}

function loadFacilityLayer(){
  facilityOverlays.forEach(function(m){map.remove(m)});
  facilityOverlays=[];
  facilityData.forEach(function(f){
    var icon=f.type==='charger'?'⚡':f.type==='signal'?'🚦':'📡';
    var content='<div class="facility-marker '+f.type+'">'+icon+'</div>';
    var marker=new AMap.Marker({
      position:[f.lon,f.lat],
      content:content,
      offset:new AMap.Pixel(-11,-11),
      zIndex:60,
      extData:f
    });

function showInfoWindow(lon,lat,content){
  if(currentInfoWindow){currentInfoWindow.close()}
  currentInfoWindow=new AMap.InfoWindow({
    content:content,
    offset:new AMap.Pixel(0,-20),
    closeWhenClickMap:true
  });
  currentInfoWindow.open(map,[lon,lat]);
}

    '<div class="iw-row"><span class="iw-label">严重程度</span><span class="iw-value"><span class="ant-tag '+sevTag+'">'+a.severity+'</span></span></div>'+
    '<div class="iw-row"><span class="iw-label">描述</span><span class="iw-value">'+a.desc+'</span></div>'+

function showTrajectory(vid){
  var v=vehicleData.find(function(d){return d.id===vid});
  if(!v)return;
  if(trajectoryLine){map.remove(trajectoryLine)}
  var points=[];
  var baseLon=v.lon,baseLat=v.lat;
  for(var i=0;i<20;i++){
    points.push([baseLon-0.008+i*0.001+Math.random()*0.0005,baseLat-0.004+i*0.0005+Math.random()*0.0003]);
  }
  points.push([baseLon,baseLat]);
  trajectoryLine=new AMap.Polyline({
    path:points,
    strokeColor:'#1677ff',
    strokeWeight:4,
    strokeOpacity:0.8,
    lineJoin:'round',
    lineCap:'round',
    zIndex:120,
    showDir:true
  });
  map.add(trajectoryLine);
  map.setFitView([trajectoryLine]);
  showToast('已加载 '+v.plate+' 的行驶轨迹');
}

function toggleLayer(layerName,visible){
  var targetOverlays;
  switch(layerName){
    case 'vehicles':targetOverlays=vehicleOverlays;break;
    case 'trajectory':if(trajectoryLine){trajectoryLine.setVisible(visible)}return;
    case 'alarms':targetOverlays=alarmOverlays;break;
    case 'accidents':targetOverlays=accidentOverlays;break;
    case 'fences':targetOverlays=fenceOverlays;break;
    case 'roads':targetOverlays=roadOverlays;break;
    case 'facilities':targetOverlays=facilityOverlays;break;
    case 'historyAccidents':targetOverlays=historyAccidentOverlays;break;
    default:return;
  }
  if(targetOverlays){
    targetOverlays.forEach(function(m){m.setVisible(visible)});
  }
}

function toggleBaseMap(){
  isSatellite=!isSatellite;
  if(isSatellite){
    map.add(satelliteLayer);
    document.getElementById('btnBaseMap').textContent='切换地图';
  }else{
    map.remove(satelliteLayer);
    document.getElementById('btnBaseMap').textContent='切换卫星';
  }
}

function focusVehicle(vid){
  var v=vehicleData.find(function(d){return d.id===vid});
  if(!v)return;
  map.setZoomAndCenter(16,[v.lon,v.lat]);
  showVehicleInfo(v);
  selectedVehicleId=vid;
}

function filterVehicles(){
  var company=document.getElementById('filterCompany').value;
  var status=document.getElementById('filterStatus').value;
  var mode=document.getElementById('filterMode').value;
  var search=document.getElementById('searchInput').value.trim().toLowerCase();
  filteredVehicleData=vehicleData.filter(function(v){
    if(company!=='all'&&v.company!==company)return false;
    if(status==='online'&&v.status!=='online')return false;
    if(status==='offline'&&v.status!=='offline')return false;
    if(status==='alarm'&&v.status!=='alarm')return false;
    if(mode==='auto'&&v.mode!=='auto')return false;
    if(mode==='manual'&&v.mode!=='manual')return false;
    if(search&&v.plate.toLowerCase().indexOf(search)===-1&&v.vin.toLowerCase().indexOf(search)===-1)return false;
    return true;
  });
  vehiclePage=1;
  renderVehicleTable(1);
  updateMapVisibility();
}

function updateMapVisibility(){
  var visibleIds=filteredVehicleData.map(function(v){return v.id});
  vehicleOverlays.forEach(function(m){
    var data=m.getExtData();
    if(data)m.setVisible(visibleIds.indexOf(data.id)!==-1);
  });
}

function renderVehicleTable(page){
  vehiclePage=page;
  vehicleTotalPages=Math.ceil(filteredVehicleData.length/vehiclePageSize)||1;
  var tbody=document.getElementById('vehicleTableBody');
  var start=(page-1)*vehiclePageSize;
  var end=Math.min(start+vehiclePageSize,filteredVehicleData.length);
  var pageData=filteredVehicleData.slice(start,end);
  tbody.innerHTML=pageData.map(function(v){
    var modeTag=v.mode==='auto'?'<span class="ant-tag ant-tag-processing" style="font-size:11px">自动</span>':'<span class="ant-tag ant-tag-success" style="font-size:11px">人工</span>';
    var statusHtml=v.status==='online'?'<span style="color:#52c41a">在线</span>':v.status==='alarm'?'<span style="color:#ff4d4f">告警</span>':'<span style="color:#999">离线</span>';
    var rowBg=v.status==='alarm'?'background:#fff2f0':'';
    return '<tr style="cursor:pointer;'+rowBg+'" onclick="focusVehicle(\''+v.id+'\')">'+
      '<td style="font-size:12px;font-weight:600">'+v.plate+'</td>'+
      '<td style="font-size:11px">'+v.company+'</td>'+
      '<td>'+modeTag+'</td>'+
      '<td style="font-size:12px">'+v.speed+'</td>'+
      '<td style="font-size:12px">'+statusHtml+'</td>'+
      '<td><div class="flex gap-1"><button class="ant-btn-link" style="font-size:11px" onclick="event.stopPropagation();focusVehicle(\''+v.id+'\')">定位</button><button class="ant-btn-link" style="font-size:11px" onclick="event.stopPropagation();showTrajectory(\''+v.id+'\')">轨迹</button><button class="ant-btn-link" style="font-size:11px" onclick="event.stopPropagation();openVehicleDetail(\''+v.id+'\')">详情</button></div></td>'+
    '</tr>';
  }).join('');
  document.getElementById('vehicleTotal').textContent=filteredVehicleData.length;
  document.getElementById('vCurrPage').textContent=page;
}

function showToast(msg){
  var t=document.createElement('div');
  t.style.cssText='position:fixed;top:80px;right:24px;z-index:9999;background:#fff;padding:10px 16px;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.15);font-size:13px;border-left:3px solid #1677ff;';
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(function(){t.style.opacity='0';t.style.transition='0.3s';setTimeout(function(){t.remove()},300)},2000);
}
