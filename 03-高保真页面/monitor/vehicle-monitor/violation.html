  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .page-header h2{font-size:20px;font-weight:600;color:#000000d9}
    .filter-bar{background:#fff;padding:16px 24px;border-radius:8px;margin-bottom:16px}
    .filter-row{display:flex;flex-wrap:wrap;gap:16px 24px;align-items:center}
    .filter-item{display:inline-flex;flex-direction:row;align-items:center;gap:8px}
    .filter-item label{font-size:14px;color:#000000d9;font-weight:normal;white-space:nowrap}
    .filter-extra{display:none}
    .filter-extra.expanded{display:flex}
    .filter-toggle{display:inline-flex;align-items:center;gap:4px;font-size:14px;color:#1677ff;cursor:pointer;border:none;background:none;padding:0}
    .filter-toggle:hover{color:#4096ff}
    .filter-toggle svg{transition:transform .2s}
    .filter-toggle.expanded svg{transform:rotate(180deg)}
    .ant-table-wrapper{background:#fff;border-radius:8px;overflow:hidden}
    .ant-table{width:100%;border-collapse:collapse}
    .ant-table thead th{background:#fafafa;padding:12px 16px;font-weight:600;font-size:14px;color:#000000d9;border-bottom:1px solid #f0f0f0}
    .ant-table tbody td{padding:12px 16px;font-size:14px;color:#000000d9;border-bottom:1px solid #f0f0f0}
    .ant-table tbody tr{transition:background .2s}
    .ant-table tbody tr:hover{background:#fafafa}
    .ant-tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:normal;border:1px solid}
    .ant-tag-processing{background:#e6f7ff;color:#1890ff;border-color:#91caff}
    .ant-tag-warning{background:#fffbe6;color:#faad14;border-color:#ffe58f}
    .ant-tag-purple{background:#f9f0ff;color:#722ed1;border-color:#d3adf7}
    .ant-btn{display:inline-flex;align-items:center;justify-content:center;padding:4px 15px;border-radius:4px;font-size:14px;border:1px solid #d9d9d9;background:#fff;color:#000000d9;cursor:pointer}
    .ant-btn-primary{background:#1677ff;border-color:#1677ff;color:#fff}
    .ant-btn-link{border:none;background:none;color:#1677ff;padding:0;height:auto;font-size:14px}
    .ant-btn-link:hover{color:#4096ff}
    .ant-select{padding:4px 11px;border:1px solid #d9d9d9;border-radius:4px;font-size:14px;background:#fff;cursor:pointer}
    .ant-input{padding:4px 11px;border:1px solid #d9d9d9;border-radius:4px;font-size:14px}
    /* Descriptions 样式 */
    .desc-section{margin-bottom:20px}
    .desc-section:last-child{margin-bottom:0}
    .desc-section-title{font-size:14px;font-weight:600;color:#000000d9;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #f0f0f0}
    .desc-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
    .desc-item{display:flex;border-bottom:1px solid #f0f0f0;padding:8px 0}
    .desc-item.full{grid-column:1/-1}
    .desc-label{width:160px;flex-shrink:0;background:#fafafa;padding:4px 12px;font-size:14px;color:#00000073}
    .desc-value{flex:1;padding:4px 12px;font-size:14px;color:#000000d9}
    /* 附件列表 */
    .attachment-list{display:flex;flex-direction:column;gap:8px}
    .attachment-item{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;background:#fafafa;border-radius:4px;border:1px solid #f0f0f0;cursor:pointer}
    .attachment-item:hover{border-color:#1677ff;background:#e6f7ff}
    .attachment-icon{font-size:16px}
    .attachment-name{font-size:14px;color:#1677ff}
    /* Toast */
    .toast-msg{position:fixed;top:80px;left:50%;transform:translateX(-50%);padding:8px 24px;border-radius:4px;color:#fff;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s}
    .toast-msg.show{opacity:1}

</head>

          <div class="flex gap-2 items-end">
            <button class="ant-btn ant-btn-primary" onclick="searchData()">查询</button>
            <button class="ant-btn" onclick="resetFilter()">重置</button>
          </div>
          <button class="filter-toggle" id="filterToggle" onclick="toggleFilter()">
            <span>展开</span>
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
          </button>
        </div>
        <!-- 第二行：默认收起 -->
        <div class="filter-row filter-extra" id="filterExtra" style="margin-top:16px">
          <div class="filter-item"><label>车辆种类</label>

          </div>
          <div class="filter-item"><label>违法行为代码</label><input class="ant-input" id="fViolationCode" placeholder="请输入违法行为代码" style="width:140px"></div>
          <div class="filter-item"><label>文书开具时间</label><input class="ant-input" type="date" id="fIssueStart" style="width:130px"> <span style="color:#00000073">~</span> <input class="ant-input" type="date" id="fIssueEnd" style="width:130px"></div>
        </div>
      </div>

      <!-- 数据列表区 -->
      <div class="ant-table-wrapper">
        <div style="overflow-x:auto">
          <table class="ant-table">
            <colgroup>
              <col style="width:40px">
              <col style="width:160px">
              <col style="width:170px">
              <col style="width:110px">
              <col style="width:120px">
              <col style="width:90px">
              <col style="width:120px">
              <col style="width:130px">
              <col style="width:110px">
              <col style="width:120px">
              <col style="width:70px">
            </colgroup>
            <thead>

                <th style="text-align:center">违法记录编号</th>
                <th style="text-align:center">违法发生时间</th>
                <th style="text-align:center">临时车牌号</th>
                <th style="text-align:left">运营企业名称</th>
                <th style="text-align:center">车辆种类</th>

                <th style="text-align:center">文书开具日期</th>
                <th style="text-align:center">操作</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <div id="paginationBar"></div>
      </div>

    </main>
  </div>
</div>

var selectedIds = new Set();
var currentFilteredData = [];
var pager = null;

/* ========== 筛选区收起/展开 ========== */
function toggleFilter() {
  var extra = document.getElementById('filterExtra');
  var btn = document.getElementById('filterToggle');
  var isExpanded = extra.classList.contains('expanded');
  if (isExpanded) {
    extra.classList.remove('expanded');
    btn.classList.remove('expanded');
    btn.querySelector('span').textContent = '展开';
  } else {
    extra.classList.add('expanded');
    btn.classList.add('expanded');
    btn.querySelector('span').textContent = '收起';
  }
}

/* ========== 筛选逻辑 ========== */
function getFilterConditions() {
  return {
    caseNo: document.getElementById('fCaseNo').value.trim(),
    timeStart: document.getElementById('fTimeStart').value,
    timeEnd: document.getElementById('fTimeEnd').value,
    plate: document.getElementById('fPlate').value.trim(),
    enterprise: document.getElementById('fEnterprise').value.trim(),
    violationCode: document.getElementById('fViolationCode').value.trim(),
    issueStart: document.getElementById('fIssueStart').value,
    issueEnd: document.getElementById('fIssueEnd').value
  };
}

function filterData() {
  var f = getFilterConditions();
  return ALL_DATA.filter(function (d) {
    if (f.caseNo && d.caseNo.indexOf(f.caseNo) === -1) return false;
    if (f.timeStart && d.time.substring(0, 10) < f.timeStart) return false;
    if (f.timeEnd && d.time.substring(0, 10) > f.timeEnd) return false;
    if (f.plate && d.plate.indexOf(f.plate) === -1) return false;
    if (f.enterprise && d.enterprise.indexOf(f.enterprise) === -1) return false;
    if (f.violationCode && d.violationCode.indexOf(f.violationCode) === -1) return false;
    if (f.issueStart && d.issueDate < f.issueStart) return false;
    if (f.issueEnd && d.issueDate > f.issueEnd) return false;
    return true;
  });
}

function searchData() {
  selectedIds.clear();
  document.getElementById('checkAll').checked = false;
  pager.reset();
  currentFilteredData = filterData();
  pager.setTotal(currentFilteredData.length);
  renderTable();
}

function resetFilter() {
  document.getElementById('fCaseNo').value = '';
  document.getElementById('fTimeStart').value = '';
  document.getElementById('fTimeEnd').value = '';
  document.getElementById('fPlate').value = '';
  document.getElementById('fEnterprise').value = '';
  document.getElementById('fViolationCode').value = '';
  document.getElementById('fIssueStart').value = '';
  document.getElementById('fIssueEnd').value = '';
  selectedIds.clear();
  document.getElementById('checkAll').checked = false;
  currentFilteredData = ALL_DATA.slice();
  pager.reset();
  pager.setTotal(currentFilteredData.length);
  renderTable();
}

/* ========== 全选/取消全选 ========== */
function toggleCheckAll(el) {
  var page = pager.getCurrentPage();
  var size = pager.getPageSize();
  var start = (page - 1) * size;
  var pageData = currentFilteredData.slice(start, start + size);
  pageData.forEach(function (d) {
    if (el.checked) selectedIds.add(d.caseNo);
    else selectedIds.delete(d.caseNo);
  });
  renderTable();
}

function toggleCheck(caseNo, el) {
  if (el.checked) selectedIds.add(caseNo);
  else selectedIds.delete(caseNo);
  /* 更新全选框状态 */
  var page = pager.getCurrentPage();
  var size = pager.getPageSize();
  var start = (page - 1) * size;
  var pageData = currentFilteredData.slice(start, start + size);
  var allChecked = pageData.every(function (d) { return selectedIds.has(d.caseNo); });
  document.getElementById('checkAll').checked = allChecked && pageData.length > 0;
}

/* ========== 渲染表格 ========== */
function renderTable() {
  var page = pager.getCurrentPage();
  var size = pager.getPageSize();
  var start = (page - 1) * size;
  var pageData = currentFilteredData.slice(start, start + size);
  var tbody = document.getElementById('tableBody');
  var html = '';
  pageData.forEach(function (d) {
    var evClass = 'ant-tag-processing';
    if (d.evidenceType === '现场交警查处') evClass = 'ant-tag-warning';
    else if (d.evidenceType === '视频举报') evClass = 'ant-tag-purple';
    var checked = selectedIds.has(d.caseNo) ? 'checked' : '';
    html += '<tr>' +
      '<td style="text-align:center"><input type="checkbox" ' + checked + ' onchange="toggleCheck(\'' + d.caseNo + '\',this)"></td>' +
      '<td style="text-align:center;font-family:monospace">' + d.caseNo + '</td>' +
      '<td style="text-align:center">' + d.time + '</td>' +
      '<td style="text-align:center">' + d.plate + '</td>' +
      '<td style="text-align:left">' + d.enterprise + '</td>' +
      '<td style="text-align:center">' + d.vehicleType + '</td>' +
      '<td style="text-align:center;font-family:monospace">' + d.violationCode + '</td>' +
      '<td style="text-align:center"><span class="ant-tag ' + evClass + '">' + d.evidenceType + '</span></td>' +
      '<td style="text-align:center">' + d.policeId + '</td>' +
      '<td style="text-align:center">' + d.issueDate + '</td>' +
      '<td style="text-align:center"><button class="ant-btn-link" onclick="showDetail(\'' + d.caseNo + '\')">详情</button></td>' +
      '</tr>';
  });
  if (pageData.length === 0) {
    html = '<tr><td colspan="11" style="text-align:center;padding:40px 0;color:#00000073">暂无数据</td></tr>';
  }
  tbody.innerHTML = html;
}

/* ========== 导出功能 ========== */
function showToast(msg, color) {
  var el = document.createElement('div');
  el.className = 'toast-msg';
  el.style.background = color || '#1677ff';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function () { el.classList.add('show'); }, 10);
  setTimeout(function () { el.classList.remove('show'); setTimeout(function () { el.remove(); }, 300); }, 2500);
}

function exportTable() {
  var selectedData = ALL_DATA.filter(function (item) { return selectedIds.has(item.caseNo); });
  if (selectedData.length > 0) {
    showToast('已导出选中的 ' + selectedData.length + ' 条记录', '#1677ff');
  } else {
    if (confirm('是否导出所有数据？')) {
      showToast('已导出当前筛选条件下共 ' + currentFilteredData.length + ' 条记录', '#1677ff');
    }
  }
}

/* ========== 详情弹窗 ========== */

/* ========== 初始化 ========== */
document.addEventListener('DOMContentLoaded', function () {
  currentFilteredData = ALL_DATA.slice();
  pager = new Pagination({
    container: 'paginationBar',
    pageSize: 10,
    pageSizeOptions: [10, 20, 50],
    onPageChange: function () { renderTable(); },
    onPageSizeChange: function () { renderTable(); }
  });
  pager.setTotal(currentFilteredData.length);
  renderTable();
});
</script>
