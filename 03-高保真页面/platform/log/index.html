var logPager;

function renderLogTable() {
  var cp = logPager ? logPager.getCurrentPage() : 1;
  var ps = logPager ? logPager.getPageSize() : 10;
  var start = (cp - 1) * ps;
  var end = start + ps;
  var pageData = logData.slice(start, end);
  var tbody = document.getElementById('logTableBody');
  tbody.innerHTML = pageData.map(function(item) {
    var statusClass = item.status === '成功' ? 'ant-tag-success' : 'ant-tag-error';
    return '<tr>' +
      '<td style="text-align:center">' + item.id + '</td>' +
      '<td>' + item.module + '</td>' +
      '<td style="text-align:center">' + item.bizType + '</td>' +
      '<td style="text-align:center"><span class="ant-tag ant-tag-processing">' + item.method + '</span></td>' +
      '<td style="text-align:center">' + item.operator + '</td>' +
      '<td>' + item.ip + '</td>' +
      '<td style="text-align:center"><span class="ant-tag ' + statusClass + '">' + item.status + '</span></td>' +
      '<td style="text-align:center">' + item.duration + '</td>' +
      '<td>' + item.time + '</td>' +
      '<td style="text-align:center"><button class="ant-btn-link" onclick="openDetailModal()">查看</button><button class="ant-btn-link danger" onclick="openDeleteModal()">删除</button></td>' +
    '</tr>';
  }).join('');
  if (logPager) logPager.setTotal(logData.length);
}

logPager = new Pagination({
  container: 'paginationBar',
  pageSize: 10,
  pageSizeOptions: [10, 20, 50, 100],
  onPageChange: function(page, size) { renderLogTable(); },
  onPageSizeChange: function(size) { renderLogTable(); }
});
