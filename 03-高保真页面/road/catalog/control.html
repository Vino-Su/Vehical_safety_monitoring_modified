function getStatusClass(s){
  if(s==='开放') return 'ant-tag-success';
  if(s==='暂停') return 'ant-tag-warning';
  if(s==='关闭') return 'ant-tag-error';
  return 'ant-tag-default';
}

function statusTag(s){
  if(s==='已通过') return '<span class="ant-tag ant-tag-success">'+s+'</span>';
  if(s==='已退回') return '<span class="ant-tag ant-tag-error">'+s+'</span>';
  return '<span class="ant-tag ant-tag-processing">'+s+'</span>';
}

function renderOperationButtons(row){
  var btns = [];
  btns.push('<button class="ant-btn-link" onclick="openRoadDetail(\''+row.code+'\',\''+row.name+'\')">详情</button>');
  if(row.status==='开放'){
    btns.push('<button class="ant-btn-link" onclick="openStatusModal(\'暂停\','+row.hasProcess+')">暂停</button>');
    btns.push('<button class="ant-btn-link ant-btn-link-danger" onclick="openStatusModal(\'关闭\','+row.hasProcess+')">关闭</button>');
  } else if(row.status==='暂停'){
    btns.push('<button class="ant-btn-link ant-btn-link-success" onclick="openStatusModal(\'恢复\',false)">恢复</button>');
    btns.push('<button class="ant-btn-link ant-btn-link-danger" onclick="openStatusModal(\'关闭\','+row.hasProcess+')">关闭</button>');
  } else if(row.status==='关闭'){
    btns.push('<button class="ant-btn-link ant-btn-link-success" onclick="openStatusModal(\'恢复\',false)">恢复</button>');
  }
  btns.push('<button class="ant-btn-link" onclick="openAccessConfig(\''+row.name+'\')">准入配置</button>');
  btns.push('<button class="ant-btn-link" onclick="openChangeRecordModal(\''+row.code+'\',\''+row.name+'\')">变更记录</button>');
  return '<div class="op-btns">'+btns.join('')+'</div>';
}

function renderRoadTable(){
  var page = roadPager ? roadPager.getCurrentPage() : 1;
  var size = roadPager ? roadPager.getPageSize() : 10;
  var start = (page-1)*size;
  var end = Math.min(start+size, filteredRoadData.length);
  var pageData = filteredRoadData.slice(start, end);
  var tbody = document.getElementById('roadTbody');
  if(pageData.length===0){
    tbody.innerHTML='<tr><td colspan="10" style="text-align:center;padding:30px;color:#999">暂无数据</td></tr>';
    return;
  }
  tbody.innerHTML = pageData.map(function(r){
    var applyCell = r.applies > 0
      ? '<button class="ant-btn-link" onclick="openApplyModal(\''+r.name+'\','+r.applies+')">'+r.applies+'个</button>'
      : '0';
    return '<tr>'+
      '<td>'+r.code+'</td>'+
      '<td>'+r.name+'</td>'+
      '<td>'+r.district+'</td>'+
      '<td>'+r.level+'</td>'+
      '<td><span class="ant-tag '+getStatusClass(r.status)+'">'+r.status+'</span></td>'+
      '<td>'+r.hours+'</td>'+
      '<td>'+r.ad+'</td>'+
      '<td>'+r.biz+'</td>'+
      '<td>'+applyCell+'</td>'+
      '<td class="col-action">'+renderOperationButtons(r)+'</td>'+
    '</tr>';
  }).join('');
}

function doSearch(){
  var name = document.getElementById('filterName').value.trim();
  var districtSel = document.querySelector('#filterDistrictItem select');
  var statusSel = document.querySelector('#filterStatusItem select');
  var district = districtSel ? districtSel.value : '全部';
  var status = statusSel ? statusSel.value : '全部';
  filteredRoadData = roadData.filter(function(r){
    if(name && r.name.indexOf(name)===-1 && r.code.indexOf(name)===-1) return false;
    if(district !== '全部' && r.district !== district) return false;
    if(status !== '全部' && r.status !== status) return false;
    return true;
  });
  if(roadPager) roadPager.setTotal(filteredRoadData.length);
  renderRoadTable();
}

function doReset(){
  document.getElementById('filterName').value='';
  var districtSel = document.querySelector('#filterDistrictItem select');
  var statusSel = document.querySelector('#filterStatusItem select');
  if(districtSel) districtSel.selectedIndex=0;
  if(statusSel) statusSel.selectedIndex=0;
  filteredRoadData = roadData.slice();
  if(roadPager) roadPager.setTotal(filteredRoadData.length);
  renderRoadTable();
}

function initPagination(){
  roadPager = new Pagination({
    container:'paginationBar',
    pageSize:10,
    pageSizeOptions:[10,20,50,100],
    onPageChange:function(){ renderRoadTable(); },
    onPageSizeChange:function(){ renderRoadTable(); }
  });
  roadPager.setTotal(filteredRoadData.length);
  renderRoadTable();
}

function getFilteredApplies(){
  if(currentApplyFilter==='all') return applyData;
  return applyData.filter(function(a){return a.valid;});
}

function renderApplyTable(){
  var list = getFilteredApplies();
  if(applyPager) applyPager.setTotal(list.length);
  var page = applyPager ? applyPager.getCurrentPage() : 1;
  var size = applyPager ? applyPager.getPageSize() : 10;
  var start = (page-1)*size;
  var end = Math.min(start+size, list.length);
  var pageData = list.slice(start, end);
  var tbody = document.getElementById('applyTbody');
  if(!tbody) return;
  if(pageData.length===0){
    tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:30px;color:#999">暂无关联申请</td></tr>';
    return;
  }
  tbody.innerHTML = pageData.map(function(a){
    var timeRange = a.testDate || a.period || '-';
    return '<tr><td>'+a.id+'</td><td>'+a.type+'</td><td>'+a.company+'</td><td>'+a.vehicles+'</td><td>'+statusTag(a.status)+'</td><td>'+timeRange+'</td><td><button class="ant-btn-link" onclick="openApplyDetail(\''+a.id+'\')">查看详情</button></td></tr>';
  }).join('');
}

function filterApply(type){
  currentApplyFilter = type;
  var btnV = document.getElementById('btnValid');

    if(type==='valid'){
      btnV.className='ant-btn ant-btn-primary'; btnV.style.height='28px'; btnV.style.padding='0 12px'; btnV.style.fontSize='12px';
      btnA.className='ant-btn'; btnA.style.height='28px'; btnA.style.padding='0 12px'; btnA.style.fontSize='12px';
    } else {
      btnA.className='ant-btn ant-btn-primary'; btnA.style.height='28px'; btnA.style.padding='0 12px'; btnA.style.fontSize='12px';

    }

  if(status==='已通过') return {sc1:'#52c41a',sc2:'#52c41a',sc3:'#52c41a',sc4:'#52c41a',l1:'#52c41a',l2:'#52c41a',l3:'#52c41a',d1:'✓',d2:'✓',d3:'✓',d4:'✓'};

function openChangeRecordModal(roadCode, roadName){
  var records = changeRecordData[roadCode] || [];
  records = records.slice().sort(function(a,b){return b.time.localeCompare(a.time);});
  var rows = '';
  if(records.length===0){
    rows = '<tr><td colspan="6" style="text-align:center;padding:30px;color:#999">暂无变更记录</td></tr>';
  } else {
    rows = records.map(function(r){
      var beforeVal = r.field==='开放状态' ? '<span class="ant-tag '+getStatusClass(r.before)+'">'+r.before+'</span>' : r.before;
      var afterVal = r.field==='开放状态' ? '<span class="ant-tag '+getStatusClass(r.after)+'">'+r.after+'</span>' : r.after;
      return '<tr><td>'+r.field+'</td><td>'+beforeVal+'</td><td>'+afterVal+'</td><td>'+r.reason+'</td><td>'+r.operator+'</td><td>'+r.time+'</td></tr>';
    }).join('');
  }
  var html =
    '<div style="overflow-x:auto"><table class="ant-table"><thead><tr><th style="width:180px">字段名称</th><th style="width:100px">变更前</th><th style="width:100px">变更后</th><th style="width:300px">变更原因说明</th><th style="width:120px">操作人</th><th style="width:160px">操作时间</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  openModal('变更记录 - '+roadName, html, {wide:true, footer:'<button class="ant-btn" onclick="closeModal()">关闭</button>'});
}
