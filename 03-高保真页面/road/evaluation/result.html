<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>评估结果管理 - 智能网联汽车安全监测平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{DEFAULT:'#1677ff',hover:'#4096ff',disabled:'#85a5cc'}}}}}</script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    .gauge-box{width:120px;height:120px;margin:0 auto}
    .radar-box{height:260px}
    .trend-box{height:220px}
    .progress-bar-wrap{height:10px;background:#f0f0f0;border-radius:5px;overflow:hidden}
    .progress-bar-fill{height:100%;border-radius:5px;transition:all .3s}
    .detail-tabs{display:flex;gap:0;border-bottom:1px solid #f0f0f0;margin-bottom:14px;flex-wrap:wrap}
    .detail-tab{padding:8px 16px;cursor:pointer;font-size:12px;font-weight:500;color:#666;border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none}
    .detail-tab:hover{color:#1677ff}
    .detail-tab.active{color:#1677ff;border-bottom-color:#1677ff}
    .detail-tab-content{display:none}
    .detail-tab-content.active{display:block}
  </style>
</head>
<body>
<div id="app" class="flex h-screen overflow-hidden">
  <aside id="sidebar"></aside>
  <div class="flex-1 flex flex-col overflow-hidden">
    <header id="topnav"></header>
    <main class="flex-1 overflow-auto bg-[#f0f2f5] p-6">
      <div class="page-header"><h2>评估结果管理</h2><div class="flex gap-2"><button class="ant-btn ant-btn-primary">+ 手动发起评估</button><button class="ant-btn">导出Excel</button></div></div>
      <div class="filter-bar">
        <div class="filter-row">
          <div class="filter-item"><label>道路名称/编号</label><input class="ant-input" placeholder="模糊匹配" id="filterRoad"></div>
          <div class="filter-item"><label>所属区域</label><div class="ant-select" id="filterDistrict">全部<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg></div></div>
          <div class="filter-item"><label>建议开放等级</label><div class="ant-select" id="filterOpenLevel">全部<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg></div></div>
          <div class="filter-item"><label>风险等级</label><div class="ant-select" id="filterRisk">全部<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg></div></div>
          <div class="filter-item"><label>复杂度等级</label><div class="ant-select" id="filterComplexity">全部<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg></div></div>
          <div class="flex gap-2 items-end"><button class="ant-btn ant-btn-primary" onclick="refreshList()">查询</button><button class="ant-btn" onclick="resetFilters()">重置</button></div>
        </div>
      </div>
      <div class="ant-table-wrapper">
        <div style="overflow-x:auto">
          <table class="ant-table">
            <thead><tr><th>道路编号</th><th>道路名称</th><th>所属区域</th><th>复杂度等级</th><th>风险等级</th><th>最佳适配场景</th><th>建议开放等级</th><th>综合得分</th><th>评估时间</th><th>操作</th></tr></thead>
            <tbody id="listBody"></tbody>
          </table>
        </div>
        <div id="paginationBar"></div>
      </div>
    </main>
  </div>
</div>

<!-- 无自定义弹窗HTML，使用 common.js 动态弹窗 -->

<script src="../../components/pagination-component.js"></script>
<script>
const PAGE_ID='eval-result';

// ==================== 道路评估数据 ====================
const districts = ['樊城区', '襄城区', '高新区', '襄州区', '南漳县', '谷城县'];
const openLevels = ['完全开放', '条件开放', '限制开放', '禁止开放'];
const riskLevels = ['低', '中', '高'];
const complexityLevels = ['低', '中', '高'];
const scenes = ['城区道路', '园区道路', '环卫作业道路', '物流配送道路'];

function randomItem(arr){return arr[Math.floor(Math.random()*arr.length)]}

const roadNames = ['长虹路', '檀溪路', '航空路', '人民路', '建设路', '金源路', '中原路', '春园路', '前进路', '大庆东路', '汉江路', '襄阳大道', '环城南路', '邓城大道', '航天路', '胜利路', '解放路', '琵琶山路', '卧龙大道', '钻石大道'];

const evalData = roadNames.map((name, i) => {
  const id = 'RD-' + String(i+1).padStart(3, '0');
  const district = randomItem(districts);
  const complexity = randomItem(complexityLevels);
  const risk = randomItem(riskLevels);
  const scene = randomItem(scenes);
  const clScore = complexity === '高' ? 70+Math.floor(Math.random()*25) : complexity === '中' ? 40+Math.floor(Math.random()*25) : 15+Math.floor(Math.random()*20);
  const rlScore = risk === '高' ? 70+Math.floor(Math.random()*25) : risk === '中' ? 40+Math.floor(Math.random()*25) : 15+Math.floor(Math.random()*20);
  const scScore = 50+Math.floor(Math.random()*45);
  const rawScore = (100 - clScore*0.33 - rlScore*0.34 + scScore*0.33 + 20 + Math.random()*10).toFixed(1);
  const score = Math.min(100, Math.max(0, parseFloat(rawScore))).toFixed(1);
  const openLevel = score >= 85 ? '完全开放' : score >= 70 ? '条件开放' : score >= 50 ? '限制开放' : '禁止开放';
  const month = 5-Math.floor(Math.random()*3);
  const day = Math.floor(Math.random()*28)+1;
  const time = '2026-0'+month+'-'+String(day).padStart(2,'0')+' 02:00';
  const sceneFits = scenes.map(s => ({name: s, fit: Math.random()>0.3 ? '适用' : '不适用', score: 40+Math.floor(Math.random()*55), threshold: 60}));
  const rules = [];
  if (risk === '高') rules.push({name:'高风险限制', cond:'风险等级=高', action: openLevel, priority: 1});
  if (complexity === '高') rules.push({name:'复杂度高降级', cond:'复杂度=高', action: openLevel, priority: 2});
  if (rules.length === 0) rules.push({name:'默认规则', cond:'无高风险', action: openLevel, priority: 0});
  const autoLevel = openLevel === '完全开放' ? 'L2/L3/L4' : openLevel === '条件开放' ? 'L3/L4' : 'L4';
  const testTypes = openLevel === '完全开放' ? '载人、载货、环卫、物流' : openLevel === '条件开放' ? '载货、环卫、物流' : '环卫、物流';
  const limitTime = openLevel === '完全开放' ? '无限制' : openLevel === '条件开放' ? '06:00-22:00' : '09:00-17:00';
  const control = openLevel === '完全开放' ? '无特殊要求' : openLevel === '条件开放' ? '需额外提交安全评估' : '需安全员全程监控';
  return { id, name, district, complexity, risk, scene, openLevel, score, time, clScore, rlScore, scScore, scenes: sceneFits, rules, autoLevel, testTypes, limitTime, control };
});

// 历史版本
const historyVersions = [
  {ver:'V3.2', time:'2026-05-08 02:00', score:72.5, level:'条件开放', complexity:72, risk:68, sceneScore:78},
  {ver:'V3.1', time:'2026-04-01 02:00', score:78.2, level:'完全开放', complexity:65, risk:55, sceneScore:82},
  {ver:'V3.0', time:'2026-03-01 02:00', score:75.0, level:'条件开放', complexity:70, risk:60, sceneScore:76}
];

// ==================== 状态 ====================
var pager = null;
var chartInstances = {};

// ==================== 工具 ====================
function levelTag(lv) {
  const map = {'高':'ant-tag-error','中':'ant-tag-warning','低':'ant-tag-success','完全开放':'ant-tag-success','条件开放':'ant-tag-warning','限制开放':'ant-tag-error','禁止开放':'ant-tag-default'};
  return '<span class="ant-tag '+ (map[lv]||'ant-tag-processing') +'">'+lv+'</span>';
}

function initChart(id) {
  const dom = document.getElementById(id);
  if (!dom) return null;
  if (chartInstances[id]) chartInstances[id].dispose();
  const c = echarts.init(dom);
  chartInstances[id] = c;
  return c;
}

function resizeAll() { Object.values(chartInstances).forEach(c => { if (c && !c.isDisposed()) c.resize(); }); }

// ==================== 列表渲染 ====================
function renderList() {
  var filtered = getFilteredData();
  var total = filtered.length;
  var page = pager ? pager.getCurrentPage() : 1;
  var size = pager ? pager.getPageSize() : 10;
  var totalPages = Math.ceil(total / size) || 1;
  if (page > totalPages) page = totalPages || 1;
  var start = (page - 1) * size;
  var end = Math.min(start + size, total);
  var pageData = filtered.slice(start, end);

  if (pager) pager.setTotal(total);

  var html = '';
  if (pageData.length === 0) {
    html = '<tr><td colspan="10" style="text-align:center;padding:40px;color:#999;">暂无匹配评估结果</td></tr>';
  }
  pageData.forEach(function(r) {
    html += '<tr><td>'+r.id+'</td><td><strong>'+r.name+'</strong></td><td>'+r.district+'</td>' +
      '<td>'+levelTag(r.complexity)+'</td><td>'+levelTag(r.risk)+'</td><td>'+r.scene+'</td>' +
      '<td>'+levelTag(r.openLevel)+'</td><td><strong style="color:'+(r.score>=85?'#52c41a':r.score>=70?'#fa8c16':r.score>=50?'#1677ff':'#ff4d4f')+'">'+r.score+'</strong></td>' +
      '<td>'+r.time+'</td>' +
      '<td class="flex gap-1"><button class="ant-btn-link" onclick="openDetailModal(\''+r.id+'\')">查看详情</button>' +
      '<button class="ant-btn-link" onclick="openHistoryModal(\''+r.id+'\')">历史版本</button>' +
      '<button class="ant-btn-link" onclick="showToast(\'已触发重新评估\')">重新评估</button></td></tr>';
  });
  document.getElementById('listBody').innerHTML = html;
}

function getFilteredData() {
  const road = (document.getElementById('filterRoad').value||'').trim().toLowerCase();
  const district = document.getElementById('filterDistrict').textContent.trim();
  const openLevel = document.getElementById('filterOpenLevel').textContent.trim();
  const risk = document.getElementById('filterRisk').textContent.trim();
  const complexity = document.getElementById('filterComplexity').textContent.trim();
  return evalData.filter(r => {
    if (road && !r.name.toLowerCase().includes(road) && !r.id.toLowerCase().includes(road)) return false;
    if (district !== '全部' && r.district !== district) return false;
    if (openLevel !== '全部' && r.openLevel !== openLevel) return false;
    if (risk !== '全部' && r.risk !== risk) return false;
    if (complexity !== '全部' && r.complexity !== complexity) return false;
    return true;
  });
}

window.refreshList = function() { if (pager) pager.reset(); else renderList(); showToast('列表已刷新'); };
window.resetFilters = function() {
  document.getElementById('filterRoad').value='';
  ['filterDistrict','filterOpenLevel','filterRisk','filterComplexity'].forEach(function(id) {
    var el=document.getElementById(id); if(el) el.childNodes[0].textContent='全部';
  });
  if (pager) pager.reset(); else renderList();
};

// ==================== 详情弹窗（标签页 + 图表） ====================
window.openDetailModal = function(code) {
  const r = evalData.find(d => d.id === code) || evalData[0];
  let html = '<div class="detail-tabs" id="detailTabs">';
  ['评估总览', '复杂度分析', '风险分析', '场景适配', '决策追溯'].forEach((t,i) => {
    html += '<button class="detail-tab'+(i===0?' active':'')+'" data-tab="tab'+i+'">'+t+'</button>';
  });
  html += '</div>';

  // Tab0 - 评估总览
  html += '<div class="detail-tab-content active" id="tab0">' +
    '<div class="ant-descriptions">' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">建议开放等级</div><div class="ant-descriptions-value">' + levelTag(r.openLevel) + '</div><div class="ant-descriptions-label">综合得分</div><div class="ant-descriptions-value" style="color:' + (r.score >= 85 ? '#52c41a' : r.score >= 70 ? '#fa8c16' : r.score >= 50 ? '#1677ff' : '#ff4d4f') + ';font-size:18px;font-weight:700">' + r.score + '</div></div>' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">适用自动驾驶等级</div><div class="ant-descriptions-value">' + r.autoLevel + '</div><div class="ant-descriptions-label">允许测试类型</div><div class="ant-descriptions-value">' + r.testTypes + '</div></div>' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">限制时段</div><div class="ant-descriptions-value">' + r.limitTime + '</div><div class="ant-descriptions-label">管控说明</div><div class="ant-descriptions-value">' + r.control + '</div></div>' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">评估时间</div><div class="ant-descriptions-value">' + r.time + '</div><div class="ant-descriptions-label">触发方式</div><div class="ant-descriptions-value">定时重评</div></div>' +
    '</div></div>';

  // Tab1 - 复杂度分析
  html += '<div class="detail-tab-content" id="tab1">' +
    '<div class="ant-descriptions">' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">复杂度指数</div><div class="ant-descriptions-value"><strong>' + r.clScore + '</strong> ' + levelTag(r.complexity) + '</div><div class="ant-descriptions-label"></div><div class="ant-descriptions-value"></div></div>' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">车道复杂度</div><div class="ant-descriptions-value">得分: ' + Math.floor(r.clScore * 0.3) + ' / 权重: 0.3</div><div class="ant-descriptions-label">交叉口复杂度</div><div class="ant-descriptions-value">得分: ' + Math.floor(r.clScore * 0.25) + ' / 权重: 0.25</div></div>' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">混合交通复杂度</div><div class="ant-descriptions-value">得分: ' + Math.floor(r.clScore * 0.2) + ' / 权重: 0.2</div><div class="ant-descriptions-label">坡度/曲率</div><div class="ant-descriptions-value">得分: ' + Math.floor(r.clScore * 0.15) + ' / 权重: 0.15</div></div>' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">信号灯完整度</div><div class="ant-descriptions-value">得分: ' + Math.floor(r.clScore * 0.1) + ' / 权重: 0.1</div><div class="ant-descriptions-label"></div><div class="ant-descriptions-value"></div></div>' +
    '</div></div>';

  // Tab2 - 风险分析
  html += '<div class="detail-tab-content" id="tab2">' +
    '<div class="ant-descriptions">' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">风险指数</div><div class="ant-descriptions-value"><strong>' + r.rlScore + '</strong> ' + levelTag(r.risk) + '</div><div class="ant-descriptions-label"></div><div class="ant-descriptions-value"></div></div>' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">概率维度</div><div class="ant-descriptions-value">事故频率: ' + Math.floor(r.rlScore * 0.5) + ' / 权重: 0.5</div><div class="ant-descriptions-label">严重度维度</div><div class="ant-descriptions-value">伤亡权重: ' + Math.floor(r.rlScore * 0.5) + ' / 权重: 0.5</div></div>' +
    '</div></div>';

  // Tab3 - 场景适配
  html += '<div class="detail-tab-content" id="tab3"><div style="overflow-x:auto"><table class="ant-table"><thead><tr><th>场景名称</th><th>适配状态</th><th>适配度得分</th><th>适配阈值</th></tr></thead><tbody>';
  (r.scenes || []).forEach(function(s) {
    html += '<tr><td>' + s.name + '</td><td>' + (s.fit === '适用' ? '<span class="ant-tag ant-tag-success">适用</span>' : '<span class="ant-tag ant-tag-error">不适用</span>') + '</td><td>' + s.score + '</td><td>' + s.threshold + '</td></tr>';
  });
  html += '</tbody></table></div><p class="mt-3"><strong>最佳场景：</strong>' + r.scene + '</p></div>';

  // Tab4 - 决策追溯
  html += '<div class="detail-tab-content" id="tab4"><div style="overflow-x:auto"><table class="ant-table"><thead><tr><th>规则名称</th><th>条件描述</th><th>动作</th><th>优先级</th></tr></thead><tbody>';
  (r.rules || []).forEach(function(ru) {
    html += '<tr><td>' + ru.name + '</td><td>' + ru.cond + '</td><td>' + ru.action + '</td><td>' + ru.priority + '</td></tr>';
  });
  html += '</tbody></table></div></div>';

  openModal('评估详情 - '+r.name+' ('+r.id+')', html, { wide: true });

  setTimeout(function() {
    document.querySelectorAll('#detailTabs .detail-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('#detailTabs .detail-tab').forEach(function(t) { t.classList.remove('active'); });
        this.classList.add('active');
        document.querySelectorAll('.detail-tab-content').forEach(function(c) { c.classList.remove('active'); });
        document.getElementById(this.dataset.tab).classList.add('active');
      });
    });
  }, 50);
};

// ==================== 历史版本对比 ====================
window.openHistoryModal = function(code) {
  var r = evalData.find(function(d) { return d.id === code; }) || evalData[0];
  var html = '<p class="mb-3"><b>道路：</b>' + r.name + ' (' + r.id + ')</p>' +
    '<p class="text-sm text-[#00000073] mb-2">请选择两个版本后点击对比</p>' +
    '<div style="overflow-x:auto"><table class="ant-table"><thead><tr><th>版本</th><th>评估时间</th><th>综合得分</th><th>开放等级</th><th>选择</th></tr></thead><tbody>';
  historyVersions.forEach(function(v, i) {
    html += '<tr><td>' + v.ver + '</td><td>' + v.time + '</td><td>' + v.score + '</td><td>' + levelTag(v.level) + '</td><td>' +
      '<input type="radio" name="histA" ' + (i === 0 ? 'checked' : '') + ' style="margin-right:2px">A ' +
      '<input type="radio" name="histB" ' + (i === 1 ? 'checked' : '') + ' style="margin-left:6px">B</td></tr>';
  });
  html += '</tbody></table></div>' +
    '<div class="mt-3 flex justify-end"><button class="ant-btn ant-btn-primary" onclick="showDiff(\'' + r.id + '\')">对比差异</button></div>';
  openModal('历史版本对比 - ' + r.name, html, { wide: true });
};

window.showDiff = function(code) {
  var radiosA = document.querySelectorAll('input[name="histA"]');
  var radiosB = document.querySelectorAll('input[name="histB"]');
  var idxA = -1, idxB = -1;
  radiosA.forEach(function(r, i) { if (r.checked) idxA = i; });
  radiosB.forEach(function(r, i) { if (r.checked) idxB = i; });
  if (idxA < 0 || idxB < 0) return;
  if (idxA === idxB) { showToast('请选择两个不同的版本'); return; }
  var va = historyVersions[idxA], vb = historyVersions[idxB];
  var diffHtml = '<div style="overflow-x:auto"><table class="ant-table"><thead><tr><th>指标</th><th>版本A (' + va.ver + ')</th><th>版本B (' + vb.ver + ')</th><th>变化</th></tr></thead><tbody>' +
    '<tr><td>复杂度指数</td><td>' + va.complexity + '</td><td>' + vb.complexity + '</td><td style="color:' + (vb.complexity > va.complexity ? '#ff4d4f' : '#52c41a') + ';font-weight:600">' + (vb.complexity > va.complexity ? '↑' : '↓') + Math.abs(vb.complexity - va.complexity) + '</td></tr>' +
    '<tr><td>风险指数</td><td>' + va.risk + '</td><td>' + vb.risk + '</td><td style="color:' + (vb.risk > va.risk ? '#ff4d4f' : '#52c41a') + ';font-weight:600">' + (vb.risk > va.risk ? '↑' : '↓') + Math.abs(vb.risk - va.risk) + '</td></tr>' +
    '<tr><td>场景适配得分</td><td>' + va.sceneScore + '</td><td>' + vb.sceneScore + '</td><td style="color:' + (vb.sceneScore > va.sceneScore ? '#52c41a' : '#ff4d4f') + ';font-weight:600">' + (vb.sceneScore > va.sceneScore ? '↑' : '↓') + Math.abs(vb.sceneScore - va.sceneScore) + '</td></tr>' +
    '<tr><td>开放等级</td><td>' + va.level + '</td><td>' + vb.level + '</td><td>' + (va.level === vb.level ? '无变化' : '<span style="color:#ff4d4f;font-weight:600">' + va.level + ' → ' + vb.level + '</span>') + '</td></tr>' +
    '</tbody></table></div>';
  openModal('对比结果 - ' + va.ver + ' vs ' + vb.ver, diffHtml, { wide: true, footer: '<button class="ant-btn" onclick="closeModal()">关闭</button>' });
};

// ==================== Toast ====================
function showToast(msg) {
  var t = document.createElement('div');
  t.style.cssText = 'position:fixed;top:20px;right:20px;z-index:9999;background:#fff;padding:12px 20px;border-radius:6px;box-shadow:0 6px 16px rgba(0,0,0,0.1);font-size:13px;border-left:3px solid #1677ff;';
  t.textContent = '✅ ' + msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.style.opacity='0'; t.style.transition='0.3s'; setTimeout(function(){t.remove();},300); }, 2000);
}

// ==================== 初始化分页组件 ====================
pager = new Pagination({
  container: 'paginationBar',
  pageSize: 10,
  pageSizeOptions: [10, 20, 50, 100],
  onPageChange: function(page, size) {
    renderList();
  }
});

// ==================== 初始 ====================
renderList();
</script>
<script src="../../common.js"></script>
</body>
</html>
