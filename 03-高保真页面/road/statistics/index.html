<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>区域统计查询 - 智能网联汽车安全监测平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{DEFAULT:'#1677ff',hover:'#4096ff',disabled:'#85a5cc'}}}}}}</script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    html,body{margin:0;padding:0;overflow-x:hidden;font-family:"Microsoft YaHei",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .page-header h2{font-size:20px;font-weight:600;color:#000000d9;margin:0}
    .filter-bar{background:#fff;border-radius:8px;padding:16px 20px;margin-bottom:16px;display:flex;flex-wrap:wrap;align-items:flex-end;gap:14px;box-shadow:0 1px 2px rgba(0,0,0,.03);border:1px solid #f0f0f0}
    .filter-row{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;width:100%}
    .filter-item{display:flex;flex-direction:column;gap:5px;min-width:130px}
    .filter-item label{font-size:12px;font-weight:500;color:#00000073;white-space:nowrap}
    .ant-input{height:32px;padding:0 11px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;color:#000000d9;background:#fff;outline:none;min-width:160px}
    .ant-input:focus{border-color:#1677ff;box-shadow:0 0 0 2px rgba(22,119,255,.06)}
    .ant-select{height:32px;padding:0 28px 0 11px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;color:#000000d9;background:#fff;outline:none;min-width:130px;cursor:pointer;display:inline-flex;align-items:center;justify-content:space-between;position:relative}
    .ant-select:focus{border-color:#1677ff;box-shadow:0 0 0 2px rgba(22,119,255,.06)}
    .ant-select::after{content:'';width:10px;height:10px;border-right:1.5px solid #8c8c8c;border-bottom:1.5px solid #8c8c8c;transform:rotate(45deg);margin-top:-5px}
    .ant-btn{height:32px;padding:0 15px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:.2s;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;font-family:inherit;background:#fff;color:#333;border:1px solid #d9d9d9}
    .ant-btn:hover{color:#1677ff;border-color:#1677ff}
    .ant-btn-primary{background:#1677ff;color:#fff;border-color:#1677ff}
    .ant-btn-primary:hover{background:#4096ff;border-color:#4096ff;color:#fff}
    .ant-btn-link{background:transparent;color:#1677ff;border:none;padding:0;height:auto;cursor:pointer;font-weight:500;font-size:13px;text-decoration:none}
    .ant-btn-link:hover{color:#4096ff;text-decoration:underline}
    .stat-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;overflow:hidden}
    .stat-card{background:#fff;border-radius:8px;padding:18px 20px;box-shadow:0 1px 2px rgba(0,0,0,.03);border:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;transition:.2s;overflow:hidden}
    .stat-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
    .stat-card .icon-box{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;font-weight:700}
    .stat-card .info-box{display:flex;flex-direction:column;gap:2px;min-width:0;margin-left:auto;text-align:right}
    .stat-card .stat-value{font-size:26px;font-weight:700;line-height:1.2;letter-spacing:-.5px}
    .stat-card .stat-label{font-size:12px;color:#00000073;line-height:1.4}
    .stat-card .stat-sub{font-size:11px;color:#00000040}
    .card{background:#fff;border-radius:8px;padding:20px;box-shadow:0 1px 2px rgba(0,0,0,.03);border:1px solid #f0f0f0;margin-bottom:24px;overflow:hidden}
    .card-header{font-size:16px;font-weight:600;margin-bottom:16px;color:#000000d9}
    .chart-container{min-height:280px;width:100%;overflow:hidden}
    .row-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;overflow:hidden}
    .ant-table-wrapper{margin-top:0;overflow-x:hidden}
    .ant-table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
    .ant-table thead th{background:#fafafa;padding:12px 16px;text-align:left;font-weight:600;color:#00000073;border-bottom:1px solid #f0f0f0;font-size:13px;white-space:nowrap}
    .ant-table tbody td{padding:12px 16px;border-bottom:1px solid #f5f5f5;color:#000000d9}
    .ant-table tbody tr:hover{background:#fafafa}
    .ant-tag{display:inline-block;padding:2px 10px;border-radius:4px;font-size:12px;font-weight:500;white-space:nowrap;line-height:1.667}
    .ant-tag-success{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
    .ant-tag-warning{background:#fffbe6;color:#faad14;border:1px solid #ffe58f}
    .ant-tag-error{background:#fff2f0;color:#ff4d4f;border:1px solid #ffccc7}
    .ant-tag-processing{background:#e6f7ff;color:#1677ff;border:1px solid #91caff}
    .pagination-bar{display:flex;align-items:center;justify-content:flex-end;gap:10px;margin-top:16px;font-size:13px;color:#00000073;flex-wrap:wrap}
    .pagination-bar select{width:80px;height:30px;border:1px solid #d9d9d9;border-radius:4px}
    .modal-mask{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
    .modal-mask.show{display:flex}
    .modal{background:#fff;border-radius:8px;width:720px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 6px 16px rgba(0,0,0,.1)}
    .modal-header{padding:16px 24px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:15px;position:relative}
    .modal-body{padding:24px;overflow-y:auto;flex:1}
    .mini-stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
    .mini-stat{background:#fafafa;border-radius:6px;padding:16px;text-align:center}
    .mini-stat .ms-label{font-size:12px;color:#00000073;margin-bottom:6px}
    .mini-stat .ms-value{font-size:22px;font-weight:700}
    .ant-modal-close{position:absolute;top:14px;right:18px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;font-size:14px;color:#00000073;transition:all .2s;background:transparent;border:none}
    .ant-modal-close:hover{background:#f5f5f5;color:#000000d9}
    .ant-modal-footer{padding:12px 24px;border-top:1px solid #f0f0f0;display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
    .ant-modal-body .ant-table th,.ant-modal-body .ant-table td{text-align:center!important}
    @media (max-width:1200px){.stat-cards{grid-template-columns:repeat(2,1fr)}.row-2{grid-template-columns:1fr}.mini-stat-grid{grid-template-columns:repeat(2,1fr)}}

</head>
<body>
<div id="app" class="flex h-screen overflow-hidden">
  <aside id="sidebar"></aside>
  <div class="flex-1 flex flex-col overflow-hidden min-w-0">
    <header id="topnav"></header>
    <main class="flex-1 overflow-y-auto overflow-x-hidden bg-[#f0f2f5] p-6 min-w-0">
      <div class="mb-1 text-xl font-semibold tracking-wide">区域统计查询</div>
      <!-- <div class="mb-4 text-xs text-[#00000073]">行政区域、道路等级、道路类型、测试场景维度开放道路数量统计分析</div> -->

      <!-- 统计卡片 -->
      <div class="stat-cards">
        <div class="stat-card">
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="icon-box" style="background:#e6f4ff;color:#1677ff;">🛣</div>
            <div><div class="stat-value" style="color:#1677ff;">128</div><div class="stat-label">开放道路数</div></div>
          </div>
          <div class="info-box"><span class="stat-sub" style="color:#52c41a;">↑ 较上月 +12</span></div>
        </div>
        <div class="stat-card">
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="icon-box" style="background:#f6ffed;color:#52c41a;">✓</div>
            <div><div class="stat-value" style="color:#52c41a;">35</div><div class="stat-label">开放</div></div>
          </div>
          <div class="info-box"><span class="stat-sub" style="color:#52c41a;">↑ 较上月 +5</span></div>
        </div>
        <div class="stat-card">
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="icon-box" style="background:#e6f4ff;color:#1677ff;">⏸</div>
            <div><div class="stat-value" style="color:#1677ff;">48</div><div class="stat-label">暂停</div></div>
          </div>
          <div class="info-box"><span class="stat-sub" style="color:#ff4d4f;">↓ 较上月 -3</span></div>
        </div>
        <div class="stat-card">
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="icon-box" style="background:#fff7e6;color:#fa8c16;">✕</div>
            <div><div class="stat-value" style="color:#fa8c16;">45</div><div class="stat-label">关闭</div></div>
          </div>
          <div class="info-box"><span class="stat-sub" style="color:#ff4d4f;">↓ 较上月 -2</span></div>
        </div>
      </div>

      <!-- 筛选条件 -->
      <div class="filter-bar">
        <div class="filter-row">
          <div class="filter-item"><label>时间范围</label><div style="display:flex;gap:4px;align-items:center;"><input class="ant-input" type="date" value="2026-04-01" style="width:140px"><span class="mx-1 text-[#00000040]">~</span><input class="ant-input" type="date" value="2026-05-08" style="width:140px"></div></div>
          <div class="filter-item"><label>行政区域</label><div class="ant-select">全部区域</div></div>
          <div class="filter-item"><label>道路等级</label><select id="filterLevel" style="height:32px;padding:0 28px 0 11px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;color:#000000d9;background:#fff;outline:none;min-width:130px;cursor:pointer;"><option value="">全部等级</option><option>主干道</option><option>次干道</option><option>支路</option><option>快速路</option></select></div>
          <div class="filter-item"><label>开放等级</label><select id="filterStatus" style="height:32px;padding:0 28px 0 11px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;color:#000000d9;background:#fff;outline:none;min-width:130px;cursor:pointer;"><option value="">全部等级</option><option>开放</option><option>暂停</option><option>关闭</option></select></div>
          <div class="filter-item"><label>搜索关键词</label><input class="ant-input" placeholder="请输入搜索关键词" id="searchKeyword"></div>
          <div style="display:flex;gap:8px;align-items:end;">
            <button class="ant-btn ant-btn-primary" onclick="applyFilters()">查询</button>
            <button class="ant-btn" onclick="resetFilters()">重置</button>
          </div>
        </div>
      </div>

      <!-- 图表区域 -->
      <div class="row-2">
        <div class="card">
          <div class="card-header">各区域道路数量分布</div>
          <div class="chart-container" id="chartRegionDist"></div>
        </div>
        <div class="card">
          <div class="card-header">开放等级占比</div>
          <div class="chart-container" id="chartStatusPie"></div>
        </div>
      </div>

      <!-- 数据表格 -->
      <div class="card">
        <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;">
          <span>统计明细数据</span>
          <button class="ant-btn ant-btn-primary" onclick="exportData()">导出数据</button>
        </div>
        <div class="ant-table-wrapper">
          <table class="ant-table">
            <thead>
              <tr>
                <th style="width:10%;">行政区域</th>
                <th style="width:8%;">道路数量</th>
                <th style="width:8%;">开放</th>
                <th style="width:8%;">暂停</th>
                <th style="width:8%;">关闭</th>
                <th style="width:12%;">总里程(km)</th>
                <th style="width:10%;">RSU设备数</th>
                <th style="width:10%;text-align:center;">操作</th>
              </tr>
            </thead>
            <tbody id="regionTableBody"></tbody>
          </table>
        </div>
        <div class="pagination-bar">
          <span>每页显示</span>
          <select id="pageSizeSelect"><option value="10" selected>10</option><option value="20">20</option><option value="50">50</option></select>
          <span>条</span>
          <button class="ant-btn ant-btn-primary" id="prevBtn">上一页</button>
          <span id="pageNumbers"></span>
          <button class="ant-btn ant-btn-primary" id="nextBtn">下一页</button>
          <span>共 <b id="totalPage">1</b> 页</span>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- 详情模态窗 -->
<div class="modal-mask" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <span id="modalTitle">区域道路统计详情</span>
      <span class="ant-modal-close" onclick="closeDetailModal()">✕</span>
    </div>
    <div class="modal-body">
      <!-- 迷你统计卡片 -->
      <div class="mini-stat-grid" id="miniStats"></div>

      <!-- 道路明细列表标题 + 检索框 -->
      <div style="margin-bottom:16px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <div style="font-size:14px;font-weight:600;color:#000000d9;">道路明细列表</div>
          <div style="display:flex;gap:8px;align-items:center;">
            <input type="text" id="roadSearchInput" placeholder="输入道路名称检索..." style="width:200px;height:32px;padding:0 11px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;outline:none;" oninput="searchRoadList(this.value)">
            <button class="ant-btn ant-btn-primary" onclick="searchRoadList(document.getElementById('roadSearchInput').value)" style="height:32px;">搜索</button>
          </div>
        </div>

        <div class="ant-table-wrapper">
          <table class="ant-table" id="roadDetailTable">
            <thead>
              <tr>
                <th>道路名称</th>
                <th>开放等级</th>
                <th>道路类型</th>
                <th>里程(km)</th>
              </tr>
            </thead>
            <tbody id="roadDetailBody"></tbody>
          </table>
        </div>
        <div id="modalPaginationBar"></div>
      </div>
    </div>
    <div class="ant-modal-footer">
      <button class="ant-btn" onclick="closeDetailModal()">关闭</button>
      <button class="ant-btn ant-btn-primary" onclick="exportDetail()">导出详情</button>
    </div>
  </div>
</div>

<script src="../../components/pagination-component.js"></script>

        { name: '荆山路', status: '关闭', type: '支路', mileage: 2.3 },
        { name: '襄江路', status: '暂停', type: '支路', mileage: 1.9 },

        { name: '智慧路', status: '关闭', type: '支路', mileage: 0.6 }
      ]
    }
  ];

  let currentPage = 1;
  let pageSize = 10;
  let currentDetailRoads = [];
  let filteredRegionData = [...regionData];
  let modalPager = null;

  // ==================== 筛选逻辑 ====================
  window.applyFilters = function() {
    const district = document.getElementById('filterDistrict').value;
    const level = document.getElementById('filterLevel').value;
    const status = document.getElementById('filterStatus').value;
    const keyword = document.getElementById('searchKeyword').value.trim();

    filteredRegionData = regionData.filter(r => {
      if (district && r.district !== district) return false;
      return true;
    });

    currentPage = 1;
    renderTable();
    updateCharts();
  };

  window.resetFilters = function() {
    document.getElementById('filterDistrict').value = '';
    document.getElementById('filterLevel').value = '';
    document.getElementById('filterStatus').value = '';
    document.getElementById('searchKeyword').value = '';
    filteredRegionData = [...regionData];
    currentPage = 1;
    renderTable();
    updateCharts();
  };

  // ==================== 表格渲染 ====================
  function renderTable() {
    const tbody = document.getElementById('regionTableBody');
    const start = (currentPage - 1) * pageSize;
    const end = Math.min(start + pageSize, filteredRegionData.length);
    const pageData = filteredRegionData.slice(start, end);

    tbody.innerHTML = pageData.map(r => `
      <tr>
        <td><strong>${r.district}</strong></td>
        <td><strong>${r.total}</strong></td>
        <td><span class="ant-tag ant-tag-success">${r.open}</span></td>
        <td><span class="ant-tag ant-tag-processing">${r.suspended}</span></td>
        <td><span class="ant-tag ant-tag-warning">${r.closed}</span></td>
        <td>${r.mileage.toFixed(1)}</td>
        <td>${r.rsu}</td>
        <td style="text-align:center;"><a class="ant-btn-link" onclick="openDetail('${r.district}')" href="javascript:void(0);">查看详情</a></td>
      </tr>
    `).join('');

    const totalPages = Math.ceil(filteredRegionData.length / pageSize) || 1;
    document.getElementById('totalPage').textContent = totalPages;

    let pageHtml = '';
    for (let i = 1; i <= totalPages; i++) {
      pageHtml += `<button class="ant-btn ${i === currentPage ? 'ant-btn-primary' : ''}" onclick="goToPage(${i})" style="padding:0 10px;height:28px;font-size:12px;">${i}</button>`;
    }
    document.getElementById('pageNumbers').innerHTML = pageHtml;
  }

  window.goToPage = function(page) {
    currentPage = page;
    renderTable();
  };

  document.getElementById('prevBtn').addEventListener('click', function() {
    if (currentPage > 1) { currentPage--; renderTable(); }
  });
  document.getElementById('nextBtn').addEventListener('click', function() {
    const totalPages = Math.ceil(filteredRegionData.length / pageSize);
    if (currentPage < totalPages) { currentPage++; renderTable(); }
  });
  document.getElementById('pageSizeSelect').addEventListener('change', function() {
    pageSize = parseInt(this.value);
    currentPage = 1;
    renderTable();
  });

  // ==================== 详情模态窗 ====================
  window.openDetail = function(district) {
    var data = regionData.find(function(r) { return r.district === district; });
    if (!data) return;

    currentDetailRoads = data.roads.slice();

    document.getElementById('modalTitle').textContent = district + '道路统计详情';
    document.getElementById('miniStats').innerHTML =
      '<div class="mini-stat"><div class="ms-label">道路数量</div><div class="ms-value" style="color:#1677ff;">'+data.total+'</div></div>' +
      '<div class="mini-stat"><div class="ms-label">开放</div><div class="ms-value" style="color:#52c41a;">'+data.open+'</div></div>' +
      '<div class="mini-stat"><div class="ms-label">总里程(km)</div><div class="ms-value" style="color:#faad14;">'+data.mileage.toFixed(1)+'</div></div>' +
      '<div class="mini-stat"><div class="ms-label">RSU设备</div><div class="ms-value" style="color:#722ed1;">'+data.rsu+'</div></div>';
    document.getElementById('roadSearchInput').value = '';

    // 初始化或重置模态窗分页
    if (modalPager) {
      modalPager.destroy();
    }
    modalPager = new Pagination({
      container: 'modalPaginationBar',
      pageSize: 10,
      pageSizeOptions: [5, 10, 20],
      onPageChange: function() {
        renderModalRoadTable();
      }
    });
    renderModalRoadTable();
    document.getElementById('detailModal').classList.add('show');
  };

  window.closeDetailModal = function() {
    document.getElementById('detailModal').classList.remove('show');
    if (modalPager) { modalPager.destroy(); modalPager = null; }
  };

  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target === this) closeDetailModal();
  });

  window.searchRoadList = function(keyword) {
    if (!keyword || keyword.trim() === '') {
      currentDetailRoads = getCurrentRegionRoads();
    } else {
      var allRoads = getCurrentRegionRoads();
      currentDetailRoads = allRoads.filter(function(r) { return r.name.toLowerCase().includes(keyword.toLowerCase()); });
    }
    if (modalPager) modalPager.reset();
    renderModalRoadTable();
  };

  function getCurrentRegionRoads() {
    var title = document.getElementById('modalTitle').textContent || '';
    var district = title.replace('道路统计详情', '');
    var data = regionData.find(function(r) { return r.district === district; });
    return data ? data.roads.slice() : [];
  }

  function renderModalRoadTable() {
    var tbody = document.getElementById('roadDetailBody');
    var roads = currentDetailRoads || [];
    if (roads.length === 0) {
      if (modalPager) modalPager.setTotal(0);
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#999;padding:30px;">暂无匹配的道路数据</td></tr>';
      return;
    }

    if (modalPager) modalPager.setTotal(roads.length);
    var page = modalPager ? modalPager.getCurrentPage() : 1;
    var size = modalPager ? modalPager.getPageSize() : 10;
    var start = (page - 1) * size;
    var end = Math.min(start + size, roads.length);
    var pageData = roads.slice(start, end);

    tbody.innerHTML = pageData.map(function(r) {
      var tagClass = r.status === '开放' ? 'ant-tag-success' : r.status === '暂停' ? 'ant-tag-processing' : 'ant-tag-warning';
      return '<tr>' +
        '<td>' + r.name + '</td>' +
        '<td><span class="ant-tag ' + tagClass + '">' + r.status + '</span></td>' +
        '<td>' + r.type + '</td>' +
        '<td>' + r.mileage.toFixed(1) + '</td>' +
      '</tr>';
    }).join('');
  }

  window.exportDetail = function() {
    alert('已生成区域道路统计详情Excel报告');
  };

  window.exportData = function() {
    alert('已生成区域统计数据Excel报表');
  };

  // ==================== ECharts 图表 ====================
  const chartInstances = {};

  function initChart(id) {
    const dom = document.getElementById(id);
    if (!dom) return null;
    if (chartInstances[id]) chartInstances[id].dispose();
    const chart = echarts.init(dom);
    chartInstances[id] = chart;
    return chart;
  }

  function updateCharts() {
    // 各区域道路数量分布（横向柱状图）
    const chartRegionDist = initChart('chartRegionDist');
    if (chartRegionDist) {
      const districts = filteredRegionData.map(r => r.district);
      const totals = filteredRegionData.map(r => r.total);
      const opens = filteredRegionData.map(r => r.open);
      const suspendeds = filteredRegionData.map(r => r.suspended);
      const closeds = filteredRegionData.map(r => r.closed);

      chartRegionDist.setOption({
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
        legend: { bottom: 0, data: ['开放', '暂停', '关闭'] },
        grid: { left: 80, right: 20, top: 10, bottom: 36 },
        xAxis: { type: 'value', name: '道路数量' },
        yAxis: { type: 'category', data: districts, axisLabel: { fontSize: 12 } },
        series: [
          { name: '开放', type: 'bar', stack: 'total', data: opens, itemStyle: { color: '#52c41a', borderRadius: [0, 0, 0, 0] }, barWidth: 20 },
          { name: '暂停', type: 'bar', stack: 'total', data: suspendeds, itemStyle: { color: '#1677ff' } },
          { name: '关闭', type: 'bar', stack: 'total', data: closeds, itemStyle: { color: '#fa8c16', borderRadius: [4, 4, 0, 0] } }
        ]
      });
    }

    // 开放等级占比（饼图）
    const chartStatusPie = initChart('chartStatusPie');
    if (chartStatusPie) {
      let totalOpen = 0, totalSuspended = 0, totalClosed = 0;
      filteredRegionData.forEach(r => {
        totalOpen += r.open;
        totalSuspended += r.suspended;
        totalClosed += r.closed;
      });

      chartStatusPie.setOption({
        tooltip: { trigger: 'item', formatter: '{b}: {c}条 ({d}%)' },
        legend: { bottom: 0, textStyle: { fontSize: 12 } },
        series: [{
          type: 'pie',
          radius: ['45%', '72%'],
          center: ['50%', '46%'],
          itemStyle: { borderRadius: 6, borderColor: '#fff', borderWidth: 2 },
          label: { formatter: '{b}\n{d}%', fontSize: 11 },
          data: [
            { value: totalOpen, name: '开放', itemStyle: { color: '#52c41a' } },
            { value: totalSuspended, name: '暂停', itemStyle: { color: '#1677ff' } },
            { value: totalClosed, name: '关闭', itemStyle: { color: '#fa8c16' } }
          ],
        }],
      });
    }
  }

  function resizeAllCharts() {
    Object.values(chartInstances).forEach(c => { if (c && !c.isDisposed()) c.resize(); });
  }
  window.addEventListener('resize', function() {
    clearTimeout(window._resizeTimer);
    window._resizeTimer = setTimeout(resizeAllCharts, 200);
  });

  // ==================== 初始化 ====================
  renderTable();
  updateCharts();
})();
</script>
