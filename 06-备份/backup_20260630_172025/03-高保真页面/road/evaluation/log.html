<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>评估日志管理 - 智能网联汽车安全监测平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../components/pagination-component.js"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{DEFAULT:'#1677ff',hover:'#4096ff',disabled:'#85a5cc'}}}}}</script>
<style>
  .detail-tabs{display:flex;gap:0;border-bottom:1px solid #f0f0f0;margin-bottom:14px;flex-wrap:wrap}
  .detail-tab{padding:8px 16px;cursor:pointer;font-size:12px;font-weight:500;color:#666;border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none}
  .detail-tab:hover{color:#1677ff}
  .detail-tab.active{color:#1677ff;border-bottom-color:#1677ff}
  .detail-tab-content{display:none}
  .detail-tab-content.active{display:block}
  .info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px 16px}
  .info-grid>div{font-size:12px}
</style>
</head>
<body>
<div id="app" class="flex h-screen overflow-hidden">
  <aside id="sidebar"></aside>
  <div class="flex-1 flex flex-col overflow-hidden">
    <header id="topnav"></header>
    <main class="flex-1 overflow-auto bg-[#f0f2f5] p-6">
      <div class="page-header"><h2>评估日志管理</h2><div class="flex gap-2"><button class="ant-btn" onclick="handleExport()">导出</button></div></div>
      <p class="text-sm text-[#00000073] mb-4">记录每次评估的触发方式、操作人及结果快照</p>
      
      <div class="filter-bar">
        <div class="filter-row">
          <div class="filter-item"><label>道路名称/编号</label><input class="ant-input" placeholder="模糊匹配" id="filterRoad"></div>
          <div class="filter-item"><label>评估时间</label><input class="ant-input" type="date" id="filterDateFrom" style="width:130px"><span class="self-end mb-1">—</span><input class="ant-input" type="date" id="filterDateTo" style="width:130px"></div>
          <div class="filter-item"><label>触发方式</label><select class="ant-input" id="filterTrigger"><option>全部</option><option>自动</option><option>手动</option><option>自动-定期评估</option><option>自动-道路信息变更</option><option>自动-道路状态变更</option><option>手动-手动触发</option><option>手动-重新评估</option></select></div>
          <div class="flex gap-2 items-end"><button class="ant-btn ant-btn-primary" onclick="refreshList()">查询</button><button class="ant-btn" onclick="resetFilters()">重置</button></div>
        </div>
      </div>
      
      <div class="bg-white rounded-lg shadow-sm border border-[#f0f0f0]">
        <div class="px-4 py-3 border-b border-[#f0f0f0] flex justify-between items-center">
          <span class="font-medium">日志列表</span>
        </div>
        <div style="overflow-x:auto">
          <table class="ant-table">
            <thead><tr><th><input type="checkbox" class="ant-checkbox" id="selectAll" onclick="toggleSelectAll(this)"></th><th>日志ID</th><th>道路名称</th><th>评估时间</th><th>触发方式</th><th>操作人</th><th>综合得分</th><th>建议开放等级</th><th>操作</th></tr></thead>
            <tbody id="listBody"></tbody>
          </table>
        </div>
        <div class="flex items-center justify-between px-4 py-3 border-t border-[#f0f0f0]">
          <div id="paginationBar"></div>
        </div>
      </div>
    </main>
  </div>
</div>
<script>
const PAGE_ID='eval-log';

const roadNames = ['长虹路', '檀溪路', '航空路', '人民路', '建设路', '金源路', '中原路', '春园路', '前进路', '大庆东路', '汉江路', '襄阳大道', '环城南路', '邓城大道', '航天路'];

const triggerTypes = [
  '自动-定期评估',
  '自动-道路信息变更',
  '自动-道路状态变更',
  '手动-手动触发',
  '手动-重新评估'
];

const logData = [];
for (var i = 1; i <= 25; i++) {
  var month = 5 - Math.floor(Math.random() * 3);
  var day = Math.floor(Math.random() * 28) + 1;
  var trigger = triggerTypes[i % 5];
  var isAuto = trigger.indexOf('自动') === 0;
  logData.push({
    id: 'LOG-' + String(i).padStart(6, '0'),
    road: roadNames[i % roadNames.length],
    time: '2026-0' + month + '-' + String(day).padStart(2, '0') + (isAuto ? ' 02:00' : ' 14:30'),
    trigger: trigger,
    operator: isAuto ? '系统' : '管理员',
    score: (70 + Math.random() * 25).toFixed(1),
    level: ['完全开放', '条件开放', '限制开放', '禁止开放'][Math.floor(Math.random() * 4)]
  });
}

var pager;

function levelTag(lv) {
  var map = { '完全开放': 'ant-tag-success', '条件开放': 'ant-tag-warning', '限制开放': 'ant-tag-error', '禁止开放': 'ant-tag-default' };
  return '<span class="ant-tag ' + (map[lv] || 'ant-tag-processing') + '">' + lv + '</span>';
}

function getFilteredData() {
  var road = (document.getElementById('filterRoad').value || '').trim().toLowerCase();
  var dateFrom = document.getElementById('filterDateFrom').value;
  var dateTo = document.getElementById('filterDateTo').value;
  var trigger = document.getElementById('filterTrigger').value;
  
  return logData.filter(function(r) {
    if (road && !r.road.toLowerCase().includes(road) && !r.id.toLowerCase().includes(road)) return false;
    if (dateFrom && r.time.slice(0, 10) < dateFrom) return false;
    if (dateTo && r.time.slice(0, 10) > dateTo) return false;
    if (trigger !== '全部') {
      // 支持按大类筛选：自动/手动
      if (trigger === '自动' && r.trigger.indexOf('自动') !== 0) return false;
      if (trigger === '手动' && r.trigger.indexOf('手动') !== 0) return false;
      if (trigger !== '自动' && trigger !== '手动' && r.trigger !== trigger) return false;
    }
    return true;
  });
}

function renderList() {
  var filtered = getFilteredData();
  var total = filtered.length;
  var cp = pager?pager.getCurrentPage():1;
  var ps = pager?pager.getPageSize():10;
  var start = (cp - 1) * ps;
  var end = Math.min(start + ps, total);
  var pageData = filtered.slice(start, end);

  var html = '';
  if (pageData.length === 0) {
    html = '<tr><td colspan="9" style="text-align:center;padding:40px;color:#999;">暂无匹配日志</td></tr>';
  }
  pageData.forEach(function(r) {
    html += '<tr>' +
      '<td><input type="checkbox" class="ant-checkbox row-checkbox" data-id="' + r.id + '"></td>' +
      '<td>' + r.id + '</td>' +
      '<td><strong>' + r.road + '</strong></td>' +
      '<td>' + r.time + '</td>' +
      '<td>' + r.trigger + '</td>' +
      '<td>' + r.operator + '</td>' +
      '<td><strong style="color:' + (r.score >= 85 ? '#52c41a' : r.score >= 70 ? '#fa8c16' : r.score >= 50 ? '#1677ff' : '#ff4d4f') + '">' + r.score + '</strong></td>' +
      '<td>' + levelTag(r.level) + '</td>' +
      '<td><button class="ant-btn-link" onclick="openLogDetail(\'' + r.id + '\')">查看详情</button></td>' +
    '</tr>';
  });
  document.getElementById('listBody').innerHTML = html;
  if(pager) pager.setTotal(total);
}

window.refreshList = function() { if(pager) pager.reset(); pager = new Pagination({container:'paginationBar',pageSize:10,pageSizeOptions:[10,20,50,100],onPageChange:function(){renderList();},onPageSizeChange:function(){renderList();}});
renderList(); showToast('列表已刷新'); };
window.resetFilters = function() {
  document.getElementById('filterRoad').value = '';
  document.getElementById('filterDateFrom').value = '';
  document.getElementById('filterDateTo').value = '';
  var el = document.getElementById('filterTrigger');
  if (el) el.value = '全部';
  if(pager) pager.reset();
  pager = new Pagination({container:'paginationBar',pageSize:10,pageSizeOptions:[10,20,50,100],onPageChange:function(){renderList();},onPageSizeChange:function(){renderList();}});
renderList();
};

function getLogProcessData(l) {
  var n = parseInt(String(l.id).replace('LOG-', ''), 10) || 0;
  var levels = ['主干道', '次干道', '支路', '快速路'];
  var flowOptions = ['高', '中', '低'];
  var roadLevel = levels[n % 4];
  var laneCount = (n % 4) + 2;
  var length = ((n * 137) % 4000) + 800;
  var flowLevel = flowOptions[n % 3];
  var dataWindow = ((n % 3) + 6) + ' 个月';
  var base = parseFloat(l.score);
  var complexityScore = Math.min(100, Math.max(10, 100 - base * 0.6)).toFixed(1);
  var complexityLevel = complexityScore >= 70 ? '高' : (complexityScore >= 40 ? '中' : '低');
  var riskScore = Math.min(100, Math.max(5, base * 0.5)).toFixed(1);
  var riskLevel = riskScore >= 60 ? '高' : (riskScore >= 30 ? '中' : '低');
  var sceneScores = {
    '城区道路': (base * 0.90).toFixed(1),
    '园区道路': (base * 0.85 + 5).toFixed(1),
    '环卫作业': (base * 0.88 + 2).toFixed(1),
    '物流配送': (base * 0.87).toFixed(1),
    '公交运营': (base * 0.83 - 3).toFixed(1)
  };
  var rules = [];
  if (riskLevel === '高') {
    rules.push({ priority: 1, name: '高风险禁止开放', action: '禁止开放' });
  } else if (complexityLevel === '高' && riskLevel === '高') {
    rules.push({ priority: 2, name: '高复杂度+高风险', action: '限制开放' });
  } else if (complexityLevel === '中') {
    rules.push({ priority: 3, name: '中复杂度条件开放', action: '条件开放' });
  } else if (riskLevel === '中' && parseFloat(sceneScores['城区道路']) < 60) {
    rules.push({ priority: 4, name: '中风险且适配不足', action: '限制开放' });
  } else {
    rules.push({ priority: 5, name: '默认等级映射', action: l.level });
  }
  var exception = (n % 2 === 0)
    ? '信号灯覆盖率数据缺失，该指标按默认 60 分计算。'
    : '流量数据采用近 7 天均值，已按规则权重 0.10 参与计算。';
  var inputSummary = roadLevel + ' | ' + laneCount + ' 车道 | ' + length + ' m | 流量等级：' + flowLevel;
  return {
    n: n, roadLevel: roadLevel, laneCount: laneCount, length: length, flowLevel: flowLevel,
    dataWindow: dataWindow, inputSummary: inputSummary,
    complexityScore: complexityScore, complexityLevel: complexityLevel,
    riskScore: riskScore, riskLevel: riskLevel,
    sceneScores: sceneScores, rules: rules, exception: exception
  };
}

window.switchLogDetailTab = function(key, btn) {
  var tabs = document.querySelectorAll('#modal-mask .detail-tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  if (btn) btn.classList.add('active');
  var contents = document.querySelectorAll('#modal-mask .detail-tab-content');
  for (var j = 0; j < contents.length; j++) contents[j].classList.remove('active');
  var target = document.getElementById('logTab_' + key);
  if (target) target.classList.add('active');
};

window.openLogDetail = function(id) {
  var l = logData.find(function(lo) { return lo.id === id; }) || logData[0];
  var d = getLogProcessData(l);
  var scoreColor = l.score >= 85 ? '#52c41a' : l.score >= 70 ? '#fa8c16' : l.score >= 50 ? '#1677ff' : '#ff4d4f';
  function tag(text, type) {
    return '<span class="ant-tag ant-tag-' + type + '">' + text + '</span>';
  }
  var complexityTag = d.complexityLevel === '高' ? tag('高', 'error') : (d.complexityLevel === '中' ? tag('中', 'warning') : tag('低', 'success'));
  var riskTag = d.riskLevel === '高' ? tag('高', 'error') : (d.riskLevel === '中' ? tag('中', 'warning') : tag('低', 'success'));
  var sceneRows = Object.keys(d.sceneScores).map(function(name) {
    var sc = parseFloat(d.sceneScores[name]);
    var status = sc >= 60 ? '<span class="ant-tag ant-tag-success">适用</span>' : '<span class="ant-tag ant-tag-error">不适用</span>';
    return '<tr><td>' + name + '</td><td>' + status + '</td><td>' + sc.toFixed(1) + '</td><td>60</td></tr>';
  }).join('');
  var ruleRows = d.rules.map(function(r) {
    var actionTag = r.action === '禁止开放' ? tag('禁止开放', 'default')
      : r.action === '限制开放' ? tag('限制开放', 'warning')
      : r.action === '条件开放' ? tag('条件开放', 'processing')
      : tag(r.action, 'success');
    return '<tr><td>' + r.priority + '</td><td>' + r.name + '</td><td>' + actionTag + '</td></tr>';
  }).join('');

  var tab1 =
    '<h4 class="text-sm font-semibold text-[#000000d9] mb-3 pb-2 border-b border-[#f0f0f0]">基本信息</h4>' +
    '<div class="info-grid">' +
      '<div><span class="text-[#00000073]">日志 ID：</span><strong>' + l.id + '</strong></div>' +
      '<div><span class="text-[#00000073]">道路：</span><strong>' + l.road + '</strong></div>' +
      '<div><span class="text-[#00000073]">评估时间：</span>' + l.time + '</div>' +
      '<div><span class="text-[#00000073]">触发方式：</span>' + l.trigger + '</div>' +
      '<div><span class="text-[#00000073]">操作人：</span>' + (l.operator || '-') + '</div>' +
      '<div><span class="text-[#00000073]">数据时间窗口：</span>' + d.dataWindow + '</div>' +
    '</div>' +
    '<h4 class="text-sm font-semibold text-[#000000d9] mb-3 mt-4 pb-2 border-b border-[#f0f0f0]">输入数据</h4>' +
    '<div class="p-3 bg-[#fafafa] rounded text-xs">' +
      '<p><span class="text-[#00000073]">道路基础信息摘要：</span>' + d.inputSummary + '</p>' +
      '<p class="mt-1"><span class="text-[#00000073]">事故/流量数据来源：</span>事故数据来源于公安交通管理部门，流量数据来源于路侧感知设备统计</p>' +
    '</div>' +
    '<h4 class="text-sm font-semibold text-[#000000d9] mb-3 mt-4 pb-2 border-b border-[#f0f0f0]">指标评分明细</h4>' +
    '<div class="grid grid-cols-2 gap-3">' +
      '<div class="p-3 bg-[#fafafa] rounded">' +
        '<p class="text-xs font-semibold mb-2">复杂度指数 <strong style="color:' + (d.complexityScore >= 70 ? '#ff4d4f' : d.complexityScore >= 40 ? '#fa8c16' : '#52c41a') + '">' + d.complexityScore + '</strong> ' + complexityTag + '</p>' +
        '<ul class="text-xs space-y-1">' +
          '<li><span class="text-[#00000073]">车道复杂度：</span>' + (d.complexityScore * 0.25).toFixed(1) + '</li>' +
          '<li><span class="text-[#00000073]">交叉口密度：</span>' + (d.complexityScore * 0.25).toFixed(1) + '</li>' +
          '<li><span class="text-[#00000073]">混合交通比例：</span>' + (d.complexityScore * 0.20).toFixed(1) + '</li>' +
          '<li><span class="text-[#00000073]">坡度/曲率：</span>' + (d.complexityScore * 0.15).toFixed(1) + '</li>' +
          '<li><span class="text-[#00000073]">信号灯完整度：</span>' + (d.complexityScore * 0.15).toFixed(1) + '</li>' +
        '</ul>' +
      '</div>' +
      '<div class="p-3 bg-[#fafafa] rounded">' +
        '<p class="text-xs font-semibold mb-2">风险指数 <strong style="color:' + (d.riskScore >= 60 ? '#ff4d4f' : d.riskScore >= 30 ? '#fa8c16' : '#52c41a') + '">' + d.riskScore + '</strong> ' + riskTag + '</p>' +
        '<ul class="text-xs space-y-1">' +
          '<li><span class="text-[#00000073]">事故频率：</span>' + (d.riskScore * 0.35).toFixed(1) + '</li>' +
          '<li><span class="text-[#00000073]">事故严重度：</span>' + (d.riskScore * 0.35).toFixed(1) + '</li>' +
          '<li><span class="text-[#00000073]">交通事件频率：</span>' + (d.riskScore * 0.20).toFixed(1) + '</li>' +
          '<li><span class="text-[#00000073]">流量修正系数：</span>' + (d.riskScore * 0.10).toFixed(1) + '</li>' +
        '</ul>' +
      '</div>' +
    '</div>' +
    '<h4 class="text-sm font-semibold text-[#000000d9] mb-3 mt-4 pb-2 border-b border-[#f0f0f0]">场景适配评分</h4>' +
    '<table class="ant-table" style="width:auto"><thead><tr><th>场景</th><th>适配状态</th><th>适配度得分</th><th>适配阈值</th></tr></thead><tbody>' + sceneRows + '</tbody></table>' +
    '<h4 class="text-sm font-semibold text-[#000000d9] mb-3 mt-4 pb-2 border-b border-[#f0f0f0]">评估结果</h4>' +
    '<div class="info-grid">' +
      '<div><span class="text-[#00000073]">综合得分：</span><strong style="color:' + scoreColor + ';font-size:16px">' + l.score + '</strong></div>' +
      '<div><span class="text-[#00000073]">建议开放等级：</span>' + levelTag(l.level) + '</div>' +
      '<div><span class="text-[#00000073]">适用自动驾驶等级：</span>L3/L4</div>' +
      '<div><span class="text-[#00000073]">允许测试类型：</span>载货、环卫、物流</div>' +
      '<div><span class="text-[#00000073]">限制时段：</span>06:00-22:00</div>' +
      '<div></div>' +
    '</div>' +
    '<h4 class="text-sm font-semibold text-[#000000d9] mb-3 mt-4 pb-2 border-b border-[#f0f0f0]">命中规则</h4>' +
    '<table class="ant-table" style="width:auto"><thead><tr><th>优先级</th><th>规则名称</th><th>动作</th></tr></thead><tbody>' + ruleRows + '</tbody></table>' +
    '<p class="text-xs text-[#00000073] mt-1">详细规则条件请切换至「配置快照」Tab 查看。</p>' +
    '<h4 class="text-sm font-semibold text-[#000000d9] mb-3 mt-4 pb-2 border-b border-[#f0f0f0]">异常与干预说明</h4>' +
    '<div class="p-3 bg-[#fffbe6] rounded border border-[#ffe58f]">' +
      '<p class="text-xs text-[#00000073]">' + d.exception + '</p>' +
      '<p class="text-xs text-[#00000073] mt-1">本次评估无人工干预记录。</p>' +
    '</div>';

  var tab2 =
    '<div class="mt-2 space-y-3">' +
      '<div class="p-3 bg-[#fafafa] rounded">' +
        '<p class="text-xs font-semibold mb-2">复杂度模型权重</p>' +
        '<div class="grid grid-cols-5 gap-2 text-xs">' +
          '<div><span class="text-[#00000073]">车道复杂度：</span><strong>0.25</strong></div>' +
          '<div><span class="text-[#00000073]">交叉口密度：</span><strong>0.25</strong></div>' +
          '<div><span class="text-[#00000073]">混合交通比例：</span><strong>0.20</strong></div>' +
          '<div><span class="text-[#00000073]">坡度/曲率：</span><strong>0.15</strong></div>' +
          '<div><span class="text-[#00000073]">信号灯完整度：</span><strong>0.15</strong></div>' +
        '</div>' +
      '</div>' +
      '<div class="p-3 bg-[#fafafa] rounded">' +
        '<p class="text-xs font-semibold mb-2">风险模型权重</p>' +
        '<div class="grid grid-cols-4 gap-2 text-xs">' +
          '<div><span class="text-[#00000073]">事故频率：</span><strong>0.35</strong></div>' +
          '<div><span class="text-[#00000073]">事故严重度：</span><strong>0.35</strong></div>' +
          '<div><span class="text-[#00000073]">交通事件频率：</span><strong>0.20</strong></div>' +
          '<div><span class="text-[#00000073]">流量修正系数：</span><strong>0.10</strong></div>' +
        '</div>' +
        '<p class="text-xs mt-2"><span class="text-[#00000073]">统计窗口：</span><strong>24 个月</strong></p>' +
        '<p class="text-xs"><span class="text-[#00000073]">时间衰减权重：</span>近6个月=1.0 | 6-12个月=0.7 | 12-24个月=0.4 | >24个月=0.2</p>' +
      '</div>' +
      '<div class="p-3 bg-[#fafafa] rounded">' +
        '<p class="text-xs font-semibold mb-2">场景适配模型 - 各场景阈值</p>' +
        '<div class="grid grid-cols-2 gap-1 text-xs">' +
          '<div><span class="text-[#00000073]">城区道路：</span>最低4车道 | 禁混行 | 照明≥2 | 坡度≤8%</div>' +
          '<div><span class="text-[#00000073]">园区道路：</span>最低2车道 | 允许混行 | 照明≥1 | 坡度≤12%</div>' +
          '<div><span class="text-[#00000073]">环卫作业：</span>最低2车道 | 允许混行 | 照明≥1 | 坡度≤10%</div>' +
          '<div><span class="text-[#00000073]">物流配送：</span>最低2车道 | 禁混行 | 照明≥2 | 坡度≤8%</div>' +
          '<div><span class="text-[#00000073]">公交运营：</span>最低4车道 | 禁混行 | 照明≥3 | 坡度≤6%</div>' +
        '</div>' +
        '<p class="text-xs mt-1"><span class="text-[#00000073]">适配阈值：</span><strong>≥60 分</strong></p>' +
      '</div>' +
      '<div class="p-3 bg-[#fafafa] rounded">' +
        '<p class="text-xs font-semibold mb-2">硬性准入条件</p>' +
        '<div class="grid grid-cols-2 gap-1 text-xs">' +
          '<div><span class="text-[#00000073]">最小车道宽度：</span>≥ 3.0 m</div>' +
          '<div><span class="text-[#00000073]">最大坡度：</span>≤ 6%</div>' +
          '<div><span class="text-[#00000073]">交通信号覆盖率：</span>≥ 80%</div>' +
          '<div><span class="text-[#00000073]">视距不足路段占比：</span>&lt; 10%</div>' +
        '</div>' +
      '</div>' +
      '<div class="p-3 bg-[#fafafa] rounded">' +
        '<p class="text-xs font-semibold mb-2">融合规则列表</p>' +
        '<table class="ant-table" style="width:auto"><thead><tr><th>优先级</th><th>条件</th><th>动作</th><th>状态</th></tr></thead><tbody>' +

          '<tr><td>6</td><td>风险等级=高</td><td>禁止开放</td><td><span class="ant-tag ant-tag-success">启用</span></td></tr>' +

        '</tbody></table>' +
        '<p class="text-xs mt-1"><span class="text-[#00000073]">子模型融合权重：</span>复杂度0.33 | 风险0.34 | 场景适配0.33</p>' +
      '</div>' +
      '<div class="p-3 bg-[#fafafa] rounded">' +
        '<p class="text-xs font-semibold mb-2">映射关系表</p>' +
        '<table class="ant-table" style="width:auto"><thead><tr><th>开放等级</th><th>自动驾驶等级</th><th>测试类型</th><th>限制时段</th></tr></thead><tbody>' +
          '<tr><td>完全开放</td><td>L2/L3/L4</td><td>载人、载货、环卫、物流</td><td>无限制</td></tr>' +

      '</div>' +

  var body =
    '<div class="detail-tabs">' +
      '<button class="detail-tab active" data-tab="process" onclick="switchLogDetailTab(\'process\', this)">评估过程详情</button>' +

  openModal('日志详情 - ' + l.id, body, { width: 900, footer: '<button class="ant-btn" onclick="closeModal()">关闭</button>' });
};

function showToast(msg) {
  var t = document.createElement('div');
  t.style.cssText = 'position:fixed;top:20px;right:20px;z-index:9999;background:#fff;padding:12px 20px;border-radius:6px;box-shadow:0 6px 16px rgba(0,0,0,0.1);font-size:13px;border-left:3px solid #1677ff;';
  t.textContent = '✅ ' + msg;
  document.body.appendChild(t);
  setTimeout(function() { t.style.opacity = '0'; t.style.transition = '0.3s'; setTimeout(function() { t.remove(); }, 300); }, 2000);
}

window.toggleSelectAll = function(checkbox) {
  var checkboxes = document.querySelectorAll('.row-checkbox');
  for (var i = 0; i < checkboxes.length; i++) {
    checkboxes[i].checked = checkbox.checked;
  }
};

window.handleExport = function() {
  var selected = document.querySelectorAll('.row-checkbox:checked');
  var selectedIds = [];
  for (var i = 0; i < selected.length; i++) {
    selectedIds.push(selected[i].getAttribute('data-id'));
  }

  if (selectedIds.length > 0) {
    var today = new Date();
    var dateStr = today.getFullYear() + '' + String(today.getMonth() + 1).padStart(2, '0') + String(today.getDate()).padStart(2, '0');
    showToast('已导出 ' + selectedIds.length + ' 条数据，文件名：评估日志管理_' + dateStr + '.xlsx');
  } else {
    openConfirmModal('导出确认', '是否导出所有数据？', function() {
      var today = new Date();
      var dateStr = today.getFullYear() + '' + String(today.getMonth() + 1).padStart(2, '0') + String(today.getDate()).padStart(2, '0');
      var filtered = getFilteredData();
      showToast('已导出 ' + filtered.length + ' 条数据，文件名：评估日志管理_' + dateStr + '.xlsx');
    });
  }
};

function openConfirmModal(title, message, onConfirm) {
  var modal = document.createElement('div');
  modal.id = 'confirmModal';
  modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:1000;';
  modal.innerHTML = '<div class="bg-white rounded-lg shadow-lg" style="width:400px;padding:24px;">' +
    '<h3 class="text-lg font-semibold mb-4">' + title + '</h3>' +
    '<p class="text-sm text-[#00000073] mb-6">' + message + '</p>' +
    '<div class="flex justify-end gap-2">' +
      '<button class="ant-btn" onclick="closeConfirmModal()">取消</button>' +
      '<button class="ant-btn ant-btn-primary" id="confirmBtn">确定</button>' +
    '</div>' +
  '</div>';
  document.body.appendChild(modal);
  document.getElementById('confirmBtn').onclick = function() {
    closeConfirmModal();
    if (onConfirm) onConfirm();
  };
}

window.closeConfirmModal = function() {
  var modal = document.getElementById('confirmModal');
  if (modal) modal.remove();
};

pager = new Pagination({container:'paginationBar',pageSize:10,pageSizeOptions:[10,20,50,100],onPageChange:function(){renderList();},onPageSizeChange:function(){renderList();}});
renderList();
</script>
