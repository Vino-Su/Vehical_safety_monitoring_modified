<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>事故数据解析 - 智能网联汽车安全监测平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{DEFAULT:'#1677ff',hover:'#4096ff',disabled:'#85a5cc'}}}}}</script>
</head>
<body>
<div id="app" class="flex h-screen overflow-hidden">
  <aside id="sidebar"></aside>
  <div class="flex-1 flex flex-col overflow-hidden min-w-0">
    <header id="topnav"></header>
    <main class="flex-1 overflow-x-hidden overflow-y-auto bg-[#f0f2f5]" style="padding:24px">
      <div class="page-header">
        <h2>事故数据解析</h2>
        <button class="ant-btn ant-btn-primary" onclick="openUploadModal()">上传事故报告</button>
      </div>

      <div class="filter-bar">
        <div class="filter-row">
          <div class="filter-item"><label>事故编号</label><input class="ant-input" id="filterId" placeholder="请输入事故编号" style="width:160px"></div>
          <div class="filter-item"><label>涉事车辆</label><input class="ant-input" id="filterPlate" placeholder="车牌号/VIN" style="width:140px"></div>
          <div class="filter-item"><label>事故类型</label><select id="filterType" class="ant-input" style="width:120px"><option value="all">全部</option><option>碰撞</option><option>刮擦</option><option>追尾</option><option>行人冲突</option><option>侧翻</option></select></div>
          <div class="filter-item"><label>责任认定</label><select id="filterLiability" class="ant-input" style="width:100px"><option value="all">全部</option><option>全责</option><option>主责</option><option>同责</option><option>次责</option><option>无责</option></select></div>
          <div class="filter-item"><label>解析状态</label><select id="filterStatus" class="ant-input" style="width:110px"><option value="all">全部</option><option value="parsed">已解析</option><option value="corrected">已校正</option><option value="pending">待解析</option></select></div>
          <div class="flex gap-2 items-end"><button class="ant-btn ant-btn-primary" onclick="applyFilters()">查询</button><button class="ant-btn" onclick="resetFilters()">重置</button></div>
        </div>
      </div>

      <div class="card p-0">
        <div style="overflow-x:auto">
          <table class="ant-table">
            <thead><tr><th>事故编号</th><th>事故时间</th><th>事故地点</th><th>涉事车辆</th><th>事故类型</th><th>责任认定</th><th>伤亡情况</th><th>解析状态</th><th>操作</th></tr></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <div class="flex items-center justify-between px-4 py-3">
          <span class="text-sm text-[#00000073]">共 <b id="totalCount">0</b> 条</span>
          <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 text-sm text-[#00000073]">
              <span>每页显示</span>
              <select id="pageSizeSelect" class="ant-input" style="width:70px;height:28px;padding:0 4px;font-size:12px" onchange="pageSize=parseInt(this.value);currentPage=1;renderTable()">
                <option value="10" selected>10</option><option value="20">20</option><option value="50">50</option>
              </select>
              <span>条</span>
            </div>
            <div class="ant-pagination">
              <span class="page-item" onclick="currentPage>1&&currentPage--&&renderTable()">&lt;</span>
              <span class="page-item active" id="pageDisplay">1</span>
              <span class="page-item" onclick="currentPage<totalPages&&currentPage++&&renderTable()">&gt;</span>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="../../common.js"></script>

var filteredData=[];

  {id:'ACC-2026-0006',time:'2026-03-15 19:30:00',location:'卧龙大道与中原路交叉口',plate:'鄂F·A002',vin:'LSVAA4189N2000002',company:'A公司',autoLevel:'L3',driveMode:'自动驾驶',type:'侧翻',liability:'全责',injury:'重伤1人 轻伤1人',injuryDetail:{light:1,heavy:1,death:0},weather:'雨',light:'夜间',road:'积水',preSpeed:62,maxDecel:4.2,steer:'急转',brake:'未制动',throttle:35,status:'corrected',corrector:'王工',correctTime:'2026-03-16 10:15',envDesc:'夜间暴雨，路面积水严重，能见度极差',reportFile:'侧翻事故报告_20260315.pdf',photos:['现场照片1.jpg','现场照片2.jpg','现场照片3.jpg','现场照片4.jpg']},

function applyFilters(){
  var fId=document.getElementById('filterId').value.trim().toLowerCase();
  var fPlate=document.getElementById('filterPlate').value.trim().toLowerCase();
  var fType=document.getElementById('filterType').value;
  var fLiability=document.getElementById('filterLiability').value;
  var fStatus=document.getElementById('filterStatus').value;
  filteredData=accidentRecords.filter(function(r){
    if(fId&&r.id.toLowerCase().indexOf(fId)===-1)return false;
    if(fPlate&&r.plate.toLowerCase().indexOf(fPlate)===-1&&r.vin.toLowerCase().indexOf(fPlate)===-1)return false;
    if(fType!=='all'&&r.type!==fType)return false;
    if(fLiability!=='all'&&r.liability!==fLiability)return false;
    if(fStatus!=='all'&&r.status!==fStatus)return false;
    return true;
  });
  currentPage=1;
  renderTable();
}

function resetFilters(){
  document.getElementById('filterId').value='';
  document.getElementById('filterPlate').value='';
  document.getElementById('filterType').value='all';
  document.getElementById('filterLiability').value='all';
  document.getElementById('filterStatus').value='all';
  filteredData=[].concat(accidentRecords);
  currentPage=1;
  renderTable();
}

function statusTag(s){
  if(s==='corrected')return '<span class="ant-tag ant-tag-success">已校正</span>';
  if(s==='parsed')return '<span class="ant-tag ant-tag-processing">已解析</span>';
  return '<span class="ant-tag ant-tag-warning">待解析</span>';
}

function liabilityTag(l){
  if(l==='全责')return '<span class="ant-tag ant-tag-error">'+l+'</span>';
  if(l==='主责')return '<span class="ant-tag ant-tag-error">'+l+'</span>';
  if(l==='同责')return '<span class="ant-tag ant-tag-warning">'+l+'</span>';
  if(l==='次责')return '<span class="ant-tag ant-tag-processing">'+l+'</span>';
  if(l==='无责')return '<span class="ant-tag ant-tag-success">'+l+'</span>';
  return '<span class="ant-tag ant-tag-default">'+l+'</span>';
}

function typeTag(t){
  if(t==='碰撞'||t==='追尾'||t==='侧翻')return '<span class="ant-tag ant-tag-error">'+t+'</span>';
  if(t==='行人冲突')return '<span class="ant-tag ant-tag-warning">'+t+'</span>';
  return '<span class="ant-tag ant-tag-processing">'+t+'</span>';
}

function renderTable(){
  totalPages=Math.ceil(filteredData.length/pageSize)||1;
  var tbody=document.getElementById('tableBody');
  var start=(currentPage-1)*pageSize;
  var end=Math.min(start+pageSize,filteredData.length);
  var pageData=filteredData.slice(start,end);
  tbody.innerHTML=pageData.map(function(r){
    return '<tr>'+
      '<td><b>'+r.id+'</b></td>'+
      '<td>'+r.time+'</td>'+
      '<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+r.location+'</td>'+
      '<td>'+r.plate+'</td>'+
      '<td>'+typeTag(r.type)+'</td>'+
      '<td>'+liabilityTag(r.liability)+'</td>'+
      '<td>'+r.injury+'</td>'+
      '<td>'+statusTag(r.status)+'</td>'+
      '<td><div class="flex gap-1"><button class="ant-btn-link" onclick="openDetailModal(\''+r.id+'\')">详情</button>'+(r.status==='parsed'?'<button class="ant-btn-link" onclick="openCorrectModal(\''+r.id+'\')">校正</button>':'')+(r.status==='pending'?'<button class="ant-btn-link" onclick="startParse(\''+r.id+'\')">解析</button>':'')+'</div></td>'+
    '</tr>';
  }).join('');
  document.getElementById('totalCount').textContent=filteredData.length;
  document.getElementById('pageDisplay').textContent=currentPage;
}

function findRecord(id){return accidentRecords.find(function(r){return r.id===id})}

  }

  openModal('事故解析详情 - '+r.id,
    '<div style="margin-bottom:16px"><h4 style="font-size:14px;font-weight:600;color:#000000d9;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #f0f0f0">基本信息</h4>'+
      '<div class="ant-descriptions">'+
        '<div class="ant-descriptions-row"><div class="ant-descriptions-label">事故编号</div><div class="ant-descriptions-value">'+r.id+'</div><div class="ant-descriptions-label">事故时间</div><div class="ant-descriptions-value">'+r.time+'</div></div>'+
        '<div class="ant-descriptions-row"><div class="ant-descriptions-label">事故地点</div><div class="ant-descriptions-value" style="flex:3">'+r.location+'</div></div>'+

    '</div>'+

      '<div class="ant-descriptions">'+
        '<div class="ant-descriptions-row"><div class="ant-descriptions-label">号牌</div><div class="ant-descriptions-value">'+r.plate+'</div><div class="ant-descriptions-label">VIN</div><div class="ant-descriptions-value" style="font-family:monospace;font-size:12px">'+r.vin+'</div></div>'+
        '<div class="ant-descriptions-row"><div class="ant-descriptions-label">所属企业</div><div class="ant-descriptions-value">'+r.company+'</div><div class="ant-descriptions-label">自动驾驶等级</div><div class="ant-descriptions-value">'+r.autoLevel+'</div></div>'+
        '<div class="ant-descriptions-row"><div class="ant-descriptions-label">当时驾驶模式</div><div class="ant-descriptions-value">'+(r.driveMode==='自动驾驶'?'<span class="ant-tag ant-tag-processing">自动驾驶</span>':'<span class="ant-tag ant-tag-success">人工驾驶</span>')+'</div></div>'+
      '</div>'+

    '<div style="margin-bottom:16px"><h4 style="font-size:14px;font-weight:600;color:#000000d9;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #f0f0f0">运行数据（碰撞时刻前后30秒）</h4>'+
      '<div class="ant-descriptions">'+

        '<div class="ant-descriptions-row"><div class="ant-descriptions-label">转向状态</div><div class="ant-descriptions-value">'+r.steer+'</div><div class="ant-descriptions-label">制动状态</div><div class="ant-descriptions-value">'+r.brake+'</div></div>'+

      '</div>'+

    '<div style="margin-bottom:16px"><h4 style="font-size:14px;font-weight:600;color:#000000d9;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #f0f0f0">环境信息</h4>'+

      attachHtml+
    '</div>'+
    correctedInfo,
    {wide:true,footer:'<button class="ant-btn" onclick="closeModal()">关闭</button>'+(r.status==='parsed'?'<button class="ant-btn ant-btn-primary" onclick="closeModal();openCorrectModal(\''+r.id+'\')">校正</button>':'')});

function openCorrectModal(id){
  var r=findRecord(id);if(!r)return;
  openModal('人工校正 - '+r.id,

    '<div style="margin-bottom:16px"><h4 style="font-size:14px;font-weight:600;color:#000000d9;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #f0f0f0">基本信息</h4>'+

        '<div class="ant-form-item"><div class="ant-form-label">事故地点</div><div class="ant-form-control"><input class="ant-input" value="'+r.location+'"></div></div>'+
        '<div class="ant-form-item"><div class="ant-form-label">事故类型</div><div class="ant-form-control"><select class="ant-input"><option '+(r.type==='碰撞'?'selected':'')+'>碰撞</option><option '+(r.type==='刮擦'?'selected':'')+'>刮擦</option><option '+(r.type==='追尾'?'selected':'')+'>追尾</option><option '+(r.type==='行人冲突'?'selected':'')+'>行人冲突</option><option '+(r.type==='侧翻'?'selected':'')+'>侧翻</option></select></div></div>'+

function saveCorrection(id){
  var r=findRecord(id);if(!r)return;
  r.status='corrected';
  r.corrector='当前用户';
  r.correctTime=new Date().toISOString().replace('T',' ').substring(0,19);
  closeModal();
  showToast('校正保存成功，已记录校正人及校正时间');
  applyFilters();
}

function openUploadModal(){
  openModal('上传事故处置报告',
    '<div style="padding:12px 16px;background:#e6f4ff;border:1px solid #91caff;border-radius:6px;margin-bottom:16px;font-size:12px;color:#00000073"><span style="color:#1677ff;font-weight:600">流程说明</span>：上传事故处置报告后，系统将调用第三方OCR服务进行字段识别，并与车端碰撞时刻前后30秒数据关联，自动生成结构化事故报告。</div>'+
    '<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>选择事故处置报告</div><div class="ant-form-control">'+
      '<div id="uploadArea" style="border:2px dashed #d9d9d9;border-radius:8px;padding:32px 16px;text-align:center;cursor:pointer;transition:border-color .2s" onclick="document.getElementById(\'fileInput\').click()" onmouseover="this.style.borderColor=\'#1677ff\'" onmouseout="this.style.borderColor=\'#d9d9d9\'">'+
        '<div style="font-size:32px;margin-bottom:8px;color:#00000040">📄</div>'+
        '<p style="font-size:14px;color:#000000d9;margin-bottom:4px">点击或拖拽文件到此区域上传</p>'+
        '<p style="font-size:12px;color:#00000040">支持 PDF、JPG、PNG 格式，单文件不超过 20MB</p>'+
        '<div id="uploadedFileName" style="margin-top:8px;font-size:13px;color:#1677ff;display:none"></div>'+
      '</div>'+
      '<input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png" style="display:none" onchange="handleFileSelect(this)">'+
    '</div></div>'+
    '<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>关联车辆</div><div class="ant-form-control"><select class="ant-input" id="uploadVehicle"><option value="">请选择涉事车辆</option><option>鄂F·A001 - A公司</option><option>鄂F·B003 - B公司</option><option>鄂F·D010 - C公司</option><option>鄂F·C007 - D公司</option><option>鄂F·F012 - J公司</option><option>鄂F·G023 - C公司</option><option>鄂F·H034 - D公司</option></select></div></div>'+
    '<div class="ant-form-item"><div class="ant-form-label">现场照片（可选）</div><div class="ant-form-control">'+
      '<div id="photoArea" style="border:1px dashed #d9d9d9;border-radius:8px;padding:16px;text-align:center;cursor:pointer" onclick="document.getElementById(\'photoInput\').click()">'+
        '<span style="font-size:12px;color:#00000040">点击上传现场照片（支持JPG/PNG，最多5张）</span>'+
        '<div id="uploadedPhotos" style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap"></div>'+
      '</div>'+
      '<input type="file" id="photoInput" accept=".jpg,.jpeg,.png" multiple style="display:none" onchange="handlePhotoSelect(this)">'+
    '</div></div>'+
    '<div class="ant-form-item"><div class="ant-form-label">备注</div><div class="ant-form-control"><textarea class="ant-input" style="height:80px;padding:8px 12px;resize:vertical" placeholder="请输入补充说明（选填）"></textarea></div></div>'+
    '<div style="padding:10px 12px;background:#f5f5f5;border-radius:6px;font-size:12px;color:#00000073">'+
      '<div style="font-weight:600;color:#000000d9;margin-bottom:4px">OCR识别模板字段预览</div>'+
      '<div class="flex flex-wrap gap-2">'+
        '<span class="ant-tag ant-tag-processing">事故时间</span>'+
        '<span class="ant-tag ant-tag-processing">事故地点</span>'+
        '<span class="ant-tag ant-tag-processing">涉事车辆号牌</span>'+
        '<span class="ant-tag ant-tag-processing">事故类型</span>'+
        '<span class="ant-tag ant-tag-processing">责任认定</span>'+
        '<span class="ant-tag ant-tag-processing">伤亡情况</span>'+
        '<span class="ant-tag ant-tag-processing">天气/路面状况</span>'+
      '</div>'+
    '</div>',
    {wide:true,footer:'<button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn ant-btn-primary" onclick="submitUpload()">提交并开始解析</button>'});
}

function handleFileSelect(input){
  if(input.files&&input.files[0]){
    var name=input.files[0].name;
    var el=document.getElementById('uploadedFileName');
    el.textContent='已选择：'+name;
    el.style.display='block';
  }
}

function handlePhotoSelect(input){
  if(input.files){
    var container=document.getElementById('uploadedPhotos');
    container.innerHTML='';
    for(var i=0;i<Math.min(input.files.length,5);i++){
      container.innerHTML+='<div style="width:48px;height:48px;background:#f0f0f0;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#00000040">'+input.files[i].name.slice(0,4)+'</div>';
    }
  }
}

function submitUpload(){
  closeModal();
  showToast('报告已提交，OCR解析进行中...');
  setTimeout(function(){
    showToast('OCR解析完成，已生成结构化事故报告');
    applyFilters();
  },2000);
}

function startParse(id){
  showToast('正在调用OCR服务解析事故报告...');
  var r=findRecord(id);
  if(r){
    setTimeout(function(){
      r.status='parsed';
      showToast('解析完成，可查看详情或进行人工校正');
      applyFilters();
    },1500);
  }
}

function showToast(msg){
  var t=document.createElement('div');
  t.style.cssText='position:fixed;top:80px;right:24px;z-index:9999;background:#fff;padding:10px 16px;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.15);font-size:13px;border-left:3px solid #1677ff;';
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(function(){t.style.opacity='0';t.style.transition='0.3s';setTimeout(function(){t.remove()},300)},2000);
}

filteredData=[].concat(accidentRecords);
renderTable();
