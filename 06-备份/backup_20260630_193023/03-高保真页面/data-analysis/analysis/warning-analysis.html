<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>预警事件分析 - 智能网联汽车安全监测平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{DEFAULT:'#1677ff',hover:'#4096ff',disabled:'#85a5cc'}}}}}</script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    html,body{margin:0;padding:0;overflow-x:hidden;font-family:"Microsoft YaHei",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .stat-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
    .stat-card{background:#fff;border-radius:8px;padding:18px 20px;box-shadow:0 1px 2px rgba(0,0,0,.03);border:1px solid #f0f0f0;display:flex;flex-direction:column;gap:6px;transition:.2s}
    .stat-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);transform:translateY(-1px)}
    .stat-card .stat-label{font-size:12px;color:#00000073;text-transform:uppercase;letter-spacing:.5px;font-weight:500}
    .stat-card .stat-value{font-size:28px;font-weight:700;color:#000000d9;letter-spacing:-.5px}
    .stat-card .stat-sub{font-size:11px;color:#00000073}
    .card{background:#fff;border-radius:8px;padding:20px;box-shadow:0 1px 2px rgba(0,0,0,.03);border:1px solid #f0f0f0;margin-bottom:24px;overflow:hidden}
    .card-header{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;color:#000000d9}
    .chart-container{min-height:300px;width:100%;overflow:hidden}
    .map-container{height:420px;border-radius:6px;overflow:hidden}
    .map-container .leaflet-container{z-index:1}
    .row-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;overflow:hidden}
    .row-1{display:grid;grid-template-columns:1fr;gap:16px;overflow:hidden}
    .table-wrap{margin-top:8px;overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
    th{background:#fafafa;padding:14px 16px;text-align:left;font-weight:600;color:#00000073;border-bottom:1px solid #f0f0f0;white-space:nowrap;font-size:13px;height:48px;overflow:hidden;text-overflow:ellipsis}
    td{padding:14px 16px;border-bottom:1px solid #f5f5f5;color:#000000d9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;height:48px}
    tbody tr{transition:.2s;cursor:pointer}
    tbody tr:hover{background:#fafafa}
    .tag{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:500;white-space:nowrap}
    .tag-red{background:#fff1f0;color:#cf1322}
    .tag-orange{background:#fff7e6;color:#d46b08}
    .tag-green{background:#f6ffed;color:#389e0d}
    .tag-blue{background:#e6f7ff;color:#096dd9}
    .tag-purple{background:#f9f0ff;color:#722ed1}
    .tag-cyan{background:#e6fffb;color:#08979c}
    .pagination-bar{display:flex;align-items:center;justify-content:flex-end;gap:10px;margin-top:14px;font-size:13px;color:#00000073;flex-wrap:wrap}
    .pagination-bar select{width:80px;height:30px}
    .pagination-bar .page-info{font-weight:500}
    .pagination-bar .btn-sm{height:30px}
    .modal-mask{display:none!important;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
    .modal-mask.show{display:flex!important}
    .modal{background:#fff;border-radius:8px;width:800px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 6px 16px rgba(0,0,0,.1)}
    .modal-header{padding:16px 24px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:15px}
    .modal-body{padding:20px 24px;overflow-y:auto;flex:1;font-size:13px;line-height:2}
    .modal-body .detail-row{display:grid;grid-template-columns:1fr 1fr;gap:8px 20px}
    .modal-body .detail-row .dl{color:#00000040;font-size:11px}
    .modal-body .detail-row .dv{font-weight:500;color:#000000d9}
    @media (max-width:768px){.stat-cards{grid-template-columns:1fr}.row-2{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div id="app" class="flex h-screen overflow-hidden">
  <aside id="sidebar"></aside>
  <div class="flex-1 flex flex-col overflow-hidden min-w-0">
    <header id="topnav"></header>
    <main class="flex-1 overflow-y-auto overflow-x-hidden bg-[#f0f2f5] p-6 min-w-0">
      <div class="page-header"><h2>预警事件分析</h2></div>

      <div class="filter-bar">
        <div class="filter-row">
          <div class="filter-item"><label>开始日期</label><input class="ant-input" type="date" id="startDate" value="2026-04-01" style="width:140px"></div>
          <div class="filter-item"><label>结束日期</label><input class="ant-input" type="date" id="endDate" value="2026-05-08" style="width:140px"></div>
          <div class="filter-item"><label>事件类型</label><select class="ant-input" id="filterType" style="width:140px"><option value="all">全部</option><option>碰撞预警</option><option>车道偏离预警</option><option>行人碰撞预警</option><option>交通标识预警</option><option>前车碰撞预警</option></select></div>
          <div class="filter-item"><label>行政区域</label><select class="ant-input" id="filterDistrict" style="width:110px"><option value="all">全部</option><option>樊城区</option><option>襄城区</option><option>襄州区</option><option>南漳县</option><option>谷城县</option></select></div>
          <div class="flex gap-2 items-end"><button class="ant-btn ant-btn-primary" onclick="applyFilters()">查询</button><button class="ant-btn" onclick="showToast('导出功能开发中','#1677ff')">导出</button></div>
        </div>
      </div>

      <!-- 统计卡片 -->
      <div class="stat-cards">
        <div class="stat-card" style="border-left:3px solid #ff4d4f;">
          <span class="stat-label">预警事件总数</span>
          <span class="stat-value" style="color:#ff4d4f;" id="totalEvents">1,852</span>
          <span class="stat-sub">统计周期内累计</span>
        </div>
        <div class="stat-card" style="border-left:3px solid #fa8c16;">
          <span class="stat-label">未处理事件</span>
          <span class="stat-value" style="color:#fa8c16;" id="unhandledEvents">156</span>
          <span class="stat-sub" id="unhandledRate">占比 8.4%</span>
        </div>
        <div class="stat-card" style="border-left:3px solid #1677ff;">
          <span class="stat-label">关联事故数</span>
          <span class="stat-value" style="color:#1677ff;" id="linkedAccidents">48</span>
          <span class="stat-sub" id="conversionRate">预警→事故转化率 2.6%</span>
        </div>
        <div class="stat-card" style="border-left:3px solid #52c41a;">
          <span class="stat-label">平均响应时间</span>
          <span class="stat-value" style="color:#52c41a;">2.3<span style="font-size:14px;font-weight:500;">s</span></span>
          <span class="stat-sub">系统预警延迟</span>
        </div>
      </div>

      <!-- 图表区域 -->
      <div class="row-2">
        <div class="card">
          <div class="card-header">预警事件趋势</div>
          <div class="chart-container" id="chartTrend"></div>
        </div>
        <div class="card">
          <div class="card-header">事件类型分布</div>
          <div class="chart-container" id="chartTypePie"></div>
        </div>
      </div>

      <!-- 热点地图 -->
      <div class="row-1">
        <div class="card">
          <div class="card-header">预警事件热点地图</div>
          <div id="hotspotMap" class="map-container"></div>
        </div>
      </div>

      <!-- 事件列表 -->
      <div class="card">
        <div class="card-header">预警事件列表</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>事件编号</th>
                <th>时间</th>
                <th>事件类型</th>
                <th>车牌号</th>
                <th>VIN码</th>
                <th>所属企业</th>
                <th>地点</th>
                <th>关联事故</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="eventTableBody"></tbody>
          </table>
        </div>
        <div class="pagination-bar">
          <span>共 <b id="totalCount">1852</b> 条</span>
          <select id="pageSizeSelect">
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
          <span>条/页</span>
          <button class="btn btn-sm btn-outline" id="prevBtn">上一页</button>
          <span class="page-info">第 <b id="currPage">1</b> / <b id="totalPage">186</b> 页</span>
          <button class="btn btn-sm btn-outline" id="nextBtn">下一页</button>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- 详情弹窗 -->
<div class="modal-mask" id="modalMask">
  <div class="modal">
    <div class="modal-header">
      <span id="modalTitle">预警事件详情</span>
      <button class="btn btn-sm btn-outline" onclick="closeModal()">✕ 关闭</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
const PAGE_ID = 'warning-analysis';

(function() {
  // ==================== 模拟数据 ====================
  const eventTypes = ['碰撞预警', '车道偏离预警', '行人碰撞预警', '交通标识预警', '前车碰撞预警'];
  const companies = ['A公司', 'Q公司', 'R公司', 'B公司', 'C公司', 'I公司', 'J公司', 'P公司', 'G公司'];
  const districts = ['樊城区', '襄城区', '襄州区', '南漳县', '谷城县'];
  const plates = [
    '鄂F·A1234', '鄂F·B5678', '鄂F·C3456', '鄂F·D7890', '鄂F·E9012',
    '鄂F·F4567', '鄂F·G8901', '鄂F·H2345', '鄂F·I6789', '鄂F·J0123',
    '鄂F·K3456', '鄂F·L7890', '鄂F·M1234', '鄂F·N5678', '鄂F·O9012'
  ];
  const vins = [
    'LSVAA4189N2000001', 'LSVAA4189N2000002', 'LSVAA4189N2000003',
    'LSVAA4189N2000004', 'LSVAA4189N2000005', 'LSVAA4189N2000006',
    'LSVAA4189N2000007', 'LSVAA4189N2000008', 'LSVAA4189N2000009',
    'LSVAA4189N2000010', 'LSVAA4189N2000011', 'LSVAA4189N2000012',
    'LSVAA4189N2000013', 'LSVAA4189N2000014', 'LSVAA4189N2000015'
  ];
  const locations = [
    '长虹路与建华路交叉口', '檀溪路与铁佛寺路交叉口', '航空路与金富士路交叉口',
    '人民路天元四季城前', '建设路与银城大道交叉口', '金源路中段',
    '卧龙大道与中原路交叉口', '大庆路与人民路交叉口', '环城南路与檀溪路交叉口',
    '前进路与长征路交叉口'
  ];

  function randomEl(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function generateEvents(count) {
    const arr = [];
    for (let i = 0; i < count; i++) {
      const date = new Date(2026, 3, 1);
      date.setDate(date.getDate() + Math.floor(Math.random() * 38));
      date.setHours(Math.floor(Math.random() * 24), Math.floor(Math.random() * 60), Math.floor(Math.random() * 60));
      const type = randomEl(eventTypes);
      const plateIdx = Math.floor(Math.random() * plates.length);
      const hasAccident = Math.random() < 0.06;
      arr.push({
        id: 'EVT-2026-' + String(i + 1).padStart(5, '0'),
        time: date.toISOString().replace('T', ' ').substring(0, 19),
        type: type,
        plate: plates[plateIdx],
        vin: vins[plateIdx],
        company: randomEl(companies),
        location: randomEl(locations),
        district: randomEl(districts),
        accidentId: hasAccident ? 'ACC-2026-' + String(Math.floor(Math.random() * 200) + 1).padStart(4, '0') : '-',
      });
    }
    arr.sort((a, b) => b.time.localeCompare(a.time));
    return arr;
  }

  const allEvents = generateEvents(1852);
  let currentPage = 1;
  let pageSize = 10;
  let filteredEvents = [...allEvents];

  // ==================== 筛选逻辑 ====================
  window.applyFilters = function() {
    const type = document.getElementById('filterType').value;
    const district = document.getElementById('filterDistrict').value;
    filteredEvents = allEvents.filter(e => {
      if (type !== 'all' && e.type !== type) return false;
      if (district !== 'all' && e.district !== district) return false;
      return true;
    });
    updateStats();
    currentPage = 1;
    renderTable(1);
    updateCharts();
  };

  function updateStats() {
    const total = filteredEvents.length;
    const linked = filteredEvents.filter(e => e.accidentId !== '-').length;
    const rate = total > 0 ? (linked / total * 100).toFixed(1) : '0.0';
    document.getElementById('totalEvents').textContent = total.toLocaleString();
    document.getElementById('linkedAccidents').textContent = linked;
    document.getElementById('conversionRate').textContent = '预警→事故转化率 ' + rate + '%';
  }

  // ==================== 表格渲染 ====================
  function renderTable(page) {
    const tbody = document.getElementById('eventTableBody');
    const start = (page - 1) * pageSize;
    const end = Math.min(start + pageSize, filteredEvents.length);
    const pageData = filteredEvents.slice(start, end);

    tbody.innerHTML = pageData.map(e => {
      const typeTag = e.type === '碰撞预警' ? 'tag-red' : e.type === '车道偏离预警' ? 'tag-orange' : e.type === '行人碰撞预警' ? 'tag-purple' : e.type === '前车碰撞预警' ? 'tag-cyan' : 'tag-blue';
      return `<tr onclick="openDetail('${e.id}')" style="cursor:pointer;">
        <td><strong>${e.id}</strong></td>
        <td>${e.time}</td>
        <td><span class="tag ${typeTag}">${e.type}</span></td>
        <td>${e.plate}</td>
        <td style="font-family:monospace;font-size:11px;">${e.vin}</td>
        <td>${e.company}</td>
        <td>${e.location}</td>
        <td>${e.accidentId !== '-' ? '<a href="#" onclick="event.stopPropagation();" class="btn-link">' + e.accidentId + '</a>' : '-'}</td>
        <td><button class="btn-link btn-sm" onclick="event.stopPropagation();openDetail('${e.id}')">详情</button></td>
      </tr>`;
    }).join('');

    document.getElementById('totalCount').textContent = filteredEvents.length;
    document.getElementById('currPage').textContent = page;
    document.getElementById('totalPage').textContent = Math.ceil(filteredEvents.length / pageSize) || 1;
  }

  document.getElementById('prevBtn').addEventListener('click', function() {
    if (currentPage > 1) { currentPage--; renderTable(currentPage); }
  });
  document.getElementById('nextBtn').addEventListener('click', function() {
    const totalPages = Math.ceil(filteredEvents.length / pageSize);
    if (currentPage < totalPages) { currentPage++; renderTable(currentPage); }
  });
  document.getElementById('pageSizeSelect').addEventListener('change', function() {
    pageSize = parseInt(this.value);
    currentPage = 1;
    renderTable(currentPage);
  });

  // ==================== 详情弹窗 ====================
  window.openDetail = function(id) {
    const evt = filteredEvents.find(e => e.id === id) || filteredEvents[0];
    const typeTag = evt.type === '碰撞预警' ? 'tag-red' : evt.type === '车道偏离预警' ? 'tag-orange' : evt.type === '行人碰撞预警' ? 'tag-purple' : evt.type === '前车碰撞预警' ? 'tag-cyan' : 'tag-blue';
    const html = `
      <div class="detail-row">
        <div><span class="dl">事件编号</span><br><span class="dv">${evt.id}</span></div>
        <div><span class="dl">时间</span><br><span class="dv">${evt.time}</span></div>
        <div><span class="dl">事件类型</span><br><span class="tag ${typeTag}">${evt.type}</span></div>
        <div><span class="dl">车牌号</span><br><span class="dv">${evt.plate}</span></div>
        <div><span class="dl">VIN码</span><br><span class="dv" style="font-family:monospace;">${evt.vin}</span></div>
        <div><span class="dl">所属企业</span><br><span class="dv">${evt.company}</span></div>
        <div><span class="dl">地点</span><br><span class="dv">${evt.location}</span></div>
        <div><span class="dl">关联事故</span><br><span class="dv">${evt.accidentId !== '-' ? evt.accidentId : '无'}</span></div>
      </div>
      <hr style="margin:14px 0;border-color:#f0f0f0;">
      <p style="font-weight:600;">关联车辆近期预警</p>
      <p>该车辆近7天共触发预警 <b>${Math.floor(Math.random()*8+2)}</b> 次，其中碰撞预警 ${Math.floor(Math.random()*3+1)} 次。</p>
    `;
    document.getElementById('modalTitle').textContent = '预警事件详情 - ' + evt.id;
    document.getElementById('modalBody').innerHTML = html;
    document.getElementById('modalMask').style.setProperty('display','flex','important');
  };

  window.closeModal = function() { document.getElementById('modalMask').style.setProperty('display','none','important'); };
  document.getElementById('modalMask').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ==================== ECharts 图表 ====================
  const chartInstances = {};

  function initChart(id) {
    const dom = document.getElementById(id);
    if (!dom) return null;
    if (chartInstances[id]) chartInstances[id].dispose();
    const chart = echarts.init(dom);
    chartInstances[id] = chart;
    return chart;
  }

  function updateCharts() {
    // 预警事件趋势
    const chartTrend = initChart('chartTrend');
    if (chartTrend) {
      const trendDays = [];
      const trendData = [];
      for (let i = 29; i >= 0; i--) {
        const d = new Date(2026, 4, 8);
        d.setDate(d.getDate() - i);
        trendDays.push((d.getMonth() + 1) + '/' + d.getDate());
        trendData.push(Math.floor(40 + Math.random() * 40));
      }
      chartTrend.setOption({
        tooltip: { trigger: 'axis' },
        grid: { left: 50, right: 20, top: 10, bottom: 35 },
        xAxis: { type: 'category', data: trendDays, axisLabel: { rotate: 0, fontSize: 9, interval: Math.floor(trendDays.length / 8) } },
        yAxis: { type: 'value', name: '事件数' },
        series: [{
          type: 'line',
          data: trendData,
          smooth: true,
          lineStyle: { color: '#fa8c16', width: 2 },
          areaStyle: { color: 'rgba(250,140,22,0.12)' },
          itemStyle: { color: '#fa8c16' },
        }],
      });
    }

    // 事件类型分布饼图
    const chartTypePie = initChart('chartTypePie');
    if (chartTypePie) {
      const typeData = {};
      filteredEvents.forEach(e => { typeData[e.type] = (typeData[e.type] || 0) + 1; });
      const typeColors = { '碰撞预警': '#f5222d', '车道偏离预警': '#fa8c16', '行人碰撞预警': '#722ed1', '交通标识预警': '#1677ff', '前车碰撞预警': '#13c2c2' };
      const pieData = Object.entries(typeData).map(([k, v]) => ({ value: v, name: k, itemStyle: { color: typeColors[k] || '#666' } }));
      chartTypePie.setOption({
        tooltip: { trigger: 'item', formatter: '{b}: {c} 起 ({d}%)' },
        legend: { bottom: 0, textStyle: { fontSize: 11 } },
        series: [{
          type: 'pie',
          radius: ['50%', '75%'],
          center: ['50%', '46%'],
          itemStyle: { borderRadius: 5, borderColor: '#fff', borderWidth: 2 },
          label: { formatter: '{b}\n{d}%', fontSize: 10 },
          data: pieData,
        }],
      });
    }
  }

  // ==================== Leaflet 热点地图 ====================
  let hotspotMap;
  let mapInitialized = false;

  function initHotspotMap() {
    if (mapInitialized) return;
    const container = document.getElementById('hotspotMap');
    if (!container || container._leaflet_id) return;
    try {
      hotspotMap = L.map(container).setView([32.02, 112.12], 12);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 18 }).addTo(hotspotMap);
      const typeColor = { '碰撞预警': '#f5222d', '车道偏离预警': '#fa8c16', '行人碰撞预警': '#722ed1', '交通标识预警': '#1677ff', '前车碰撞预警': '#13c2c2' };
      for (let i = 0; i < 150; i++) {
        const lat = 31.76 + Math.random() * 0.35;
        const lng = 111.70 + Math.random() * 0.55;
        const type = randomEl(eventTypes);
        L.circleMarker([lat, lng], {
          radius: 4 + Math.random() * 4,
          fillColor: typeColor[type],
          color: '#fff',
          weight: 1,
          fillOpacity: 0.7,
        }).addTo(hotspotMap).bindPopup('<b>' + type + '</b><br/>地点：' + randomEl(locations));
      }
      mapInitialized = true;
      setTimeout(function() { if (hotspotMap) hotspotMap.invalidateSize(); }, 300);
    } catch (e) {}
  }

  function resizeAllCharts() {
    Object.values(chartInstances).forEach(c => { if (c && !c.isDisposed()) c.resize(); });
    if (hotspotMap) hotspotMap.invalidateSize();
  }
  window.addEventListener('resize', function() {
    clearTimeout(window._resizeTimer);
    window._resizeTimer = setTimeout(resizeAllCharts, 200);
  });

  // ==================== 初始化 ====================
  renderTable(1);
  updateStats();
  updateCharts();
  initHotspotMap();
})();
</script>
<script src="../../common.js"></script>
</body>
</html>
