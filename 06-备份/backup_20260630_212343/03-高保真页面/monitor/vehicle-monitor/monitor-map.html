<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>监控一张图 - 智能网联汽车安全监测平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{DEFAULT:'#1677ff',hover:'#4096ff',disabled:'#85a5cc'}}}}}</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/AMap.JSAPI.Driving/1.4.4/AMap.Driving.min.css">
  <style>
    .amap-logo,.amap-copyright{display:none!important}
    .layer-switch{position:relative;display:inline-block;width:36px;height:20px}
    .layer-switch input{opacity:0;width:0;height:0}
    .layer-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#d9d9d9;border-radius:20px;transition:.3s}
    .layer-slider:before{content:"";position:absolute;height:16px;width:16px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.3s}
    .layer-switch input:checked+.layer-slider{background:#1677ff}
    .layer-switch input:checked+.layer-slider:before{transform:translateX(16px)}
    .vehicle-marker{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.3);cursor:pointer;border:2px solid #fff;transition:transform .2s}
    .vehicle-marker:hover{transform:scale(1.2)}
    .vehicle-marker.auto{background:#1677ff}
    .vehicle-marker.manual{background:#52c41a}
    .vehicle-marker.testing{background:#722ed1}
    .vehicle-marker.alarm{background:#ff4d4f;animation:pulse-alarm 1s infinite}
    .vehicle-marker.offline{background:#d9d9d9;color:#999}
    @keyframes pulse-alarm{0%,100%{box-shadow:0 0 0 0 rgba(255,77,79,.4)}50%{box-shadow:0 0 0 8px rgba(255,77,79,0)}}
    .alarm-badge{position:absolute;top:-6px;right:-6px;min-width:16px;height:16px;line-height:16px;text-align:center;background:#ff4d4f;color:#fff;font-size:10px;border-radius:8px;padding:0 4px;font-weight:600}
    .accident-marker{width:28px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);background:#fadb14}
    .info-window{background:#fff;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.15);padding:16px;min-width:280px;max-width:360px;font-size:13px}
    .info-window .iw-title{font-size:14px;font-weight:600;color:#000000d9;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #f0f0f0}
    .info-window .iw-row{display:flex;justify-content:space-between;padding:3px 0}
    .info-window .iw-label{color:#00000073}
    .info-window .iw-value{color:#000000d9;font-weight:500}
    .info-window .iw-actions{margin-top:10px;padding-top:8px;border-top:1px solid #f0f0f0;display:flex;gap:8px;flex-wrap:wrap}
    .info-window .iw-close{position:absolute;top:8px;right:8px;cursor:pointer;color:#00000040;font-size:16px;line-height:1}
    .info-window .iw-close:hover{color:#000000d9}
    .fence-label{background:rgba(22,119,255,.12);border:2px dashed #1677ff;border-radius:4px;padding:4px 8px;font-size:11px;color:#1677ff;white-space:nowrap}
    .fence-label.forbidden{background:rgba(255,77,79,.1);border-color:#ff4d4f;color:#ff4d4f}
    .fence-label.speed{background:rgba(250,173,20,.1);border-color:#faad14;color:#faad14}
    .road-open{stroke:#52c41a;stroke-width:4;stroke-opacity:.7}
    .road-paused{stroke:#faad14;stroke-width:4;stroke-opacity:.7;stroke-dasharray:8 4}
    .road-closed{stroke:#ff4d4f;stroke-width:4;stroke-opacity:.7;stroke-dasharray:4 4}
    .facility-marker{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;border:1.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}
    .facility-marker.charger{background:#52c41a;color:#fff}
    .facility-marker.signal{background:#722ed1;color:#fff}
    .facility-marker.sensor{background:#1677ff;color:#fff}
    .traj-slider{-webkit-appearance:none;appearance:none;height:6px;background:#e5e7eb;border-radius:3px;outline:none}
    .traj-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:#1677ff;cursor:pointer;box-shadow:0 1px 4px rgba(22,119,255,.4)}
    .traj-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#1677ff;cursor:pointer;border:none}
  </style>
</head>
<body>
<div id="app" class="flex h-screen overflow-hidden">
  <aside id="sidebar"></aside>
  <div class="flex-1 flex flex-col overflow-hidden min-w-0">
    <header id="topnav"></header>
    <main class="flex-1 overflow-hidden bg-[#f0f2f5] flex flex-col" style="padding:16px 24px 24px">
      <div class="grid grid-cols-4 gap-4 mb-4" style="flex-shrink:0">
        <div class="stat-card"><div class="stat-icon" style="background:#e6f4ff;color:#1677ff">🚗</div><div class="stat-info"><div class="stat-value" id="statOnline">186</div><div class="stat-label">在线车辆 / 总计480辆</div></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:#fff2f0;color:#ff4d4f">🚨</div><div class="stat-info"><div class="stat-value" id="statAlarm">7</div><div class="stat-label">今日告警总数（严重2/一般5）</div></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:#fff7e6;color:#fa8c16">⚠</div><div class="stat-info"><div class="stat-value" id="statAccident">1</div><div class="stat-label">当日事故数量</div></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:#f6ffed;color:#52c41a">🤖</div><div class="stat-info"><div class="stat-value" id="statAuto">142</div><div class="stat-label">自动驾驶模式车辆数</div></div></div>
      </div>
      <div class="flex-1 flex gap-4 min-h-0">
        <div class="flex-1 card p-0 overflow-hidden relative" style="min-height:0">
          <div id="mapContainer" class="w-full h-full"></div>
          <div class="absolute top-3 left-3 z-20 flex gap-2">
            <button class="ant-btn bg-white shadow-md text-sm" onclick="toggleLayerPanel()" style="height:32px;padding:0 12px">☰ 图层控制</button>
          </div>
          <div id="layerPanel" class="absolute top-12 left-3 bg-white rounded-lg shadow-lg z-30" style="width:260px;display:none;max-height:calc(100% - 60px);overflow-y:auto">
            <div class="flex items-center justify-between p-4 pb-2">
              <h4 class="text-sm font-semibold text-[#000000d9]">图层控制</h4>
              <button class="text-[#00000040] hover:text-[#000000d9] text-lg leading-none" onclick="toggleLayerPanel()">×</button>
            </div>
            <div class="px-4 pb-4 space-y-3">
              <div class="border-b border-[#f0f0f0] pb-3">
                <div class="text-xs text-[#00000073] mb-2">底图切换（互斥）</div>
                <div class="flex gap-3">
                  <label class="flex items-center gap-1.5 text-sm cursor-pointer"><input type="radio" name="baseMap" value="normal" checked onchange="switchBaseMap('normal')"> 电子地图</label>
                  <label class="flex items-center gap-1.5 text-sm cursor-pointer"><input type="radio" name="baseMap" value="satellite" onchange="switchBaseMap('satellite')"> 卫星影像</label>
                </div>
              </div>
              <div class="flex items-center justify-between"><span class="text-sm">车辆实时位置</span><label class="layer-switch"><input type="checkbox" checked onchange="toggleLayer('vehicles',this.checked)"><span class="layer-slider"></span></label></div>
              <div class="flex items-center justify-between"><span class="text-sm">行驶轨迹</span><label class="layer-switch"><input type="checkbox" onchange="toggleLayer('trajectory',this.checked)"><span class="layer-slider"></span></label></div>
              <div class="border-t border-[#f0f0f0] pt-3">
                <div class="flex items-center justify-between"><span class="text-sm font-medium">告警信息</span><label class="layer-switch"><input type="checkbox" checked onchange="toggleLayer('alarms',this.checked)"><span class="layer-slider"></span></label></div>
                <div class="mt-2 pl-3 border-l-2 border-[#f0f0f0] space-y-2">
                  <div class="text-xs text-[#00000073]">级别筛选：</div>
                  <div class="flex flex-wrap gap-2">
                    <label class="flex items-center gap-1 text-xs"><input type="checkbox" checked class="alarm-filter" data-level="严重" onchange="applyAlarmFilter()"> 严重</label>
                    <label class="flex items-center gap-1 text-xs"><input type="checkbox" checked class="alarm-filter" data-level="一般" onchange="applyAlarmFilter()"> 一般</label>
                  </div>
                  <div class="text-xs text-[#00000073]">类型筛选：</div>
                  <div class="flex flex-wrap gap-2">
                    <label class="flex items-center gap-1 text-xs"><input type="checkbox" checked class="alarm-filter" data-type="车辆运行异常" onchange="applyAlarmFilter()"> 车辆运行异常</label>
                    <label class="flex items-center gap-1 text-xs"><input type="checkbox" checked class="alarm-filter" data-type="碰撞" onchange="applyAlarmFilter()"> 碰撞</label>
                    <label class="flex items-center gap-1 text-xs"><input type="checkbox" checked class="alarm-filter" data-type="终端异常" onchange="applyAlarmFilter()"> 终端异常</label>
                    <label class="flex items-center gap-1 text-xs"><input type="checkbox" checked class="alarm-filter" data-type="临牌预警" onchange="applyAlarmFilter()"> 临牌预警</label>
                    <label class="flex items-center gap-1 text-xs"><input type="checkbox" checked class="alarm-filter" data-type="电子围栏越界" onchange="applyAlarmFilter()"> 电子围栏越界</label>
                    <label class="flex items-center gap-1 text-xs"><input type="checkbox" checked class="alarm-filter" data-type="时段合规" onchange="applyAlarmFilter()"> 时段合规</label>
                    <label class="flex items-center gap-1 text-xs"><input type="checkbox" checked class="alarm-filter" data-type="安全员状态" onchange="applyAlarmFilter()"> 安全员状态</label>
                  </div>
                </div>
              </div>
              <div class="border-t border-[#f0f0f0] pt-3">
                <div class="flex items-center justify-between"><span class="text-sm font-medium">事故点位</span><label class="layer-switch"><input type="checkbox" onchange="toggleLayer('accidents',this.checked)"><span class="layer-slider"></span></label></div>
                <div class="mt-2 pl-3 border-l-2 border-[#f0f0f0]">
                  <label class="flex items-center gap-1 text-xs"><input type="checkbox" onchange="toggleLayer('historyAccidents',this.checked)"> 包含历史事故</label>
                </div>
              </div>
              <div class="flex items-center justify-between"><span class="text-sm">电子围栏</span><label class="layer-switch"><input type="checkbox" onchange="toggleLayer('fences',this.checked)"><span class="layer-slider"></span></label></div>
              <div class="flex items-center justify-between"><span class="text-sm">开放道路</span><label class="layer-switch"><input type="checkbox" checked onchange="toggleLayer('roads',this.checked)"><span class="layer-slider"></span></label></div>
              <div class="flex items-center justify-between"><span class="text-sm">设施设备</span><label class="layer-switch"><input type="checkbox" onchange="toggleLayer('facilities',this.checked)"><span class="layer-slider"></span></label></div>
              <div class="border-t border-[#f0f0f0] pt-3 flex items-center justify-between">
                <span class="text-sm">图例说明</span>
                <label class="layer-switch"><input type="checkbox" checked onchange="toggleLegend(this.checked)"><span class="layer-slider"></span></label>
              </div>
            </div>
          </div>
          <div id="legendPanel" class="absolute bottom-3 left-3 bg-white/95 rounded-lg shadow p-3 z-10" style="width:170px">
            <div class="flex items-center justify-between mb-2">
              <h4 class="text-xs font-semibold text-[#000000d9]">图例说明</h4>
              <button class="text-[#00000040] hover:text-[#000000d9] text-xs" onclick="document.querySelector('input[onchange*=toggleLegend]').checked=false;toggleLegend(false)">×</button>
            </div>
            <div class="space-y-1.5 text-xs">
              <div class="flex items-center gap-2"><span class="inline-block w-3 h-3 rounded-full bg-[#1677ff]"></span>自动驾驶模式</div>
              <div class="flex items-center gap-2"><span class="inline-block w-3 h-3 rounded-full bg-[#52c41a]"></span>人工驾驶模式</div>
              <div class="flex items-center gap-2"><span class="inline-block w-3 h-3 rounded-full bg-[#722ed1]"></span>测试中车辆</div>
              <div class="flex items-center gap-2"><span class="inline-block w-3 h-3 rounded-full bg-[#ff4d4f]"></span>故障/告警车辆</div>
              <div class="flex items-center gap-2"><span class="inline-block w-3 h-3 rounded bg-[#fadb14]"></span>事故点位</div>
              <div class="flex items-center gap-2"><span class="inline-block w-4 h-0.5 bg-[#52c41a]"></span>开放道路</div>
              <div class="flex items-center gap-2"><span class="inline-block w-4 h-0.5 bg-[#faad14]" style="border-top:1px dashed #faad14"></span>暂停道路</div>
              <div class="flex items-center gap-2"><span class="inline-block w-4 h-0.5 bg-[#ff4d4f]" style="border-top:1px dashed #ff4d4f"></span>关闭道路</div>
              <div class="flex items-center gap-2"><span class="inline-block w-3 h-3 rounded border-2 border-[#52c41a] bg-[#52c41a20]"></span>围栏-开放</div>
              <div class="flex items-center gap-2"><span class="inline-block w-3 h-3 rounded border-2 border-dashed border-[#faad14] bg-[#faad1420]"></span>围栏-暂停</div>
              <div class="flex items-center gap-2"><span class="inline-block w-3 h-3 rounded border-2 border-dashed border-[#ff4d4f] bg-[#ff4d4f20]"></span>围栏-关闭</div>
              <div class="flex items-center gap-2"><span class="inline-block w-3 h-3 rounded bg-[#52c41a] text-white text-[8px] flex items-center justify-center">⚡</span>充电桩</div>
            </div>
          </div>
        </div>
        <div class="card flex flex-col" style="width:420px;min-width:380px;max-width:460px">
          <div class="p-4 border-b border-[#f0f0f0]" style="flex-shrink:0">
            <h4 class="text-sm font-semibold text-[#000000d9] mb-3">车辆运行列表</h4>
            <div class="flex flex-wrap gap-2">
              <select id="filterCompany" class="ant-input" style="width:120px;font-size:12px" onchange="filterVehicles()"><option value="all">全部企业</option><option>A公司</option><option>B公司</option><option>C公司</option><option>D公司</option><option>J公司</option></select>
              <select id="filterStatus" class="ant-input" style="width:90px;font-size:12px" onchange="filterVehicles()"><option value="all">全部状态</option><option value="online">在线</option><option value="offline">离线</option><option value="alarm">告警</option></select>
              <select id="filterMode" class="ant-input" style="width:100px;font-size:12px" onchange="filterVehicles()"><option value="all">全部模式</option><option value="auto">自动驾驶</option><option value="manual">人工驾驶</option></select>
              <select id="filterApplyType" class="ant-input" style="width:120px;font-size:12px" onchange="filterVehicles()"><option value="all">全部申请类型</option><option value="road-test">道路测试</option><option value="demo">示范应用</option><option value="operate">商业化试点</option></select>
            </div>
            <div class="mt-2 relative">
              <input id="searchInput" class="ant-input" placeholder="输入车牌号或VIN搜索" style="font-size:12px;padding-right:32px" oninput="filterVehicles()">
              <svg class="absolute right-2 top-1/2 -translate-y-1/2 w-4 h-4 text-[#00000040]" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </div>
          </div>
          <div class="flex-1 overflow-y-auto">
            <table class="ant-table" style="width:100%">
              <thead><tr><th>车牌号</th><th>企业</th><th>模式</th><th>速度</th><th>状态</th><th>操作</th></tr></thead>
              <tbody id="vehicleTableBody"></tbody>
            </table>
          </div>
          <div class="flex items-center justify-between px-4 py-2 border-t border-[#f0f0f0]" style="flex-shrink:0">
            <span class="text-xs text-[#00000073]">共 <b id="vehicleTotal">0</b> 辆</span>
            <div class="flex items-center gap-3">
              <div class="flex items-center gap-1.5 text-xs text-[#00000073]">
                <span>每页显示</span>
                <select id="vehiclePageSize" class="ant-input" style="width:56px;height:24px;font-size:12px;padding:0 6px" onchange="vehiclePageSize=parseInt(this.value);renderVehicleTable(1)">
                  <option value="10" selected>10</option><option value="20">20</option>
                </select>
                <span>条</span>
              </div>
              <div class="ant-pagination flex items-center gap-1">
                <span class="page-item cursor-pointer" id="vPrevBtn" onclick="vehiclePage>1&&renderVehicleTable(vehiclePage-1)" style="min-width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:12px">&lt;</span>
                <span class="page-item active" id="vCurrPage" style="min-width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:12px">1</span>
                <span class="page-item cursor-pointer" id="vNextBtn" onclick="vehiclePage<vehicleTotalPages&&renderVehicleTable(vehiclePage+1)" style="min-width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:12px">&gt;</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="../../common.js"></script>

}

function getAlarmFilterConfig(){
  var levels=[],types=[];
  document.querySelectorAll('.alarm-filter[data-level]').forEach(function(el){if(el.checked)levels.push(el.dataset.level)});
  document.querySelectorAll('.alarm-filter[data-type]').forEach(function(el){if(el.checked)types.push(el.dataset.type)});
  return {levels:levels,types:types};
}

function alarmMatchesFilter(v){
  if(!v.alarmList||v.alarmList.length===0)return false;
  var cfg=getAlarmFilterConfig();
  if(!v.alarmLevels||!v.alarmTypes)return true;
  for(var i=0;i<v.alarmList.length;i++){
    var lvl=v.alarmLevels[i]||'一般';
    var typ=v.alarmTypes[i]||'车辆运行异常';
    if(cfg.levels.indexOf(lvl)!==-1&&cfg.types.indexOf(typ)!==-1)return true;
  }
  return false;
}

function applyAlarmFilter(){
  alarmOverlays.forEach(function(m){map.remove(m)});
  alarmOverlays=[];
  vehicleData.filter(function(v){return v.status==='alarm'&&alarmMatchesFilter(v)}).forEach(function(v){
    var circle=new AMap.Circle({
      center:[v.lon,v.lat],
      radius:80,
      strokeColor:'#ff4d4f',
      strokeOpacity:0.6,
      strokeWeight:2,
      fillColor:'#ff4d4f',
      fillOpacity:0.08,
      zIndex:90
    });
    alarmOverlays.push(circle);
  });
  map.add(alarmOverlays);
  vehicleOverlays.forEach(function(m){
    var data=m.getExtData();
    if(data&&data.status==='alarm'){
      m.setVisible(alarmMatchesFilter(data));
    }
  });
}

var trajectoryState={vid:null,points:[],currentIndex:0,playing:false,speed:1,timer:null,startTime:'08:00',endTime:'14:32',movedMarker:null,passedLine:null};

function buildTrajectoryData(v,timeFrom,timeTo){
  var pts=[];
  var baseLon=v.lon,baseLat=v.lat;
  var fromH=timeFrom?parseInt(timeFrom.split(':')[0]):8,fromM=timeFrom?parseInt(timeFrom.split(':')[1]):0;
  var toH=timeTo?parseInt(timeTo.split(':')[0]):14,toM=timeTo?parseInt(timeTo.split(':')[1]):32;
  var totalMinutes=(toH*60+toM)-(fromH*60+fromM);
  var totalSteps=Math.max(2,Math.ceil(totalMinutes/15));
  var startHour=fromH,startMin=fromM;
  for(var i=0;i<totalSteps;i++){
    var ratio=i/(totalSteps-1);
    var minuteOffset=Math.round(totalMinutes*ratio);
    var hh=String(startHour+Math.floor((startMin+minuteOffset)/60)).padStart(2,'0');
    var mm=String((startMin+minuteOffset)%60).padStart(2,'0');
    var lon=baseLon-0.008+i*(0.016/(totalSteps-1))+(Math.random()-0.5)*0.0004;
    var lat=baseLat-0.004+i*(0.008/(totalSteps-1))+(Math.random()-0.5)*0.0003;
    var speed=Math.round(20+Math.random()*40);
    var statusOpts=['自动驾驶','自动驾驶','自动驾驶','人工接管','自动驾驶'];
    pts.push({
      idx:i,
      timeLabel:hh+':'+mm,
      timeStr:hh+':'+mm,
      lon:lon,
      lat:lat,
      speed:speed,
      acceleration:+((Math.random()-0.5)*0.8).toFixed(2),
      heading:Math.round(Math.random()*360),
      driveMode:statusOpts[Math.floor(Math.random()*statusOpts.length)],
      isKey:(i===0||i===totalSteps-1||(i%Math.max(1,Math.floor(totalSteps/4))===0&&i>0)),
      event:(i===0?'起点':i===totalSteps-1?'终点':'')
    });
  }
  return pts;
}

function showTrajectory(vid){
  var v=vehicleData.find(function(d){return d.id===vid});
  if(!v)return;
  if(trajectoryLine){map.remove(trajectoryLine)}
  if(trajectoryState.movedMarker){map.remove(trajectoryState.movedMarker);trajectoryState.movedMarker=null}
  if(trajectoryState.passedLine){map.remove(trajectoryState.passedLine);trajectoryState.passedLine=null}
  if(trajectoryState.timer){clearInterval(trajectoryState.timer);trajectoryState.timer=null}
  var points=buildTrajectoryData(v,'08:00','14:32');
  trajectoryState={vid:vid,points:points,currentIndex:0,playing:false,speed:1,timer:null,startTime:points[0].timeStr,endTime:points[points.length-1].timeStr,movedMarker:null,passedLine:null};
  var path=points.map(function(p){return [p.lon,p.lat]});
  trajectoryLine=new AMap.Polyline({
    path:path,
    strokeColor:'#1677ff',
    strokeWeight:4,
    strokeOpacity:0.45,
    strokeStyle:'dashed',
    lineJoin:'round',
    lineCap:'round',
    zIndex:120,
    showDir:true
  });
  map.add(trajectoryLine);
  trajectoryState.passedLine=new AMap.Polyline({
    path:[path[0]],
    strokeColor:'#1677ff',
    strokeWeight:5,
    strokeOpacity:0.95,
    lineJoin:'round',
    lineCap:'round',
    zIndex:121
  });
  map.add(trajectoryState.passedLine);
  trajectoryState.movedMarker=new AMap.Marker({
    position:path[0],
    content:'<div class="vehicle-marker auto" style="width:24px;height:24px;font-size:10px">'+v.plate.slice(-2)+'</div>',
    offset:new AMap.Pixel(-12,-12),
    zIndex:200
  });
  map.add(trajectoryState.movedMarker);
  map.setFitView([trajectoryLine]);
  openTrajectoryPanel(v);
}

function openTrajectoryPanel(v){
  var p=trajectoryState.points[trajectoryState.currentIndex];
  var now=new Date();

function reloadTrajectoryHistory(){
  var vid=document.getElementById('trajHistVehicle').value;
  var v=vehicleData.find(function(d){return d.id===vid});
  if(!v)return;
  if(trajectoryLine){map.remove(trajectoryLine)}
  if(trajectoryState.movedMarker){map.remove(trajectoryState.movedMarker);trajectoryState.movedMarker=null}
  if(trajectoryState.passedLine){map.remove(trajectoryState.passedLine);trajectoryState.passedLine=null}
  if(trajectoryState.timer){clearInterval(trajectoryState.timer);trajectoryState.timer=null}
  var timeFrom=document.getElementById('trajHistTimeFrom')?document.getElementById('trajHistTimeFrom').value:'08:00';
  var timeTo=document.getElementById('trajHistTimeTo')?document.getElementById('trajHistTimeTo').value:'14:32';
  var points=buildTrajectoryData(v,timeFrom,timeTo);
  trajectoryState.vid=vid;trajectoryState.points=points;trajectoryState.currentIndex=0;trajectoryState.playing=false;
  trajectoryState.movedMarker=null;trajectoryState.passedLine=null;
  var path=points.map(function(p){return [p.lon,p.lat]});
  trajectoryLine=new AMap.Polyline({
    path:path,
    strokeColor:'#1677ff',
    strokeWeight:4,
    strokeOpacity:0.45,
    strokeStyle:'dashed',
    lineJoin:'round',
    lineCap:'round',
    zIndex:120,
    showDir:true
  });
  map.add(trajectoryLine);
  trajectoryState.passedLine=new AMap.Polyline({
    path:[path[0]],
    strokeColor:'#1677ff',
    strokeWeight:5,
    strokeOpacity:0.95,
    lineJoin:'round',
    lineCap:'round',
    zIndex:121
  });
  map.add(trajectoryState.passedLine);
  trajectoryState.movedMarker=new AMap.Marker({
    position:path[0],
    content:'<div class="vehicle-marker auto" style="width:24px;height:24px;font-size:10px">'+v.plate.slice(-2)+'</div>',
    offset:new AMap.Pixel(-12,-12),
    zIndex:200
  });
  map.add(trajectoryState.movedMarker);
  map.setFitView([trajectoryLine]);
  openTrajectoryPanel(v);
}

function closeTrajectoryPanel(){
  var panel=document.getElementById('trajectoryPanel');
  if(panel)panel.style.display='none';
  if(trajectoryState.timer){clearInterval(trajectoryState.timer);trajectoryState.timer=null}
  trajectoryState.playing=false;
}

function togglePlayTrajectory(){
  trajectoryState.playing=!trajectoryState.playing;
  var btn=document.getElementById('trajPlayBtn');
  if(trajectoryState.playing){
    if(btn)btn.innerHTML='⏸ 暂停';
    if(trajectoryState.currentIndex>=trajectoryState.points.length-1)seekTrajectory(0);
    trajectoryState.timer=setInterval(function(){
      if(trajectoryState.currentIndex>=trajectoryState.points.length-1){
        togglePlayTrajectory();
        return;
      }
      seekTrajectory(trajectoryState.currentIndex+1);
    },1000/trajectoryState.speed);
  }else{
    if(btn)btn.innerHTML='▶ 播放';
    if(trajectoryState.timer){clearInterval(trajectoryState.timer);trajectoryState.timer=null}
  }
}

function changeTrajectorySpeed(s){
  trajectoryState.speed=parseInt(s);
  if(trajectoryState.playing){
    if(trajectoryState.timer)clearInterval(trajectoryState.timer);
    trajectoryState.timer=setInterval(function(){
      if(trajectoryState.currentIndex>=trajectoryState.points.length-1){togglePlayTrajectory();return}
      seekTrajectory(trajectoryState.currentIndex+1);
    },1000/trajectoryState.speed);
  }
}

function seekTrajectory(idx){
  if(idx<0)idx=0;
  if(idx>=trajectoryState.points.length)idx=trajectoryState.points.length-1;
  trajectoryState.currentIndex=idx;
  var p=trajectoryState.points[idx];
  var path=trajectoryState.points.slice(0,idx+1).map(function(x){return [x.lon,x.lat]});
  if(trajectoryState.passedLine)trajectoryState.passedLine.setPath(path);
  if(trajectoryState.movedMarker)trajectoryState.movedMarker.setPosition([p.lon,p.lat]);
  var slider=document.getElementById('trajSlider');
  if(slider)slider.value=idx;
  var tEl=document.getElementById('trajCurTime');if(tEl)tEl.textContent=p.timeStr;
  var sEl=document.getElementById('trajCurSpeed');if(sEl){sEl.textContent=p.speed+'km/h';sEl.style.color='#1677ff';}
  var mEl=document.getElementById('trajCurMode');if(mEl){mEl.textContent=p.driveMode;mEl.style.color=p.driveMode==='自动驾驶'?'#52c41a':'#faad14';}
  updateTrajectoryProgress();
}

function updateTrajectoryProgress(){
  var bg=document.getElementById('trajProgressBg');
  var pct=trajectoryState.points.length>1?(trajectoryState.currentIndex/(trajectoryState.points.length-1)*100):0;
  if(bg)bg.style.width=pct+'%';
}

function toggleLayer(layerName,visible){
  var targetOverlays;
  switch(layerName){
    case 'vehicles':targetOverlays=vehicleOverlays;break;
    case 'trajectory':if(trajectoryLine){trajectoryLine.setVisible(visible)}return;
    case 'alarms':targetOverlays=alarmOverlays;break;
    case 'accidents':
      if(visible&&!accidentLayerLoaded){loadAccidentLayer();accidentLayerLoaded=true}
      targetOverlays=accidentOverlays;
      break;
    case 'fences':targetOverlays=fenceOverlays;break;
    case 'roads':targetOverlays=roadOverlays;break;
    case 'facilities':targetOverlays=facilityOverlays;break;
    case 'historyAccidents':
      if(visible&&!historyAccidentLayerLoaded){loadHistoryAccidentLayer();historyAccidentLayerLoaded=true}
      targetOverlays=historyAccidentOverlays;
      break;
    default:return;
  }
  if(targetOverlays){
    targetOverlays.forEach(function(m){m.setVisible(visible)});
  }
}

function filterVehicles(){
  var company=document.getElementById('filterCompany').value;
  var status=document.getElementById('filterStatus').value;
  var mode=document.getElementById('filterMode').value;
  var applyType=document.getElementById('filterApplyType').value;
  var search=document.getElementById('searchInput').value.trim().toLowerCase();
  filteredVehicleData=vehicleData.filter(function(v){
    if(company!=='all'&&v.company!==company)return false;
    if(status==='online'&&v.status!=='online')return false;
    if(status==='offline'&&v.status!=='offline')return false;
    if(status==='alarm'&&v.status!=='alarm')return false;
    if(mode==='auto'&&v.mode!=='auto')return false;
    if(mode==='manual'&&v.mode!=='manual')return false;
    if(applyType!=='all'&&v.applyType!==applyType)return false;
    if(search&&v.plate.toLowerCase().indexOf(search)===-1&&v.vin.toLowerCase().indexOf(search)===-1)return false;
    return true;
  });
  vehiclePage=1;
  renderVehicleTable(1);
  updateMapVisibility();
}

function updateMapVisibility(){
  var visibleIds=filteredVehicleData.map(function(v){return v.id});
  vehicleOverlays.forEach(function(m){
    var data=m.getExtData();
    if(data)m.setVisible(visibleIds.indexOf(data.id)!==-1);
  });
}

    {id:'cam_in',name:'车内摄像头',icon:'◉'},

    '<div style="text-align:center;color:rgba(255,255,255,.45)"><div style="font-size:36px;margin-bottom:8px">📹</div><p style="font-size:13px" id="mainCamTitle">前视摄像头 - 实时视频流</p><p style="font-size:11px;margin-top:4px">RTSP/RTMP协议接入 · H.264/H.265</p></div>';
  openModal('实时视频画面播放 - '+plate,
    '<div class="flex gap-3 mb-3">'+
      '<div class="flex-1">'+
        '<div style="background:#000;border-radius:8px;height:300px;display:flex;align-items:center;justify-content:center;margin-bottom:8px" id="videoMainStage">'+mainArea+'</div>'+
        '<div class="flex items-center justify-between">'+
          '<div class="flex gap-2">'+
            (isOffline?'':'<button class="ant-btn ant-btn-sm" onclick="showToast(\'已截图保存\')">📷 截图</button><button class="ant-btn ant-btn-sm" onclick="showToast(\'开始本地录像\')">⏺ 本地录像</button><button class="ant-btn ant-btn-sm">⛶ 全屏</button>')+
          '</div>'+
          '<div class="flex gap-2">'+
            '<button class="ant-btn ant-btn-sm" onclick="closeModal();openVideoHistory(\''+plate+'\')">历史回放</button>'+
          '</div>'+
        '</div>'+
        '<div class="flex items-center gap-2 text-xs mt-2"><span>00:00</span><div class="flex-1 h-1.5 bg-[#333] rounded overflow-hidden"><div class="h-full bg-[#1677ff] rounded" style="width:35%"></div></div><span>实时</span></div>'+
      '</div>'+
    '</div>'+
    '<div class="text-xs text-[#00000073] mb-2">摄像头列表（点击缩略图切换主画面）</div>'+
    '<div class="grid grid-cols-3 gap-2">'+thumbHtml+'</div>',
    {wide:true,footer:'<button class="ant-btn" onclick="closeModal()">关闭</button>'});
}

function selectCamera(camId,plate){
  var camNames={'cam_front':'前视摄像头','cam_rear':'后视摄像头','cam_left':'左侧摄像头','cam_right':'右侧摄像头','cam_in':'车内摄像头','cam_round':'环视摄像头'};
  document.querySelectorAll('.cam-thumb').forEach(function(el){
    el.classList.remove('ring-2','ring-[#1677ff]');
    el.classList.add('border','border-[#f0f0f0]');
    if(el.dataset.cam===camId){
      el.classList.add('ring-2','ring-[#1677ff]');
      el.classList.remove('border','border-[#f0f0f0]');
    }
  });
  var stage=document.getElementById('videoMainStage');
  if(stage){
    var titleEl=document.getElementById('mainCamTitle');
    if(titleEl)titleEl.textContent=(camNames[camId]||'摄像头')+' - 实时视频流';
  }
  showToast('已切换到'+(camNames[camId]||'')+'画面');
}

function startLiveRefresh(){
  if(liveRefreshTimer)return;
  // 模拟 1Hz 位置刷新：每秒对在线车辆的位置/速度做轻微抖动，并同步 marker 坐标
  liveRefreshTimer=setInterval(function(){
    vehicleData.forEach(function(v){
      if(v.status==='offline')return;
      var dLon=(Math.random()-0.5)*0.0008;
      var dLat=(Math.random()-0.5)*0.0006;
      v.lon=+(v.lon+dLon).toFixed(6);
      v.lat=+(v.lat+dLat).toFixed(6);
      v.speed=Math.max(0,Math.min(80,v.speed+Math.round((Math.random()-0.5)*4)));
      v.heading=(v.heading+Math.round((Math.random()-0.5)*15)+360)%360;
      var ts=new Date();
      v.lastTime=ts.getFullYear()+'-'+String(ts.getMonth()+1).padStart(2,'0')+'-'+String(ts.getDate()).padStart(2,'0')+' '+String(ts.getHours()).padStart(2,'0')+':'+String(ts.getMinutes()).padStart(2,'0')+':'+String(ts.getSeconds()).padStart(2,'0');
    });
    vehicleOverlays.forEach(function(m){
      var data=m.getExtData();
      if(data&&data.status!=='offline'){
        m.setPosition([data.lon,data.lat]);
      }
    });
    alarmOverlays.forEach(function(c,idx){
      var v=vehicleData.filter(function(d){return d.status==='alarm'})[idx];
      if(v)c.setCenter([v.lon,v.lat]);
    });
  },1000);
}

function initPage(){
  filteredVehicleData=[].concat(vehicleData);
  renderVehicleTable(1);
  initMap();
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',initPage);
}else{
  initPage();
}
