<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{DEFAULT:'#1677ff',hover:'#4096ff',disabled:'#85a5cc'}}}}}</script>
  <style>
    /* 列表行 hover 高亮 */
    .ant-table tbody tr{transition:background-color .18s ease}
    .ant-table tbody tr.row-pending{box-shadow:inset 3px 0 0 #ff4d4f;background:#fffbfb}
    .ant-table tbody tr.row-pending:hover{background:#fff1f0}
    /* 操作列按钮排版 */
    .row-actions{display:inline-flex;gap:0;flex-wrap:nowrap;justify-content:center;align-items:center}
    .row-actions .ant-btn-link{padding:0 6px;font-size:13px;white-space:nowrap}
    .row-actions .ant-btn-link+.ant-btn-link{border-left:1px solid #f0f0f0}
    /* Tab 计数徽标 */
    .ant-tab .tab-count{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 6px;margin-left:6px;border-radius:9px;background:#f0f0f0;color:#00000073;font-size:12px;line-height:1;font-weight:500}
    .ant-tab.active .tab-count{background:#e6f4ff;color:#1677ff}
    .ant-tab .tab-count.tab-count-urgent{background:#fff1f0;color:#ff4d4f}
    /* 详情弹窗中的回复时间线 */
    .reply-timeline{position:relative;padding-left:24px}
    .reply-timeline::before{content:"";position:absolute;left:7px;top:6px;bottom:6px;width:1px;background:#e6e6e6}
    .reply-item{position:relative;padding:10px 12px 12px 16px;margin-bottom:10px;background:#fafbff;border:1px solid #eef1f8;border-radius:8px;transition:all .2s}
    .reply-item:last-child{margin-bottom:0}
    .reply-item:hover{border-color:#91caff;background:#f0f6ff}
    .reply-item::before{content:"";position:absolute;left:-21px;top:16px;width:9px;height:9px;border-radius:50%;background:#1677ff;box-shadow:0 0 0 3px #fff,0 0 0 4px #91caff}
    .reply-item .reply-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;font-size:13px;color:#00000073}
    .reply-item .reply-head .reply-by{font-weight:500;color:#000000d9}
    .reply-item .reply-status{display:inline-flex;align-items:center;height:20px;padding:0 6px;font-size:12px;border-radius:3px;border:1px solid;margin-left:6px}
    .reply-item .reply-status.s-processing{color:#1677ff;background:#e6f4ff;border-color:#91caff}
    .reply-item .reply-status.s-success{color:#52c41a;background:#f6ffed;border-color:#b7eb8f}
    .reply-item .reply-body{font-size:14px;color:#000000d9;line-height:1.7;white-space:pre-line}
    /* 处理状态的小指示灯 */
    .status-dot{display:inline-flex;align-items:center;gap:6px}
    .status-dot::before{content:"";width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .status-dot.dot-pending::before{background:#ff4d4f;box-shadow:0 0 0 3px rgba(255,77,79,.15)}
    .status-dot.dot-processing::before{background:#1677ff;box-shadow:0 0 0 3px rgba(22,119,255,.15)}
    .status-dot.dot-success::before{background:#52c41a;box-shadow:0 0 0 3px rgba(82,196,26,.15)}
    .status-dot.dot-default::before{background:#bfbfbf}
    /* 标题区下方的次级说明 */
    .page-subtitle{font-size:13px;color:#00000073;margin-top:4px}
    /* 关闭弹窗强调 */
    .close-warning{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:#fff7e6;border:1px solid #ffe58f;border-radius:8px;margin-bottom:16px}

      </div>

        <span class="ant-tab" data-tab="pending" onclick="switchTab(this,'pending')">待处理<span class="tab-count tab-count-urgent" id="cnt-pending">0</span></span>

/* ========== 工具函数 ========== */
function getReplyCount(d){return (d.replyList||[]).length;}
function getLatestReplyTime(d){
  var list=d.replyList||[];
  if(!list.length) return '—';
  return list[list.length-1].time;
}
function findById(id){return feedbackManageData.find(function(d){return d.id===id;});}

/* ========== 计数 ========== */
function refreshCounts(){
  var cnt={all:0,pending:0,processing:0,done:0,closed:0};
  feedbackManageData.forEach(function(d){
    cnt.all++;
    if(cnt[d.status]!==undefined) cnt[d.status]++;
  });
  for(var k in cnt){
    var el=document.getElementById('cnt-'+k);
    if(el) el.textContent=cnt[k];
  }
}

/* ========== 过滤+排序 ========== */
function getFilteredData(){
  var rows=feedbackManageData.slice();
  if(currentFilter.id) rows=rows.filter(function(d){return d.id.indexOf(currentFilter.id)>-1;});
  if(currentFilter.title) rows=rows.filter(function(d){return d.title.indexOf(currentFilter.title)>-1;});
  if(currentFilter.submitter) rows=rows.filter(function(d){return d.submitter.indexOf(currentFilter.submitter)>-1;});
  if(currentFilter.company) rows=rows.filter(function(d){return d.company.indexOf(currentFilter.company)>-1;});
  if(currentFilter.status) rows=rows.filter(function(d){return d.status===currentFilter.status;});
  if(currentFilter.timeStart) rows=rows.filter(function(d){return d.time.substring(0,10)>=currentFilter.timeStart;});
  if(currentFilter.timeEnd) rows=rows.filter(function(d){return d.time.substring(0,10)<=currentFilter.timeEnd;});

  if(currentTab!=='all'){
    var tab=currentTab;
    rows=rows.filter(function(d){return d.status===tab;});
    rows.sort(function(a,b){return a.time<b.time?1:-1;});
  } else {
    rows.sort(function(a,b){
      if(a.status==='pending' && b.status!=='pending') return -1;
      if(a.status!=='pending' && b.status==='pending') return 1;
      return a.time<b.time?1:-1;
    });
  }
  return rows;
}

  if(d.status==='pending'){
    html+='<button class="ant-btn-link" style="color:#1677ff" onclick="openReply(\''+d.id+'\',\'accept\')">受理回复</button>';
    html+='<button class="ant-btn-link danger" onclick="confirmClose(\''+d.id+'\')">关闭</button>';
  } else if(d.status==='processing'){
    html+='<button class="ant-btn-link" style="color:#1677ff" onclick="openReply(\''+d.id+'\',\'continue\')">继续回复</button>';
    html+='<button class="ant-btn-link danger" onclick="confirmClose(\''+d.id+'\')">关闭</button>';
  }
  html+='</div>';
  return html;
}

function buildRow(d){
  var s=STATUS_MAP[d.status];
  var rowCls=d.status==='pending'?'row-pending':'';
  return '<tr class="'+rowCls+'">'
    +'<td class="col-code">'+d.id+'</td>'
    +'<td>'+d.title+'</td>'
    +'<td>'+d.submitter+'</td>'
    +'<td>'+d.company+'</td>'
    +'<td class="col-code">'+d.time+'</td>'
    +'<td class="col-status"><span class="ant-tag '+s.cls+'">'+s.label+'</span></td>'
    +'<td>'+d.handler+'</td>'
    +'<td class="col-num">'+getReplyCount(d)+'</td>'
    +'<td class="col-code">'+(getReplyCount(d)?getLatestReplyTime(d):'<span class="text-[#bfbfbf]">—</span>')+'</td>'
    +'<td class="col-action">'+buildOps(d)+'</td>'
    +'</tr>';
}

function renderTable(){
  var rows=getFilteredData();
  if(!pager) return;
  var cp=pager.getCurrentPage(), ps=pager.getPageSize();
  var start=(cp-1)*ps;
  var pd=rows.slice(start,start+ps);
  var h='';
  pd.forEach(function(d){h+=buildRow(d);});
  if(h==='') h='<tr><td colspan="10" style="text-align:center;color:#00000073;padding:48px 24px">暂无反馈记录<br><span style="font-size:12px;color:#bfbfbf">如需查看历史反馈，请切换至其他 Tab 或调整筛选条件</span></td></tr>';
  document.getElementById('tbody').innerHTML=h;
  pager.setTotal(rows.length);
}

function applyFilter(){
  currentFilter={
    id:document.getElementById('q-id').value.trim(),
    title:document.getElementById('q-title').value.trim(),
    submitter:document.getElementById('q-submitter').value.trim(),
    company:document.getElementById('q-company').value.trim(),
    status:'',
    timeStart:document.getElementById('q-time-start').value,
    timeEnd:document.getElementById('q-time-end').value
  };
  if(pager) pager.reset();
  renderTable();
  showToast('已应用筛选条件');
}

function resetFilter(){
  document.getElementById('q-id').value='';
  document.getElementById('q-title').value='';
  document.getElementById('q-submitter').value='';
  document.getElementById('q-company').value='';
  document.getElementById('q-time-start').value='';
  document.getElementById('q-time-end').value='';
  currentFilter={id:'',title:'',submitter:'',company:'',status:'',timeStart:'',timeEnd:''};
  if(pager) pager.reset();
  renderTable();
  showToast('已重置筛选');
}

function switchTab(el,tab){
  document.querySelectorAll('#tabs .ant-tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  currentTab=tab;
  if(pager) pager.reset();
  renderTable();
}

function exportCurrentData(){
  var rows=getFilteredData();
  if(!rows.length){showToast('当前无数据可导出','warn');return;}
  showToast('已导出 '+rows.length+' 条反馈记录（'+currentTab+' Tab，当前筛选条件）');
}

/* ========== 弹窗：详情 ========== */
function openDetail(id){
  var d=findById(id); if(!d) return;
  var s=STATUS_MAP[d.status];
  var html='<div class="ant-descriptions">'
    +'<div class="ant-descriptions-row"><div class="ant-descriptions-label">反馈编号</div><div class="ant-descriptions-value">'+d.id+'</div><div class="ant-descriptions-label">处理状态</div><div class="ant-descriptions-value"><span class="ant-tag '+s.cls+'">'+s.label+'</span></div></div>'
    +'<div class="ant-descriptions-row"><div class="ant-descriptions-label">问题标题</div><div class="ant-descriptions-value" style="flex:3">'+d.title+'</div></div>'
    +'<div class="ant-descriptions-row"><div class="ant-descriptions-label">提交人</div><div class="ant-descriptions-value">'+d.submitter+'</div><div class="ant-descriptions-label">所属企业</div><div class="ant-descriptions-value">'+d.company+'</div></div>'
    +'<div class="ant-descriptions-row"><div class="ant-descriptions-label">提交时间</div><div class="ant-descriptions-value">'+d.time+'</div><div class="ant-descriptions-label">受理机构</div><div class="ant-descriptions-value">'+d.handler+'</div></div>'
    +'</div>';
  html+='<h4 class="text-sm font-semibold text-[#000000d9] mt-4 mb-2 pb-2 border-b border-[#f0f0f0]">问题详情</h4>';
  html+='<div class="p-3 bg-[#fafafa] rounded text-sm text-[#000000d9] whitespace-pre-line leading-relaxed">'+d.content+'</div>';

  html+=renderAttachments(d.attachments);

  if(d.replyList && d.replyList.length){
    html+='<h4 class="text-sm font-semibold text-[#000000d9] mt-4 mb-3 pb-2 border-b border-[#f0f0f0]">受理回复时间线（共 '+d.replyList.length+' 条）</h4>';
    html+='<div class="reply-timeline">';
    d.replyList.forEach(function(r){
      var sCls=r.status==='done'?'s-success':'s-processing';
      var sLabel=r.status==='done'?'已处理':'处理中';
      html+='<div class="reply-item">'
        +'<div class="reply-head"><span><span class="reply-by">'+r.by+'</span>　<span class="text-[#00000073]">'+r.role+'</span><span class="reply-status '+sCls+'">'+sLabel+'</span></span><span>'+r.time+'</span></div>'
        +'<div class="reply-body">'+r.content+'</div>'
        +'</div>';
    });
    html+='</div>';
  } else {
    html+='<h4 class="text-sm font-semibold text-[#000000d9] mt-4 mb-2 pb-2 border-b border-[#f0f0f0]">受理回复</h4>';
    html+='<div class="p-3 bg-[#fafafa] rounded text-sm text-[#00000073]">尚未受理，点击底部"受理回复"按钮开始处理</div>';
  }

  if(d.closedNote){
    html+='<h4 class="text-sm font-semibold text-[#000000d9] mt-4 mb-2 pb-2 border-b border-[#f0f0f0]">关闭备注</h4>';
    html+='<div class="p-3 bg-[#fff7e6] rounded text-sm text-[#874d00] leading-relaxed">'+d.closedNote+'</div>';
  }

  openModal('反馈详情 - '+d.id, html, {wide:true, footer:'<button class="ant-btn" onclick="closeModal()">关闭</button>'});
}

/* ========== 附件渲染 ========== */
function renderAttachments(attachments){
  if(!attachments || !attachments.length) return '';
  var html='<h4 class="text-sm font-semibold text-[#000000d9] mt-4 mb-2 pb-2 border-b border-[#f0f0f0]">附件（共 '+attachments.length+' 个）</h4>';
  html+='<div class="space-y-2">';
  attachments.forEach(function(a){
    var iconBg=a.type==='image'?'#e6f4ff':'#fff7e6';
    var iconColor=a.type==='image'?'#1677ff':'#faad14';
    var iconSvg=a.type==='image'
      ?'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>'
      :'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>';
    html+='<div class="flex items-center gap-2 px-3 py-2 bg-[#fafafa] rounded border border-[#f0f0f0] hover:border-[#91caff] transition-colors">'
      +'<span class="inline-flex items-center justify-center w-7 h-7 rounded" style="background:'+iconBg+';color:'+iconColor+'">'+iconSvg+'</span>'
      +'<span class="flex-1 text-sm text-[#000000d9] truncate">'+a.name+'</span>'
      +'<span class="text-xs text-[#00000073]">'+a.size+'</span>'
      +'<button class="ant-btn-link" style="font-size:12px">预览</button>'
      +'<button class="ant-btn-link" style="font-size:12px">下载</button>'
      +'</div>';
  });
  html+='</div>';
  return html;
}

/* ========== 弹窗：受理回复/继续回复 ========== */
function openReply(id,mode){
  var d=findById(id); if(!d) return;
  var title=(mode==='accept'?'受理回复':'继续回复')+' - '+d.id;
  var s=STATUS_MAP[d.status];
  var html='<div class="ant-descriptions" style="margin-bottom:16px">'
    +'<div class="ant-descriptions-row"><div class="ant-descriptions-label">反馈编号</div><div class="ant-descriptions-value">'+d.id+'</div><div class="ant-descriptions-label">当前状态</div><div class="ant-descriptions-value"><span class="ant-tag '+s.cls+'">'+s.label+'</span></div></div>'
    +'<div class="ant-descriptions-row"><div class="ant-descriptions-label">问题标题</div><div class="ant-descriptions-value" style="flex:3">'+d.title+'</div></div>'
    +'</div>';
  html+='<h4 class="text-sm font-semibold text-[#000000d9] mt-2 mb-2 pb-2 border-b border-[#f0f0f0]">问题详情</h4>';
  html+='<div class="p-3 bg-[#fafafa] rounded text-sm text-[#000000d9] whitespace-pre-line leading-relaxed">'+d.content+'</div>';
  html+=renderAttachments(d.attachments);
  html+='<div class="ant-form-item" style="margin-top:20px"><div class="ant-form-label"><span class="required">*</span>回复内容</div><div class="ant-form-control"><textarea class="ant-input" id="replyContent" rows="5" maxlength="2000" style="padding:8px 12px;height:auto;resize:vertical" placeholder="请输入回复内容，最长 2000 字" oninput="document.getElementById(\'replyCount\').textContent=this.value.length+\'/2000字\'"></textarea><div class="text-xs text-[#00000040] mt-1"><span id="replyCount">0/2000字</span></div></div></div>';
  html+='<div class="ant-form-item"><div class="ant-form-label">处理状态</div><div class="ant-form-control"><div class="ant-select" id="replyStatus" style="width:200px">'+(mode==='accept'?'处理中':'处理中')+' <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg></div></div></div>';
  html+='<div class="grid grid-cols-2 gap-4 text-xs text-[#00000073]">';
  html+='<div>受理机构：<span class="text-[#000000d9]">监管人员</span></div>';
  html+='<div>回复人：<span class="text-[#000000d9]">管理员</span></div>';
  html+='</div>';

  openModal(title, html, {
    wide:true,
    footer:'<button class="ant-btn" onclick="closeModal()">取消</button>'
      +'<button class="ant-btn ant-btn-primary" onclick="submitReply(\''+d.id+'\',\''+mode+'\')">提交回复</button>'
  });
}

function submitReply(id,mode){
  var content=document.getElementById('replyContent').value.trim();
  var status=document.getElementById('replyStatus').textContent.trim().split(/\s+/)[0];
  if(!content){showToast('请填写回复内容','warn');return;}
  if(status!=='处理中' && status!=='已处理'){showToast('处理状态无效','warn');return;}

  var d=findById(id);
  var now=new Date();
  var pad=function(n){return n<10?'0'+n:n;};
  var timeStr=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+' '+pad(now.getHours())+':'+pad(now.getMinutes());

  d.replyList.push({
    by:'管理员',
    role:'监管人员',
    time:timeStr,
    content:content,
    status:status==='已处理'?'done':'processing'
  });
  if(mode==='accept' || status==='处理中'){
    d.status='processing';
    d.handler=d.handler==='—'?'监管人员':d.handler;
  }
  if(status==='已处理'){
    d.status='done';
  }
  closeModal();
  refreshCounts();
  renderTable();
  showToast(mode==='accept'?'已受理该反馈':'回复已提交');
}

/* ========== 弹窗：关闭确认 ========== */
function confirmClose(id){
  var d=findById(id); if(!d) return;
  var html='<div class="close-warning">'
    +'<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>'
    +'<div class="close-warning-text">关闭后用户不能再追加问题，管理部门仍可查看历史。该操作不可撤销，请确认。</div>'
    +'</div>'
    +'<div class="ant-descriptions">'
    +'<div class="ant-descriptions-row"><div class="ant-descriptions-label">反馈编号</div><div class="ant-descriptions-value">'+d.id+'</div><div class="ant-descriptions-label">当前状态</div><div class="ant-descriptions-value"><span class="ant-tag '+STATUS_MAP[d.status].cls+'">'+STATUS_MAP[d.status].label+'</span></div></div>'
    +'<div class="ant-descriptions-row"><div class="ant-descriptions-label">问题标题</div><div class="ant-descriptions-value" style="flex:3">'+d.title+'</div></div>'
    +'<div class="ant-descriptions-row"><div class="ant-descriptions-label">提交人</div><div class="ant-descriptions-value">'+d.submitter+'</div><div class="ant-descriptions-label">所属企业</div><div class="ant-descriptions-value">'+d.company+'</div></div>'
    +'</div>';
  openModal('关闭确认', html, {
    width:520,
    footer:'<button class="ant-btn" onclick="closeModal()">取消</button>'
      +'<button class="ant-btn ant-btn-danger" onclick="doClose(\''+d.id+'\')">确认关闭</button>'
  });
}

function doClose(id){
  var d=findById(id); if(!d) return;
  d.status='closed';
  d.closedNote='由管理部门于 '+new Date().toISOString().substring(0,16).replace('T',' ')+' 关闭';
  closeModal();
  refreshCounts();
  renderTable();
  showToast('反馈已关闭');
}

/* ========== Toast ========== */
function showToast(msg,type){
  var t=document.createElement('div');
  var bg=type==='warn'?'#faad14':'#52c41a';
  t.style.cssText='position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:10000;background:'+bg+';color:#fff;padding:10px 24px;border-radius:6px;font-size:14px;box-shadow:0 4px 12px rgba(0,0,0,.15)';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.style.transition='opacity .3s';t.style.opacity='0';setTimeout(function(){t.remove();},300);},1800);
}

/* ========== 初始化 ========== */
document.addEventListener('DOMContentLoaded',function(){
  pager=new Pagination({container:'pageBar',pageSize:10,pageSizeOptions:[10,20,50,100],onPageChange:function(){renderTable();},onPageSizeChange:function(){pager.reset();renderTable();}});
  refreshCounts();
  renderTable();
});

</script>
<script src="../../common.js"></script>
</body>
</html>
