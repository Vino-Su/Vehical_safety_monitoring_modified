<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通知公告 - 智能网联汽车安全监测平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{DEFAULT:'#1677ff',hover:'#4096ff',disabled:'#85a5cc'}}}}}</script>
  <style>
    .rte-toolbar{display:flex;gap:2px;padding:6px 8px;background:#fafafa;border:1px solid #d9d9d9;border-bottom:none;border-radius:6px 6px 0 0;flex-wrap:wrap}
    .rte-toolbar button{width:28px;height:28px;border:1px solid transparent;background:transparent;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:#666;transition:all .15s}
    .rte-toolbar button:hover{background:#e6f4ff;color:#1677ff;border-color:#bae0ff}
    .rte-toolbar button.rte-active{background:#e6f4ff;color:#1677ff;border-color:#1677ff}
    .rte-toolbar .rte-sep{width:1px;background:#d9d9d9;margin:0 4px}
    .rte-editor{min-height:180px;max-height:400px;padding:10px 12px;border:1px solid #d9d9d9;border-radius:0 0 6px 6px;outline:none;overflow-y:auto;font-size:14px;line-height:1.7;color:#1f1f1f;background:#fff}
    .rte-editor:focus{border-color:#1677ff;box-shadow:0 0 0 2px rgba(22,119,255,.1)}
    .rte-editor:empty:before{content:attr(data-placeholder);color:#bfbfbf;pointer-events:none}
  </style>
  <script src="../../components/pagination-component.js"></script>
</head>
<body>
<div id="app" class="flex h-screen overflow-hidden">
  <aside id="sidebar"></aside>
  <div class="flex-1 flex flex-col overflow-hidden">
    <header id="topnav"></header>
    <main class="flex-1 overflow-auto bg-[#f0f2f5] p-6">
      <div class="page-header"><h2>通知公告</h2><div class="flex gap-2"><button class="ant-btn ant-btn-primary" onclick="openNoticeModal()">+ 新建信息发布申请</button></div></div>

      <!-- 筛选条件 -->
      <div class="filter-bar mb-4">
        <div class="filter-row">
          <div class="filter-item"><label>通知公告标题/关键词</label><input class="ant-input" placeholder="请输入标题或关键词搜索" style="width:200px"></div>
          <div class="filter-item"><label>通知公告类型/状态</label><div class="ant-select" style="width:140px">全部 <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg></div></div>
          <div class="filter-item"><label>发布状态</label><div class="ant-select" style="width:120px">全部 <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg></div></div>
          <button class="ant-btn ant-btn-primary">查询</button>
          <button class="ant-btn">重置</button>
        </div>
      </div>

      <!-- Tab页签 -->
      <div class="ant-tabs mb-4">
        <span class="ant-tab active" onclick="switchTab(this,'tab-all')">全部</span>
        <span class="ant-tab" onclick="switchTab(this,'tab-draft')">草稿箱</span>
        <span class="ant-tab" onclick="switchTab(this,'tab-pending')">待审核</span>
        <span class="ant-tab" onclick="switchTab(this,'tab-published')">已发布</span>
      </div>

      <!-- 全部列表 -->
      <div id="tab-all">
        <div class="ant-table-wrapper">
          <table class="ant-table"><thead><tr><th>通知公告编号</th><th>内容摘要</th><th>通知公告类型/状态</th><th>创建人</th><th>目标受众</th><th>发布状态</th><th>最后修改时间/创建时间</th><th>操作按钮</th></tr></thead>
          <tbody id="tbody-all"></tbody></table>
        </div>
        <div id="pageBar-all" class="mt-4"></div>
      </div>

      <!-- 草稿箱 -->
      <div id="tab-draft" style="display:none"><div class="ant-table-wrapper"><table class="ant-table"><thead><tr><th>通知公告编号</th><th>内容摘要</th><th>通知公告类型/状态</th><th>最后修改时间/创建时间</th><th>操作按钮</th></tr></thead><tbody id="tbody-draft"></tbody></table></div><div id="pageBar-draft" class="mt-4"></div></div>

      <!-- 待审核 -->
      <div id="tab-pending" style="display:none"><div class="ant-table-wrapper"><table class="ant-table"><thead><tr><th>通知公告编号</th><th>内容摘要</th><th>通知公告类型/状态</th><th>提交审核时间</th><th>操作按钮</th></tr></thead><tbody id="tbody-pending"></tbody></table></div><div id="pageBar-pending" class="mt-4"></div></div>

      <!-- 已发布 -->
      <div id="tab-published" style="display:none"><div class="ant-table-wrapper"><table class="ant-table"><thead><tr><th>通知公告编号</th><th>内容摘要</th><th>通知公告类型/状态</th><th>发布时间</th><th>操作按钮</th></tr></thead><tbody id="tbody-published"></tbody></table></div><div id="pageBar-published" class="mt-4"></div></div>
    </main>
  </div>
</div>
<script>
var RTE_TPL='<div class="rte-toolbar"><button type="button" onclick="rteExec(\'bold\')" title="加粗"><b>B</b></button><button type="button" onclick="rteExec(\'italic\')" title="斜体"><i>I</i></button><button type="button" onclick="rteExec(\'underline\')" title="下划线"><u>U</u></button><span class="rte-sep"></span><button type="button" onclick="rteExec(\'formatBlock\',\'h3\')" title="标题">H</button><button type="button" onclick="rteExec(\'formatBlock\',\'p\')" title="正文">P</button><span class="rte-sep"></span><button type="button" onclick="rteExec(\'insertUnorderedList\')" title="无序列表">•</button><button type="button" onclick="rteExec(\'insertOrderedList\')" title="有序列表">1.</button></div><div class="rte-editor" contenteditable="true" data-placeholder="请输入正文内容..."></div>';
function rteExec(cmd,val){
  document.execCommand(cmd,false,val||null);
  var sel=window.getSelection();
  if(sel.rangeCount>0){
    var ed=sel.anchorNode;while(ed&&!ed.classList.contains('rte-editor'))ed=ed.parentNode;
    if(ed)ed.focus();
  }
}
const PAGE_ID='notice';
function switchTab(el,tabId){
  document.querySelectorAll('.ant-tab').forEach(function(t){t.classList.remove('active')});
  el.classList.add('active');
  ['tab-all','tab-draft','tab-pending','tab-published'].forEach(function(id){
    document.getElementById(id).style.display=id===tabId?'':'none';
  });
  currentTab=tabId.replace('tab-','');
  if(pagers[currentTab])pagers[currentTab].reset();
  renderTable(currentTab);
}

var noticeData=[
  {id:'INF20260427001',summary:'关于开展2026年度智能网联汽车道路测试安全专项检查工作的通知',type:'announce',typeLabel:'公告公示',typeCls:'ant-tag-processing',creator:'平台运营管理员',audience:'所有测试企业',status:'published',statusLabel:'已发布',statusCls:'ant-tag-success',time:'2026-04-27 09:00'},
  {id:'INF20260427002',summary:'关于调整测试车辆数据上报频率的说明',type:'guide',typeLabel:'办事指南',typeCls:'ant-tag-default',creator:'技术支持组',audience:'所有测试企业',status:'published',statusLabel:'已发布',statusCls:'ant-tag-success',time:'2026-04-27 10:30'},
  {id:'INF20260427003',summary:'2026年第二季度示范应用运营数据分析报告审核通知',type:'report',typeLabel:'测试示范报告',typeCls:'ant-tag-warning',creator:'商业化试点管理员',audience:'所有运营企业',status:'pending',statusLabel:'待审核',statusCls:'ant-tag-processing',time:'2026-04-27 11:00'},
  {id:'INF20260426001',summary:'关于车辆故障告警处理流程优化的建议征集',type:'announce',typeLabel:'公告公示',typeCls:'ant-tag-processing',creator:'安全管理员',audience:'所有运维人员',status:'draft',statusLabel:'草稿箱',statusCls:'ant-tag-default',time:'2026-04-26 14:00'},
  {id:'INF20260425001',summary:'关于近期恶劣天气下自动驾驶测试注意事项的通知',type:'guide',typeLabel:'办事指南',typeCls:'ant-tag-default',creator:'技术支持组',audience:'所有测试企业',status:'published',statusLabel:'已发布',statusCls:'ant-tag-success',time:'2026-04-25 16:00'}
];
var tabConfig={all:{filter:function(d){return true;},tbody:'tbody-all',bar:'pageBar-all',cols:8},draft:{filter:function(d){return d.status==='draft';},tbody:'tbody-draft',bar:'pageBar-draft',cols:5},pending:{filter:function(d){return d.status==='pending';},tbody:'tbody-pending',bar:'pageBar-pending',cols:5},published:{filter:function(d){return d.status==='published';},tbody:'tbody-published',bar:'pageBar-published',cols:5}};
var pagers={};var currentTab='all';
function typeTag(d){return '<span class="ant-tag '+d.typeCls+'">'+d.typeLabel+'</span>';}
function statusTag(d){return '<span class="ant-tag '+d.statusCls+'">'+d.statusLabel+'</span>';}
function buildOps(d){
  if(d.status==='draft')return '<button class="ant-btn-link" onclick="openNoticeModal()">编辑</button><button class="ant-btn-link danger" onclick="confirmDelete(\''+d.id+'\')">删除</button>';
  if(d.status==='pending')return '<button class="ant-btn-link" onclick="openDetailModal(\''+d.id+'\')">查看</button><button class="ant-btn-link danger" onclick="confirmWithdraw(\''+d.id+'\')">撤回</button>';
  return '<button class="ant-btn-link" onclick="openDetailModal(\''+d.id+'\')">查看</button><button class="ant-btn-link" style="color:#faad14" onclick="openNoticeModal()">编辑</button><button class="ant-btn-link danger" onclick="confirmWithdraw(\''+d.id+'\')">撤回</button>';
}
function buildRow(d,tabKey){
  var ops=buildOps(d);
  if(tabKey==='all')return '<tr><td>'+d.id+'</td><td>'+d.summary+'</td><td>'+typeTag(d)+'</td><td>'+d.creator+'</td><td>'+d.audience+'</td><td>'+statusTag(d)+'</td><td>'+d.time+'</td><td class="flex gap-1">'+ops+'</td></tr>';
  return '<tr><td>'+d.id+'</td><td>'+d.summary+'</td><td>'+typeTag(d)+' - '+d.creator+'</td><td>'+d.time+'</td><td class="flex gap-1">'+ops+'</td></tr>';
}
function renderTable(tabKey){
  var cfg=tabConfig[tabKey];var data=noticeData.filter(cfg.filter);var pager=pagers[tabKey];
  var cp=pager?pager.getCurrentPage():1;var ps=pager?pager.getPageSize():10;
  var start=(cp-1)*ps;var pd=data.slice(start,start+ps);var h='';
  pd.forEach(function(d){h+=buildRow(d,tabKey);});
  if(h==='')h='<tr><td colspan="'+cfg.cols+'" style="text-align:center;color:#00000073;padding:24px">暂无数据</td></tr>';
  document.getElementById(cfg.tbody).innerHTML=h;
  if(pager)pager.setTotal(data.length);
}
function openDetailModal(id){
  var d=noticeData.find(function(x){return x.id===id;});if(!d)return;
  var html='<div class="ant-descriptions"><div class="ant-descriptions-row"><div class="ant-descriptions-label">通知公告编号</div><div class="ant-descriptions-value">'+d.id+'</div><div class="ant-descriptions-label">信息类型</div><div class="ant-descriptions-value">'+typeTag(d)+'</div></div><div class="ant-descriptions-row"><div class="ant-descriptions-label">标题</div><div class="ant-descriptions-value" style="flex:1">'+d.summary+'</div></div><div class="ant-descriptions-row"><div class="ant-descriptions-label">创建人</div><div class="ant-descriptions-value">'+d.creator+'</div><div class="ant-descriptions-label">目标受众</div><div class="ant-descriptions-value">'+d.audience+'</div></div><div class="ant-descriptions-row"><div class="ant-descriptions-label">发布状态</div><div class="ant-descriptions-value">'+statusTag(d)+'</div><div class="ant-descriptions-label">时间</div><div class="ant-descriptions-value">'+d.time+'</div></div></div><h4 class="text-sm font-semibold text-[#000000d9] mb-2 mt-4 pb-2 border-b border-[#f0f0f0]">正文内容</h4><div class="p-3 bg-[#fafafa] rounded text-sm leading-relaxed">此处展示「'+d.typeLabel+'」的正文详细内容，支持富文本格式（加粗、斜体、列表、标题等）。</div>';
  openModal('信息详情 - '+id,html,{wide:true,footer:'<button class="ant-btn" onclick="closeModal()">关闭</button>'});
}
function confirmWithdraw(id){openModal('撤回确认','<p class="text-sm text-[#000000d9]">确认撤回该信息发布吗？撤回后该信息将不再对外展示，可重新编辑后再次提交审核。</p>',{footer:'<button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn ant-btn-primary" onclick="doWithdraw(\''+id+'\')">确认撤回</button>'});}
function doWithdraw(id){var i=noticeData.findIndex(function(x){return x.id===id;});if(i>-1){noticeData[i].status='draft';noticeData[i].statusLabel='草稿箱';noticeData[i].statusCls='ant-tag-default';}closeModal();renderTable(currentTab);showNoticeToast('已撤回');}
function confirmDelete(id){openModal('删除确认','<p class="text-sm text-[#000000d9]">确认删除该信息吗？删除后不可恢复。</p>',{footer:'<button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn ant-btn-primary" onclick="doDelete(\''+id+'\')" style="background:#ff4d4f;border-color:#ff4d4f">确认删除</button>'});}
function doDelete(id){noticeData=noticeData.filter(function(x){return x.id!==id;});closeModal();renderTable(currentTab);showNoticeToast('已删除');}
function showNoticeToast(msg){var t=document.createElement('div');t.style.cssText='position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:10000;background:#52c41a;color:#fff;padding:10px 24px;border-radius:6px;font-size:14px;box-shadow:0 4px 12px rgba(0,0,0,.15)';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.style.transition='opacity .3s';t.style.opacity='0';setTimeout(function(){t.remove();},300);},1500);}
document.addEventListener('DOMContentLoaded',function(){['all','draft','pending','published'].forEach(function(tabKey){var cfg=tabConfig[tabKey];pagers[tabKey]=new Pagination({container:cfg.bar,pageSize:10,pageSizeOptions:[10,20,50,100],onPageChange:function(){renderTable(currentTab);},onPageSizeChange:function(){if(pagers[currentTab])pagers[currentTab].reset();renderTable(currentTab);}});});switchTab(document.querySelector('.ant-tab'),'tab-all');});

function openNoticeModal(){
  openModal('新建信息发布申请',
    '<div class="mb-4">' +
      '<h4 class="text-sm font-semibold text-[#000000d9] mb-3 pb-2 border-b border-[#f0f0f0]">基本信息填写</h4>' +
      '<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>信息类型</div><div class="ant-form-control"><select class="ant-input" id="infoTypeSelect" onchange="toggleInfoFields(this.value)" style="cursor:pointer"><option value="">请选择信息类型</option><option value="announce">公告公示</option><option value="guide">办事指南</option><option value="report">测试示范报告</option></select></div></div>' +
      '<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>标题</div><div class="ant-form-control"><input class="ant-input" placeholder="请输入标题"></div></div>' +
      '<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>创建人</div><div class="ant-form-control"><select class="ant-input" style="cursor:pointer"><option value="">请选择创建人</option><option>平台运营管理员</option><option>安全管理员</option><option>技术支持组</option><option>商业化试点管理员</option><option>其他部门</option></select></div></div>' +
    '</div>' +

    '<!-- 公告公示填写项 -->' +
    '<div id="fields-announce" style="display:none">' +
      '<h4 class="text-sm font-semibold text-[#000000d9] mb-3 pb-2 border-b border-[#f0f0f0]">公告公示</h4>' +
      '<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>子类型</div><div class="ant-form-control"><select class="ant-input" style="cursor:pointer"><option value="">请选择子类型</option><option>系统公告</option><option>重要通知</option><option>政策发布</option><option>会议通知</option></select></div></div>' +
      '<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>发布范围</div><div class="ant-form-control"><select class="ant-input" style="cursor:pointer"><option value="">请选择发布范围</option><option>所有测试企业</option><option>所有运维人员</option><option>所有运营企业</option><option>特定企业</option><option>公众用户</option></select></div></div>' +
      '<div class="ant-form-item"><div class="ant-form-label">有效期至</div><div class="ant-form-control"><input class="ant-input" type="date"></div></div>' +
      '<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>正文内容</div><div class="ant-form-control">'+RTE_TPL+'</div></div>' +
      '<div class="ant-form-item"><div class="ant-form-label">附件上传</div><div class="ant-form-control"><button class="ant-btn ant-btn-sm">选择附件上传</button><div class="text-xs text-[#00000040] mt-1">支持PDF/Word/图片等格式，图片≤5MB、文档≤20MB</div></div></div>' +
    '</div>' +

    '<!-- 办事指南填写项 -->' +
    '<div id="fields-guide" style="display:none">' +
      '<h4 class="text-sm font-semibold text-[#000000d9] mb-3 pb-2 border-b border-[#f0f0f0]">办事指南</h4>' +
      '<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>适用对象</div><div class="ant-form-control"><input class="ant-input" placeholder="请输入适用对象描述"></div></div>' +
      '<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>有效期至</div><div class="ant-form-control"><input class="ant-input" placeholder="请输入有效截止日期"></div></div>' +
      '<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>正文内容</div><div class="ant-form-control">'+RTE_TPL+'</div></div>' +
      '<div class="ant-form-item"><div class="ant-form-label">附件上传</div><div class="ant-form-control"><button class="ant-btn ant-btn-sm">选择附件上传</button></div></div>' +
    '</div>' +

    '<!-- 测试示范报告填写项 -->' +
    '<div id="fields-report" style="display:none">' +
      '<h4 class="text-sm font-semibold text-[#000000d9] mb-3 pb-2 border-b border-[#f0f0f0]">测试示范报告</h4>' +
      '<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>报告周期</div><div class="ant-form-control"><select class="ant-input" style="cursor:pointer"><option value="">请选择报告周期</option><option>月度</option><option>季度</option><option>半年度</option><option>年度</option></select></div></div>' +
      '<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>报告概述</div><div class="ant-form-control"><textarea class="ant-input" rows="3" placeholder="请输入报告概述，最长500字" maxlength="500" onkeyup="this.nextElementSibling.textContent=this.value.length+\'/500字\'" style="resize:vertical"></textarea><div class="text-xs text-[#00000040] mt-1">0/500字</div></div></div>' +
      '<div class="ant-form-item"><div class="ant-form-label">关键数据概览</div><div class="ant-form-control"><textarea class="ant-input" rows="2" placeholder="用于列表页展示，最长300字" maxlength="300" onkeyup="this.nextElementSibling.textContent=this.value.length+\'/300字\'" style="resize:vertical"></textarea><div class="text-xs text-[#00000040] mt-1">0/300字</div></div></div>' +
      '<div class="ant-form-item"><div class="ant-form-label"><span class="required">*</span>报告正文</div><div class="ant-form-control">'+RTE_TPL+'</div></div>' +
      '<div class="ant-form-item"><div class="ant-form-label">附件上传</div><div class="ant-form-control"><button class="ant-btn ant-btn-sm">选择附件上传</button><div class="text-xs text-[#00000040] mt-1">支持PDF/Excel等格式，文档≤20MB</div></div></div>' +
    '</div>',
    {wide:true,footer:'<button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn" onclick="closeModal()">保存草稿</button><button class="ant-btn ant-btn-primary" onclick="closeModal()">提交审核'});
}

function toggleInfoFields(type){
  document.getElementById('fields-announce').style.display=type==='announce'?'':'none';
  document.getElementById('fields-guide').style.display=type==='guide'?'':'none';
  document.getElementById('fields-report').style.display=type==='report'?'':'none';
}
</script>
<script src="../../common.js"></script>
</body>
</html>
