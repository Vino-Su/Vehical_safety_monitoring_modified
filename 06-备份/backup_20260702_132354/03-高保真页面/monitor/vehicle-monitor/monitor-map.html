<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>监控一张图 - 智能网联汽车安全监测平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{DEFAULT:'#1677ff',hover:'#4096ff',disabled:'#85a5cc'}}}}}</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <style>
    .leaflet-control-attribution,.leaflet-control-zoom{display:none!important}
    .leaflet-container{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:#eef3f7}
    .leaflet-div-icon,.vehicle-div-icon,.label-div-icon,.facility-div-icon,.accident-div-icon{background:transparent;border:0}
    .leaflet-popup-content-wrapper{border-radius:8px;padding:0;box-shadow:none;background:transparent}
    .leaflet-popup-content{margin:0}
    .leaflet-popup-tip{display:none}
    .layer-switch{position:relative;display:inline-block;width:36px;height:20px}
    .layer-switch input{opacity:0;width:0;height:0}
    .layer-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#d9d9d9;border-radius:20px;transition:.3s}
    .layer-slider:before{content:"";position:absolute;height:16px;width:16px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.3s}
    .layer-switch input:checked+.layer-slider{background:#1677ff}
    .layer-switch input:checked+.layer-slider:before{transform:translateX(16px)}
    .vehicle-marker{width:34px;height:28px;border-radius:8px 8px 10px 10px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.3);cursor:pointer;border:2px solid #fff;transition:transform .2s;position:relative;letter-spacing:0}
    .vehicle-marker:before{content:"";position:absolute;top:-7px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:8px solid #1677ff}
    .vehicle-marker:after{content:"";position:absolute;bottom:-5px;left:7px;width:20px;height:5px;background:rgba(0,0,0,.16);border-radius:50%}
    .vehicle-marker:hover{transform:scale(1.2)}
    .vehicle-marker.auto{background:#1677ff}
    .vehicle-marker.manual{background:#52c41a}
    .vehicle-marker.testing{background:#722ed1}
    .vehicle-marker.alarm{background:#ff4d4f;animation:pulse-alarm 1s infinite}
    .vehicle-marker.offline{background:#d9d9d9;color:#999}
    .vehicle-marker.auto:before{border-bottom-color:#1677ff}
    .vehicle-marker.manual:before{border-bottom-color:#52c41a}
    .vehicle-marker.testing:before{border-bottom-color:#722ed1}
    .vehicle-marker.alarm:before{border-bottom-color:#ff4d4f}
    .vehicle-marker.offline:before{border-bottom-color:#d9d9d9}
    @keyframes pulse-alarm{0%,100%{box-shadow:0 0 0 0 rgba(255,77,79,.4)}50%{box-shadow:0 0 0 8px rgba(255,77,79,0)}}
    .alarm-badge{position:absolute;top:-6px;right:-6px;min-width:16px;height:16px;line-height:16px;text-align:center;background:#ff4d4f;color:#fff;font-size:10px;border-radius:8px;padding:0 4px;font-weight:600}
    .accident-marker{width:28px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);background:#fadb14}
    .info-window{background:#fff;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.15);padding:16px;min-width:280px;max-width:360px;font-size:13px}
    .info-window .iw-title{font-size:14px;font-weight:600;color:#000000d9;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #f0f0f0}
    .info-window .iw-row{display:flex;justify-content:space-between;padding:3px 0}
    .info-window .iw-label{color:#00000073}
    .info-window .iw-value{color:#000000d9;font-weight:500}
    .info-window .iw-actions{margin-top:10px;padding-top:8px;border-top:1px solid #f0f0f0;display:flex;gap:8px;flex-wrap:wrap}
    .info-window .iw-close{position:absolute;top:8px;right:8px;cursor:pointer;color:#00000040;font-size:16px;line-height:1}
    .info-window .iw-close:hover{color:#000000d9}
    .info-window .iw-tabs{display:flex;border-bottom:1px solid #f0f0f0;margin-bottom:10px}
    .info-window .iw-tab{padding:6px 14px;font-size:13px;color:#00000073;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.2s;white-space:nowrap}
    .info-window .iw-tab:hover{color:#1677ff}
    .info-window .iw-tab.active{color:#1677ff;border-bottom-color:#1677ff;font-weight:500}
    .info-window .iw-tab-pane{display:none}
    .info-window .iw-tab-pane.active{display:block}
    .info-window .iw-alarm-list{max-height:200px;overflow-y:auto;margin-top:2px}
    .info-window .iw-alarm-item{padding:8px 0;border-bottom:1px dashed #f0f0f0}
    .info-window .iw-alarm-item:last-child{border-bottom:0}
    .info-window .iw-alarm-head{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:4px}
    .info-window .iw-alarm-type{font-size:12px;font-weight:600;color:#000000d9}
    .info-window .iw-alarm-time{font-size:11px;color:#00000073;white-space:nowrap}
    .info-window .iw-alarm-row{font-size:11px;color:#00000073;line-height:18px}
    .fence-label{background:rgba(22,119,255,.12);border:2px dashed #1677ff;border-radius:4px;padding:4px 8px;font-size:11px;color:#1677ff;white-space:nowrap}
    .fence-label.forbidden{background:rgba(255,77,79,.1);border-color:#ff4d4f;color:#ff4d4f}
    .fence-label.speed{background:rgba(250,173,20,.1);border-color:#faad14;color:#faad14}
    .road-open{stroke:#52c41a;stroke-width:4;stroke-opacity:.7}
    .road-paused{stroke:#faad14;stroke-width:4;stroke-opacity:.7;stroke-dasharray:8 4}
    .road-closed{stroke:#ff4d4f;stroke-width:4;stroke-opacity:.7;stroke-dasharray:4 4}
    .facility-marker{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;border:1.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}
    .facility-marker.charger{background:#52c41a;color:#fff}
    .facility-marker.signal{background:#722ed1;color:#fff}
    .facility-marker.sensor{background:#1677ff;color:#fff}
    .traj-slider{-webkit-appearance:none;appearance:none;height:6px;background:#e5e7eb;border-radius:3px;outline:none}
    .traj-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:#1677ff;cursor:pointer;box-shadow:0 1px 4px rgba(22,119,255,.4)}
    .traj-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#1677ff;cursor:pointer;border:none}
    .monitor-shell{display:flex;flex-direction:column;gap:12px;height:100%;min-height:0}
    .situation-bar{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;flex-shrink:0}
    .situation-item{height:76px;background:#fff;border:1px solid #f0f0f0;border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:14px;text-align:left;transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.03);cursor:pointer;min-width:0}
    .situation-item:hover{border-color:#91caff;box-shadow:0 2px 8px rgba(22,119,255,.12)}
    .situation-item.danger{border-color:#ffccc7;background:linear-gradient(180deg,#fff,#fff7f6)}
    .situation-item.warning{border-color:#ffe7ba;background:linear-gradient(180deg,#fff,#fffaf0)}
    .situation-icon{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
    .situation-meta{min-width:0;flex:1;display:flex;flex-direction:column;justify-content:center;gap:2px}
    .situation-row{display:flex;align-items:baseline;gap:8px;white-space:nowrap}
    .situation-label{font-size:13px;color:#00000073;line-height:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .situation-value{font-family:DIN,Arial,sans-serif;font-size:22px;font-weight:700;color:#000000d9;line-height:26px;display:inline;white-space:nowrap}
    .situation-sub{font-size:12px;color:#00000073;line-height:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .monitor-stage{position:relative;flex:1;min-height:0}
    .monitor-main{height:100%;min-height:0;display:flex;gap:12px}
    .map-card{flex:1;min-width:0;min-height:0;border-radius:8px;overflow:hidden;position:relative;background:#fff;border:1px solid #f0f0f0}
    .map-toolbar{position:absolute;top:16px;right:16px;z-index:760;display:flex;flex-direction:column;gap:8px}
    .map-tool-btn{width:38px;height:38px;padding:0;border:1px solid #d9d9d9;background:#fff;border-radius:8px;color:#000000d9;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.10);cursor:pointer}
    .map-tool-btn:hover{color:#1677ff;border-color:#1677ff}
    .map-tool-btn svg{width:18px;height:18px;stroke:currentColor}
    .float-panel{position:absolute;top:16px;right:64px;background:#fff;border:1px solid #f0f0f0;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:780;display:none;max-height:calc(100% - 72px);overflow-y:auto}
    .float-panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px}
    .float-panel-title{font-size:14px;font-weight:600;color:#000000d9}
    .float-panel-body{padding:0 16px 16px}
    .panel-section{border-top:1px solid #f0f0f0;padding-top:12px;margin-top:12px}
    .panel-section:first-child{border-top:0;margin-top:0;padding-top:0}
    .section-title{font-size:12px;color:#00000073;margin-bottom:8px}
    .layer-row{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:30px;font-size:13px;color:#000000d9}
    .filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .context-panel{width:390px;min-width:360px;max-width:420px;background:#fff;border:1px solid #f0f0f0;border-radius:8px;display:flex;flex-direction:column;min-height:0;overflow:hidden}
    .context-head{padding:14px 16px 10px;border-bottom:1px solid #f0f0f0;flex-shrink:0}
    .context-title{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .context-title h3{font-size:15px;font-weight:600;color:#000000d9;line-height:22px}
    .live-pill{display:inline-flex;align-items:center;gap:6px;height:24px;padding:0 8px;border-radius:12px;background:#f6ffed;color:#389e0d;font-size:12px;white-space:nowrap}
    .live-dot{width:6px;height:6px;border-radius:50%;background:#52c41a;box-shadow:0 0 0 4px rgba(82,196,26,.14)}
    .warning-overview{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:12px}
    .overview-cell{border-radius:6px;background:#fafafa;border:1px solid #f0f0f0;padding:8px 8px;text-align:left;cursor:pointer;transition:.18s;min-width:0}
    .overview-cell:hover{border-color:#91caff;background:#f0f7ff}
    .overview-cell.active{border-color:#1677ff;background:#e6f4ff;box-shadow:0 2px 8px rgba(22,119,255,.12)}
    .overview-cell .num{font-family:DIN,Arial,sans-serif;font-size:18px;font-weight:700;line-height:22px}
    .overview-cell .txt{font-size:11px;color:#00000073;line-height:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .warning-list{flex:1;min-height:0;overflow-y:auto;padding:12px 16px}
    .warning-card{border:1px solid #f0f0f0;border-radius:8px;background:#fff;padding:10px 10px 9px;margin-bottom:8px;cursor:pointer;transition:.2s}
    .warning-card:hover{border-color:#91caff;box-shadow:0 2px 8px rgba(22,119,255,.10)}
    .warning-card.active{border-color:#1677ff;background:#f0f7ff}
    .warning-card.event-warning{border-left:3px solid #1677ff}
    .warning-card.event-alarm{border-left:3px solid #fa8c16}
    .warning-card-main{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
    .warning-type{font-size:13px;font-weight:600;color:#000000d9;line-height:20px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .warning-time{font-size:12px;color:#00000073;white-space:nowrap}
    .warning-line{font-size:12px;color:#00000073;line-height:18px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .warning-expand{display:none;margin-top:8px;padding-top:8px;border-top:1px dashed #f0f0f0}
    .warning-card.active .warning-expand{display:block}
    .vehicle-drawer{position:absolute;left:0;right:402px;bottom:0;background:#fff;border:1px solid #d9d9d9;border-radius:8px 8px 0 0;box-shadow:0 -8px 24px rgba(0,0,0,.12);z-index:790;height:40%;min-height:292px;display:flex;flex-direction:column;transition:.25s}
    .vehicle-drawer.collapsed{height:46px;min-height:46px}
    .drawer-head{height:46px;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 16px;border-bottom:1px solid #f0f0f0;flex-shrink:0}
    .drawer-summary{display:flex;align-items:center;gap:14px;font-size:13px;color:#00000073}
    .drawer-body{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
    .vehicle-drawer.collapsed .drawer-body{display:none}
    .drawer-table-wrap{flex:1;min-height:0;overflow:auto}
    .vehicle-pin-wrap{position:relative;width:38px;height:38px;display:flex;align-items:center;justify-content:center}
    .vehicle-pin-wrap.has-event:before{content:"";position:absolute;inset:-3px;border-radius:12px;border:2px solid #1677ff;animation:pulse-alarm 1.2s infinite}
    .vehicle-pin-wrap.has-event.event-alarm:before{border-color:#fa8c16}
    .vehicle-marker.selected{outline:3px solid rgba(22,119,255,.35)}
    .vehicle-plate-label{position:absolute;left:50%;top:34px;transform:translateX(-50%);height:18px;line-height:18px;padding:0 6px;border-radius:9px;background:#fff;border:1px solid #d9d9d9;color:#000000d9;font-size:10px;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.12);pointer-events:none}
    .fallback-map-layer{position:absolute;inset:0;z-index:12;pointer-events:none}
    .fallback-map-layer .fallback-vehicle-point{position:absolute;transform:translate(-50%,-50%);pointer-events:auto}
    #legendPanel{transition:bottom .25s ease;max-height:calc(100% - 72px);overflow:auto}
    .trajectory-panel{position:absolute;left:12px;right:12px;bottom:58px;z-index:785;background:rgba(255,255,255,.98);border:1px solid #e8e8e8;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.14);backdrop-filter:blur(4px);transition:bottom .25s ease}
    .traj-shell{padding:8px 10px;display:flex;flex-direction:column;gap:7px}
    .traj-top{display:flex;align-items:center;justify-content:space-between;gap:12px;min-width:0}
    .traj-query{display:flex;align-items:center;gap:5px;flex-wrap:nowrap;min-width:0;overflow:hidden}
    .traj-query-group{display:flex;align-items:center;gap:6px;font-size:12px;min-width:0}
    .traj-query-label{color:#00000073;white-space:nowrap}
    .traj-query input,.traj-query select{height:26px;font-size:12px;border:1px solid #d9d9d9;border-radius:4px;padding:0 5px;background:#fff}
    .traj-metrics{display:flex;align-items:center;gap:10px;flex-shrink:0}
    .traj-metric{display:flex;align-items:baseline;gap:4px;text-align:left;min-width:auto}
    .traj-metric-label{font-size:11px;color:#00000073;line-height:16px;white-space:nowrap}
    .traj-metric-value{font-size:14px;font-weight:600;line-height:18px;color:#000000d9;white-space:nowrap}
    .traj-close{width:24px;height:24px;border:0;background:transparent;color:#00000040;font-size:18px;line-height:24px;cursor:pointer}
    .traj-close:hover{color:#000000d9}
    .traj-controls{display:grid;grid-template-columns:auto 36px minmax(140px,1fr) 36px;align-items:center;gap:7px}
    .traj-buttons{display:flex;align-items:center;gap:4px;flex-wrap:nowrap}
    .traj-buttons .ant-btn{height:28px;min-width:30px;padding:2px 7px;font-size:13px}
    .traj-play{width:64px}
    .traj-speed{width:64px;height:28px;font-size:12px;border:1px solid #d9d9d9;border-radius:4px;padding:0 4px;background:#fff}
    .traj-time-label{font-size:12px;font-weight:500;color:#00000073;white-space:nowrap}
    .traj-slider-wrap{position:relative;min-width:0}
    .traj-range{width:100%;height:6px;-webkit-appearance:none;appearance:none;background:#e8e8e8;border-radius:3px;outline:none;cursor:pointer;display:block}
    .traj-progress-bg{position:absolute;top:0;left:0;height:6px;pointer-events:none;width:0;border-radius:3px;background:#1677ff}
    .status-muted{color:#00000073}
    .empty-state{height:160px;display:flex;align-items:center;justify-content:center;text-align:center;color:#00000040;font-size:13px;line-height:22px}
    @media (max-width:1400px){
      .situation-item{height:70px;padding:10px 14px;gap:12px}
      .situation-icon{width:36px;height:36px;font-size:14px}
      .situation-label{font-size:12px}
      .situation-value{font-size:20px;line-height:24px}
      .situation-row{gap:6px}
      .situation-sub{font-size:11px}
      .context-panel{width:360px;min-width:340px}
      .vehicle-drawer{right:372px}
      .traj-top{align-items:flex-start}
      .traj-metrics{gap:8px}
    }
    @media (max-width:1280px){
      .situation-bar{grid-template-columns:repeat(3,1fr)}
      .situation-item{height:62px;padding:8px 12px;gap:10px}
      .situation-icon{width:32px;height:32px;font-size:13px;border-radius:6px}
      .situation-value{font-size:18px;line-height:22px}
      .situation-row{gap:5px}
      .situation-label{font-size:11px}
      .situation-sub{font-size:10px}
      .monitor-main{gap:10px}
      .context-panel{width:340px;min-width:320px}
      .vehicle-drawer{right:350px}
      .traj-top{flex-direction:column}
      .traj-metrics{width:100%;justify-content:space-between}
      .traj-metric-label{font-size:10px;line-height:14px}
      .traj-metric-value{font-size:13px;line-height:16px}
      .traj-controls{grid-template-columns:auto 36px minmax(120px,1fr) 36px;gap:6px}
      .traj-buttons{flex-wrap:nowrap}
    }
  </style>
</head>
<body>
<div id="app" class="flex h-screen overflow-hidden">
  <aside id="sidebar"></aside>
  <div class="flex-1 flex flex-col overflow-hidden min-w-0">
    <header id="topnav"></header>
    <main class="flex-1 overflow-hidden bg-[#f0f2f5] flex flex-col" style="padding:16px 24px 24px">
      <div class="monitor-shell">
        <div class="situation-bar">
          <button class="situation-item" onclick="applySituationQuickFilter('online')">
            <span class="situation-icon" style="background:#e6f4ff;color:#1677ff">车</span>
            <span class="situation-meta"><span class="situation-row"><span class="situation-label">在线车辆</span><span class="situation-value"><span id="statOnline">0</span>/<span id="statTotal">480</span></span></span><span class="situation-sub" id="statOnlineRate">在线率 --</span></span>
          </button>
          <button class="situation-item" onclick="applySituationQuickFilter('auto')">
            <span class="situation-icon" style="background:#f6ffed;color:#389e0d">自</span>
            <span class="situation-meta"><span class="situation-row"><span class="situation-label">自动驾驶</span><span class="situation-value" id="statAuto">0</span></span><span class="situation-sub">点击筛选自动驾驶车辆</span></span>
          </button>
          <button class="situation-item" onclick="applySituationQuickFilter('warningEvent')">
            <span class="situation-icon" style="background:#e6f4ff;color:#1677ff">预</span>
            <span class="situation-meta"><span class="situation-row"><span class="situation-label">预警事件</span><span class="situation-value" id="statWarningEvent">0</span></span><span class="situation-sub">安全/技术风险</span></span>
          </button>
          <button class="situation-item warning" onclick="applySituationQuickFilter('alarmEvent')">
            <span class="situation-icon" style="background:#fff7e6;color:#fa8c16">告</span>
            <span class="situation-meta"><span class="situation-row"><span class="situation-label">告警事件</span><span class="situation-value" id="statAlarmEvent">0</span></span><span class="situation-sub">合规违规通知</span></span>
          </button>
          <button class="situation-item warning" onclick="applySituationQuickFilter('accidents')">
            <span class="situation-icon" style="background:#fff7e6;color:#d46b08">事</span>
            <span class="situation-meta"><span class="situation-row"><span class="situation-label">当日事故</span><span class="situation-value" id="statAccident">0</span></span><span class="situation-sub">点击开启事故图层</span></span>
          </button>
        </div>
        <div class="monitor-stage">
          <div class="monitor-main">
            <div class="map-card">
              <div id="mapContainer" class="w-full h-full"></div>
              <div id="fallbackVehicleLayer" class="fallback-map-layer"></div>
              <div class="map-toolbar">
                <button class="map-tool-btn" onclick="toggleLayerPanel()" title="图层控制" aria-label="图层控制">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 3 3 8l9 5 9-5-9-5Z"/><path d="m3 13 9 5 9-5"/><path d="m3 18 9 5 9-5"/></svg>
                </button>
                <button class="map-tool-btn" onclick="toggleFilterPanel()" title="数据筛选" aria-label="数据筛选">

  return '<span class="ant-tag" style="'+sizeStyle+'color:'+color+';background:'+(category==='告警'?'#fff7e6':'#e6f4ff')+';border-color:'+(category==='告警'?'#ffd591':'#91caff')+'">'+category+'</span>';
}

function getEventTypePrefix(type){
  var map={
    '车辆运行异常预警':'EW01',
    '车辆碰撞事件预警':'EW02',
    '车载终端异常预警':'EW03',
    '临牌有效期告警':'ALT04',
    '电子围栏越界告警':'ALT05',
    '测试时段合规性告警':'ALT06',
    '安全员到岗状态告警':'ALT07'
  };
  return map[type]||'EW01';
}

function getWarningEvents(){
  var events=[];
  vehicleData.forEach(function(v){
    if(!v.alarmList||!v.alarmList.length)return;
    v.alarmList.forEach(function(desc,idx){
      var category=(v.eventCategories&&v.eventCategories[idx])||'预警';
      var type=(v.alarmTypes&&v.alarmTypes[idx])||(category==='告警'?'电子围栏越界告警':'车辆运行异常预警');
      var timeMatch=desc.match(/(\d{1,2}:\d{2})/);
      var time=timeMatch?timeMatch[1]:v.lastTime.slice(11,16);
      var prefix=getEventTypePrefix(type);
      events.push({
        id:prefix+'-20260511-'+String(idx+1).padStart(3,'0'),
        vehicleId:v.id,
        plate:v.plate,
        vin:v.vin,
        company:v.company,
        category:category,
        type:type,
        time:time,
        fullTime:'2026-05-11 '+time+':00',
        desc:desc,
        status:idx===0?'未处理':'处理中',
        location:type==='电子围栏越界告警'?'襄阳高新区测试道路 · 2.3km':type==='车载终端异常预警'?'长虹路测试段 · 1.1km':'檀溪路测试段 · 0.8km',
        rule:type==='电子围栏越界告警'?'车辆驶出授权电子围栏边界，自动驾驶模式且车速不为0':type==='车载终端异常预警'?'车载终端数据连续异常或通信中断':'车辆运行指标触发监管阈值'
      });
    });
  });
  return events.sort(function(a,b){
    if(a.status!==b.status)return a.status==='未处理'?-1:1;
    if(a.category!==b.category)return a.category==='告警'?-1:1;
    return a.time<b.time?1:-1;
  });
}

function getFilteredWarningEvents(){
  var cfg=getAlarmFilterConfig();
  return getWarningEvents().filter(function(w){
    if(cfg.categories.indexOf(w.category)===-1)return false;
    if(cfg.types.indexOf(w.type)===-1)return false;
    if(warningQuickFilter==='warning'&&w.category!=='预警')return false;
    if(warningQuickFilter==='alarm'&&w.category!=='告警')return false;
    if(warningQuickFilter==='pending'&&w.status!=='未处理')return false;
    return true;
  });
}

function renderSituationBar(){
  var online=vehicleData.filter(function(v){return v.status!=='offline'}).length;
  var offline=vehicleData.filter(function(v){return v.status==='offline'}).length;
  var auto=vehicleData.filter(function(v){return v.mode==='auto'&&v.status!=='offline'}).length;
  var warnings=getWarningEvents();
  var warningCount=warnings.filter(function(w){return w.category==='预警'}).length;
  var alarmCount=warnings.filter(function(w){return w.category==='告警'}).length;
  var pending=warnings.filter(function(w){return w.status==='未处理'}).length;
  var todayAccidents=accidentData.filter(function(a){return a.time.startsWith('2026-05-11')}).length;
  var total=480;
  var onlineRate=Math.round(online/total*100);
  setText('statOnline',online);
  setText('statTotal',total);
  setText('statOnlineRate','在线率 '+onlineRate+'% · 离线 '+offline);
  setText('statAuto',auto);
  setText('statWarningEvent',warningCount);
  setText('statAlarmEvent',alarmCount);
  setText('statAccident',todayAccidents);
  setText('overviewAll',warnings.length);
  setText('overviewWarning',warningCount);
  setText('overviewAlarm',alarmCount);
  setText('overviewPending',pending);
  setText('drawerOnline',online);
  setText('drawerOffline',offline);
  setText('drawerEvent',vehicleData.filter(function(v){return v.status==='alarm'}).length);
}

function setText(id,value){
  var el=document.getElementById(id);
  if(el)el.textContent=value;
}

function renderWarningPanel(){
  renderSituationBar();
  document.querySelectorAll('.overview-cell[data-warning-filter]').forEach(function(btn){
    btn.classList.toggle('active',btn.dataset.warningFilter===warningQuickFilter);
  });
  var list=document.getElementById('warningList');
  if(!list)return;
  var events=getFilteredWarningEvents();
  if(!events.length){
    list.innerHTML='<div class="empty-state"><div><div style="font-size:15px;color:#00000073;margin-bottom:4px">暂无待处理异常事件</div><div>点击地图车辆可查看车辆实时状态和异常事件。</div></div></div>';
    return;
  }
  list.innerHTML=events.map(function(w){
    var active=w.id===selectedWarningId?' active':'';
    var levelCls=w.category==='告警'?'event-alarm':'event-warning';
    var tag=getEventCategoryTag(w.category);
    return '<div class="warning-card '+levelCls+active+'" onclick="selectWarning(\''+w.id+'\')">'+
      '<div class="warning-card-main"><div style="min-width:0;flex:1"><div class="warning-type">'+tag+' '+w.type+'</div></div><div class="warning-time">'+w.time+'</div></div>'+
      '<div class="warning-line">'+w.plate+' | '+w.company+'</div>'+
      '<div class="warning-line">'+w.location+'</div>'+
      '<div class="warning-expand">'+
        '<div class="warning-line">事件编号：'+w.id+'</div>'+
        '<div class="warning-line">VIN：'+w.vin+'</div>'+
        '<div class="warning-line">触发规则：'+w.rule+'</div>'+
        '<div class="warning-line">处理状态：'+w.status+'</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function selectWarning(id){
  selectedWarningId=selectedWarningId===id?null:id;
  var w=getWarningEvents().find(function(e){return e.id===id});
  if(w){
    selectedVehicleId=w.vehicleId;
    var v=vehicleData.find(function(d){return d.id===w.vehicleId});
    if(v){
      if(map)setMapView(v.lon,v.lat,16);
      showVehicleInfo(v);
    }
  }
  renderWarningPanel();
  highlightSelectedVehicle();
}

function setWarningQuickFilter(filter){

}

function clearSelectedVehicle(){

}

function getMarkerClass(v){
  if(v.status==='offline')return 'offline';
  if(v.mode==='auto')return 'auto';
  if(v.mode==='manual')return 'manual';
  return 'testing';
}

function getDominantEventCategory(v){
  if(!v.eventCategories||!v.eventCategories.length)return null;
  return v.eventCategories.indexOf('告警')!==-1?'告警':'预警';
}

function getVehicleMarkerHtml(v,withInlineClick){
  var cls=getMarkerClass(v);
  var category=getDominantEventCategory(v);
  var warnCls=v.alarms>0?' has-event '+(category==='告警'?'event-alarm':''):'';
  var selected=v.id===selectedVehicleId?' selected':'';
  var clickAttr=withInlineClick?' onclick="focusVehicle(\''+v.id+'\')"':'';
  var badgeColor=category?getEventCategoryColor(category):'#ff4d4f';
  return '<div class="vehicle-pin-wrap'+warnCls+'" data-vehicle-id="'+v.id+'"'+clickAttr+'>'+
    '<div class="vehicle-marker '+cls+selected+'">车</div>'+
    (v.alarms>0?'<span class="alarm-badge" style="background:'+badgeColor+'">'+v.alarms+'</span>':'')+
    '<span class="vehicle-plate-label">'+v.plate.slice(-3)+'</span>'+
  '</div>';
}

function toLatLng(lon,lat){
  return [lat,lon];
}

function pathToLatLng(path){
  return path.map(function(p){return [p[1],p[0]]});
}

function removeLayer(layer){
  if(layer&&map&&map.hasLayer&&map.hasLayer(layer))map.removeLayer(layer);
}

function addLayer(layer){
  if(layer&&map&&map.addLayer&&!map.hasLayer(layer))layer.addTo(map);
}

function removeLayers(layers){
  (layers||[]).forEach(function(layer){removeLayer(layer)});
}

function setLayersVisible(layers,visible){
  (layers||[]).forEach(function(layer){
    if(visible)addLayer(layer);
    else removeLayer(layer);
  });
}

function setMapView(lon,lat,zoom){
  if(map&&map.setView)map.setView(toLatLng(lon,lat),zoom||map.getZoom());
}

function fitLayerBounds(layer){
  if(!map||!layer||!layer.getBounds)return;
  map.fitBounds(layer.getBounds(),{padding:[30,30],maxZoom:16});
}

function makeDivIcon(className,html,size,anchor){
  return L.divIcon({
    className:className,
    html:html,
    iconSize:size,
    iconAnchor:anchor
  });
}

function shouldShowVehicle(v){
  if(!v)return false;
  var source=Array.isArray(filteredVehicleData)?filteredVehicleData:vehicleData;
  var visibleIds=source.map(function(item){return item.id});
  if(visibleIds.indexOf(v.id)===-1)return false;
  if(v.status==='alarm'&&!alarmMatchesFilter(v))return false;
  return true;
}

function renderFallbackVehicleLayer(){
  var layer=document.getElementById('fallbackVehicleLayer');
  if(!layer)return;
  var pts=[
    ['V001',63,43],['V002',58,37],['V003',52,50],['V004',69,41],['V005',39,54],
    ['V006',31,66],['V007',75,58],['V008',61,57],['V009',47,44],['V010',53,33],
    ['V011',67,68],['V012',57,27],['V013',73,47],['V014',34,76],['V015',65,35]
  ];
  layer.innerHTML=pts.map(function(p){
    var v=vehicleData.find(function(d){return d.id===p[0]});
    if(!shouldShowVehicle(v))return '';
    return '<div class="fallback-vehicle-point" style="left:'+p[1]+'%;top:'+p[2]+'%">'+getVehicleMarkerHtml(v,true)+'</div>';
  }).join('');
}

function loadVehicleLayer(){
  if(!map||typeof L==='undefined'){
    renderFallbackVehicleLayer();
    return;
  }
  removeLayers(vehicleOverlays);
  vehicleOverlays=[];
  vehicleData.forEach(function(v){
    var marker=L.marker(toLatLng(v.lon,v.lat),{
      icon:makeDivIcon('vehicle-div-icon',getVehicleMarkerHtml(v,false),[58,48],[29,24]),
      zIndexOffset:v.status==='alarm'?200:100
    });
    marker._vehicleData=v;
    marker.on('click',function(){showVehicleInfo(v)});
    vehicleOverlays.push(marker);
  });
  updateMapVisibility();
  highlightSelectedVehicle();
  renderFallbackVehicleLayer();
}

function getAlarmFilterConfig(){
  var types=[];
  document.querySelectorAll('.alarm-filter[data-type]').forEach(function(el){if(el.checked)types.push(el.dataset.type)});
  var categories=[];
  document.querySelectorAll('.event-category-filter[data-category]').forEach(function(el){if(el.checked)categories.push(el.dataset.category)});
  if(warningQuickFilter==='warning')categories=['预警'];
  if(warningQuickFilter==='alarm')categories=['告警'];
  return {categories:categories,types:types};
}

function alarmMatchesFilter(v){
  if(!v.alarmList||v.alarmList.length===0)return false;
  var cfg=getAlarmFilterConfig();
  if(!v.eventCategories||!v.alarmTypes)return true;
  for(var i=0;i<v.alarmList.length;i++){
    var category=v.eventCategories[i]||'预警';
    var typ=v.alarmTypes[i]||'车辆运行异常预警';
    if(cfg.categories.indexOf(category)!==-1&&cfg.types.indexOf(typ)!==-1)return true;
  }
  return false;
}

function applyAlarmFilter(){
  if(!map||typeof L==='undefined'){
    renderFallbackVehicleLayer();
    return;
  }
  removeLayers(alarmOverlays);
  alarmOverlays=[];
  vehicleData.filter(function(v){return v.status==='alarm'&&alarmMatchesFilter(v)}).forEach(function(v){
    var circle=L.circle(toLatLng(v.lon,v.lat),{
      radius:80,
      color:getEventCategoryColor(getDominantEventCategory(v)),
      opacity:0.6,
      weight:2,
      fillColor:getEventCategoryColor(getDominantEventCategory(v)),
      fillOpacity:0.08,
      interactive:false
    });
    circle._vehicleId=v.id;
    alarmOverlays.push(circle);
  });
  setLayersVisible(alarmOverlays,layerVisibility.alarms);
  updateMapVisibility();
}

function loadAlarmLayer(){
  applyAlarmFilter();
}

function loadFenceLayer(){
  if(!map||typeof L==='undefined')return;
  removeLayers(fenceOverlays);
  fenceOverlays=[];
  fenceData.forEach(function(f){
    var colorMap={open:'#52c41a',paused:'#faad14',closed:'#ff4d4f'};
    var color=colorMap[f.status]||'#1677ff';
    var polygon=L.polygon(pathToLatLng(f.path),{
      color:color,
      weight:2,
      opacity:0.9,
      dashArray:f.status==='open'?null:(f.status==='paused'?'8 4':'4 4'),
      fillColor:color,
      fillOpacity:0.12
    });
    polygon._fenceData=f;
    var labelCls=f.status==='open'?'fence-label':f.status==='paused'?'fence-label speed':'fence-label forbidden';
    var labelText=f.name;
    var center=f.path.reduce(function(acc,p){return [acc[0]+p[0]/f.path.length,acc[1]+p[1]/f.path.length]},[0,0]);
    var textMarker=L.marker(toLatLng(center[0],center[1]),{
      icon:makeDivIcon('label-div-icon','<span class="'+labelCls+'">'+labelText+'</span>',[140,24],[70,12]),
      interactive:false,
      zIndexOffset:55
    });
    polygon.on('click',function(){
      var statusLabel=f.status==='open'?'开放':f.status==='paused'?'暂停':'关闭';
      showInfoWindow(center[0],center[1],'<div class="info-window"><div class="iw-title">电子围栏 - '+f.name+'</div><div class="iw-row"><span class="iw-label">状态</span><span class="iw-value">'+statusLabel+'</span></div><div class="iw-row"><span class="iw-label">顶点数</span><span class="iw-value">'+f.path.length+'</span></div></div>');
    });
    fenceOverlays.push(polygon);
    fenceOverlays.push(textMarker);
  });
  setLayersVisible(fenceOverlays,true);
}

function loadRoadLayer(){
  if(!map||typeof L==='undefined')return;
  removeLayers(roadOverlays);
  roadOverlays=[];
  roadData.forEach(function(r){
    var color=r.status==='open'?'#52c41a':r.status==='paused'?'#faad14':'#ff4d4f';
    var dashArray=r.status==='open'?null:(r.status==='paused'?'8 4':'4 4');
    var polyline=L.polyline(pathToLatLng(r.path),{

      opacity:0.8,

    });
    polyline._roadData=r;
    var mid=r.path[Math.floor(r.path.length/2)];
    var textMarker=L.marker(toLatLng(mid[0],mid[1]),{
      icon:makeDivIcon('label-div-icon','<span style="background:#fff;padding:2px 6px;border-radius:3px;font-size:10px;color:'+color+';box-shadow:0 1px 3px rgba(0,0,0,.1);white-space:nowrap">'+r.name+'</span>',[100,24],[50,12]),
      interactive:false,
      zIndexOffset:45
    });
    roadOverlays.push(polyline);
    roadOverlays.push(textMarker);
  });
  setLayersVisible(roadOverlays,true);
}

var trajectoryState={vid:null,points:[],currentIndex:0,playing:false,speed:1,timer:null,startTime:'08:00',endTime:'14:32',movedMarker:null,passedLine:null};

function clearTrajectoryLayers(){
  removeLayer(trajectoryLine);
  trajectoryLine=null;
  removeLayer(trajectoryState.movedMarker);
  removeLayer(trajectoryState.passedLine);
  trajectoryState.movedMarker=null;
  trajectoryState.passedLine=null;
  if(trajectoryState.timer){clearInterval(trajectoryState.timer);trajectoryState.timer=null}
}

function createTrajectoryLayers(v,points){
  if(!map||typeof L==='undefined'){
    showToast('地图未加载完成，暂无法回放轨迹');
    return;
  }
  var path=points.map(function(p){return toLatLng(p.lon,p.lat)});
  trajectoryLine=L.polyline(path,{
    color:'#1677ff',
    weight:4,
    opacity:0.45,
    dashArray:'8 6',
    lineJoin:'round',
    lineCap:'round'
  }).addTo(map);
  trajectoryState.passedLine=L.polyline([path[0]],{
    color:'#1677ff',
    weight:5,
    opacity:0.95,
    lineJoin:'round',
    lineCap:'round'
  }).addTo(map);
  trajectoryState.movedMarker=L.marker(path[0],{
    icon:makeDivIcon('vehicle-div-icon','<div class="vehicle-marker auto" style="width:24px;height:24px;font-size:10px">'+v.plate.slice(-2)+'</div>',[24,24],[12,12]),
    zIndexOffset:220
  }).addTo(map);
  fitLayerBounds(trajectoryLine);
  layerVisibility.trajectory=true;
  var trajectoryToggle=document.querySelector('input[onchange*=trajectory]');
  if(trajectoryToggle)trajectoryToggle.checked=true;
}

function buildTrajectoryData(v,timeFrom,timeTo){
  var pts=[];
  var baseLon=v.lon,baseLat=v.lat;
  var fromH=timeFrom?parseInt(timeFrom.split(':')[0]):8,fromM=timeFrom?parseInt(timeFrom.split(':')[1]):0;
  var toH=timeTo?parseInt(timeTo.split(':')[0]):14,toM=timeTo?parseInt(timeTo.split(':')[1]):32;
  var totalMinutes=(toH*60+toM)-(fromH*60+fromM);
  var totalSteps=Math.max(2,Math.ceil(totalMinutes/15));
  var startHour=fromH,startMin=fromM;
  for(var i=0;i<totalSteps;i++){
    var ratio=i/(totalSteps-1);
    var minuteOffset=Math.round(totalMinutes*ratio);
    var hh=String(startHour+Math.floor((startMin+minuteOffset)/60)).padStart(2,'0');
    var mm=String((startMin+minuteOffset)%60).padStart(2,'0');
    var lon=baseLon-0.008+i*(0.016/(totalSteps-1))+(Math.random()-0.5)*0.0004;
    var lat=baseLat-0.004+i*(0.008/(totalSteps-1))+(Math.random()-0.5)*0.0003;
    var speed=Math.round(20+Math.random()*40);
    var statusOpts=['自动驾驶','自动驾驶','自动驾驶','人工接管','自动驾驶'];
    pts.push({
      idx:i,
      timeLabel:hh+':'+mm,
      timeStr:hh+':'+mm,
      lon:lon,
      lat:lat,
      speed:speed,
      acceleration:+((Math.random()-0.5)*0.8).toFixed(2),
      heading:Math.round(Math.random()*360),
      driveMode:statusOpts[Math.floor(Math.random()*statusOpts.length)],
      isKey:(i===0||i===totalSteps-1||(i%Math.max(1,Math.floor(totalSteps/4))===0&&i>0)),
      event:(i===0?'起点':i===totalSteps-1?'终点':'')
    });
  }
  return pts;
}

function showTrajectory(vid){
  var v=vehicleData.find(function(d){return d.id===vid});
  if(!v)return;
  clearTrajectoryLayers();
  var points=buildTrajectoryData(v,'08:00','14:32');
  trajectoryState={vid:vid,points:points,currentIndex:0,playing:false,speed:1,timer:null,startTime:points[0].timeStr,endTime:points[points.length-1].timeStr,movedMarker:null,passedLine:null};
  createTrajectoryLayers(v,points);
  openTrajectoryPanel(v);
}

  var panel=document.getElementById('trajectoryPanel');

    panel.className='trajectory-panel';

function reloadTrajectoryHistory(){
  var vid=document.getElementById('trajHistVehicle').value;
  var v=vehicleData.find(function(d){return d.id===vid});
  if(!v)return;
  clearTrajectoryLayers();
  var timeFrom=document.getElementById('trajHistTimeFrom')?document.getElementById('trajHistTimeFrom').value:'08:00';
  var timeTo=document.getElementById('trajHistTimeTo')?document.getElementById('trajHistTimeTo').value:'14:32';
  var points=buildTrajectoryData(v,timeFrom,timeTo);
  trajectoryState.vid=vid;trajectoryState.points=points;trajectoryState.currentIndex=0;trajectoryState.playing=false;
  trajectoryState.movedMarker=null;trajectoryState.passedLine=null;
  createTrajectoryLayers(v,points);
  openTrajectoryPanel(v);
}

function closeTrajectoryPanel(){
  var panel=document.getElementById('trajectoryPanel');
  if(panel)panel.style.display='none';
  if(trajectoryState.timer){clearInterval(trajectoryState.timer);trajectoryState.timer=null}
  trajectoryState.playing=false;
}

function togglePlayTrajectory(){
  trajectoryState.playing=!trajectoryState.playing;
  var btn=document.getElementById('trajPlayBtn');
  if(trajectoryState.playing){
    if(btn)btn.innerHTML='⏸ 暂停';
    if(trajectoryState.currentIndex>=trajectoryState.points.length-1)seekTrajectory(0);
    trajectoryState.timer=setInterval(function(){
      if(trajectoryState.currentIndex>=trajectoryState.points.length-1){
        togglePlayTrajectory();
        return;
      }
      seekTrajectory(trajectoryState.currentIndex+1);
    },1000/trajectoryState.speed);
  }else{
    if(btn)btn.innerHTML='▶ 播放';
    if(trajectoryState.timer){clearInterval(trajectoryState.timer);trajectoryState.timer=null}
  }
}

function changeTrajectorySpeed(s){
  trajectoryState.speed=parseInt(s);
  if(trajectoryState.playing){
    if(trajectoryState.timer)clearInterval(trajectoryState.timer);
    trajectoryState.timer=setInterval(function(){
      if(trajectoryState.currentIndex>=trajectoryState.points.length-1){togglePlayTrajectory();return}
      seekTrajectory(trajectoryState.currentIndex+1);
    },1000/trajectoryState.speed);
  }
}

function seekTrajectory(idx){
  if(idx<0)idx=0;
  if(idx>=trajectoryState.points.length)idx=trajectoryState.points.length-1;
  trajectoryState.currentIndex=idx;
  var p=trajectoryState.points[idx];
  var path=trajectoryState.points.slice(0,idx+1).map(function(x){return toLatLng(x.lon,x.lat)});
  if(trajectoryState.passedLine)trajectoryState.passedLine.setLatLngs(path);
  if(trajectoryState.movedMarker)trajectoryState.movedMarker.setLatLng(toLatLng(p.lon,p.lat));
  var slider=document.getElementById('trajSlider');
  if(slider)slider.value=idx;
  var tEl=document.getElementById('trajCurTime');if(tEl)tEl.textContent=p.timeStr;
  var sEl=document.getElementById('trajCurSpeed');if(sEl){sEl.textContent=p.speed+'km/h';sEl.style.color='#1677ff';}
  var mEl=document.getElementById('trajCurMode');if(mEl){mEl.textContent=p.driveMode;mEl.style.color=p.driveMode==='自动驾驶'?'#52c41a':'#faad14';}
  updateTrajectoryProgress();
}

function updateTrajectoryProgress(){
  var bg=document.getElementById('trajProgressBg');
  var pct=trajectoryState.points.length>1?(trajectoryState.currentIndex/(trajectoryState.points.length-1)*100):0;
  if(bg)bg.style.width=pct+'%';
}

function toggleLayer(layerName,visible){
  layerVisibility[layerName]=visible;
  var targetOverlays;
  switch(layerName){
    case 'vehicles':targetOverlays=vehicleOverlays;break;
    case 'trajectory':
      setLayersVisible([trajectoryLine,trajectoryState.passedLine,trajectoryState.movedMarker].filter(Boolean),visible);
      return;
    case 'alarms':targetOverlays=alarmOverlays;break;
    case 'accidents':
      if(visible&&!accidentLayerLoaded){loadAccidentLayer();accidentLayerLoaded=true}
      targetOverlays=accidentOverlays;
      break;
    case 'fences':targetOverlays=fenceOverlays;break;
    case 'roads':targetOverlays=roadOverlays;break;
    case 'facilities':targetOverlays=facilityOverlays;break;
    case 'historyAccidents':
      if(visible&&!historyAccidentLayerLoaded){loadHistoryAccidentLayer();historyAccidentLayerLoaded=true}
      targetOverlays=historyAccidentOverlays;
      break;
    default:return;
  }
  if(targetOverlays){
    setLayersVisible(targetOverlays,visible);
  }
  if(layerName==='vehicles')renderFallbackVehicleLayer();
}

function getFloatingOverlayBottom(){
  var drawer=document.getElementById('vehicleDrawer');
  if(!drawer)return 58;
  var collapsed=drawer.classList.contains('collapsed');
  var height=collapsed?46:drawer.getBoundingClientRect().height;
  return Math.max(58,Math.round(height)+12);
}

function syncFloatingOverlayPosition(){

function filterVehicles(){
  var company=document.getElementById('filterCompany').value;
  var status=document.getElementById('filterStatus').value;
  var mode=document.getElementById('filterMode').value;
  var applyType=document.getElementById('filterApplyType').value;
  var searchPlate=document.getElementById('searchPlate').value.trim().toLowerCase();
  var searchVin=document.getElementById('searchVin').value.trim().toLowerCase();
  var eventCfg=getAlarmFilterConfig();
  filteredVehicleData=vehicleData.filter(function(v){
    if(company!=='all'&&v.company!==company)return false;
    if(status==='online'&&v.status!=='online')return false;
    if(status==='offline'&&v.status!=='offline')return false;
    if(status==='alarm'&&v.status!=='alarm')return false;
    if(mode==='auto'&&v.mode!=='auto')return false;
    if(mode==='manual'&&v.mode!=='manual')return false;
    if(applyType!=='all'&&v.applyType!==applyType)return false;
    if(searchPlate&&v.plate.toLowerCase().indexOf(searchPlate)===-1)return false;
    if(searchVin&&v.vin.toLowerCase().indexOf(searchVin)===-1)return false;
    if(v.status==='alarm'&&!vehicleHasMatchingEvent(v,eventCfg))return false;
    return true;
  });
  vehiclePage=1;
  renderVehicleTable(1);
  updateMapVisibility();
  renderSituationBar();
  renderWarningPanel();
}

function updateMapVisibility(){
  var fallback=document.getElementById('fallbackVehicleLayer');
  if(fallback&&layerVisibility.vehicles&&(!map||typeof L==='undefined'))fallback.style.display='';
  if(fallback&&(!layerVisibility.vehicles||map))fallback.style.display='none';
  vehicleOverlays.forEach(function(m){
    var data=m._vehicleData;
    var visible=layerVisibility.vehicles&&shouldShowVehicle(data);
    if(visible)addLayer(m);
    else removeLayer(m);
  });
  renderFallbackVehicleLayer();
}

    return '<tr style="cursor:pointer;'+rowBg+'" onclick="focusVehicle(\''+v.id+'\')">'+
      '<td style="font-size:12px;font-weight:600">'+v.plate+'</td>'+
      '<td style="font-size:11px;font-family:monospace">'+v.vin+'</td>'+
      '<td style="font-size:12px">'+v.company+'</td>'+
      '<td style="font-size:12px">'+getApplyTypeLabel(v.applyType)+'</td>'+

function applySituationQuickFilter(type){
  if(type==='online'){
    setSelectValue('filterStatus','online');
    filterVehicles();
    toggleFilterPanel();
    return;
  }
  if(type==='auto'){
    setSelectValue('filterMode','auto');
    filterVehicles();
    toggleFilterPanel();
    return;
  }
  if(type==='warningEvent'||type==='alarmEvent'){
    var target=type==='warningEvent'?'warning':'alarm';
    setWarningQuickFilter(target);
    return;
  }
  if(type==='accidents'){
    var accidentToggle=document.querySelector('input[onchange*=accidents]');
    if(accidentToggle&&!accidentToggle.checked){accidentToggle.checked=true}
    toggleLayer('accidents',true);
    showToast('已开启当日事故点位图层');
  }
}

function vehicleHasMatchingEvent(v,cfg){
  if(!v.alarmList||!v.alarmList.length)return false;
  for(var i=0;i<v.alarmList.length;i++){
    var category=(v.eventCategories&&v.eventCategories[i])||'预警';
    var type=(v.alarmTypes&&v.alarmTypes[i])||'车辆运行异常预警';
    if(cfg.categories.indexOf(category)!==-1&&cfg.types.indexOf(type)!==-1)return true;
  }
  return false;
}

function startLiveRefresh(){
  if(liveRefreshTimer)return;
  // 模拟 5 秒一次位置刷新：降低演示页 marker 与列表重绘频率，避免地图闪动
  liveRefreshTimer=setInterval(function(){
    var ts=new Date();
    vehicleData.forEach(function(v){
      if(v.status==='offline')return;
      var dLon=(Math.random()-0.5)*0.0008;
      var dLat=(Math.random()-0.5)*0.0006;
      v.lon=+(v.lon+dLon).toFixed(6);
      v.lat=+(v.lat+dLat).toFixed(6);
      v.speed=Math.max(0,Math.min(80,v.speed+Math.round((Math.random()-0.5)*4)));
      v.heading=(v.heading+Math.round((Math.random()-0.5)*15)+360)%360;
      v.lastTime=ts.getFullYear()+'-'+String(ts.getMonth()+1).padStart(2,'0')+'-'+String(ts.getDate()).padStart(2,'0')+' '+String(ts.getHours()).padStart(2,'0')+':'+String(ts.getMinutes()).padStart(2,'0')+':'+String(ts.getSeconds()).padStart(2,'0');
    });
    vehicleOverlays.forEach(function(m){
      var data=m._vehicleData;
      if(data&&data.status!=='offline'){
        m.setLatLng(toLatLng(data.lon,data.lat));
        m.setIcon(makeDivIcon('vehicle-div-icon',getVehicleMarkerHtml(data,false),[58,48],[29,24]));
      }
    });
    alarmOverlays.forEach(function(c){
      var v=vehicleData.find(function(d){return d.id===c._vehicleId});
      if(v)c.setLatLng(toLatLng(v.lon,v.lat));
    });
    renderFallbackVehicleLayer();
    renderSituationBar();
    renderVehicleTable(vehiclePage);
  },5000);
}

  filteredVehicleData=[].concat(vehicleData);
  renderVehicleTable(1);
  renderWarningPanel();
  renderSituationBar();
  initMap();
  syncFloatingOverlayPosition();
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',initPage);
}else{
  initPage();
}
window.addEventListener('resize',syncFloatingOverlayPosition);
</script>
