<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>评估日志管理 - 智能网联汽车安全监测平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../components/pagination-component.js"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{DEFAULT:'#1677ff',hover:'#4096ff',disabled:'#85a5cc'}}}}}</script>
<style>
  .detail-tabs{display:flex;gap:0;border-bottom:1px solid #f0f0f0;margin-bottom:14px;flex-wrap:wrap}
  .detail-tab{padding:8px 16px;cursor:pointer;font-size:12px;font-weight:500;color:#666;border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none}
  .detail-tab:hover{color:#1677ff}
  .detail-tab.active{color:#1677ff;border-bottom-color:#1677ff}
  .detail-tab-content{display:none}
  .detail-tab-content.active{display:block}
  .info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px 16px}
  .info-grid>div{font-size:12px}
  /* 评估结果弹窗标题区段（参照评估结果管理） */
  .result-section-title{font-size:14px;font-weight:600;color:#000000d9;line-height:22px;padding:0 0 8px 0;border-bottom:1px solid #f0f0f0;margin:14px 0 12px;display:flex;align-items:center;gap:8px}
  .result-section-title::before{content:'';width:3px;height:14px;background:#1677ff;border-radius:2px}
  /* 历史版本详情弹窗 readonly 样式（参照评估指标配置-历史版本记录详情） */
  .readonly-section{background:#fafafa;border:1px solid #f0f0f0;border-radius:8px;padding:16px 20px;margin-bottom:12px}
  .readonly-section-title{font-size:14px;font-weight:600;color:#000000d9;line-height:22px;display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .readonly-section-title::before{content:'';width:3px;height:14px;background:#bfbfbf;border-radius:2px}
  .readonly-meta{display:flex;align-items:center;gap:12px;padding:10px 14px;margin-bottom:14px;background:#fafafa;border:1px solid #f0f0f0;border-radius:6px;flex-wrap:wrap}
  .readonly-meta-divider{width:1px;height:14px;background:#e8e8e8}
  .readonly-version-tag{display:inline-flex;align-items:center;height:22px;padding:0 8px;background:#e6f4ff;color:#1677ff;font-size:12px;font-weight:600;border-radius:3px;letter-spacing:.5px}
  .readonly-status-current{display:inline-flex;align-items:center;height:22px;padding:0 8px;background:#1677ff;color:#fff;font-size:12px;font-weight:500;border-radius:3px}
  .readonly-status-old{display:inline-flex;align-items:center;height:22px;padding:0 8px;background:#f0f0f0;color:#00000073;font-size:12px;border-radius:3px}
  .readonly-table{width:100%;border-collapse:collapse}
  .readonly-table th,.readonly-table td{padding:8px 10px;border-bottom:1px solid #f0f0f0;font-size:12px;text-align:left}
  .readonly-table th{background:#fafafa;color:#00000073;font-weight:500}
  .readonly-input{display:inline-block;min-width:70px;height:28px;padding:0 8px;border:1px solid #e8e8e8;border-radius:4px;font-size:12px;text-align:center;background:#f5f5f5;color:#00000073;line-height:26px;font-family:DIN,Consolas,monospace}
  .readonly-form-input{display:inline-block;height:32px;padding:0 12px;border:1px solid #e8e8e8;border-radius:6px;font-size:14px;color:#00000073;background:#f5f5f5;width:160px;line-height:30px}
  .readonly-form-unit{font-size:14px;color:#00000073}
  .readonly-form-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:6px 0}
  .readonly-form-label{font-size:14px;color:#000000d9;min-width:120px}
  .readonly-chip{display:inline-flex;align-items:center;gap:4px;height:22px;padding:0 8px;background:#f0f0f0;color:#00000073;border-radius:3px;font-size:12px;margin-right:4px;margin-bottom:4px}
  .readonly-chip.checked{background:#e6f4ff;color:#1677ff;border:1px solid #91caff}
  /* 历史详情 Tab 样式（与配置页面保持一致） */
  .history-tab-content{display:none}
  .history-tab-content.active{display:block}
</style>
</head>
<body>
<div id="app" class="flex h-screen overflow-hidden">
  <aside id="sidebar"></aside>
  <div class="flex-1 flex flex-col overflow-hidden">
    <header id="topnav"></header>
    <main class="flex-1 overflow-auto bg-[#f0f2f5] p-6">
      <div class="page-header"><h2>评估日志管理</h2><div class="flex gap-2"><button class="ant-btn" onclick="handleExport()">导出</button></div></div>

      <div class="filter-bar">
        <div class="filter-row">
          <div class="filter-item"><label>道路名称</label><input class="ant-input" placeholder="模糊搜索" id="filterRoad"></div>
          <div class="filter-item"><label>评估时间</label><input class="ant-input" type="date" id="filterDateFrom" style="width:130px"><span class="self-end mb-1">—</span><input class="ant-input" type="date" id="filterDateTo" style="width:130px"></div>
          <div class="filter-item"><label>触发方式</label><select class="ant-input" id="filterTrigger"><option>全部</option><option>自动触发</option><option>手动触发</option></select></div>
          <div class="filter-item"><label>建议开放等级</label><select class="ant-input" id="filterLevel"><option>全部</option><option>完全开放</option><option>条件开放</option><option>限制开放</option><option>禁止开放</option></select></div>
          <div class="flex gap-2 items-end"><button class="ant-btn ant-btn-primary" onclick="refreshList()">查询</button><button class="ant-btn" onclick="resetFilters()">重置</button></div>
        </div>
      </div>
      
      <div class="bg-white rounded-lg shadow-sm border border-[#f0f0f0]">
        <div style="overflow-x:auto">
          <table class="ant-table">
            <thead><tr><th><input type="checkbox" class="ant-checkbox" id="selectAll" onclick="toggleSelectAll(this)"></th><th>日志ID</th><th>道路名称</th><th>评估时间</th><th>触发方式</th><th>操作人</th><th>综合得分</th><th>建议开放等级</th><th>操作</th></tr></thead>
            <tbody id="listBody"></tbody>
          </table>
        </div>
        <div class="flex items-center justify-end px-4 py-3 border-t border-[#f0f0f0]">
          <div id="paginationBar"></div>
        </div>
      </div>
    </main>
  </div>
</div>
<script>
const PAGE_ID='eval-log';

const roadNames = ['长虹路', '檀溪路', '航空路', '人民路', '建设路', '金源路', '中原路', '春园路', '前进路', '大庆东路', '汉江路', '襄阳大道', '环城南路', '邓城大道', '航天路'];

const triggerTypes = ['自动触发', '自动触发', '手动触发', '手动触发', '自动触发'];

const logData = [];
for (var i = 1; i <= 25; i++) {
  var month = 5 + Math.floor(Math.random() * 2);
  var day = Math.floor(Math.random() * 28) + 1;
  var trigger = triggerTypes[i % 5];
  var isAuto = trigger === '自动触发';
  logData.push({
    id: 'LOG-' + String(i).padStart(6, '0'),
    road: roadNames[i % roadNames.length],
    time: '2026-0' + month + '-' + String(day).padStart(2, '0') + (isAuto ? ' 02:00' : ' 14:30'),
    trigger: trigger,
    operator: isAuto ? '-' : '管理员',
    score: (70 + Math.random() * 25).toFixed(1),
    level: ['完全开放', '条件开放', '限制开放', '禁止开放'][Math.floor(Math.random() * 4)],
    configVersion: 'V' + (1 + (i % 3)) + '.' + (i % 5)
  });
}

var pager;

function levelTag(lv) {
  var map = { '完全开放': 'ant-tag-success', '条件开放': 'ant-tag-warning', '限制开放': 'ant-tag-error', '禁止开放': 'ant-tag-default' };
  return '<span class="ant-tag ' + (map[lv] || 'ant-tag-processing') + '">' + lv + '</span>';
}

function getFilteredData() {
  var road = (document.getElementById('filterRoad').value || '').trim().toLowerCase();
  var dateFrom = document.getElementById('filterDateFrom').value;
  var dateTo = document.getElementById('filterDateTo').value;
  var trigger = document.getElementById('filterTrigger').value;
  var level = document.getElementById('filterLevel').value;

  return logData.filter(function(r) {
    if (road && !r.road.toLowerCase().includes(road)) return false;
    if (dateFrom && r.time.slice(0, 10) < dateFrom) return false;
    if (dateTo && r.time.slice(0, 10) > dateTo) return false;
    if (trigger !== '全部' && r.trigger !== trigger) return false;
    if (level !== '全部' && r.level !== level) return false;
    return true;
  });
}

function renderList() {
  var filtered = getFilteredData();
  var total = filtered.length;
  var cp = pager?pager.getCurrentPage():1;
  var ps = pager?pager.getPageSize():10;
  var start = (cp - 1) * ps;
  var end = Math.min(start + ps, total);
  var pageData = filtered.slice(start, end);

  var html = '';
  if (pageData.length === 0) {
    html = '<tr><td colspan="9" style="text-align:center;padding:40px;color:#999;">暂无匹配日志</td></tr>';
  }
  pageData.forEach(function(r) {
    html += '<tr>' +
      '<td><input type="checkbox" class="ant-checkbox row-checkbox" data-id="' + r.id + '"></td>' +
      '<td>' + r.id + '</td>' +
      '<td><strong>' + r.road + '</strong></td>' +
      '<td>' + r.time + '</td>' +
      '<td>' + r.trigger + '</td>' +
      '<td>' + r.operator + '</td>' +
      '<td><strong style="color:' + (r.score >= 85 ? '#52c41a' : r.score >= 70 ? '#fa8c16' : r.score >= 50 ? '#1677ff' : '#ff4d4f') + '">' + r.score + '</strong></td>' +
      '<td>' + levelTag(r.level) + '</td>' +
      '<td><button class="ant-btn-link" onclick="openLogDetail(\'' + r.id + '\')">查看详情</button></td>' +
    '</tr>';
  });
  document.getElementById('listBody').innerHTML = html;
  if(pager) pager.setTotal(total);
}

window.refreshList = function() { if(pager) pager.reset(); pager = new Pagination({container:'paginationBar',pageSize:10,pageSizeOptions:[10,20,50,100],onPageChange:function(){renderList();},onPageSizeChange:function(){renderList();}});
renderList(); showToast('列表已刷新'); };
window.resetFilters = function() {
  document.getElementById('filterRoad').value = '';
  document.getElementById('filterDateFrom').value = '';
  document.getElementById('filterDateTo').value = '';
  document.getElementById('filterTrigger').value = '全部';
  document.getElementById('filterLevel').value = '全部';
  if(pager) pager.reset();
  pager = new Pagination({container:'paginationBar',pageSize:10,pageSizeOptions:[10,20,50,100],onPageChange:function(){renderList();},onPageSizeChange:function(){renderList();}});
renderList();
};

function getLogProcessData(l) {
  var n = parseInt(String(l.id).replace('LOG-', ''), 10) || 0;
  var levels = ['主干道', '次干道', '支路', '快速路'];
  var flowOptions = ['高', '中', '低'];
  var roadLevel = levels[n % 4];
  var laneCount = (n % 4) + 2;
  var length = ((n * 137) % 4000) + 800;
  var flowLevel = flowOptions[n % 3];
  var dataWindow = ((n % 3) + 6) + ' 个月';
  var base = parseFloat(l.score);
  var complexityScore = Math.min(100, Math.max(10, 100 - base * 0.6)).toFixed(1);
  var complexityLevel = complexityScore >= 70 ? '高' : (complexityScore >= 40 ? '中' : '低');
  var riskScore = Math.min(100, Math.max(5, base * 0.5)).toFixed(1);
  var riskLevel = riskScore >= 60 ? '高' : (riskScore >= 30 ? '中' : '低');
  var sceneScores = {
    '城区道路': (base * 0.90).toFixed(1),
    '园区道路': (base * 0.85 + 5).toFixed(1),
    '环卫作业': (base * 0.88 + 2).toFixed(1),
    '物流配送': (base * 0.87).toFixed(1),
    '公交运营': (base * 0.83 - 3).toFixed(1)
  };
  var rules = [];
  if (riskLevel === '高') {
    rules.push({ priority: 1, name: '高风险禁止开放', action: '禁止开放' });
  } else if (complexityLevel === '高' && riskLevel === '高') {
    rules.push({ priority: 2, name: '高复杂度+高风险', action: '限制开放' });
  } else if (complexityLevel === '中') {
    rules.push({ priority: 3, name: '中复杂度条件开放', action: '条件开放' });
  } else if (riskLevel === '中' && parseFloat(sceneScores['城区道路']) < 60) {
    rules.push({ priority: 4, name: '中风险且适配不足', action: '限制开放' });
  } else {
    rules.push({ priority: 5, name: '默认等级映射', action: l.level });
  }
  var exception = (n % 2 === 0)
    ? '信号灯覆盖率数据缺失，该指标按默认 60 分计算。'
    : '流量数据采用近 7 天均值，已按规则权重 0.10 参与计算。';
  var inputSummary = roadLevel + ' | ' + laneCount + ' 车道 | ' + length + ' m | 流量等级：' + flowLevel;
  return {
    n: n, roadLevel: roadLevel, laneCount: laneCount, length: length, flowLevel: flowLevel,
    dataWindow: dataWindow, inputSummary: inputSummary,
    complexityScore: complexityScore, complexityLevel: complexityLevel,
    riskScore: riskScore, riskLevel: riskLevel,
    sceneScores: sceneScores, rules: rules, exception: exception
  };
}

window.openLogDetail = function(id) {
  var l = logData.find(function(lo) { return lo.id === id; }) || logData[0];
  var d = getLogProcessData(l);
  var scoreColor = l.score >= 85 ? '#52c41a' : l.score >= 70 ? '#fa8c16' : l.score >= 50 ? '#1677ff' : '#ff4d4f';
  function tag(text, type) {
    return '<span class="ant-tag ant-tag-' + type + '">' + text + '</span>';
  }
  var complexityTag = d.complexityLevel === '高' ? tag('高', 'error') : (d.complexityLevel === '中' ? tag('中', 'warning') : tag('低', 'success'));
  var riskTag = d.riskLevel === '高' ? tag('高', 'error') : (d.riskLevel === '中' ? tag('中', 'warning') : tag('低', 'success'));
  var ruleRows = d.rules.map(function(r) {
    var actionTag = r.action === '禁止开放' ? tag('禁止开放', 'default')
      : r.action === '限制开放' ? tag('限制开放', 'warning')
      : r.action === '条件开放' ? tag('条件开放', 'processing')
      : tag(r.action, 'success');
    return '<tr><td>' + r.priority + '</td><td>' + r.name + '</td><td>' + actionTag + '</td></tr>';
  }).join('');

  // 准入条件检查结果（参照评估结果管理-评估总览）
  var accessRows = [
    { name: '最小车道宽度', threshold: '≥ 3.0 m', actual: '3.5 m', passed: true },
    { name: '最大坡度', threshold: '≤ 6%', actual: '4%', passed: true },
    { name: '交通信号覆盖率', threshold: '≥ 80%', actual: '92%', passed: true },
    { name: '视距不足路段占比', threshold: '< 10%', actual: '5%', passed: true }
  ];
  var accessPassed = accessRows.every(function(c) { return c.passed; });
  var accessRowHtml = accessRows.map(function(c) {
    var status = c.passed ? '满足' : '不满足';
    var color = c.passed ? '#52c41a' : '#ff4d4f';
    return '<div>' + c.name + ' ' + c.threshold + '：<span style="color:' + color + '">' + status + '（实际 ' + c.actual + '）</span></div>';
  }).join('');
  var accessBox =
    '<div class="mb-3 p-3 rounded border ' + (accessPassed ? 'bg-[#f6ffed] border-[#b7eb8f]' : 'bg-[#fff2f0] border-[#ffccc7]') + '">' +
      '<p class="text-sm font-semibold" style="color:' + (accessPassed ? '#52c41a' : '#ff4d4f') + '">准入条件检查：' + (accessPassed ? '通过' : '未通过，直接判定为禁止开放') + '</p>' +
      '<div class="grid grid-cols-2 gap-1 mt-1 text-xs text-[#00000073]">' + accessRowHtml + '</div>' +
    '</div>';

  // 数据缺失说明
  var missingBox = d.exception.indexOf('缺失') >= 0
    ? '<div class="mb-3 p-3 bg-[#fffbe6] rounded border border-[#ffe58f]">' +
        '<p class="text-sm font-semibold text-[#fa8c16]">数据缺失说明</p>' +
        '<p class="text-xs text-[#00000073] mt-1">' + d.exception + '</p>' +
      '</div>'
    : '';

  // 计算综合得分（参照result.html）
  var W_COMPLEXITY = 0.33, W_RISK = 0.34, W_SCENE = 0.33;
  var cScore = (100 - parseFloat(d.complexityScore)) * W_COMPLEXITY;
  var rkScore = (100 - parseFloat(d.riskScore)) * W_RISK;
  var bestSceneScore = 0;
  Object.keys(d.sceneScores).forEach(function(k) {
    var s = parseFloat(d.sceneScores[k]);
    if (s > bestSceneScore) bestSceneScore = s;
  });
  var scScore = bestSceneScore * W_SCENE;
  var bestScene = '';
  Object.keys(d.sceneScores).forEach(function(k) {
    if (parseFloat(d.sceneScores[k]) === bestSceneScore) bestScene = k;
  });
  var scoreFormula = '综合得分 = (100 - ' + d.complexityScore + ') × ' + W_COMPLEXITY + ' + (100 - ' + d.riskScore + ') × ' + W_RISK + ' + ' + bestSceneScore.toFixed(0) + ' × ' + W_SCENE + ' = ' + l.score;

  // 判定来源
  var decisionSource = '综合得分映射';
  if (d.rules && d.rules[0]) {
    decisionSource = '融合规则' + d.rules[0].priority + '：' + d.rules[0].name;
  }

  // 业务规则映射
  var mappingTable = {
    '完全开放': { autoLevel: 'L2/L3/L4', testTypes: '载人、载货、环卫、物流', limitTime: '无限制', control: '无特殊要求' },
    '条件开放': { autoLevel: 'L3/L4', testTypes: '载货、环卫、物流', limitTime: '06:00-22:00', control: '需额外提交安全评估' },
    '限制开放': { autoLevel: 'L4', testTypes: '环卫、物流', limitTime: '09:00-17:00', control: '需安全员全程监控' },
    '禁止开放': { autoLevel: '—', testTypes: '—', limitTime: '—', control: '禁止任何测试活动' }
  };
  var mapping = mappingTable[l.level] || mappingTable['禁止开放'];

  var body =
    // 顶部基本信息（参照评估结果管理-评估总览 descriptions 风格）
    '<div class="result-section-title">基本信息</div>' +
    '<div class="ant-descriptions">' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">日志 ID</div><div class="ant-descriptions-value"><strong>' + l.id + '</strong></div><div class="ant-descriptions-label">道路名称</div><div class="ant-descriptions-value"><strong>' + l.road + '</strong></div></div>' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">评估时间</div><div class="ant-descriptions-value">' + l.time + '</div><div class="ant-descriptions-label">触发方式</div><div class="ant-descriptions-value">' + l.trigger + '</div></div>' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">配置版本</div><div class="ant-descriptions-value"><a href="javascript:void(0)" onclick="openConfigHistory(\'' + l.configVersion + '\')" style="color:#1677ff">' + l.configVersion + '</a></div><div class="ant-descriptions-label">操作人</div><div class="ant-descriptions-value">' + (l.operator || '-') + '</div></div>' +
    '</div>' +
    // 评估结果（参照评估结果管理-评估总览）
    '<div class="result-section-title">评估结果</div>' +
    accessBox +
    missingBox +
    '<div class="ant-descriptions">' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">建议开放等级</div><div class="ant-descriptions-value">' + levelTag(l.level) + '</div><div class="ant-descriptions-label">综合得分</div><div class="ant-descriptions-value" style="color:' + scoreColor + ';font-size:18px;font-weight:700">' + l.score + '</div></div>' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">配置版本</div><div class="ant-descriptions-value">' + l.configVersion + '</div><div class="ant-descriptions-label">判定来源</div><div class="ant-descriptions-value">' + decisionSource + '</div></div>' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">综合得分公式</div><div class="ant-descriptions-value" style="font-size:12px;color:#00000073" colspan="3">' + scoreFormula + '</div></div>' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">复杂度得分</div><div class="ant-descriptions-value">' + d.complexityScore + ' (' + complexityTag + ')</div><div class="ant-descriptions-label">转换后得分</div><div class="ant-descriptions-value">(100 - ' + d.complexityScore + ') × ' + W_COMPLEXITY + ' = ' + cScore.toFixed(1) + '</div></div>' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">风险得分</div><div class="ant-descriptions-value">' + d.riskScore + ' (' + riskTag + ')</div><div class="ant-descriptions-label">转换后得分</div><div class="ant-descriptions-value">(100 - ' + d.riskScore + ') × ' + W_RISK + ' = ' + rkScore.toFixed(1) + '</div></div>' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">场景适配得分</div><div class="ant-descriptions-value">' + bestSceneScore.toFixed(0) + '</div><div class="ant-descriptions-label">转换后得分</div><div class="ant-descriptions-value">' + bestSceneScore.toFixed(0) + ' × ' + W_SCENE + ' = ' + scScore.toFixed(1) + '</div></div>' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">适用自动驾驶等级</div><div class="ant-descriptions-value">' + mapping.autoLevel + '</div><div class="ant-descriptions-label">允许测试类型</div><div class="ant-descriptions-value">' + mapping.testTypes + '</div></div>' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">限制时段</div><div class="ant-descriptions-value">' + mapping.limitTime + '</div><div class="ant-descriptions-label">管控说明</div><div class="ant-descriptions-value">' + mapping.control + '</div></div>' +
    '</div>' +
    '<div class="result-section-title">命中融合规则</div>' +

window.switchHistoryTab = function(el, tabId) {
  document.querySelectorAll('#historyTabs .ant-tab').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
  document.querySelectorAll('.history-tab-content').forEach(function(c) { c.classList.remove('active'); });
  document.getElementById(tabId).classList.add('active');
};

function renderHistoryTabContents(s) {
  return '<div class="history-tab-content active" id="hcfg0">' + renderHistoryTab0(s) + '</div>' +
         '<div class="history-tab-content" id="hcfg1">' + renderHistoryTab1(s) + '</div>' +
         '<div class="history-tab-content" id="hcfg2">' + renderHistoryTab2(s) + '</div>' +
         '<div class="history-tab-content" id="hcfg3">' + renderHistoryTab3(s) + '</div>' +
         '<div class="history-tab-content" id="hcfg4">' + renderHistoryTab4(s) + '</div>';
}

function chipHtml(value, options) {
  var cls = 'readonly-chip' + (options.checkedValues && options.checkedValues.indexOf(value) >= 0 ? ' checked' : '');
  return '<span class="' + cls + '">' + value + '</span>';
}

// Tab0 复杂度模型
function renderHistoryTab0(s) {
  var weights = [
    { name: '车道复杂度', val: s.cl1 },
    { name: '交叉口密度', val: s.cl2 },
    { name: '混合交通比例', val: s.cl3 },
    { name: '坡度/曲率', val: s.cl4 },
    { name: '信号灯完整度', val: s.cl5 }
  ];
  var rows = weights.map(function(w) {
    return '<tr><td><strong>' + w.name + '</strong></td><td><span class="readonly-input">' + w.val + '</span></td><td class="text-[#00000073]" style="font-family:DIN,Consolas,monospace">' + parseFloat(w.val).toFixed(2) + '</td></tr>';
  }).join('');
  return '<div class="readonly-section">' +
      '<div class="readonly-section-title">权重配置</div>' +
      '<table class="readonly-table"><thead><tr><th style="width:200px">指标名称</th><th style="width:120px">权重(0-1)</th><th style="width:120px">当前值</th></tr></thead><tbody>' + rows + '</tbody></table>' +
    '</div>' +
    '<div class="readonly-section">' +
      '<div class="readonly-section-title">分级阈值配置</div>' +
      '<div class="readonly-form-row"><span class="readonly-form-label">低复杂度</span><span class="readonly-form-unit">&lt;</span><span class="readonly-form-input">' + s.clLow + '</span><span class="readonly-form-unit">分</span></div>' +
      '<div class="readonly-form-row"><span class="readonly-form-label">中复杂度</span><span class="readonly-form-input">' + s.clMidLow + '</span><span class="readonly-form-unit">-</span><span class="readonly-form-input">' + s.clMidHigh + '</span><span class="readonly-form-unit">分</span></div>' +
      '<div class="readonly-form-row"><span class="readonly-form-label">高复杂度</span><span class="readonly-form-unit">≥</span><span class="readonly-form-input">' + s.clHigh + '</span><span class="readonly-form-unit">分</span></div>' +
    '</div>';
}

// Tab1 风险模型
function renderHistoryTab1(s) {
  var weights = [
    { name: '事故频率', val: s.r1 },
    { name: '事故严重度', val: s.r2 },
    { name: '交通事件频率', val: s.r3 },
    { name: '流量修正系数', val: s.r4 }
  ];
  var wRows = weights.map(function(w) {
    return '<tr><td><strong>' + w.name + '</strong></td><td><span class="readonly-input">' + w.val + '</span></td></tr>';
  }).join('');
  var decayLabels = ['近 6 个月', '6 - 12 个月', '12 - 24 个月', '> 24 个月'];
  var decayRows = decayLabels.map(function(label, i) {
    var v = (s.decay && s.decay[i] !== undefined) ? s.decay[i] : '-';
    return '<tr><td>' + label + '</td><td><span class="readonly-input">' + v + '</span></td></tr>';
  }).join('');
  return '<div class="readonly-section">' +
      '<div class="readonly-section-title">权重配置</div>' +
      '<table class="readonly-table"><thead><tr><th style="width:200px">指标名称</th><th style="width:120px">权重(0-1)</th></tr></thead><tbody>' + wRows + '</tbody></table>' +
    '</div>' +
    '<div class="readonly-section">' +
      '<div class="readonly-section-title">风险等级阈值配置</div>' +
      '<div class="readonly-form-row"><span class="readonly-form-label">低风险</span><span class="readonly-form-unit">&lt;</span><span class="readonly-form-input">' + s.rkLow + '</span><span class="readonly-form-unit">分</span></div>' +
      '<div class="readonly-form-row"><span class="readonly-form-label">中风险</span><span class="readonly-form-input">' + s.rkMidLow + '</span><span class="readonly-form-unit">-</span><span class="readonly-form-input">' + s.rkMidHigh + '</span><span class="readonly-form-unit">分</span></div>' +
      '<div class="readonly-form-row"><span class="readonly-form-label">高风险</span><span class="readonly-form-unit">≥</span><span class="readonly-form-input">' + s.rkHigh + '</span><span class="readonly-form-unit">分</span></div>' +
    '</div>' +
    '<div class="readonly-section">' +
      '<div class="readonly-section-title">时间窗配置</div>' +
      '<div class="readonly-form-row"><span class="readonly-form-label">历史数据范围</span><span class="readonly-form-input">' + s.riskMonths + '</span><span class="readonly-form-unit">个月</span></div>' +
    '</div>' +
    '<div class="readonly-section">' +
      '<div class="readonly-section-title">时间衰减权重表</div>' +
      '<table class="readonly-table"><thead><tr><th style="width:200px">时间区间</th><th style="width:160px">衰减权重</th></tr></thead><tbody>' + decayRows + '</tbody></table>' +
    '</div>';
}

// Tab2 场景适配模型
function renderHistoryTab2(s) {
  var sceneRows = (s.scenes || []).map(function(sc) {
    return '<tr><td><strong>' + sc.name + '</strong></td><td><span class="readonly-input">' + sc.lane + '</span></td><td>' + chipHtml(sc.mixed === '是' ? '是' : '否', { checkedValues: [] }) + '</td><td><span class="readonly-input">' + sc.lighting + '</span></td><td><span class="readonly-input">' + sc.slope + '</span></td></tr>';
  }).join('');
  return '<div class="readonly-section">' +
      '<div class="readonly-section-title">场景映射条件</div>' +
      '<table class="readonly-table"><thead><tr><th style="width:160px">场景名称</th><th>最低车道数</th><th>允许机非混行</th><th>最低照明等级</th><th>允许最大坡度(%)</th></tr></thead><tbody>' + sceneRows + '</tbody></table>' +
    '</div>' +
    '<div class="readonly-section">' +
      '<div class="readonly-section-title">适配阈值</div>' +
      '<div class="readonly-form-row"><span class="readonly-form-label">适用阈值</span><span class="readonly-form-input">' + s.sceneThreshold + '</span><span class="readonly-form-unit">分以上判定为</span><span class="readonly-chip checked">适用</span></div>' +
    '</div>';
}

// Tab3 融合模型
function renderHistoryTab3(s) {
  var hardNames = ['最小车道宽度', '最大坡度', '交通信号覆盖率', '视距严重不足路段占比'];
  var hardRows = (s.hardConditions || []).map(function(h, i) {
    return '<tr><td>' + (h.enabled ? '✅ 启用' : '⬜ 禁用') + '</td><td>' + (hardNames[i] || ('条件' + (i + 1))) + '</td><td><span class="readonly-input">' + h.threshold + '</span></td></tr>';
  }).join('');
  var fusionRows = (s.fusionRules || []).map(function(r) {
    return '<tr><td>' + (r.enabled ? '✅ 启用' : '⬜ 禁用') + '</td><td><span class="readonly-chip">' + r.priority + '</span></td><td>' + r.desc + '</td><td>' + r.action + '</td></tr>';
  }).join('');
  return '<div class="readonly-section">' +
      '<div class="readonly-section-title">子模型权重配置</div>' +
      '<div class="readonly-form-row"><span class="readonly-form-label">复杂度模型权重</span><span class="readonly-form-input">' + s.wComplexity + '</span></div>' +
      '<div class="readonly-form-row"><span class="readonly-form-label">风险模型权重</span><span class="readonly-form-input">' + s.wRisk + '</span></div>' +
      '<div class="readonly-form-row"><span class="readonly-form-label">场景适配模型权重</span><span class="readonly-form-input">' + s.wScene + '</span></div>' +
      '<div style="margin-top:12px;padding:10px 12px;background:#fff;border:1px dashed #d9d9d9;border-radius:4px;font-family:DIN,Consolas,monospace;font-size:12px;color:#00000073">' +
        '综合得分 = (100 - 复杂度指数) × 复杂度权重 + (100 - 风险指数) × 风险权重 + 场景适配度得分 × 场景适配权重' +
      '</div>' +
    '</div>' +
    '<div class="readonly-section">' +
      '<div class="readonly-section-title">综合得分与开放等级映射</div>' +
      '<div class="readonly-form-row"><span class="readonly-form-label">完全开放</span><span class="readonly-form-unit">综合得分 ≥</span><span class="readonly-form-input">' + s.fullyOpen + '</span><span class="readonly-form-unit">分</span></div>' +
      '<div class="readonly-form-row"><span class="readonly-form-label">条件开放</span><span class="readonly-form-unit">' + s.fullyOpen + ' &gt; 综合得分 ≥</span><span class="readonly-form-input">' + s.conditionalOpen + '</span><span class="readonly-form-unit">分</span></div>' +
      '<div class="readonly-form-row"><span class="readonly-form-label">限制开放</span><span class="readonly-form-unit">' + s.conditionalOpen + ' &gt; 综合得分 ≥</span><span class="readonly-form-input">' + s.restrictedOpen + '</span><span class="readonly-form-unit">分</span></div>' +
      '<div class="readonly-form-row"><span class="readonly-form-label">禁止开放</span><span class="readonly-form-unit">综合得分 &lt; ' + s.restrictedOpen + ' 分</span></div>' +
    '</div>' +
    '<div class="readonly-section">' +
      '<div class="readonly-section-title">硬性准入条件</div>' +
      '<table class="readonly-table"><thead><tr><th style="width:80px">状态</th><th style="width:240px">准入条件</th><th>阈值</th></tr></thead><tbody>' + hardRows + '</tbody></table>' +
    '</div>' +
    '<div class="readonly-section">' +
      '<div class="readonly-section-title">融合规则</div>' +
      '<table class="readonly-table"><thead><tr><th style="width:80px">状态</th><th style="width:80px">优先级</th><th>条件描述</th><th>动作</th></tr></thead><tbody>' + fusionRows + '</tbody></table>' +
    '</div>';
}

// Tab4 映射关系表
function renderHistoryTab4(s) {
  var lvls = ['完全开放', '条件开放', '限制开放', '禁止开放'];
  var rows = lvls.map(function(lv) {
    var d = (s.mapping && s.mapping[lv]) || { autoLevels: [], testTypes: [], limitTime: '---', control: '' };
    var autoChips = ['L2','L3','L4'].map(function(v) { return chipHtml(v, { checkedValues: d.autoLevels }); }).join('');
    var testChips = ['载人','载货','环卫','物流'].map(function(v) { return chipHtml(v, { checkedValues: d.testTypes }); }).join('');
    var limitTimeDisabled = (lv === '禁止开放') ? 'style="background:#f0f0f0;color:#00000040"' : '';
    return '<tr><td><strong>' + lv + '</strong></td><td>' + autoChips + '</td><td>' + testChips + '</td><td><span class="readonly-form-input"' + limitTimeDisabled + '>' + (d.limitTime || '---') + '</span></td><td><span class="readonly-form-input" style="width:100%">' + (d.control || '-') + '</span></td></tr>';
  }).join('');
  return '<div class="readonly-section">' +
      '<div class="readonly-section-title">开放等级业务规则映射</div>' +
      '<table class="readonly-table"><thead><tr><th style="width:100px">开放等级</th><th>适用自动驾驶等级</th><th>允许测试类型</th><th style="width:160px">限制时段</th><th>管控要求</th></tr></thead><tbody>' + rows + '</tbody></table>' +
    '</div>';
}

function showToast(msg) {
  var t = document.createElement('div');
  t.style.cssText = 'position:fixed;top:20px;right:20px;z-index:9999;background:#fff;padding:12px 20px;border-radius:6px;box-shadow:0 6px 16px rgba(0,0,0,0.1);font-size:13px;border-left:3px solid #1677ff;';
  t.textContent = '✅ ' + msg;
  document.body.appendChild(t);
  setTimeout(function() { t.style.opacity = '0'; t.style.transition = '0.3s'; setTimeout(function() { t.remove(); }, 300); }, 2000);
}

window.toggleSelectAll = function(checkbox) {
  var checkboxes = document.querySelectorAll('.row-checkbox');
  for (var i = 0; i < checkboxes.length; i++) {
    checkboxes[i].checked = checkbox.checked;
  }
};

window.handleExport = function() {
  var selected = document.querySelectorAll('.row-checkbox:checked');
  var selectedIds = [];
  for (var i = 0; i < selected.length; i++) {
    selectedIds.push(selected[i].getAttribute('data-id'));
  }

  if (selectedIds.length > 0) {
    var today = new Date();
    var dateStr = today.getFullYear() + '' + String(today.getMonth() + 1).padStart(2, '0') + String(today.getDate()).padStart(2, '0');
    showToast('已导出 ' + selectedIds.length + ' 条数据，文件名：评估日志管理_' + dateStr + '.xlsx');
  } else {
    openConfirmModal('导出确认', '是否导出所有数据？', function() {
      var today = new Date();
      var dateStr = today.getFullYear() + '' + String(today.getMonth() + 1).padStart(2, '0') + String(today.getDate()).padStart(2, '0');
      var filtered = getFilteredData();
      showToast('已导出 ' + filtered.length + ' 条数据，文件名：评估日志管理_' + dateStr + '.xlsx');
    });
  }
};

function openConfirmModal(title, message, onConfirm) {
  var modal = document.createElement('div');
  modal.id = 'confirmModal';
  modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:1000;';
  modal.innerHTML = '<div class="bg-white rounded-lg shadow-lg" style="width:400px;padding:24px;">' +
    '<h3 class="text-lg font-semibold mb-4">' + title + '</h3>' +
    '<p class="text-sm text-[#00000073] mb-6">' + message + '</p>' +
    '<div class="flex justify-end gap-2">' +
      '<button class="ant-btn" onclick="closeConfirmModal()">取消</button>' +
      '<button class="ant-btn ant-btn-primary" id="confirmBtn">确定</button>' +
    '</div>' +
  '</div>';
  document.body.appendChild(modal);
  document.getElementById('confirmBtn').onclick = function() {
    closeConfirmModal();
    if (onConfirm) onConfirm();
  };
}

window.closeConfirmModal = function() {
  var modal = document.getElementById('confirmModal');
  if (modal) modal.remove();
};

pager = new Pagination({container:'paginationBar',pageSize:10,pageSizeOptions:[10,20,50,100],onPageChange:function(){renderList();},onPageSizeChange:function(){renderList();}});
renderList();
