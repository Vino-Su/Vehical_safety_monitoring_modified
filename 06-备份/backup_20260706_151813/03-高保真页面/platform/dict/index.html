<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据字典管理 - 智能网联汽车安全监测平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{DEFAULT:'#1677ff',hover:'#4096ff',disabled:'#85a5cc'}}}}}</script>
  <script src="../../components/pagination-component.js"></script>
</head>
<body>
<div id="app" class="flex h-screen overflow-hidden">
  <aside id="sidebar"></aside>
  <div class="flex-1 flex flex-col overflow-hidden">
    <header id="topnav"></header>
    <main class="flex-1 overflow-auto bg-[#f0f2f5] p-6">
      <div class="page-header">
        <h2>数据字典管理</h2>
        <div class="flex gap-2">
          <button class="ant-btn" onclick="openExportModal()">导出数据</button>
          <button class="ant-btn ant-btn-primary" onclick="openDictModal()">+ 新增字典项</button>
        </div>
      </div>
      <div class="filter-bar">
        <div class="filter-row">
          <div class="filter-item"><label>时间范围</label><div style="display:flex;gap:4px;align-items:center;"><input class="ant-input" type="date" value="2026-04-01" style="width:140px"><span class="mx-1 text-[#00000040]">~</span><input class="ant-input" type="date" value="2026-05-08" style="width:140px"></div></div>
          <div class="filter-item"><label>字典编码</label><input class="ant-input" placeholder="请输入字典编码搜索"></div>
          <div class="filter-item"><label>字典名称</label><input class="ant-input" placeholder="请输入字典名称搜索"></div>
          <div class="filter-item"><label>所属应用</label><select class="ant-input" style="width:140px"><option value="all">全部</option><option>准入管理</option><option>监测管理</option><option>数据分析</option><option>道路管理</option><option>平台管理</option></select></div>
          <div class="filter-item"><label>状态</label><select class="ant-input" style="width:120px"><option value="all">全部</option><option>已启用</option><option>已停用</option></select></div>
          <div class="flex gap-2 items-end"><button class="ant-btn ant-btn-primary">查询</button><button class="ant-btn">重置</button></div>
        </div>
      </div>
      <div class="ant-table-wrapper">
        <div style="overflow-x:auto">
          <table class="ant-table">
            <thead>
              <tr>
                <th style="width:48px;text-align:center"><input type="checkbox" class="ant-checkbox" id="dictSelectAll" onchange="toggleSelectAll(this)"></th>
                <th>字典编码</th>
                <th>字典名称</th>
                <th>所属应用</th>
                <th>字典键名</th>
                <th>字典值数量</th>
                <th>版本</th>
                <th>状态</th>
                <th>最后更新时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="dictTableBody"></tbody>
          </table>
        </div>
        <div id="paginationBar"></div>
      </div>
    </main>
  </div>
</div>
<script>
const PAGE_ID='dict-manage';

var dictData = [
  {code:'VEHICLE_TYPE', name:'车辆类型', app:'准入管理', key:'vehicle_type', count:5, version:'V3', status:'已启用', updateTime:'2026-04-25 10:30'},
  {code:'AD_LEVEL', name:'自动驾驶等级', app:'准入管理', key:'ad_level', count:4, version:'V2', status:'已启用', updateTime:'2026-04-20 14:15'},
  {code:'ROAD_LEVEL', name:'道路等级分类', app:'道路管理', key:'road_level', count:6, version:'V1', status:'已启用', updateTime:'2026-04-18 09:00'},
  {code:'APPLY_TYPE', name:'申请类型', app:'准入管理', key:'apply_type', count:4, version:'V1', status:'已停用', updateTime:'2026-04-10 16:45'},
  {code:'TEST_SCENARIO', name:'测试场景分类', app:'道路管理', key:'test_scenario', count:3, version:'V2', status:'已启用', updateTime:'2026-04-28 11:20'},
  {code:'COMPANY_TYPE', name:'企业类型', app:'准入管理', key:'company_type', count:5, version:'V1', status:'已启用', updateTime:'2026-05-02 09:15'},
  {code:'PERSON_TYPE', name:'人员类型', app:'准入管理', key:'person_type', count:3, version:'V1', status:'已启用', updateTime:'2026-05-02 10:00'},
  {code:'ALARM_TYPE', name:'告警类型', app:'监测管理', key:'alarm_type', count:7, version:'V2', status:'已启用', updateTime:'2026-05-05 14:30'},

  {code:'REPORT_TYPE', name:'报告类型', app:'数据分析', key:'report_type', count:4, version:'V2', status:'已启用', updateTime:'2026-05-10 09:30'},
  {code:'BIZ_TYPE', name:'业务类型', app:'平台管理', key:'biz_type', count:7, version:'V1', status:'已启用', updateTime:'2026-05-12 10:15'},
  {code:'OP_TYPE', name:'操作类型', app:'平台管理', key:'op_type', count:7, version:'V1', status:'已启用', updateTime:'2026-05-12 10:30'},
  {code:'REGION_CODE', name:'行政区域编码', app:'道路管理', key:'region_code', count:10, version:'V2', status:'已启用', updateTime:'2026-05-15 13:00'},
  {code:'ROAD_TYPE', name:'道路类型', app:'道路管理', key:'road_type', count:5, version:'V3', status:'已启用', updateTime:'2026-05-18 08:20'},
  {code:'LICENSE_TYPE', name:'驾照类型', app:'准入管理', key:'license_type', count:7, version:'V1', status:'已启用', updateTime:'2026-05-20 14:45'},
  {code:'SCENE_TYPE', name:'适用场景', app:'道路管理', key:'scene_type', count:4, version:'V1', status:'已停用', updateTime:'2026-05-22 09:10'},
  {code:'TERMINATE_TYPE', name:'终止类型', app:'准入管理', key:'terminate_type', count:3, version:'V1', status:'已启用', updateTime:'2026-05-25 11:30'},
  {code:'APPROVE_NODE', name:'审批节点', app:'准入管理', key:'approve_node', count:6, version:'V2', status:'已启用', updateTime:'2026-05-28 16:00'},
  {code:'INFO_TYPE', name:'信息类型', app:'平台管理', key:'info_type', count:4, version:'V1', status:'已启用', updateTime:'2026-06-01 10:00'},
  {code:'PUBLISH_STATUS', name:'发布状态', app:'平台管理', key:'publish_status', count:3, version:'V1', status:'已启用', updateTime:'2026-06-02 14:20'},
  {code:'RISK_LEVEL', name:'风险等级', app:'监测管理', key:'risk_level', count:3, version:'V1', status:'已启用', updateTime:'2026-06-05 08:50'},
  {code:'DEVICE_TYPE', name:'感知设备类型', app:'道路管理', key:'device_type', count:5, version:'V2', status:'已启用', updateTime:'2026-06-08 15:30'},
  {code:'LANE_TYPE', name:'车道类型', app:'道路管理', key:'lane_type', count:3, version:'V1', status:'已启用', updateTime:'2026-06-10 09:45'}

var dictPager;

function renderDictTable() {
  var cp = dictPager ? dictPager.getCurrentPage() : 1;
  var ps = dictPager ? dictPager.getPageSize() : 10;
  var start = (cp - 1) * ps;
  var end = start + ps;
  var pageData = dictData.slice(start, end);
  var tbody = document.getElementById('dictTableBody');
  tbody.innerHTML = pageData.map(function(item) {
    var statusClass = item.status === '已启用' ? 'ant-tag-success' : 'ant-tag-default';
    var actionBtn = item.status === '已启用'
      ? '<button class="ant-btn-link danger" onclick="openStopModal()">停用</button>'
      : '<button class="ant-btn-link" style="color:#52c41a" onclick="openEnableModal()">启用</button>';
    return '<tr>' +
      '<td style="text-align:center"><input type="checkbox" class="ant-checkbox dict-row-cb"></td>' +
      '<td>' + item.code + '</td>' +
      '<td>' + item.name + '</td>' +
      '<td>' + item.app + '</td>' +
      '<td>' + item.key + '</td>' +
      '<td style="text-align:center">' + item.count + '</td>' +
      '<td style="text-align:center">' + item.version + '</td>' +
      '<td style="text-align:center"><span class="ant-tag ' + statusClass + '">' + item.status + '</span></td>' +
      '<td>' + item.updateTime + '</td>' +
      '<td class="flex gap-1">' +
        '<button class="ant-btn-link" onclick="openDetailModal()">详情</button>' +
        '<button class="ant-btn-link" onclick="openDictModal()">编辑</button>' +
        actionBtn +
      '</td>' +
    '</tr>';
  }).join('');
  if (dictPager) dictPager.setTotal(dictData.length);
  syncSelectAllState();
}

function toggleSelectAll(el) {
  document.querySelectorAll('#dictTableBody .dict-row-cb').forEach(function(cb) { cb.checked = el.checked; });
}

function syncSelectAllState() {
  var rowCbs = document.querySelectorAll('#dictTableBody .dict-row-cb');
  var allChecked = rowCbs.length > 0 && Array.prototype.every.call(rowCbs, function(cb) { return cb.checked; });
  var sa = document.getElementById('dictSelectAll');
  if (sa) sa.checked = allChecked;
}

dictPager = new Pagination({
  container: 'paginationBar',
  pageSize: 10,
  pageSizeOptions: [10, 20, 50, 100],
  onPageChange: function(page, size) { renderDictTable(); },
  onPageSizeChange: function(size) { renderDictTable(); }
});
renderDictTable();
function openDictModal(){
  openModal('新增字典项',
    '<div class="ant-form-item" id="dictCodeItem"><div class="ant-form-label"><span class="required">*</span>字典编码</div><div class="ant-form-control"><input class="ant-input" id="dictCodeInput" placeholder="请输入字典编码，如：VEHICLE_TYPE"><div class="ant-form-error" style="display:none">请输入字典编码</div></div></div>' +
    '<div class="ant-form-item" id="dictNameItem"><div class="ant-form-label"><span class="required">*</span>字典名称</div><div class="ant-form-control"><input class="ant-input" id="dictNameInput" placeholder="请输入字典名称"><div class="ant-form-error" style="display:none">请输入字典名称</div></div></div>' +
    '<div class="ant-form-item" id="dictAppItem"><div class="ant-form-label"><span class="required">*</span>所属应用</div><div class="ant-form-control"><select class="ant-input" id="dictAppSelect" style="width:100%;padding:6px 12px;border:1px solid #d9d9d9;border-radius:6px"><option value="">请选择</option><option>准入管理</option><option>监测管理</option><option>数据分析</option><option>道路管理</option><option>平台管理</option></select><div class="ant-form-error" style="display:none">请选择所属应用</div></div></div>' +
    '<div class="ant-form-item" id="dictKeyItem"><div class="ant-form-label"><span class="required">*</span>字典键名</div><div class="ant-form-control"><input class="ant-input" id="dictKeyInput" placeholder="请输入字典键名，如：vehicle_type"><div class="ant-form-error" style="display:none">请输入字典键名</div></div></div>' +
    '<div class="ant-form-item" id="dictTypeItem"><div class="ant-form-label"><span class="required">*</span>字典值类型</div><div class="ant-form-control"><select class="ant-input" id="dictTypeSelect" style="width:100%;padding:6px 12px;border:1px solid #d9d9d9;border-radius:6px"><option value="">请选择</option><option>字符串</option><option>整数</option><option>小数</option><option>日期</option><option>布尔</option></select><div class="ant-form-error" style="display:none">请选择字典值类型</div></div></div>' +
    '<div class="ant-form-item"><div class="ant-form-label">排序序号</div><div class="ant-form-control"><input class="ant-input" type="number" placeholder="请输入排序序号"></div></div>' +
    '<div class="ant-form-item"><div class="ant-form-label">是否必填</div><div class="ant-form-control"><label class="inline-flex items-center gap-2"><input type="radio" name="required" checked> 是</label><label class="inline-flex items-center gap-2 ml-4"><input type="radio" name="required"> 否</label></div></div>' +
    '<div class="ant-form-item"><div class="ant-form-label">备注说明</div><div class="ant-form-control"><input class="ant-input" placeholder="请输入备注说明"></div></div>' +
    '<h4 class="text-sm font-semibold text-[#000000d9] mb-3 mt-4 pb-2 border-b border-[#f0f0f0]">字典值列表</h4>' +
    '<div class="ant-table-wrapper mb-2"><table class="ant-table"><thead><tr><th>字典键</th><th>字典值</th><th>排序</th><th>状态</th><th>操作</th></tr></thead><tbody id="dictValueRows">' +
    '<tr><td><input class="ant-input ant-input-sm" placeholder="请输入"></td><td><input class="ant-input ant-input-sm" placeholder="请输入"></td><td><input class="ant-input ant-input-sm" type="number" value="1" style="width:60px"></td><td><span class="ant-tag ant-tag-success">已启用</span></td><td><button class="ant-btn-link danger" onclick="this.closest(\'tr\').remove()">删除</button></td></tr>' +
    '<tr><td><input class="ant-input ant-input-sm" placeholder="请输入"></td><td><input class="ant-input ant-input-sm" placeholder="请输入"></td><td><input class="ant-input ant-input-sm" type="number" value="2" style="width:60px"></td><td><span class="ant-tag ant-tag-success">已启用</span></td><td><button class="ant-btn-link danger" onclick="this.closest(\'tr\').remove()">删除</button></td></tr>' +
    '</tbody></table></div>' +
    '<button class="ant-btn ant-btn-sm" onclick="addDictValueRow()">+ 添加字典值</button>',
    {wide:true,footer:'<button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn ant-btn-primary" onclick="submitDictForm()">确认提交</button>'});
}
function addDictValueRow(){
  var tbody=document.getElementById('dictValueRows');
  if(!tbody)return;
  var rows=tbody.querySelectorAll('tr');
  var newRow=tbody.insertRow();
  newRow.innerHTML='<td><input class="ant-input ant-input-sm" placeholder="请输入"></td><td><input class="ant-input ant-input-sm" placeholder="请输入"></td><td><input class="ant-input ant-input-sm" type="number" value="'+(rows.length+1)+'" style="width:60px"></td><td><span class="ant-tag ant-tag-success">已启用</span></td><td><button class="ant-btn-link danger" onclick="this.closest(\'tr\').remove()">删除</button></td>';
}
function submitDictForm(){
  var isValid=true;
  var checks=[
    {inputId:'dictCodeInput',itemId:'dictCodeItem',msg:'请输入字典编码'},
    {inputId:'dictNameInput',itemId:'dictNameItem',msg:'请输入字典名称'},
    {inputId:'dictKeyInput',itemId:'dictKeyItem',msg:'请输入字典键名'}
  ];
  checks.forEach(function(c){
    var el=document.getElementById(c.inputId);
    var item=document.getElementById(c.itemId);
    var err=item.querySelector('.ant-form-error');
    if(!el||!el.value.trim()){
      item.classList.add('error');if(err){err.textContent=c.msg;err.style.display='block';}
      isValid=false;
    }else{
      item.classList.remove('error');if(err)err.style.display='none';
    }
  });
  var appEl=document.getElementById('dictAppSelect');
  var appItem=document.getElementById('dictAppItem');
  var appErr=appItem.querySelector('.ant-form-error');
  if(!appEl||!appEl.value){
    appItem.classList.add('error');if(appErr){appErr.textContent='请选择所属应用';appErr.style.display='block';}
    isValid=false;
  }else{appItem.classList.remove('error');if(appErr)appErr.style.display='none';}
  var typeEl=document.getElementById('dictTypeSelect');
  var typeItem=document.getElementById('dictTypeItem');
  var typeErr=typeItem.querySelector('.ant-form-error');
  if(!typeEl||!typeEl.value){
    typeItem.classList.add('error');if(typeErr){typeErr.textContent='请选择字典值类型';typeErr.style.display='block';}
    isValid=false;
  }else{typeItem.classList.remove('error');if(typeErr)typeErr.style.display='none';}
  if(!isValid)return;
  closeModal();
  showToast('字典项创建成功','#52c41a');
}

  openModal('字典详情 - VEHICLE_TYPE',
    '<div class="ant-descriptions">' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">字典编码</div><div class="ant-descriptions-value">VEHICLE_TYPE</div><div class="ant-descriptions-label">字典名称</div><div class="ant-descriptions-value">车辆类型</div></div>' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">所属应用</div><div class="ant-descriptions-value">准入管理</div><div class="ant-descriptions-label">字典键名</div><div class="ant-descriptions-value">vehicle_type</div></div>' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">字典值类型</div><div class="ant-descriptions-value">字符串</div><div class="ant-descriptions-label">排序序号</div><div class="ant-descriptions-value">50</div></div>' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">是否必填</div><div class="ant-descriptions-value">是</div><div class="ant-descriptions-label">备注说明</div><div class="ant-descriptions-value">车辆类型</div></div>' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">状态</div><div class="ant-descriptions-value"><span class="ant-tag ant-tag-success">已启用</span></div><div class="ant-descriptions-label">版本</div><div class="ant-descriptions-value">V3</div></div>' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">创建时间</div><div class="ant-descriptions-value">2026-01-10 09:00</div><div class="ant-descriptions-label">最后更新时间</div><div class="ant-descriptions-value">2026-04-25 10:30</div></div>' +
      '<div class="ant-descriptions-row"><div class="ant-descriptions-label">创建人</div><div class="ant-descriptions-value">系统管理员</div><div class="ant-descriptions-label">更新人</div><div class="ant-descriptions-value">系统管理员</div></div>' +
    '</div>' +
    '<h4 class="text-sm font-semibold text-[#000000d9] mb-3 mt-4 pb-2 border-b border-[#f0f0f0]">字典值明细</h4>' +
    '<table class="ant-table"><thead><tr><th>字典键</th><th>字典值</th><th>排序</th><th>状态</th></tr></thead><tbody>' +
    '<tr><td>CAR</td><td>乘用车</td><td>1</td><td><span class="ant-tag ant-tag-success">已启用</span></td></tr>' +
    '<tr><td>BUS</td><td>客车</td><td>2</td><td><span class="ant-tag ant-tag-success">已启用</span></td></tr>' +
    '<tr><td>TRUCK</td><td>货车</td><td>3</td><td><span class="ant-tag ant-tag-success">已启用</span></td></tr>' +
    '<tr><td>SANITATION</td><td>环卫车</td><td>4</td><td><span class="ant-tag ant-tag-success">已启用</span></td></tr>' +
    '<tr><td>LOGISTICS</td><td>物流车</td><td>5</td><td><span class="ant-tag ant-tag-success">已启用</span></td></tr>' +
    '</tbody></table>' +
    '<h4 class="text-sm font-semibold text-[#000000d9] mb-3 mt-4 pb-2 border-b border-[#f0f0f0]">版本记录</h4>' +
    '<table class="ant-table"><thead><tr><th>版本</th><th>更新时间</th><th>操作人</th><th>变更内容</th></tr></thead><tbody>' +
    '<tr><td>V3</td><td>2026-04-25 10:30</td><td>系统管理员</td><td>新增物流车字典值</td></tr>' +
    '<tr><td>V2</td><td>2026-03-15 14:00</td><td>系统管理员</td><td>新增环卫车字典值</td></tr>' +
    '<tr><td>V1</td><td>2026-01-10 09:00</td><td>系统管理员</td><td>初始创建</td></tr>' +
    '</tbody></table>',
    {wide:true,footer:'<button class="ant-btn" onclick="closeModal()">关闭</button>'});
}
function openStopModal(){
  openModal('停用确认',
    '<p class="text-sm text-[#000000d9]">确定要停用该字典项吗？停用后相关功能将无法使用此字典数据，且所有引用该字典的配置将失效。如需重新启用，请在列表中点击启用按钮。</p>',
    {footer:'<button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn ant-btn-danger" onclick="closeModal();alert(\'字典项已停用\')">确定停用</button>'});
}
function openEnableModal(){
  openModal('启用确认',
    '<p class="text-sm text-[#000000d9]">确定要启用该字典项吗？启用后相关功能将可以使用此字典数据。</p>',
    {footer:'<button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn ant-btn-primary" onclick="closeModal();alert(\'字典项已启用\')">确定启用</button>'});
}
function openExportModal(){
  openModal('导出数据',
    '<div class="ant-form-item"><div class="ant-form-label">导出格式</div><div class="ant-form-control"><label class="inline-flex items-center gap-2"><input type="radio" name="format" checked> Excel</label><label class="inline-flex items-center gap-2 ml-4"><input type="radio" name="format"> CSV</label></div></div>' +
    '<div class="ant-form-item"><div class="ant-form-label">导出范围</div><div class="ant-form-control"><label class="inline-flex items-center gap-2"><input type="radio" name="range" checked> 当前页数据</label><label class="inline-flex items-center gap-2 ml-4"><input type="radio" name="range"> 全部数据</label></div></div>',
    {footer:'<button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn ant-btn-primary" onclick="closeModal();alert(\'数据导出成功\')">开始导出</button>'});
}
</script>
<script src="../../common.js"></script>
</body>
</html>
