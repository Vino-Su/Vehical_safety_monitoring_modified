function categoryTag(category){
  return category==='告警'
    ? '<span class="ant-tag ant-tag-error">告警</span>'
    : '<span class="ant-tag ant-tag-processing">预警</span>';
}

function statusTag(status){
  return status==='启用'
    ? '<span class="ant-tag ant-tag-success">启用</span>'
    : '<span class="ant-tag ant-tag-default">停用</span>';
}

function findRule(code){
  return rules.find(function(item){return item.code===code;});
}

function getFilteredRules(){
  var keyword=document.getElementById('filterKeyword').value.trim();
  var category=document.getElementById('filterCategory').value;
  var type=document.getElementById('filterType').value;
  var status=document.getElementById('filterStatus').value;
  var vehicleType=document.getElementById('filterVehicleType').value;
  var scope=document.getElementById('filterScope').value;
  var critical=document.getElementById('filterCritical').value;
  var version=document.getElementById('filterVersion').value.trim();
  return rules.filter(function(rule){
    if(keyword && rule.code.indexOf(keyword)===-1 && rule.type.indexOf(keyword)===-1 && rule.subtype.indexOf(keyword)===-1) return false;
    if(category!=='全部' && rule.category!==category) return false;
    if(type!=='全部' && rule.type!==type) return false;
    if(status!=='全部' && rule.status!==status) return false;
    if(vehicleType!=='全部' && rule.vehicleTypes.indexOf(vehicleType)===-1) return false;
    if(scope!=='全部' && rule.scope!==scope) return false;
    if(critical!=='全部' && (rule.critical?'是':'否')!==critical) return false;
    if(version && rule.version!==version) return false;
    return true;
  });
}

function renderRules(){
  var data=getFilteredRules();
  var total=data.length;
  var pageTotal=Math.max(1,Math.ceil(total/pageSize));
  if(currentPage>pageTotal) currentPage=pageTotal;
  var start=(currentPage-1)*pageSize;
  var pageRows=data.slice(start,start+pageSize);
  var tbody=document.getElementById('ruleTbody');
  tbody.innerHTML=pageRows.map(function(rule){
    var muted=rule.status==='停用'?' class="rule-muted"':'';
    return '<tr'+muted+'>'+
      '<td class="rule-code">'+rule.code+'</td>'+
      '<td>'+categoryTag(rule.category)+'</td>'+
      '<td>'+rule.type+'</td>'+
      '<td><span class="risk-dot '+(rule.critical?'high':'normal')+'"></span>'+rule.subtype+'</td>'+
      '<td><div class="rule-sub" title="'+rule.object+'">'+rule.object+'</div></td>'+
      '<td><div class="rule-sub" title="'+rule.scopeText+'">'+rule.scope+' / '+rule.scopeText+'</div></td>'+
      '<td>'+statusTag(rule.status)+'</td>'+
      '<td>'+rule.version+'</td>'+
      '<td>'+rule.updateTime+'</td>'+
      '<td>'+
        '<button class="ant-btn-link" onclick="openRuleConfigModal(\''+rule.code+'\',\'view\')">查看</button>'+
        '<button class="ant-btn-link" onclick="openRuleConfigModal(\''+rule.code+'\',\'edit\')">配置</button>'+
        '<button class="ant-btn-link" onclick="toggleRuleStatus(\''+rule.code+'\')">'+(rule.status==='启用'?'停用':'启用')+'</button>'+

      '</td>'+
    '</tr>';
  }).join('');
  if(pager){
    pager.setTotal(total);
  }
}

function queryRules(){
  currentPage=1;
  renderRules();
  showToast('查询完成');
}

function resetFilters(){
  ['filterKeyword','filterVersion'].forEach(function(id){document.getElementById(id).value='';});
  ['filterCategory','filterType','filterStatus','filterVehicleType','filterScope','filterCritical'].forEach(function(id){document.getElementById(id).value='全部';});
  currentPage=1;
  var advanced=document.getElementById('advancedFilter');
  var btn=document.getElementById('expandFilterBtn');
  if(advanced) advanced.classList.remove('show');
  if(btn) btn.textContent='展开';
  renderRules();
  showToast('已重置筛选条件');
}

function toggleAdvancedFilter(){
  var advanced=document.getElementById('advancedFilter');
  var btn=document.getElementById('expandFilterBtn');
  if(!advanced) return;
  advanced.classList.toggle('show');
  if(btn) btn.textContent=advanced.classList.contains('show')?'收起':'展开';
}

function toggleRuleStatus(code){
  var rule=findRule(code);
  if(!rule) return;
  var target=rule.status==='启用'?'停用':'启用';
  var isCriticalStop=rule.critical&&target==='停用';
  var modalWidth=isCriticalStop?560:480;
  var extraAlert=isCriticalStop
    ? '<div class="inline-alert warn mb-3"><strong>关键规则停用提醒：</strong>该规则为关键规则，停用后将直接影响监管口径，请谨慎操作并填写停用原因。</div>'
    : '';
  var body=extraAlert+
    '<div class="inline-alert '+(target==='停用'?'warn':'info')+'">确认'+target+'规则“'+rule.subtype+'”？'+(target==='停用'?'停用后不再生成新事件，历史事件保留。':'启用后命中规则将生成异常事件。')+'</div>'+
    '<div class="ant-form-item mt-4"><div class="ant-form-label">'+(isCriticalStop?'<span style="color:#ff4d4f;margin-right:4px">*</span>':'')+target+'原因</div><div class="ant-form-control"><textarea id="singleReason" class="ant-input" rows="3" maxlength="200" style="height:78px!important" placeholder="可填写'+target+'原因，'+(isCriticalStop?'关键规则停用需填写':'非必填')+'" oninput="updateCharCount(this,\'reasonCount\')"></textarea><div id="reasonCount" class="field-help" style="text-align:right;margin-top:2px">0 / 200</div></div></div>';
  openModal('确认'+target+'规则',body,{
    width:modalWidth,
    maskClosable:false,
    footer:'<button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn '+(target==='停用'?'ant-btn-danger':'ant-btn-primary')+'" onclick="applySingleStatus(\''+code+'\',\''+target+'\')">确认'+target+'</button>'
  });
}

function updateCharCount(textarea,counterId){
  var counter=document.getElementById(counterId);
  if(counter) counter.textContent=textarea.value.length+' / 200';
}

function applySingleStatus(code,target){
  var rule=findRule(code);
  if(!rule) return;
  rule.status=target;
  rule.version=nextVersion(rule.version);
  rule.updateTime=nowText();
  closeModal();
  renderRules();
  showToast('规则已'+target);
}

function openRuleConfigModal(code,mode){
  var rule=findRule(code);

function filterMultiSelectOptions(input,groupId){

    opt.style.display=text.indexOf(keyword)>-1?'':'none';

function buildSearchSelectListHTML(id,keyword,items,dependentCompanyId){
  var isVehicleSelect=id.indexOf('scopeVehicle')===0;
  var companyState=dependentCompanyId?window['__ssState_'+dependentCompanyId]:null;
  var companySelected=companyState?companyState.selected:[];
  var stateId='__ssState_'+id;
  var state=window[stateId];
  var selected=state?state.selected:[];

  var groups={};
  var allOptions=[];
  items.forEach(function(item){
    if(typeof item==='string'){
      if(item.indexOf('全部')===0){allOptions.push({value:item,name:item});return;}
      groups['__nogroup__']=groups['__nogroup__']||[];
      groups['__nogroup__'].push(item);
    }else{
      var itemName=item.name||item.code||'';
      if(itemName.indexOf('全部')===0){
        allOptions.push({value:item.value||item.code,name:itemName});
        return;
      }
      var grp=item.group||item.company||'__nogroup__';
      if(grp==='__all__')return;
      groups[grp]=groups[grp]||[];
      groups[grp].push(item);
    }
  });

  var html='';
  allOptions.forEach(function(opt){
    var checked=selected.indexOf(opt.value)>-1;
    if(!keyword || opt.name.indexOf(keyword)>-1){
      html+='<div class="search-select-option '+(checked?'selected':'')+'" data-value="'+opt.value+'" onclick="toggleSearchSelectOption(\''+id+'\',\''+opt.value.replace(/'/g,"\\'")+'\',this)"><span>'+opt.name+'</span><span class="opt-check">✓</span></div>';
    }
  });

  var grpKeys=Object.keys(groups);
  grpKeys.forEach(function(grp){
    if(grp==='__nogroup__')return;
    var grpItems=groups[grp];
    var grpHasMatch=grpItems.some(function(v){
      var label=typeof v==='string'?v:v.name;
      return !keyword||label.indexOf(keyword)>-1;
    });
    if(!grpHasMatch)return;
    html+='<div class="search-select-group">'+grp+'</div>';
    grpItems.forEach(function(item){
      var value=typeof item==='string'?item:item.value||item.code;
      var label=typeof item==='string'?item:item.name||item.code;
      if(dependentCompanyId&&isVehicleSelect){
        if(companySelected.indexOf('全部企业')===-1&&companySelected.length>0){
          var itemCompany=item.company||'';
          if(companySelected.indexOf(itemCompany)===-1)return;
        }
      }
      if(keyword&&label.indexOf(keyword)===-1)return;
      var checked=selected.indexOf(value)>-1;
      html+='<div class="search-select-option '+(checked?'selected':'')+'" data-value="'+value+'" onclick="toggleSearchSelectOption(\''+id+'\',\''+value.replace(/'/g,"\\'")+'\',this)"><span>'+label+'</span><span class="opt-check">✓</span></div>';
    });
  });

  if(groups['__nogroup__']){
    groups['__nogroup__'].forEach(function(item){
      if(keyword&&item.indexOf(keyword)===-1)return;
      var checked=selected.indexOf(item)>-1;
      html+='<div class="search-select-option '+(checked?'selected':'')+'" data-value="'+item+'" onclick="toggleSearchSelectOption(\''+id+'\',\''+item.replace(/'/g,"\\'")+'\',this)"><span>'+item+'</span><span class="opt-check">✓</span></div>';
    });
  }

  if(!html){
    if(isVehicleSelect&&dependentCompanyId&&companySelected.indexOf('全部企业')===-1&&companySelected.length>0){
      return '<div class="search-select-empty">所选企业下暂无车辆可选</div>';
    }
    return '<div class="search-select-empty">未找到匹配项</div>';
  }
  return html;
}

function focusSearchSelect(id){
  var input=document.getElementById(id+'_input');
  if(input) input.focus();
  openSearchSelect(id);
}

function openSearchSelect(id){
  var dropdown=document.getElementById(id+'_dropdown');
  if(!dropdown) return;
  dropdown.classList.add('show');
  renderSearchSelectOptions(id,'');
  var trigger=document.getElementById(id+'_trigger');
  if(trigger) trigger.classList.add('focused');
}

function closeSearchSelect(id){
  var dropdown=document.getElementById(id+'_dropdown');
  if(dropdown) dropdown.classList.remove('show');
  var trigger=document.getElementById(id+'_trigger');
  if(trigger) trigger.classList.remove('focused');
  var input=document.getElementById(id+'_input');
  if(input) input.value='';
  var list=document.getElementById(id+'_list');
  if(list) list.innerHTML='';
}

function filterSearchSelect(id){
  var input=document.getElementById(id+'_input');
  var keyword=input?input.value.trim():'';
  renderSearchSelectOptions(id,keyword);
}

function renderSearchSelectOptions(id,keyword){
  var stateId='__ssState_'+id;
  var state=window[stateId];
  if(!state) return;
  var wrap=document.getElementById(id+'_wrap');
  var dependentId=wrap?wrap.getAttribute('data-dependent'):'';
  var items=state.items;
  var html=buildSearchSelectListHTML(id,keyword,items,dependentId);
  var list=document.getElementById(id+'_list');
  if(list)list.innerHTML=html;
}

function toggleSearchSelectOption(id,value,el){
  var stateId='__ssState_'+id;
  var state=window[stateId];
  if(!state)return;
  var idx=state.selected.indexOf(value);
  var wrap=document.getElementById(id+'_wrap');
  var dependentId=wrap?wrap.getAttribute('data-dependent'):'';
  var isVehicleSelect=id.indexOf('scopeVehicle')===0;

  if(value.indexOf('全部')===0){
    if(idx===-1){state.selected=[value];}
    else{state.selected=state.selected.filter(function(s){return s===value;});}
  }else{
    if(idx>-1){
      state.selected.splice(idx,1);
    }else{
      state.selected.push(value);
      var allIdx=state.selected.findIndex(function(s){return s.indexOf('全部')===0;});
      if(allIdx>-1)state.selected.splice(allIdx,1);
    }
  }

  rebuildSearchSelectTrigger(id);
  var keyword=document.getElementById(id+'_input').value.trim();
  renderSearchSelectOptions(id,keyword);

  if(dependentId&&isVehicleSelect){
    var vehicleState=window['__ssState_'+dependentId];
    if(vehicleState){
      var validValues=state.selected.filter(function(s){
        var item=state.items.find(function(it){
          return (typeof it==='string'?it:it.value)===s;
        });
        if(!item)return true;
        var itemCompany=item.company;
        var companyState2=window['__ssState_'+dependentId];
        var companySelected2=companyState2?companyState2.selected:[];
        if(companySelected2.indexOf('全部企业')>-1||companySelected2.length===0)return true;
        return companySelected2.indexOf(itemCompany)>-1;
      });
      if(validValues.length!==state.selected.length){
        state.selected=validValues;
        rebuildSearchSelectTrigger(id);
      }
    }
  }

  if(dependentId&&id.indexOf('scopeCompany')===0){
    var vehicleId=dependentId;
    var vehicleState=window['__ssState_'+vehicleId];
    if(vehicleState){
      vehicleState.selected=vehicleState.selected.filter(function(v){
        var item=vehicleState.items.find(function(it){
          return (typeof it==='string'?it:it.value)===v;
        });
        if(!item)return true;
        var itemCompany=item.company;
        if(state.selected.indexOf('全部企业')>-1||state.selected.length===0)return true;
        return state.selected.indexOf(itemCompany)>-1;
      });
      rebuildSearchSelectTrigger(vehicleId);
      var vehicleKeyword=document.getElementById(vehicleId+'_input');
      var vKeyword=vehicleKeyword?vehicleKeyword.value.trim():'';
      renderSearchSelectOptions(vehicleId,vKeyword);
    }
  }
}

function rebuildSearchSelectTrigger(id){
  var stateId='__ssState_'+id;
  var state=window[stateId];
  if(!state)return;
  var trigger=document.getElementById(id+'_trigger');
  if(!trigger)return;
  var input=document.getElementById(id+'_input');
  var inputHTML=input?input.outerHTML:'';
  var tagsHTML=state.selected.map(function(s){
    var closeBtn=s.indexOf('全部')===0?'':'<span class="tag-close" onclick="removeSearchSelectTag(\''+id+'\',\''+s.replace(/'/g,"\\'")+'\')">×</span>';
    return '<span class="search-select-tag" data-value="'+s+'"><span class="tag-text">'+s+'</span>'+closeBtn+'</span>';
  }).join('');
  trigger.innerHTML=tagsHTML+inputHTML;
  var newInput=document.getElementById(id+'_input');
  if(newInput)newInput.focus();
}

function removeSearchSelectTag(id,value){
  var stateId='__ssState_'+id;
  var state=window[stateId];
  if(!state)return;
  if(value.indexOf('全部')===0){
    return;
  }
  if(state.selected.length<=1){
    return;
  }
  state.selected=state.selected.filter(function(s){return s!==value;});
  rebuildSearchSelectTrigger(id);
  var input=document.getElementById(id+'_input');
  var keyword=input?input.value.trim():'';
  renderSearchSelectOptions(id,keyword);
}

function onSearchSelectKey(event,id){
  if(event.key==='Backspace'){
    var input=document.getElementById(id+'_input');
    if(input&&input.value===''){
      var stateId='__ssState_'+id;
      var state=window[stateId];
      if(state&&state.selected.length>0){
        state.selected.pop();
        rebuildSearchSelectTrigger(id);
        var keyword='';
        renderSearchSelectOptions(id,keyword);
      }
    }
  }else if(event.key==='Escape'){
    closeSearchSelect(id);
  }
}

document.addEventListener('click',function(e){
  var insideSearchSelect=false;
  var el=e.target;
  while(el&&el!==document.body){
    if(el.classList&&(el.classList.contains('search-select')||el.classList.contains('search-select-trigger')||el.classList.contains('search-select-dropdown'))){
      insideSearchSelect=true;break;
    }
    el=el.parentElement;
  }
  if(!insideSearchSelect){
    document.querySelectorAll('.search-select-dropdown.show').forEach(function(dd){
      dd.classList.remove('show');
    });
    document.querySelectorAll('.search-select-trigger.focused').forEach(function(t){
      t.classList.remove('focused');
    });
  }
});

function fieldRecoverConditions(label,id,subtype,readonly){
  var options=recoverOptionsMap[subtype]||recoverOptionsMap['default'];
  if(readonly){
    var defaultSelected=options.slice(0,2);
    var tags=defaultSelected.map(function(opt){return '<span class="multi-view-tag">'+opt+'</span>';}).join('');
    return '<div><div class="field-label">'+label+'</div><div class="multi-view-list">'+tags+'</div><div class="field-help">至少选择 1 项，当前为只读状态</div></div>';
  }
  var html='<div class="checkbox-grid">';
  options.forEach(function(opt,idx){
    var checked=idx<2?' checked':'';
    html+='<label class="checkbox-pill"><input type="checkbox"'+checked+'>'+opt+'</label>';
  });
  html+='</div>';
  return '<div><div class="field-label"><span style="color:#ff4d4f;margin-right:4px">*</span>'+label+'</div>'+html+'<div class="field-help">至少选择 1 项，根据规则子类型动态显示</div></div>';
}

function syncMultiEnumOption(input){
  var option=input.closest('.multi-enum-option');
  if(option) option.classList.toggle('selected',input.checked);
  var group=input.closest('.multi-enum-grid');
  if(!group) return;
  var inputs=Array.prototype.slice.call(group.querySelectorAll('input[type="checkbox"]'));
  var isAll=input.value.indexOf('全部')===0;
  if(isAll && input.checked){
    inputs.forEach(function(item){
      if(item===input) return;
      item.checked=false;
      var itemOption=item.closest('.multi-enum-option');
      if(itemOption) itemOption.classList.remove('selected');
    });
  }
  if(!isAll && input.checked){
    inputs.forEach(function(item){
      if(item.value.indexOf('全部')!==0) return;
      item.checked=false;
      var itemOption=item.closest('.multi-enum-option');
      if(itemOption) itemOption.classList.remove('selected');
    });
  }
}

function renderTypeLinkageAlert(rule){
  if(rule.type==='测试时段合规性告警'){
    return '<div class="inline-alert info mb-3">字段联动：该事件类型下规则子类型已开启时段来源、高峰时段、宽限时间的差异化配置，请结合实际道路管控要求设置。</div>';
  }
  if(rule.type==='安全员到岗状态告警'){
    return '<div class="inline-alert info mb-3">字段联动：该事件类型下规则子类型已开启排班来源、心跳超时时长、适用安全员类型配置，请结合实际排班情况设置。</div>';
  }
  return '';
}

function renderParamRows(rule,readonly){
  var params=parameterTemplates[rule.subtype]||[];
  var disabled=readonly?' disabled':'';
  var extra='';
  if(rule.subtype==='车速超限'){
    extra='<div class="inline-alert info mb-3">限速来源默认采用道路限速 + 围栏限速，命中时取更严格值。</div>';
  }
  if(rule.subtype==='区域外激活自动驾驶'){
    extra='<div class="inline-alert info mb-3">授权区域来源：授权道路 + 允许通行围栏 + 转场路段。</div>';
  }
  if(rule.subtype==='传感器故障'){
    extra='<div class="inline-alert info mb-3">关键设备范围用于限定触发传感器故障的关键设备类型，未勾选设备不参与故障判定。</div>';
  }
  return extra+'<div class="param-list">'+params.map(function(param){
    if(param.type==='multi'){
      var selected=param.value||[];
      var valueHTML;
      if(readonly){
        valueHTML=selected.map(function(s){return '<span class="multi-view-tag">'+s+'</span>';}).join('');
      }else{
        valueHTML='<div class="multi-enum-grid" style="grid-template-columns:repeat(3,minmax(0,1fr));gap:6px">'+
          param.options.map(function(opt){
            var checked=selected.indexOf(opt)>-1;
            return '<label class="multi-enum-option '+(checked?'selected':'')+'"><input type="checkbox" value="'+opt+'" '+(checked?'checked':'')+' onchange="syncMultiEnumOption(this)"><span>'+opt+'</span></label>';
          }).join('')+'</div>';
      }
      return '<div class="param-row" style="grid-template-columns:1fr"><div><div class="param-name">'+param.label+'</div><div class="param-range">校验范围：'+param.range+'</div></div><div class="mt-2">'+valueHTML+'</div></div>';
    }
    var valueStr=Array.isArray(param.value)?param.value.join('、'):param.value;
    return '<div class="param-row"><div><div class="param-name">'+param.label+'</div><div class="param-range">校验范围：'+param.range+'</div></div><div class="param-input"><input class="ant-input" value="'+valueStr+'"'+disabled+'><span class="param-unit">'+param.unit+'</span></div></div>';
  }).join('')+'</div>';
}

function checkboxGrid(items,readonly){
  return '<div class="checkbox-grid">'+items.map(function(item,idx){
    var checked=idx<4?' checked':'';
    return '<label class="checkbox-pill"><input type="checkbox"'+checked+(readonly?' disabled':'')+'>'+item+'</label>';
  }).join('')+'</div>';
}

function notifySwitch(label,checked,disabled){
  return '<div class="checkbox-pill" style="justify-content:space-between"><span>'+label+'</span>'+switchHTML('',checked,disabled,'')+'</div>';
}

function switchHTML(id,checked,disabled,handler){
  return '<button type="button" '+(id?'id="'+id+'" ':'')+'class="rule-switch '+(checked?'checked ':'')+(disabled?'disabled':'')+'" '+(disabled?'':'onclick="'+(handler||'toggleRuleSwitch(this)')+'"')+'><span></span></button>';
}

function toggleRuleSwitch(el){
  el.classList.toggle('checked');
}

function onEnableSwitchChange(){
  var el=document.getElementById('enableSwitch');
  el.classList.toggle('checked');
  var wrap=document.getElementById('disableReasonWrap');
  if(wrap) wrap.style.display=el.classList.contains('checked')?'none':'block';
}

function saveRuleConfig(code){
  var rule=findRule(code);
  if(!rule) return;
  var enabled=document.getElementById('enableSwitch').classList.contains('checked');
  var reason=document.getElementById('disableReason');
  if(reason && reason.value.length>200){
    showToast('停用原因最多 200 字符');
    return;
  }
  rule.status=enabled?'启用':'停用';
  rule.version=nextVersion(rule.version);
  rule.updateTime=nowText();
  closeModal();
  renderRules();
  showToast('规则配置已保存');
}

function confirmRestoreDefault(code){
  var rule=findRule(code);
  if(!rule) return;
  openModal('确认恢复默认参数','<div class="inline-alert warn">确认将“'+rule.subtype+'”恢复为系统默认参数？恢复后需点击保存配置才会生效。</div>',{width:480,maskClosable:false,footer:'<button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn ant-btn-primary" onclick="applyDefaultValues()">确认恢复</button>'});
}

function applyDefaultValues(){
  closeModal();
  showToast('已恢复为默认参数，保存后生效');
}

function openVersionHistory(code){
  var rule=findRule(code);
  if(!rule) return;
  currentVersionCode=code;
  var rows=versionData.map(function(item,idx){
    return '<tr>'+
      '<td>'+item.version+'</td><td>'+item.action+'</td><td>'+item.summary+'</td><td>'+item.operator+'</td><td>'+item.time+'</td><td>'+item.reason+'</td>'+
      '<td><button class="ant-btn-link" onclick="selectVersionSnapshot('+idx+')">查看</button><button class="ant-btn-link" onclick="confirmRestoreVersion('+idx+')">恢复此版本</button></td>'+
    '</tr>';
  }).join('');
  var body='<div class="version-layout">'+
    '<div><div class="inline-alert info mb-3">当前配置：'+rule.version+'，'+rule.updateTime+'，状态 '+rule.status+'。</div><div style="overflow-x:auto"><table class="ant-table"><thead><tr><th>版本号</th><th>操作类型</th><th>变更摘要</th><th>操作人</th><th>操作时间</th><th>操作原因</th><th>操作</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>'+
    '<div class="version-detail" id="versionDetail"></div>'+
  '</div>';
  openModal('版本历史 - '+rule.subtype,body,{width:920,maxHeight:'82vh',maskClosable:false,footer:'<button class="ant-btn" onclick="closeModal()">关闭</button>'});
  setTimeout(function(){selectVersionSnapshot(0);},50);
}

function selectVersionSnapshot(index){
  var rule=findRule(currentVersionCode);
  var item=versionData[index]||versionData[0];
  var detail=document.getElementById('versionDetail');
  if(!detail || !rule || !item) return;
  detail.innerHTML='<div class="config-section-title mb-3">版本配置快照</div>'+
    '<div class="snapshot-row"><span>规则子类型</span><span>'+rule.subtype+'</span></div>'+
    '<div class="snapshot-row"><span>版本号</span><span>'+item.version+'</span></div>'+
    '<div class="snapshot-row"><span>状态</span><span>'+rule.status+'</span></div>'+
    '<div class="snapshot-row"><span>适用范围</span><span>'+rule.scopeText+'</span></div>'+
    '<div class="snapshot-row"><span>主要参数</span><span>'+paramSummary(rule)+'</span></div>'+
    '<div class="snapshot-row"><span>变更摘要</span><span>'+item.summary+'</span></div>'+
    '<div class="snapshot-row"><span>操作人</span><span>'+item.operator+'</span></div>'+
    '<div class="snapshot-row"><span>操作时间</span><span>'+item.time+'</span></div>';
}

function confirmRestoreVersion(index){
  var rule=findRule(currentVersionCode);
  var item=versionData[index];
  if(!rule || !item) return;
  if(item.version===rule.version){
    showToast('当前已是该版本配置，无需恢复');
    return;
  }
  openModal('确认恢复历史版本','<div class="inline-alert warn">确认将“'+rule.subtype+'”恢复为 '+item.version+' 的配置？恢复后会生成新的当前版本。</div>',{width:480,maskClosable:false,footer:'<button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn ant-btn-primary" onclick="applyRestoreVersion()">确认恢复</button>'});
}

function applyRestoreVersion(){
  var rule=findRule(currentVersionCode);
  if(rule){
    rule.version=nextVersion(rule.version);
    rule.updateTime=nowText();
  }
  closeModal();
  renderRules();
  showToast('已恢复历史版本');
}

function paramSummary(rule){
  var params=parameterTemplates[rule.subtype]||[];
  return params.slice(0,3).map(function(p){return p.label+' '+p.value+(p.unit||'');}).join('，');
}

function nextVersion(version){
  var parts=version.replace('V','').split('.');
  var major=parts[0]||'1';
  var minor=parseInt(parts[1]||'0',10)+1;
  return 'V'+major+'.'+minor;
}

function nowText(){
  var d=new Date();
  var pad=function(n){return n<10?'0'+n:''+n;};
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
}

function showToast(msg){
  var existing=document.querySelector('.toast-msg');
  if(existing) existing.remove();
  var toast=document.createElement('div');
  toast.className='toast-msg';
  toast.textContent=msg;
  document.body.appendChild(toast);
  setTimeout(function(){
    toast.style.transition='opacity .3s';
    toast.style.opacity='0';
    setTimeout(function(){if(toast.parentNode) toast.remove();},300);
  },2200);
}

document.addEventListener('DOMContentLoaded',function(){
  initPager();
  renderRules();
});
</script>
