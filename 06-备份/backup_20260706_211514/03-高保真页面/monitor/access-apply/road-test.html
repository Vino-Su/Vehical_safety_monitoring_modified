function getOps(d){var ops=['<button class="ant-btn-link text-[12px] whitespace-nowrap" onclick="openDetail(\''+d.id+'\')">查看</button>'];if(d.status==='draft')ops.push('<button class="ant-btn-link text-[12px] whitespace-nowrap">编辑</button>','<button class="ant-btn-link text-[12px] whitespace-nowrap">提交</button>');if(d.status==='rejected')ops.push('<button class="ant-btn-link text-[12px] whitespace-nowrap">重新提交</button>');if(d.status==='pending_review'||d.status==='pending_committee'||d.status==='pending_expert')ops.push('<button class="ant-btn-link text-[12px] whitespace-nowrap">撤回</button>');if(d.status==='active'){ops.push('<button class="ant-btn-link text-[12px] whitespace-nowrap" onclick="openReportSubmitPage(\''+d.id+'\')">报告提交</button>');var hasPendingDerive=appData.some(function(a){return a.origId===d.id&&['draft','pending_review','pending_committee','pending_committee_confirm','pending_expert','pending_meeting','pending_plate'].indexOf(a.status)>-1;});var dAttr=hasPendingDerive?' disabled style="color:#00000040;cursor:not-allowed" title="存在进行中的派生申请，延期/变更/新增车辆三类互斥（见PRD 4.14）"':'';var cRenew=hasPendingDerive?'':('onclick="openRenewalPage(\''+d.id+'\')"');var cChange=hasPendingDerive?'':('onclick="openChangePage(\''+d.id+'\')"');var cAddV=hasPendingDerive?'':('onclick="openAddVehiclePage(\''+d.id+'\')"');var vt=new Date(d.validTo);var nm=new Date();var tm=new Date(nm.getTime()+60*24*60*60*1000);if(vt<=tm)ops.push('<button class="ant-btn-link text-[12px] whitespace-nowrap" '+cRenew+dAttr+'>延期</button>');ops.push('<button class="ant-btn-link text-[12px] whitespace-nowrap" '+cChange+dAttr+'>变更</button>','<button class="ant-btn-link text-[12px] whitespace-nowrap" '+cAddV+dAttr+'>新增相同配置车辆</button>');}if(d.status==='pending_plate')ops.push('<button class="ant-btn-link text-[12px] whitespace-nowrap" onclick="openPlateUploadModal(\''+d.id+'\')">上传牌照</button>');return ops.join('');}

function toggleMultiSelect(id){var panel=document.getElementById(id+'Panel');panel.classList.toggle('show');}

function updateMultiSelectLabel(id){var vals=getMultiSelectValues(id);var label=document.getElementById(id+'Label');label.textContent=vals.length===0?'全部':vals.length+'项已选';label.style.color=vals.length===0?'#00000073':'#1677ff';}
var currentValidFilter='all';
function toggleDropdown(id){var el=document.getElementById(id);el.style.display=el.style.display==='none'?'block':'none';}
function selectValid(val,label){currentValidFilter=val;var sel=document.getElementById('fValid');sel.innerHTML=label+'<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>';document.getElementById('validDropdown').style.display='none';}
document.addEventListener('click',function(e){document.querySelectorAll('.multi-select').forEach(function(ms){if(!ms.contains(e.target)){ms.querySelector('.multi-select-panel').classList.remove('show');}});if(!e.target.closest('#fValid')&&!e.target.closest('#validDropdown')){var vd=document.getElementById('validDropdown');if(vd)vd.style.display='none';}});

function resetFilter(){document.getElementById('fAppId').value='';document.querySelectorAll('#msStatusPanel input[type=checkbox]').forEach(function(cb){cb.checked=false;});updateMultiSelectLabel('msStatus');currentValidFilter='all';var sel=document.getElementById('fValid');sel.innerHTML='全部<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>';if(pager)pager.reset();renderTable();}

function openRoadSelectModal(){currentRoadTab='road';var tabHtml='<div class="flex items-center gap-2 mb-3 border-b border-[#f0f0f0]"><div id="roadTabBtn" class="px-4 py-2 cursor-pointer text-sm font-medium border-b-2 border-[#1677ff] text-[#1677ff]" onclick="switchRoadTab(\'road\')">路段（'+roadData.length+'条）</div><div id="areaTabBtn" class="px-4 py-2 cursor-pointer text-sm font-medium border-b-2 border-transparent text-[#00000073]" onclick="switchRoadTab(\'area\')">区域（'+areaData.length+'个）</div></div><div class="flex items-center gap-2 mb-3"><input id="roadSearchInput" class="ant-input" placeholder="请输入名称搜索" style="width:240px" oninput="renderRoadSelectTable()"><span class="text-xs text-[#00000073]">支持模糊搜索</span></div><div id="roadSelectTableWrap"></div><div id="roadSelectPager" class="flex items-center justify-end gap-2 mt-3 text-xs"></div>';openModal('选择测试路段或区域',tabHtml,{wide:true,footer:'<button class="ant-btn" onclick="closeModal()">取消</button><button class="ant-btn ant-btn-primary" onclick="confirmRoadSelect()">确认选择</button>',onOpen:function(){renderRoadSelectTable();}});}
function switchRoadTab(tab){currentRoadTab=tab;var rb=document.getElementById('roadTabBtn');var ab=document.getElementById('areaTabBtn');if(tab==='road'){rb.className='px-4 py-2 cursor-pointer text-sm font-medium border-b-2 border-[#1677ff] text-[#1677ff]';ab.className='px-4 py-2 cursor-pointer text-sm font-medium border-b-2 border-transparent text-[#00000073]';}else{rb.className='px-4 py-2 cursor-pointer text-sm font-medium border-b-2 border-transparent text-[#00000073]';ab.className='px-4 py-2 cursor-pointer text-sm font-medium border-b-2 border-[#1677ff] text-[#1677ff]';}var inp=document.getElementById('roadSearchInput');if(inp)inp.value='';renderRoadSelectTable();}
function renderRoadSelectTable(){var isRoad=currentRoadTab==='road';var src=isRoad?roadData:areaData;var selected=isRoad?selectedRoads:selectedAreas;var kw=(document.getElementById('roadSearchInput').value||'').trim();var filtered=src.map(function(r,i){return{i:i,d:r};}).filter(function(x){return kw===''||x.d.name.indexOf(kw)>-1;});var nameCol=isRoad?'道路名称':'区域名称';var typeCol=isRoad?'道路类型':'区域类型';var statusCol=isRoad?'道路状态':'开放状态';var ps=5;var cp=selectModalPager['roadSelect']||1;var total=filtered.length;var start=(cp-1)*ps;var pageData=filtered.slice(start,start+ps);var h='<table class="ant-table" style="width:100%;font-size:13px"><thead><tr><th style="width:40px"><input type="checkbox" class="ant-checkbox" onclick="toggleAllRoadSel(this)"></th><th>'+nameCol+'</th><th>'+typeCol+'</th><th style="width:100px">'+statusCol+'</th></tr></thead><tbody>';if(pageData.length===0){h+='<tr><td colspan="4" style="text-align:center;color:#00000073;padding:24px">暂无数据</td></tr>';}else{pageData.forEach(function(x){var ck=selected.indexOf(x.i)>-1?'checked':'';h+='<tr><td><input type="checkbox" class="ant-checkbox road-sel-cb" data-idx="'+x.i+'" '+ck+'></td><td>'+x.d.name+'</td><td>'+x.d.type+'</td><td><span class="ant-tag '+(x.d.status==='开放'?'ant-tag-success':'ant-tag-default')+'">'+x.d.status+'</span></td></tr>';});}h+='</tbody></table>';document.getElementById('roadSelectTableWrap').innerHTML=h;var totalPages=Math.max(1,Math.ceil(total/ps));var ph='<span>共 '+total+' 条</span><button class="ant-btn ant-btn-sm" '+((cp<=1)?'disabled style="opacity:0.5"':'onclick="roadSelPage('+(cp-1)+')"')+'>上一页</button><span>第 '+cp+' / '+totalPages+' 页</span><button class="ant-btn ant-btn-sm" '+((cp>=totalPages)?'disabled style="opacity:0.5"':'onclick="roadSelPage('+(cp+1)+')"')+'>下一页</button>';document.getElementById('roadSelectPager').innerHTML=ph;}
function roadSelPage(p){selectModalPager['roadSelect']=p;renderRoadSelectTable();}
function toggleAllRoadSel(el){var cbs=document.querySelectorAll('.road-sel-cb');for(var i=0;i<cbs.length;i++)cbs[i].checked=el.checked;}
function confirmRoadSelect(){var cbs=document.querySelectorAll('.road-sel-cb');if(currentRoadTab==='road'){selectedRoads=[];for(var i=0;i<cbs.length;i++){if(cbs[i].checked)selectedRoads.push(parseInt(cbs[i].dataset.idx));}}else{selectedAreas=[];for(var i=0;i<cbs.length;i++){if(cbs[i].checked)selectedAreas.push(parseInt(cbs[i].dataset.idx));}}closeModal();renderRoadTable();}

function getFlowSteps(type,status){var isInit=(type==='initial');var steps=[];steps.push({label:'提交申请',done:true});steps.push({label:'第三方初审',done:status!=='draft'});if(isInit){steps.push({label:'市工作专班审核',done:['pending_expert','pending_meeting','pending_plate','active','expired','terminated'].indexOf(status)>-1});steps.push({label:'专家评审',done:['pending_meeting','pending_plate','active','expired','terminated'].indexOf(status)>-1});steps.push({label:'专班专题会议审议',done:['pending_plate','active','expired','terminated'].indexOf(status)>-1});}else{steps.push({label:'市工作专班审核确认',done:['pending_plate','active','expired','terminated'].indexOf(status)>-1});}steps.push({label:'上传临时牌照',done:['active','expired','terminated'].indexOf(status)>-1});if(status==='rejected'){steps[steps.length-1].error=true;steps[steps.length-1].done=false;}if(status==='terminated'){steps.push({label:'已终止',done:true,error:true});}return steps;}

function openPlateUploadModal(id){currentPlateAppId=id;var dd=getDetailData(id);var plateSet=appData.reduce(function(s,a){if(a.id!==id&&a.plate){s[a.plate]=true;}return s;},{});var uploadedCount=0;var totalCount=dd.vehicles.length;var rows=dd.vehicles.map(function(v,i){var hasPlate=v.plate&&v.plate!=='-'&&v.plate!=='';var hasExpiry=v.plateExpiry&&v.plateExpiry!=='-'&&v.plateExpiry!=='';if(hasPlate&&hasExpiry)uploadedCount++;var exists=hasPlate&&plateSet[v.plate];var plateText=hasPlate?v.plate:'';var expiryText=hasExpiry?v.plateExpiry:'';var plateState=hasPlate?'<span class="text-[#52c41a]">✓ '+plateText+'</span>':'<span class="text-[#00000040]">—</span>';return '<tr data-vin="'+v.vin+'"><td>'+(i+1)+'</td><td class="font-mono text-xs">'+v.vin+'</td><td>'+(v.manufacturer||v.brand||'-')+'</td><td>'+(v.model||'-')+'</td><td><span class="ant-tag '+(v.level==='L4'?'ant-tag-success':'ant-tag-processing')+'">'+v.level+'</span></td><td><span class="ant-plate-cell-'+v.vin+'">'+plateState+'</span><input class="ant-input plate-input-'+v.vin+' hidden" placeholder="如：鄂F·A001" style="width:120px;font-size:12px" data-orig="'+plateText+'"></td><td><span class="ant-expiry-cell-'+v.vin+'">'+expiryText+'</span><input type="date" class="ant-input plate-expiry-'+v.vin+' hidden" style="width:140px;font-size:12px"></td><td class="flex gap-1 flex-wrap"><button class="ant-btn-link ant-btn-sm ant-plate-edit-'+v.vin+'" onclick="enterPlateEdit(\''+v.vin+'\')">编辑</button><button class="ant-btn-link ant-btn-sm ant-plate-save-'+v.vin+' hidden" onclick="savePlateEdit(\''+v.vin+'\')">保存</button><button class="ant-btn-link ant-btn-sm ant-plate-cancel-'+v.vin+' hidden" onclick="cancelPlateEdit(\''+v.vin+'\')">取消</button>'+(exists?'<span class="text-xs text-[#ff4d4f] ml-1" title="该临牌号已在其他申请中使用">⚠ 已存在</span>':'')+'</td></tr>';}).join('');var progressHtml='<div id="plateProgressBar" class="bg-[#fafafa] border border-[#f0f0f0] rounded-lg p-3 mb-3 text-sm flex items-center gap-3"><span class="text-[#00000073]">牌照上传进度：</span><span class="font-medium text-[#1677ff]">'+uploadedCount+' / '+totalCount+'</span><span class="text-xs text-[#00000073]">'+(uploadedCount===totalCount?'<span class="ant-tag ant-tag-success">全部已上传</span>':(uploadedCount>0?'<span class="ant-tag ant-tag-processing">部分已上传</span>':'<span class="ant-tag ant-tag-warning">待全部上传</span>'))+'</span>'+(uploadedCount===totalCount?'<span class="text-xs text-[#52c41a]">✓ 全部上传完成后流程状态将自动变更为「已生效」</span>':'')+'</div>';var html=progressHtml+'<div style="overflow-x:auto"><table class="ant-table" style="width:100%;font-size:13px"><thead><tr><th style="width:40px">序号</th><th style="width:160px">VIN码</th><th>生产企业</th><th style="width:140px">车辆型号</th><th style="width:80px">级别</th><th style="width:180px">临时牌照号</th><th style="width:160px">有效期至</th><th class="col-action">操作</th></tr></thead><tbody>'+rows+'</tbody></table></div>';openModal('牌照上传 - '+id,html,{wide:true,footer:'<button class="ant-btn" onclick="closeModal()">关闭</button>'});}
function enterPlateEdit(vin){var cell=document.querySelector('.ant-plate-cell-'+vin);var expiry=document.querySelector('.ant-expiry-cell-'+vin);var input=document.querySelector('.plate-input-'+vin);var expiryInput=document.querySelector('.plate-expiry-'+vin);var editBtn=document.querySelector('.ant-plate-edit-'+vin);var saveBtn=document.querySelector('.ant-plate-save-'+vin);var cancelBtn=document.querySelector('.ant-plate-cancel-'+vin);if(cell)cell.classList.add('hidden');if(expiry)expiry.classList.add('hidden');if(input){input.classList.remove('hidden');input.value=input.dataset.orig||'';input.focus();}if(expiryInput){expiryInput.classList.remove('hidden');expiryInput.value=expiry.textContent.trim()!=='-'?expiry.textContent.trim():'';}if(editBtn)editBtn.classList.add('hidden');if(saveBtn)saveBtn.classList.remove('hidden');if(cancelBtn)cancelBtn.classList.remove('hidden');}
function cancelPlateEdit(vin){var cell=document.querySelector('.ant-plate-cell-'+vin);var expiry=document.querySelector('.ant-expiry-cell-'+vin);var input=document.querySelector('.plate-input-'+vin);var expiryInput=document.querySelector('.plate-expiry-'+vin);var editBtn=document.querySelector('.ant-plate-edit-'+vin);var saveBtn=document.querySelector('.ant-plate-save-'+vin);var cancelBtn=document.querySelector('.ant-plate-cancel-'+vin);if(cell)cell.classList.remove('hidden');if(expiry)expiry.classList.remove('hidden');if(input)input.classList.add('hidden');if(expiryInput)expiryInput.classList.add('hidden');if(editBtn)editBtn.classList.remove('hidden');if(saveBtn)saveBtn.classList.add('hidden');if(cancelBtn)cancelBtn.classList.add('hidden');}
function savePlateEdit(vin){var input=document.querySelector('.plate-input-'+vin);var expiryInput=document.querySelector('.plate-expiry-'+vin);var val=(input?input.value.trim():'');var exp=(expiryInput?expiryInput.value.trim():'');if(!val){alert('请输入临时牌照号');return;}if(!exp){alert('请选择有效期');return;}var appId=currentPlateAppId;var plateSet=appData.reduce(function(s,a){if(a.id!==appId&&a.plate){s[a.plate]=true;}return s;},{});if(plateSet[val]){alert('临牌号 '+val+' 已在其他申请中使用，请更换');return;}var dd=getDetailData(appId);var target=dd.vehicles.find(function(x){return x.vin===vin;});if(target){target.plate=val;target.plateExpiry=exp;}var cell=document.querySelector('.ant-plate-cell-'+vin);var expiry=document.querySelector('.ant-expiry-cell-'+vin);if(cell){cell.innerHTML='<span class="text-[#52c41a]">✓ '+val+'</span>';}if(expiry)expiry.textContent=exp;if(input)input.dataset.orig=val;cancelPlateEdit(vin);var allUploaded=dd.vehicles.every(function(v){return v.plate&&v.plate!=='-'&&v.plate!==''&&v.plateExpiry&&v.plateExpiry!=='-'&&v.plateExpiry!=='';});var targetApp=appData.find(function(x){return x.id===appId;});var statusChanged=false;if(allUploaded&&targetApp&&targetApp.status==='pending_plate'){targetApp.status='active';statusChanged=true;}showToastMsg(statusChanged?'临牌号保存成功，所有车辆牌照已上传，流程状态变更为「已生效」':'临牌号保存成功');var progressEl=document.getElementById('plateProgressBar');if(progressEl){var uploadedCount=dd.vehicles.filter(function(v){return v.plate&&v.plate!=='-'&&v.plate!==''&&v.plateExpiry&&v.plateExpiry!=='-'&&v.plateExpiry!=='';}).length;progressEl.innerHTML='<span class="text-[#00000073]">牌照上传进度：</span><span class="font-medium text-[#1677ff]">'+uploadedCount+' / '+dd.vehicles.length+'</span><span class="text-xs text-[#00000073]">'+(uploadedCount===dd.vehicles.length?'<span class="ant-tag ant-tag-success">全部已上传</span>':(uploadedCount>0?'<span class="ant-tag ant-tag-processing">部分已上传</span>':'<span class="ant-tag ant-tag-warning">待全部上传</span>'))+'</span>'+(uploadedCount===dd.vehicles.length?'<span class="text-xs text-[#52c41a]">✓ 全部上传完成后流程状态将自动变更为「已生效」</span>':'');}if(statusChanged){renderTable();}}
var currentPlateAppId='';function getCurrentPlateAppId(){return currentPlateAppId;}function showToastMsg(msg){var t=document.createElement('div');t.style.cssText='position:fixed;top:20px;right:20px;z-index:9999;background:#fff;padding:12px 20px;border-radius:6px;box-shadow:0 6px 16px rgba(0,0,0,0.1);font-size:13px;border-left:3px solid #52c41a;color:#000000d9';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.style.opacity='0';t.style.transition='0.3s';setTimeout(function(){t.remove();},300);},2000);}

// 自测用：URL hash 自动触发目标弹窗
// #detail = 查看详情弹窗；#apply = 新增申请弹窗；#fullscreen = 查看详情 + 真实点击全屏按钮（验证 onclick 路径）
(function(){
  var h=location.hash;
  if(!h) return;
  if(h==='#detail') setTimeout(function(){ openDetail('RT202604001'); },400);
  else if(h==='#apply') setTimeout(function(){ openApplyModal(); },400);
  else if(h==='#fullscreen'){
    setTimeout(function(){ openDetail('RT202604001'); },400);

    setTimeout(function(){
      var btn = document.getElementById('ant-modal-fs-btn');
      if(btn) btn.click();
    }, 800);
  }
})();
